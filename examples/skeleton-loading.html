<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading - EaseMotion CSS</title>
  
  <link rel="stylesheet" href="../core/base.css">
  <link rel="stylesheet" href="../core/variables.css">
  <link rel="stylesheet" href="../core/utilities.css">
  <link rel="stylesheet" href="../core/animations.css">
</head>
<body class="ease-bg-neutral ease-flex ease-center ease-padding-10 ease-flex-col ease-gap-8" style="min-height: 100vh;">

  <div class="ease-bg-surface ease-padding-6 ease-rounded-lg ease-shadow-md" style="width: 320px;">
    <h3 class="ease-text-lg ease-mb-4 ease-text-muted">Shimmer Effect</h3>
    
    <div class="ease-skeleton-block ease-skeleton-shimmer ease-w-full ease-mb-4" style="height: 160px;"></div>
    <div class="ease-skeleton-block ease-skeleton-shimmer ease-w-full ease-mb-2" style="height: 24px;"></div>
    <div class="ease-skeleton-block ease-skeleton-shimmer ease-w-full ease-mb-2" style="height: 14px;"></div>
    <div class="ease-skeleton-block ease-skeleton-shimmer" style="height: 14px; width: 65%;"></div>
  </div>

  <div class="ease-bg-surface ease-padding-6 ease-rounded-lg ease-shadow-md" style="width: 320px;">
    <h3 class="ease-text-lg ease-mb-4 ease-text-muted">Pulse Effect</h3>
    
    <div class="ease-skeleton-block ease-skeleton-pulse ease-w-full ease-mb-4" style="height: 160px;"></div>
    <div class="ease-skeleton-block ease-skeleton-pulse ease-w-full ease-mb-2" style="height: 24px;"></div>
    <div class="ease-skeleton-block ease-skeleton-pulse ease-w-full ease-mb-2" style="height: 14px;"></div>
    <div class="ease-skeleton-block ease-skeleton-pulse" style="height: 14px; width: 65%;"></div>
  </div>

</body>
</html>
