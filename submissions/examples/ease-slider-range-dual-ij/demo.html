<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-slider-range-dual</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="srd-wrapper">
    <div class="srd-container">
      <div class="srd-sliders">
        <div class="srd-track">
          <div class="srd-fill" style="--min: 25; --max: 75;"></div>
        </div>
        <input type="range" class="srd-range srd-min" min="0" max="100" value="25">
        <input type="range" class="srd-range srd-max" min="0" max="100" value="75">
      </div>
      <div class="srd-values">
        <span class="srd-val srd-val-min">25</span>
        <span class="srd-val srd-val-max">75</span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var minRange = document.querySelector('.srd-min');
      var maxRange = document.querySelector('.srd-max');
      var fill = document.querySelector('.srd-fill');
      var valMin = document.querySelector('.srd-val-min');
      var valMax = document.querySelector('.srd-val-max');

      function update() {
        var min = parseInt(minRange.value);
        var max = parseInt(maxRange.value);

        if (min > max) {
          if (this === minRange) {
            max = min;
            maxRange.value = min;
          } else {
            min = max;
            minRange.value = max;
          }
        }

        fill.style.setProperty('--min', min);
        fill.style.setProperty('--max', max);
        valMin.textContent = min;
        valMax.textContent = max;
      }

      minRange.addEventListener('input', update);
      maxRange.addEventListener('input', update);
    })();
  </script>
</body>
</html>
