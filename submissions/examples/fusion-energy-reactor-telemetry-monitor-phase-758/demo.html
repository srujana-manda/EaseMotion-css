<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion Reactor Telemetry — Phase #758</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="telemetry-header fade-in">
    <div class="brand">STELLARATOR-X IGNITION</div>
    <div class="ign-status">
      <div class="ign-box">
        <span class="ign-val">1.04</span>
        <span class="ign-lbl">Q-Factor</span>
      </div>
      <div class="ign-box">
        <span class="ign-val" style="color: var(--clr-plasma); text-shadow: var(--glow-plasma);">150M °C</span>
        <span class="ign-lbl">Plasma Temp</span>
      </div>
      <div class="ign-box">
        <span class="ign-val" style="color: #fff; text-shadow: none;">CONTAINED</span>
        <span class="ign-lbl">Core State</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Magnetic Fields -->
    <aside class="panel fade-up">
      <div class="panel-title">Poloidal Field Coils</div>
      
      <div class="mag-group">
        <div class="mag-hdr"><span>PF-1 (Inner)</span> <span class="mag-val">12.4 T</span></div>
        <div class="flux-bar"><div class="flux-fill" style="width: 85%;"></div></div>
        <div class="coil-status">
          <div class="coil-node active"></div><div class="coil-node active"></div><div class="coil-node active"></div><div class="coil-node"></div>
        </div>
      </div>

      <div class="mag-group">
        <div class="mag-hdr"><span>PF-2 (Outer)</span> <span class="mag-val">9.1 T</span></div>
        <div class="flux-bar"><div class="flux-fill" style="width: 60%;"></div></div>
        <div class="coil-status">
          <div class="coil-node active"></div><div class="coil-node active"></div><div class="coil-node"></div><div class="coil-node"></div>
        </div>
      </div>

      <div class="mag-group">
        <div class="mag-hdr"><span>Central Solenoid</span> <span class="mag-val" style="color: var(--clr-alert)">14.8 T</span></div>
        <div class="flux-bar" style="border-color: var(--clr-alert);"><div class="flux-fill" style="width: 98%; background: var(--clr-alert); box-shadow: 0 0 15px var(--clr-alert);"></div></div>
        <div class="coil-status">
          <div class="coil-node alert"></div><div class="coil-node alert"></div><div class="coil-node alert"></div><div class="coil-node alert"></div>
        </div>
      </div>
    </aside>

    <!-- Center: 3D Tokamak Plasma Torus -->
    <section class="panel reactor-panel fade-in delay-1" style="background: transparent; border: none; box-shadow: none; backdrop-filter: none;">
      <div class="reactor-view">
        <div class="torus">
          <div class="torus-ring"></div>
          <div class="torus-ring"></div>
          <div class="torus-ring"></div>
        </div>
        <div class="core-heat"></div>
      </div>
    </section>

    <!-- Right Sidebar: Fuel & Thermal -->
    <aside class="panel fade-up delay-2">
      <div class="panel-title">Fuel Injection & Exhaust</div>
      
      <div class="fuel-box">
        <span class="fuel-name">Deuterium (D2)</span>
        <span class="fuel-rate">4.2 mg/s</span>
      </div>
      <div class="fuel-box">
        <span class="fuel-name">Tritium (T2)</span>
        <span class="fuel-rate">4.1 mg/s</span>
      </div>

      <div class="panel-title" style="margin-top: 2rem;">Thermal Divertor Load</div>
      
      <div class="thermal-graph">
        <div class="graph-line"></div>
      </div>
      <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--clr-text-dim); margin-top: 0.5rem;">
        <span>MW/m²</span>
        <span style="color: var(--clr-alert)">PEAK: 12.4</span>
      </div>

    </aside>

  </main>

</body>
</html>
