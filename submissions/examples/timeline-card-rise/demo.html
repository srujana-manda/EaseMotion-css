<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline Card Rise</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="timeline-stage" aria-label="Timeline card rise animation demo">
      <section class="timeline">
        <article style="--delay: 0ms">
          <strong>09:00</strong>
          <p>Design review completed.</p>
        </article>
        <article style="--delay: 140ms">
          <strong>10:30</strong>
          <p>Prototype sent for testing.</p>
        </article>
      </section>
    </main>
  </body>
</html>
