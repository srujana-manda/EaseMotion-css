<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated CSS Carousel - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-wrapper-qn">
        <h2>Pure CSS Image Carousel</h2>
        <p>Click the dots below to slide between images</p>
        
        <!-- Carousel Container -->
        <div class="carousel-container-qn">
            <!-- Hidden Radio Inputs for State Management -->
            <input type="radio" name="carousel-qn" id="slide1-qn" checked>
            <input type="radio" name="carousel-qn" id="slide2-qn">
            <input type="radio" name="carousel-qn" id="slide3-qn">

            <!-- Image Viewport -->
            <div class="carousel-viewport-qn">
                <div class="carousel-track-qn">
                    <!-- Slide 1 -->
                    <div class="carousel-slide-qn">
                        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Mountain Landscape">
                        <div class="slide-caption-qn">Mountain Landscape</div>
                    </div>
                    <!-- Slide 2 -->
                    <div class="carousel-slide-qn">
                        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80" alt="Foggy Forest">
                        <div class="slide-caption-qn">Foggy Forest</div>
                    </div>
                    <!-- Slide 3 -->
                    <div class="carousel-slide-qn">
                        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80" alt="Sunlit Trees">
                        <div class="slide-caption-qn">Sunlit Trees</div>
                    </div>
                </div>
            </div>

            <!-- Navigation Dots -->
            <div class="carousel-controls-qn">
                <label for="slide1-qn" class="carousel-dot-qn" aria-label="Go to slide 1"></label>
                <label for="slide2-qn" class="carousel-dot-qn" aria-label="Go to slide 2"></label>
                <label for="slide3-qn" class="carousel-dot-qn" aria-label="Go to slide 3"></label>
            </div>
        </div>
    </div>
</body>
</html>
