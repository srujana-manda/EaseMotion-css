<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Ripple Effects — EaseMotion CSS</title>
  <meta name="description" content="Micro-interaction button ripple showcase demonstrating coordinate-relative expanding circle overlay animations.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — SCSS Utilities</span>
      <h1>Button Ripple Interaction</h1>
      <p class="description">
        Demonstrates custom ripple micro-interactions. Click the buttons below 
        to trigger localized expanding circle overlays.
      </p>
    </header>

    <main class="showcase">
      
      <div class="button-group">
        <button class="ease-btn ripple-btn btn-purple" type="button">
          <span class="btn-text">Primary Ripple</span>
        </button>

        <button class="ease-btn ripple-btn btn-cyan" type="button">
          <span class="btn-text">Cyan Ocean Ripple</span>
        </button>

        <button class="ease-btn ripple-btn btn-emerald" type="button">
          <span class="btn-text">Emerald Ripple</span>
        </button>
      </div>

    </main>
  </div>

  <script>
    const buttons = document.querySelectorAll('.ripple-btn');

    buttons.forEach(button => {
      button.addEventListener('click', function(e) {
        // Calculate coordinate offsets
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Create ripple element
        const ripple = document.createElement('span');
        ripple.className = 'ripple-circle';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;

        this.appendChild(ripple);

        // Remove element after animation ends
        setTimeout(() => {
          ripple.remove();
        }, 600);
      });
    });
  </script>

</body>
</html>
