<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Banner Carousel - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Hero Banner</h1>
    <p class="desc">Auto-playing carousel with dot navigation</p>
    <div class="hb-carousel" id="hbCarousel">
      <div class="hb-track" id="hbTrack" style="--hb-current: 0;">
        <div class="hb-slide" style="--hb-bg: linear-gradient(135deg, #e94560, #f97316);">Discover New Products</div>
        <div class="hb-slide" style="--hb-bg: linear-gradient(135deg, #8b5cf6, #3b82f6);">Summer Sale 50% Off</div>
        <div class="hb-slide" style="--hb-bg: linear-gradient(135deg, #10b981, #06b6d4);">Free Shipping Worldwide</div>
      </div>
      <div class="hb-dots" id="hbDots">
        <button class="hb-dot" data-i="0"></button>
        <button class="hb-dot" data-i="1"></button>
        <button class="hb-dot" data-i="2"></button>
      </div>
      <button class="hb-arrow hb-prev" id="hbPrev">&#x276E;</button>
      <button class="hb-arrow hb-next" id="hbNext">&#x276F;</button>
    </div>
  </div>
  <script>
    const track = document.getElementById('hbTrack');
    const dots = document.querySelectorAll('.hb-dot');
    const prev = document.getElementById('hbPrev');
    const next = document.getElementById('hbNext');
    let current = 0;
    const total = 3;
    let autoPlay = setInterval(nextSlide, 4000);

    function goTo(i) {
      current = i;
      track.style.setProperty('--hb-current', i);
      dots.forEach((d, idx) => d.classList.toggle('hb-active', idx === i));
    }

    function nextSlide() { goTo((current + 1) % total); }
    function prevSlide() { goTo((current - 1 + total) % total); }

    dots.forEach(d => d.addEventListener('click', () => {
      goTo(parseInt(d.getAttribute('data-i')));
      clearInterval(autoPlay);
      autoPlay = setInterval(nextSlide, 4000);
    }));

    next.addEventListener('click', () => { nextSlide(); clearInterval(autoPlay); autoPlay = setInterval(nextSlide, 4000); });
    prev.addEventListener('click', () => { prevSlide(); clearInterval(autoPlay); autoPlay = setInterval(nextSlide, 4000); });

    document.querySelector('.hb-carousel').addEventListener('mouseenter', () => clearInterval(autoPlay));
    document.querySelector('.hb-carousel').addEventListener('mouseleave', () => { autoPlay = setInterval(nextSlide, 4000); });

    goTo(0);
  </script>
</body>
</html>
