<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EaseMotion CSS — Animation Playground</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>

<!-- EaseMotion CSS core (used for layout + component utilities in this demo) -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
/>

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="pg-header">
    <div class="pg-header__brand">
      <span class="pg-header__mark" aria-hidden="true">◆</span>
      <div>
        <p class="pg-header__eyebrow">EaseMotion CSS</p>
        <h1 class="pg-header__title">Animation Playground</h1>
      </div>
    </div>
    <p class="pg-header__desc">
      Dial in duration, delay, easing, and repeat behavior — watch it play, then
      copy the exact CSS.
    </p>
  </header>

  <main class="pg-layout">

    <!-- CONTROL PANEL -->
    <section class="pg-panel" aria-label="Animation controls">

      <div class="pg-field">
        <label for="anim-type">Animation</label>
        <select id="anim-type" class="pg-select">
          <option value="fade-in" selected>fade-in</option>
          <option value="slide-up">slide-up</option>
          <option value="slide-in-left">slide-in-left</option>
          <option value="slide-in-right">slide-in-right</option>
          <option value="zoom-in">zoom-in</option>
          <option value="flip">flip</option>
          <option value="bounce">bounce</option>
          <option value="pulse">pulse</option>
          <option value="rotate">rotate</option>
        </select>
      </div>

      <div class="pg-field">
        <div class="pg-field__label-row">
          <label for="duration">Duration</label>
          <span class="pg-readout" id="duration-readout">600ms</span>
        </div>
        <input type="range" id="duration" class="pg-range" min="100" max="3000" step="50" value="600" />
      </div>

      <div class="pg-field">
        <div class="pg-field__label-row">
          <label for="delay">Delay</label>
          <span class="pg-readout" id="delay-readout">0ms</span>
        </div>
        <input type="range" id="delay" class="pg-range" min="0" max="2000" step="50" value="0" />
      </div>

      <div class="pg-field">
        <label for="easing">Easing</label>
        <select id="easing" class="pg-select">
          <option value="ease">ease</option>
          <option value="linear">linear</option>
          <option value="ease-in">ease-in</option>
          <option value="ease-out">ease-out</option>
          <option value="ease-in-out" selected>ease-in-out</option>
          <option value="cubic-bezier(0.34, 1.56, 0.64, 1)">bounce (custom)</option>
          <option value="cubic-bezier(0.68, -0.55, 0.265, 1.55)">elastic (custom)</option>
        </select>
      </div>

      <div class="pg-field">
        <label for="iteration">Iteration count</label>
        <select id="iteration" class="pg-select">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="infinite">infinite</option>
        </select>
      </div>

      <div class="pg-field">
        <label for="direction">Direction</label>
        <select id="direction" class="pg-select">
          <option value="normal" selected>normal</option>
          <option value="reverse">reverse</option>
          <option value="alternate">alternate</option>
          <option value="alternate-reverse">alternate-reverse</option>
        </select>
      </div>

      <div class="pg-field">
        <label for="fill-mode">Fill mode</label>
        <select id="fill-mode" class="pg-select">
          <option value="none">none</option>
          <option value="forwards" selected>forwards</option>
          <option value="backwards">backwards</option>
          <option value="both">both</option>
        </select>
      </div>

      <div class="pg-actions">
        <button type="button" id="replay-btn" class="pg-btn pg-btn--primary">
          ▶ Replay
        </button>
        <button type="button" id="reset-btn" class="pg-btn pg-btn--ghost">
          Reset
        </button>
      </div>
    </section>

    <!-- LIVE PREVIEW -->
    <section class="pg-stage-wrap" aria-label="Live preview">
      <div class="pg-stage" id="stage">
        <div class="pg-stage__grid" aria-hidden="true"></div>
        <div class="pg-subject" id="subject">
          <span class="pg-subject__label">ease</span>
        </div>
      </div>

      <div class="pg-timeline" aria-hidden="true">
        <div class="pg-timeline__track">
          <div class="pg-timeline__fill" id="timeline-fill"></div>
        </div>
        <div class="pg-timeline__marks">
          <span>0</span>
          <span id="timeline-end">600ms</span>
        </div>
      </div>

      <!-- CODE OUTPUT -->
      <div class="pg-code" aria-label="Generated code">
        <div class="pg-code__bar">
          <span class="pg-code__filename">snippet.html</span>
          <button type="button" id="copy-btn" class="pg-btn pg-btn--copy">Copy code</button>
        </div>
        <pre class="pg-code__block"><code id="code-output"></code></pre>
        <p class="pg-code__hint" id="copy-hint" aria-live="polite"></p>
      </div>
    </section>

  </main>

  <footer class="pg-footer">
    <p>
      Part of the <strong>EaseMotion CSS</strong> submissions area · built as a
      self-contained example, no core files touched.
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
