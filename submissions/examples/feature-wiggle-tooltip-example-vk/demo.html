<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiggle Tooltip Example</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="tooltip-container-vk">

        <button
            class="tooltip-button-vk"
            aria-describedby="wiggle-tooltip-vk">
            Hover Me
        </button>

        <span
            id="wiggle-tooltip-vk"
            class="wiggle-tooltip-vk"
            role="tooltip">
            This tooltip wiggles!
        </span>

    </div>

</body>
</html>
