<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Orbit Animation Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Orbit Container Showcase ── */
    .showcase-container {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      width: 100%;
      max-width: 420px;
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Central Core */
    .central-core {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6c63ff, #c084fc);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.4);
      z-index: 5;
    }

    /* Satellite Stylings */
    .satellite-node {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .sat-emerald {
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
    }

    .sat-coral {
      background: #ff5a5f;
      box-shadow: 0 0 10px rgba(255, 90, 95, 0.4);
    }

    .sat-cyan {
      background: #06b6d4;
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
    }

    /* Orbital guide lines */
    .orbital-ring {
      position: absolute;
      border: 1px dashed var(--ease-color-neutral-200);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Spin Orbit Animation</h1>
    <p>
      A multi-satellite CSS orbital model where elements revolve around a central core without layout shift.
    </p>
  </header>

  <main class="showcase-container">
    
    <!-- Orbital path rings -->
    <div class="orbital-ring" style="width: 120px; height: 120px;"></div>
    <div class="orbital-ring" style="width: 200px; height: 200px;"></div>
    <div class="orbital-ring" style="width: 280px; height: 280px;"></div>

    <div class="orbit-center-uj">
      <!-- Core -->
      <div class="central-core"></div>

      <!-- Inner satellite -->
      <div class="orbit-satellite-uj" style="--orbit-radius: 60px; --orbit-duration: 4s;">
        <div class="satellite-node sat-emerald"></div>
      </div>

      <!-- Middle satellite -->
      <div class="orbit-satellite-uj" style="--orbit-radius: 100px; --orbit-duration: 7s; --orbit-delay: -1s;">
        <div class="satellite-node sat-coral"></div>
      </div>

      <!-- Outer satellite -->
      <div class="orbit-satellite-uj" style="--orbit-radius: 140px; --orbit-duration: 10s; --orbit-delay: -3s;">
        <div class="satellite-node sat-cyan"></div>
      </div>
    </div>

  </main>

</body>
</html>
