<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expandable Floating Action Button (FAB) — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Pure CSS Theme Switcher Controller -->
  <input type="checkbox" id="theme-toggle" class="theme-checkbox">

  <!-- Main Page Container -->
  <div class="page-container" id="app-root">

    <div class="demo-card">
      <div class="demo-title-row">
        <h1 class="demo-title">Expandable FAB</h1>
      </div>

      <p class="demo-desc">
        A self-contained Floating Action Button component fixed to the bottom-right corner. 
        Click the bottom-right button to expand the action menu with smooth spring bounce animations.
      </p>

      <!-- Theme Switcher Controls -->
      <div class="theme-bar">
        <span>Interface Theme Mode</span>
        <label for="theme-toggle" class="theme-switch-btn" role="button" tabindex="0">
          Toggle Light / Dark
        </label>
      </div>
    </div>

  </div>

  <!-- Pure CSS FAB Menu Switcher Controller -->
  <input type="checkbox" id="fab-toggle" class="fab-checkbox">

  <!-- Backdrop dismiss area: Clicking outside closes the expanded FAB menu -->
  <label for="fab-toggle" class="fab-backdrop" aria-hidden="true"></label>

  <!-- Fixed Bottom-Right FAB Component -->
  <div class="fab-wrapper" role="region" aria-label="Floating Quick Actions">

    <!-- Expandable Action Items Menu (Staggered List) -->
    <ul class="fab-menu-list" role="menu" aria-label="Quick actions menu">

      <!-- Action 1: New Note -->
      <li class="fab-action-item" role="none">
        <span class="fab-action-label" id="label-note">New Note</span>
        <label for="fab-toggle" class="fab-action-btn" role="menuitem" aria-labelledby="label-note" tabindex="0">
          📝
        </label>
      </li>

      <!-- Action 2: Upload Photo -->
      <li class="fab-action-item" role="none">
        <span class="fab-action-label" id="label-photo">Upload Image</span>
        <label for="fab-toggle" class="fab-action-btn" role="menuitem" aria-labelledby="label-photo" tabindex="0">
          🖼️
        </label>
      </li>

      <!-- Action 3: Bookmark -->
      <li class="fab-action-item" role="none">
        <span class="fab-action-label" id="label-bookmark">Add Bookmark</span>
        <label for="fab-toggle" class="fab-action-btn" role="menuitem" aria-labelledby="label-bookmark" tabindex="0">
          🔖
        </label>
      </li>

      <!-- Action 4: Quick Share -->
      <li class="fab-action-item" role="none">
        <span class="fab-action-label" id="label-share">Quick Share</span>
        <label for="fab-toggle" class="fab-action-btn" role="menuitem" aria-labelledby="label-share" tabindex="0">
          ⚡
        </label>
      </li>

    </ul>

    <!-- Main FAB Trigger Button -->
    <label for="fab-toggle" class="fab-main-btn" role="button" aria-expanded="false" aria-label="Toggle Quick Actions Menu" tabindex="0">
      <!-- Morphing Plus Icon -->
      <svg class="fab-icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </label>

  </div>

  <script>
    // Theme toggle script for demo wrapper class
    const themeCheckbox = document.getElementById('theme-toggle');
    const appRoot = document.getElementById('app-root');
    themeCheckbox.addEventListener('change', () => {
      appRoot.classList.toggle('light-theme', themeCheckbox.checked);
    });
  </script>

</body>
</html>
