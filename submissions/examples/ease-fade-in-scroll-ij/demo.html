<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade In Scroll - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Scroll to Reveal</h1>
    <p class="fis-desc">Elements fade in as they enter the viewport.</p>
    <div class="fis-container">
      <div class="fis-card" data-delay="0">Card One</div>
      <div class="fis-card" data-delay="0.1">Card Two</div>
      <div class="fis-card" data-delay="0.2">Card Three</div>
      <div class="fis-card" data-delay="0.3">Card Four</div>
      <div class="fis-card" data-delay="0.4">Card Five</div>
    </div>
  </section>
  <script>
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var delay = parseFloat(entry.target.getAttribute('data-delay')) || 0;
          entry.target.style.setProperty('--fis-delay', delay + 's');
          entry.target.classList.add('fis-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.fis-card').forEach(function(el) { observer.observe(el); });
  </script>
</body>
</html>
