<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav Hamburger - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Hamburger Menu</h1>
    <p class="desc">Animated hamburger icon that morphs to X</p>
    <div class="ham-card">
      <button class="ham-btn" id="hamBtn" style="--hm-open: 0;" aria-label="Toggle menu">
        <span class="hm-line hm-top"></span>
        <span class="hm-line hm-mid"></span>
        <span class="hm-line hm-bot"></span>
      </button>
      <p class="ham-state" id="hamState">Menu closed</p>
    </div>
  </div>
  <script>
    const btn = document.getElementById('hamBtn');
    const state = document.getElementById('hamState');

    btn.addEventListener('click', () => {
      const open = btn.style.getPropertyValue('--hm-open') === '1' ? '0' : '1';
      btn.style.setProperty('--hm-open', open);
      state.textContent = open === '1' ? 'Menu open' : 'Menu closed';
    });
  </script>
</body>
</html>
