<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swing Hover Tabs - Accessible Web</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs" role="tablist">
    <button class="tab active" role="tab">Home</button>
    <button class="tab" role="tab">Features</button>

    <button class="tab" role="tab">Contact</button>
</div>

<div class="content">
    <h2>Accessible Swing Hover Tabs</h2>

</div>

</html>
