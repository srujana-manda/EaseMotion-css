<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Radio Button Ripple</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-radio-group" role="radiogroup" aria-labelledby="radio-group-label">
    <div id="radio-group-label" style="margin-bottom: 8px; font-weight: 700; color: var(--ease-text);">Select Payment Method</div>

    <!-- Option 1 -->
    <label class="ease-radio-label">
      <input type="radio" name="payment" class="ease-radio-input" value="card" checked>
      <span class="ease-radio-custom"></span>
      Credit Card
    </label>

    <!-- Option 2 -->
    <label class="ease-radio-label">
      <input type="radio" name="payment" class="ease-radio-input" value="paypal">
      <span class="ease-radio-custom"></span>
      PayPal
    </label>

    <!-- Option 3 -->
    <label class="ease-radio-label">
      <input type="radio" name="payment" class="ease-radio-input" value="crypto">
      <span class="ease-radio-custom"></span>
      Cryptocurrency
    </label>
    
  </div>

</body>
</html>
