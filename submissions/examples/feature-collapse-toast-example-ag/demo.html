<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapse Toast Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <button id="trigger-btn-ag" class="trigger-button-ag">Show Toast Notification</button>

        <div id="toast-container-ag" class="toast-container-ag" aria-live="polite" aria-atomic="true">
            <!-- Toasts will be injected here -->
        </div>
    </div>

    <script>
        const btn = document.getElementById('trigger-btn-ag');
        const container = document.getElementById('toast-container-ag');
        let counter = 1;

        btn.addEventListener('click', () => {
            // Create a wrapper for the toast that will handle the collapse animation
            const wrapper = document.createElement('div');
            wrapper.className = 'ease-toast-wrapper-ag ease-collapse-in-ag';
            
            // Create the actual toast content
            const toast = document.createElement('div');
            toast.className = 'ease-toast-ag';
            toast.innerHTML = `
                <span>Update ${counter++}: Changes saved successfully!</span>
                <button class="ease-toast-close-ag" aria-label="Close notification">&times;</button>
            `;

            wrapper.appendChild(toast);
            container.appendChild(wrapper);

            // Handle close button click
            const closeBtn = toast.querySelector('.ease-toast-close-ag');
            closeBtn.addEventListener('click', () => {
                removeToast(wrapper);
            });

            // Auto-remove after 4 seconds
            setTimeout(() => {
                if (wrapper.parentNode) {
                    removeToast(wrapper);
                }
            }, 4000);
        });

        function removeToast(wrapperElement) {
            // Swap entrance class for exit class
            wrapperElement.classList.remove('ease-collapse-in-ag');
            wrapperElement.classList.add('ease-collapse-out-ag');
            
            // Wait for the animation to finish before removing from DOM
            wrapperElement.addEventListener('animationend', () => {
                wrapperElement.remove();
            }, { once: true });
        }
    </script>
</body>
</html>
