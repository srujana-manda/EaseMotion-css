<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-scroll-trigger-reveal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="str-container">
    <div class="str-card" style="--revealed: 0;">
      <h2 class="str-title">Scroll Trigger Reveal</h2>
      <p class="str-text">This element reveals itself when scrolled into view.</p>
    </div>
    <div class="str-card" style="--revealed: 0;">
      <h2 class="str-title">Another Card</h2>
      <p class="str-text">Scroll down to see the effect.</p>
    </div>
    <div class="str-card" style="--revealed: 0;">
      <h2 class="str-title">Last Card</h2>
      <p class="str-text">Each card fades and slides up on reveal.</p>
    </div>
  </div>
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        entry.target.style.setProperty('--revealed', entry.isIntersecting ? '1' : '0');
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.str-card').forEach(el => observer.observe(el));
  </script>
</body>
</html>
