<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Certificate Expiry Compliance Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Certificate Compliance</h2>

<div class="certificate healthy">
<div>
<h3>api.company.com</h3>
<p>Expires in 182 Days</p>
</div>
<span>Healthy</span>
</div>

<div class="certificate active">
<div>
<h3>auth.company.com</h3>
<p>Issued by Let's Encrypt</p>
</div>
<span>Verified</span>
</div>

<div class="certificate warning">
<div>
<h3>cdn.company.com</h3>
<p>Expires in 14 Days</p>
</div>
<span>Renew Soon</span>
</div>

<div class="certificate critical">
<div>
<h3>legacy.company.com</h3>
<p>Certificate Expired</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
