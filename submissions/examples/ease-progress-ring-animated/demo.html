<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Ring Animated — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Progress Ring Animated</h1>
  <p class="subtitle">An animated circular progress ring — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="ring-group"><div class="ring-wrapper"><svg class="progress-ring" viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="52"/><circle class="ring-fill" style="--p:75" cx="60" cy="60" r="52"/></svg><span class="ring-value">75%</span></div><div class="ring-wrapper"><svg class="progress-ring" viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="52"/><circle class="ring-fill" style="--p:45;--color:#22c55e" cx="60" cy="60" r="52"/></svg><span class="ring-value">45%</span></div><div class="ring-wrapper"><svg class="progress-ring" viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="52"/><circle class="ring-fill" style="--p:90;--color:#ef4444" cx="60" cy="60" r="52"/></svg><span class="ring-value">90%</span></div></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;svg class=&quot;progress-ring&quot; viewBox=&quot;0 0 120 120&quot;&gt;
  &lt;circle class=&quot;ring-bg&quot; cx=&quot;60&quot; cy=&quot;60&quot; r=&quot;52&quot;/&gt;
  &lt;circle class=&quot;ring-fill&quot; style=&quot;--p:75&quot; cx=&quot;60&quot; cy=&quot;60&quot; r=&quot;52&quot;/&gt;
&lt;/svg&gt;</code></pre></section>
</body>
</html>
