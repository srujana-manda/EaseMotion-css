<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-skeleton-avatar-circle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sac-container" style="--loading: 0">
    <div class="sac-skeleton">
      <div class="sac-ring"></div>
      <div class="sac-inner"></div>
    </div>
    <button class="sac-btn" onclick="toggleLoading()">Toggle Loading</button>
  </div>
  <script>
    function toggleLoading() {
      const container = document.querySelector('.sac-container');
      const current = container.style.getPropertyValue('--loading').trim();
      container.style.setProperty('--loading', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
