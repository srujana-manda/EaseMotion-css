<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stagger Button · Sequential Animation</title>

    <!-- Font Awesome for optional icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>✨ Stagger Button</h2>
        <p class="sub">dots animate in sequence on hover</p>

        <!-- === STAGGER BUTTON (DOTS VERSION) === -->
        <button class="stagger-btn dots-version" id="staggerDots">
            <span class="stagger-text">
                <span class="letter" style="--i:1;">•</span>
                <span class="letter" style="--i:2;">•</span>
                <span class="letter" style="--i:3;">•</span>
                <span class="letter" style="--i:4;">•</span>
                <span class="letter" style="--i:5;">•</span>
            </span>
            <span class="btn-label">Loading</span>
        </button>

        <!-- === STAGGER BUTTON (LETTERS VERSION) === -->
        <button class="stagger-btn letters-version" id="staggerLetters">
            <span class="stagger-text">
                <span class="letter" style="--i:1;">S</span>
                <span class="letter" style="--i:2;">t</span>
                <span class="letter" style="--i:3;">a</span>
                <span class="letter" style="--i:4;">g</span>
                <span class="letter" style="--i:5;">g</span>
                <span class="letter" style="--i:6;">e</span>
                <span class="letter" style="--i:7;">r</span>
            </span>
            <span class="btn-label">Hover me</span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · dots or letters pop in sequence
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            // --- DOTS VERSION ---
            const dotsBtn = document.getElementById('staggerDots');
            if (dotsBtn) {
                dotsBtn.addEventListener('click', function(e) {
                    // Add a quick pulse feedback
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Reset animation by removing and re-adding a class
                    const textContainer = this.querySelector('.stagger-text');
                    if (textContainer) {
                        textContainer.classList.remove('animate-stagger');
                        // Force reflow
                        void textContainer.offsetWidth;
                        textContainer.classList.add('animate-stagger');
                    }
                    console.log('🔄 Dots stagger triggered!');
                });

                // Trigger animation on load for demo
                setTimeout(() => {
                    const textContainer = dotsBtn.querySelector('.stagger-text');
                    if (textContainer) {
                        textContainer.classList.add('animate-stagger');
                    }
                }, 300);
            }

            // --- LETTERS VERSION ---
            const lettersBtn = document.getElementById('staggerLetters');
            if (lettersBtn) {
                lettersBtn.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    const textContainer = this.querySelector('.stagger-text');
                    if (textContainer) {
                        textContainer.classList.remove('animate-stagger');
                        void textContainer.offsetWidth;
                        textContainer.classList.add('animate-stagger');
                    }
                    console.log('🔤 Letters stagger triggered!');
                });

                // Trigger animation on load for demo
                setTimeout(() => {
                    const textContainer = lettersBtn.querySelector('.stagger-text');
                    if (textContainer) {
                        textContainer.classList.add('animate-stagger');
                    }
                }, 500);
            }

        })();
    </script>

</body>
</html>
