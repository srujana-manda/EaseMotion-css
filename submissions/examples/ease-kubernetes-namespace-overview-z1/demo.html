<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Kubernetes Namespace Overview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Kubernetes Namespaces</h2>

<div class="namespace healthy">
<div>
<h3>production</h3>
<p>Pods: 42 • Deployments: 11</p>
</div>
<span>Healthy</span>
</div>

<div class="namespace active">
<div>
<h3>staging</h3>
<p>CPU Quota: 58% Used</p>
</div>
<span>Running</span>
</div>

<div class="namespace warning">
<div>
<h3>analytics</h3>
<p>Memory Usage: 89%</p>
</div>
<span>High Load</span>
</div>

<div class="namespace critical">
<div>
<h3>testing</h3>
<p>2 Pods in CrashLoopBackOff</p>
</div>
<span>Attention</span>
</div>

</section>

</body>
</html>
