<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Autonomous Cargo Airship Navigation System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="airship-header">
    <h1>Autonomous Cargo Airship Navigation System</h1>
    <p>Tracking flight path, altitude control, and cargo telemetry in real time</p>
  </header>

  <main class="airship-grid">

    <section class="panel route-panel">
      <div class="panel-title">Flight Path</div>
      <div class="route-view">
        <span class="route-line"></span>
        <span class="airship-icon"></span>
        <span class="waypoint wp-1"></span>
        <span class="waypoint wp-2"></span>
        <span class="cloud-particle c-1"></span>
        <span class="cloud-particle c-2"></span>
      </div>
    </section>

    <section class="panel altitude-panel">
      <div class="panel-title">Altitude Stability</div>
      <div class="altitude-meter">
        <div class="altitude-fill"></div>
        <span class="altitude-value">94%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Cargo Load</span>
        <span class="metric-number">82%</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Distance to Dock</span>
        <span class="metric-number">14.6km</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Wind Risk</span>
        <span class="metric-number">Low</span>
      </div>
    </section>

  </main>

</body>
</html>
