<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Fade-In Popover - Dashboard Analytics</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <div class="metric-card">
      <div class="card-header">
        <div class="title-group">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="header-icon">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          <h2 class="card-title">User Engagement</h2>
        </div>

        <!-- Popover Container acting as Options Menu Trigger -->
        <div class="popover-container">
          <button class="icon-btn" aria-expanded="false" aria-controls="analytics-popover" aria-label="More options">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="5" r="1.5"></circle>
              <circle cx="12" cy="12" r="1.5"></circle>
              <circle cx="12" cy="19" r="1.5"></circle>
            </svg>
          </button>
          
          <!-- Popover Wrapper (Fade-In Animation) -->
          <div class="popover-wrapper" id="analytics-popover" role="dialog" aria-label="Options Menu">
            <div class="popover-content">
              <div class="menu-group">
                <span class="menu-label">Timeframe</span>
                <button class="menu-item active">Last 7 Days</button>
                <button class="menu-item">Last 30 Days</button>
                <button class="menu-item">Year to Date</button>
              </div>
              <div class="menu-divider"></div>
              <div class="menu-group">
                <span class="menu-label">Actions</span>
                <button class="menu-item action-export">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  Export CSV
                </button>
                <button class="menu-item action-danger">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                  Clear Data
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="card-body">
        <div class="metric-value">
          8,245
          <span class="metric-trend positive">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
              <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
            +12.5%
          </span>
        </div>
        <p class="metric-subtitle">Daily active users avg.</p>
        
        <!-- Mock Chart -->
        <div class="mock-chart">
          <div class="bar" style="height: 40%"></div>
          <div class="bar" style="height: 60%"></div>
          <div class="bar" style="height: 45%"></div>
          <div class="bar" style="height: 80%"></div>
          <div class="bar" style="height: 65%"></div>
          <div class="bar" style="height: 90%"></div>
          <div class="bar" style="height: 100%; background: var(--ease-color-primary)"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
