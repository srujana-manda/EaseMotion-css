<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Multi Open - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>FAQ</h1>
    <div class="amo-section">
      <div class="amo-item">
        <div class="amo-header" tabindex="0">What is EaseMotion?<span class="amo-chevron"></span></div>
        <div class="amo-body"><p>A CSS animation library for UI animations.</p></div>
      </div>
      <div class="amo-item">
        <div class="amo-header" tabindex="0">How to use?<span class="amo-chevron"></span></div>
        <div class="amo-body"><p>Add classes to your HTML elements.</p></div>
      </div>
      <div class="amo-item">
        <div class="amo-header" tabindex="0">Is it free?<span class="amo-chevron"></span></div>
        <div class="amo-body"><p>Yes, MIT licensed.</p></div>
      </div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.amo-header').forEach(function(h) {
      h.addEventListener('click', function() {
        this.parentElement.classList.toggle('amo-open');
      });
    });
  </script>
</body>
</html>
