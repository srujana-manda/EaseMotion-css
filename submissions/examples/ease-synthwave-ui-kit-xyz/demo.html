<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthwave UI Kit - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-synth-wrapper-xyz">
        
        <!-- BACKGROUND ELEMENTS -->
        <div class="ease-synth-bg-xyz">
            <div class="ease-synth-sun-xyz"></div>
            <div class="ease-synth-grid-xyz"></div>
        </div>

        <!-- NAVIGATION -->
        <nav class="ease-synth-nav-xyz">
            <div class="ease-synth-logo-xyz">SYNTH<span>WAVE</span></div>
            <ul class="ease-synth-menu-xyz">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Tracks</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- HERO SECTION -->
        <section class="ease-synth-hero-xyz">
            <h1 class="ease-synth-glitch-xyz" data-text="RETRO FUTURE">RETRO FUTURE</h1>
            <p class="ease-synth-subtitle-xyz">Experience the neon dreams of tomorrow, today.</p>
            <div class="ease-synth-btn-group-xyz">
                <button class="ease-synth-btn-xyz ease-synth-btn-primary-xyz">Enter the Grid</button>
                <button class="ease-synth-btn-xyz ease-synth-btn-secondary-xyz">Listen Now</button>
            </div>
        </section>

        <!-- CARDS SECTION -->
        <section class="ease-synth-cards-xyz">
            <div class="ease-synth-card-xyz">
                <div class="ease-synth-card-icon-xyz">🌴</div>
                <h3>Neon Palms</h3>
                <p>Smooth animations with a retro twist.</p>
            </div>
            <div class="ease-synth-card-xyz">
                <div class="ease-synth-card-icon-xyz">🌅</div>
                <h3>Sunset Drive</h3>
                <p>Premium easing curves for natural motion.</p>
            </div>
            <div class="ease-synth-card-xyz">
                <div class="ease-synth-card-icon-xyz">📼</div>
                <h3>VHS Vibes</h3>
                <p>Nostalgic glitch effects built with pure CSS.</p>
            </div>
        </section>

    </div>
</body>
</html>
