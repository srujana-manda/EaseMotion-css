<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Load Balancer Traffic Distribution</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="traffic-panel">

<h2>Load Balancer Traffic</h2>

<div class="server healthy">
<div>
<h3>Backend-01</h3>
<p>34% Requests • 421 Active Connections</p>
</div>
<span>Healthy</span>
</div>

<div class="server healthy">
<div>
<h3>Backend-02</h3>
<p>29% Requests • 368 Active Connections</p>
</div>
<span>Healthy</span>
</div>

<div class="server warning">
<div>
<h3>Backend-03</h3>
<p>22% Requests • 290 Active Connections</p>
</div>
<span>High Load</span>
</div>

<div class="server maintenance">
<div>
<h3>Backend-04</h3>
<p>15% Requests • Maintenance Mode</p>
</div>
<span>Paused</span>
</div>

</section>

</body>
</html>
