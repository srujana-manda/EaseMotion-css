<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Button Pulse — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Magnetic Button Pulse</h1>
  <p class="subtitle">A button with a magnetic pulse effect using CSS custom properties — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="btn-group"><button class="mag-btn">Hover Me</button><button class="mag-btn mag-btn-secondary">Click Me</button></div></section>
  <section><h2>How It Works</h2><p>The button uses <code>box-shadow</code> pulse animation on hover and a nested radial gradient that shifts to create a magnetic pull illusion.</p></section>
</body>
