<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Certificate Authority Trust Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Certificate Authority Trust</h2>

<div class="certificate healthy">
<div>
<h3>Root CA Status</h3>
<p>Trusted across all environments</p>
</div>
<span>Trusted</span>
</div>

<div class="certificate active">
<div>
<h3>Issued Certificates</h3>
<p>248 Active Certificates</p>
</div>
<span>Active</span>
</div>

<div class="certificate warning">
<div>
<h3>Revocation List</h3>
<p>3 Certificates Awaiting Review</p>
</div>
<span>Pending</span>
</div>

<div class="certificate critical">
<div>
<h3>Renewal Schedule</h3>
<p>12 Certificates Expire Within 30 Days</p>
</div>
<span>Urgent</span>
</div>

</section>

</body>
</html>
