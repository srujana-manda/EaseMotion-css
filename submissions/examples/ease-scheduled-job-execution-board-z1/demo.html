<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Scheduled Job Execution Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">
<h2>Scheduled Job Execution</h2>

<div class="job healthy">
<div>
<h3>Database Backup</h3>
<p>Completed successfully at 02:00 UTC</p>
</div>
<span>Success</span>
</div>

<div class="job active">
<div>
<h3>Log Cleanup</h3>
<p>Currently processing archived logs</p>
</div>
<span>Running</span>
</div>

<div class="job warning">
<div>
<h3>Analytics Report</h3>
<p>Execution delayed by 12 minutes</p>
</div>
<span>Delayed</span>
</div>

<div class="job critical">
<div>
<h3>Email Notification</h3>
<p>Previous execution failed</p>
</div>
<span>Failed</span>
</div>

</section>

</body>
</html>
