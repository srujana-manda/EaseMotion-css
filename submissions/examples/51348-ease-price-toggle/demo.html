<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ease Price Toggle Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Demo specific styles */
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        margin: 0;
        background-color: #f8fafc;
        color: #334155;
      }
      .demo-section {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        margin-bottom: 2rem;
        width: 100%;
        max-width: 600px;
      }
      .demo-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 0.5rem;
      }
      .pricing-header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .pricing-label {
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .pricing-amount-container {
        font-size: 3rem;
        font-weight: 700;
        color: #0f172a;
        text-align: center;
        margin-bottom: 1rem;
      }
      .currency {
        font-size: 1.5rem;
        vertical-align: super;
      }
      .period {
        font-size: 1rem;
        color: #64748b;
        font-weight: 400;
      }
      .variants-row {
        display: flex;
        align-items: center;
        justify-content: space-around;
        gap: 1rem;
        text-align: center;
      }
      .custom-colors {
        --ease-price-toggle-track-off: #f43f5e;
        --ease-price-toggle-track-on: #10b981;
        --ease-price-toggle-knob: #fcd34d;
        --ease-price-toggle-badge-bg: #8b5cf6;
        --ease-price-toggle-badge-color: #ffffff;
      }
      .custom-speed {
        --ease-price-toggle-speed: 0.8s;
      }
    </style>
  </head>
  <body>
    <div class="demo-section ease-pricing-container">
      <h2 class="demo-title">Default Pricing Toggle</h2>

      <div class="pricing-header">
        <span class="pricing-label">Monthly</span>
        <label
          class="ease-price-toggle"
          aria-label="Toggle between monthly and yearly pricing"
        >
          <input type="checkbox" class="ease-price-toggle-input" />
          <span class="ease-price-toggle-slider"></span>
        </label>
        <span class="pricing-label">
          Yearly
          <span class="ease-price-badge">Save 20%</span>
        </span>
      </div>

      <div class="pricing-amount-container ease-price-display">
        <div class="ease-price-monthly">
          <span class="currency">$</span>29<span class="period">/mo</span>
        </div>
        <div class="ease-price-yearly">
          <span class="currency">$</span>290<span class="period">/yr</span>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <h2 class="demo-title">Size Variants</h2>
      <div class="variants-row">
        <div>
          <p>Compact</p>
          <label
            class="ease-price-toggle ease-price-toggle-compact"
            aria-label="Toggle compact"
          >
            <input type="checkbox" class="ease-price-toggle-input" />
            <span class="ease-price-toggle-slider"></span>
          </label>
        </div>
        <div>
          <p>Default</p>
          <label class="ease-price-toggle" aria-label="Toggle default">
            <input type="checkbox" class="ease-price-toggle-input" checked />
            <span class="ease-price-toggle-slider"></span>
          </label>
        </div>
        <div>
          <p>Large</p>
          <label
            class="ease-price-toggle ease-price-toggle-large"
            aria-label="Toggle large"
          >
            <input type="checkbox" class="ease-price-toggle-input" />
            <span class="ease-price-toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="demo-section ease-pricing-container custom-colors custom-speed">
      <h2 class="demo-title">Custom Colors, Speed & Badge</h2>
      <div class="pricing-header">
        <span class="pricing-label">Monthly</span>
        <label
          class="ease-price-toggle"
          aria-label="Toggle custom pricing plan"
        >
          <input type="checkbox" class="ease-price-toggle-input" />
          <span class="ease-price-toggle-slider"></span>
        </label>
        <span class="pricing-label">
          Yearly
          <span class="ease-price-badge">Save $50</span>
        </span>
      </div>

      <div class="pricing-amount-container ease-price-display">
        <div class="ease-price-monthly">
          <span class="currency">$</span>99<span class="period">/mo</span>
        </div>
        <div class="ease-price-yearly">
          <span class="currency">$</span>1138<span class="period">/yr</span>
        </div>
      </div>
    </div>
  </body>
</html>
