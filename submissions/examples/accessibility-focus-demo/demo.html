<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Accessibility Focus Demo</title>
</head>
<body>
    <main>
        <h1>Accessibility Demo</h1>
        
        <button class="ease-btn" aria-label="Play animation sequence">
            <span aria-hidden="true">▶</span> Play
        </button>

        <div class="ease-card" tabindex="0" role="button" aria-label="View interactive motion card">
            <h3>Motion Card</h3>
            <p>Press Tab to navigate to this card.</p>
        </div>
    </main>
</body>
</html>
