<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Badge Alert Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ease Badge Alert Pulse</h1>

    <div class="demo">

        <button class="notification-btn">
            Notifications
            <span class="badge" tabindex="0">5</span>
        </button>

        <button class="notification-btn">
            Messages
            <span class="badge success" tabindex="0">3</span>
        </button>

        <button class="notification-btn">
            Updates
            <span class="badge warning" tabindex="0">!</span>
        </button>

    </div>

</div>

</body>
</html>
