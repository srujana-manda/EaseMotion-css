<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid Button Border Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -2px rgba(0,0,0,0.15);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Showcase layout ── */
    .showcase-container {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 3rem;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      align-items: center;
    }

    /* Button base customizations */
    .btn-custom {
      border: none;
      background: none;
      padding: 1.25rem 2.25rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      outline: none;
    }

    /* Style variants */
    .btn-primary {
      background: var(--ease-color-primary);
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.25);
    }

    .btn-gradient {
      background: linear-gradient(135deg, #ff5a5f, #ff7a00);
      box-shadow: 0 8px 24px rgba(255, 90, 95, 0.25);
    }

    .btn-outline {
      border: 2px solid var(--ease-color-primary);
      color: var(--ease-color-primary);
    }

    @media (prefers-color-scheme: light) {
      .btn-outline {
        color: var(--ease-color-primary);
        border-color: var(--ease-color-primary);
      }
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Liquid Button Border</h1>
    <p>
      Observe the buttons below. Their border radiuses morph continuously, creating an organic liquid animation.
    </p>
  </header>

  <main class="showcase-container">
    
    <button class="liquid-button-uj btn-custom btn-primary">
      Solid Morph
    </button>

    <button class="liquid-button-uj btn-custom btn-gradient">
      Gradient Flow
    </button>

    <button class="liquid-button-uj btn-custom btn-outline">
      Outline Border
    </button>

  </main>

</body>
</html>
