<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing Checkbox Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    <label class="swing-checkbox-wrapper-ag">
      <input type="checkbox" class="swing-checkbox-input-ag" aria-label="Toggle setting" />
      <div class="swing-checkbox-box-ag" aria-hidden="true">
        <!-- SVG Checkmark -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <span class="swing-checkbox-label-ag">Enable Notifications</span>
    </label>
  </div>
</body>
</html>
