<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Zoom-In Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Responsive Dashboard Carousel</h1>

  <div class="carousel">

    <div class="card active" tabindex="0">
      <h2>Sales</h2>
      <p>Revenue Overview</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Analytics</h2>
      <p>Performance Metrics</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Reports</h2>
      <p>Monthly Summary</p>
    </div>

  </div>

</div>

</body>
</html>
