<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Particles Background - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particles Container -->
    <div class="particles-container-qn">
        <!-- Generate 20 particles with different sizes, positions, and animation delays -->
        <span class="particle-qn" style="--size: 4px; --left: 10%; --delay: 0s; --duration: 15s;"></span>
        <span class="particle-qn" style="--size: 6px; --left: 20%; --delay: 2s; --duration: 18s;"></span>
        <span class="particle-qn" style="--size: 3px; --left: 30%; --delay: 4s; --duration: 12s;"></span>
        <span class="particle-qn" style="--size: 5px; --left: 40%; --delay: 1s; --duration: 20s;"></span>
        <span class="particle-qn" style="--size: 7px; --left: 50%; --delay: 3s; --duration: 16s;"></span>
        <span class="particle-qn" style="--size: 4px; --left: 60%; --delay: 5s; --duration: 14s;"></span>
        <span class="particle-qn" style="--size: 6px; --left: 70%; --delay: 2.5s; --duration: 19s;"></span>
        <span class="particle-qn" style="--size: 3px; --left: 80%; --delay: 0.5s; --duration: 13s;"></span>
        <span class="particle-qn" style="--size: 5px; --left: 90%; --delay: 3.5s; --duration: 17s;"></span>
        <span class="particle-qn" style="--size: 4px; --left: 15%; --delay: 1.5s; --duration: 21s;"></span>
        <span class="particle-qn" style="--size: 6px; --left: 25%; --delay: 4.5s; --duration: 15s;"></span>
        <span class="particle-qn" style="--size: 3px; --left: 35%; --delay: 2.2s; --duration: 18s;"></span>
        <span class="particle-qn" style="--size: 5px; --left: 45%; --delay: 0.8s; --duration: 16s;"></span>
        <span class="particle-qn" style="--size: 7px; --left: 55%; --delay: 3.2s; --duration: 20s;"></span>
        <span class="particle-qn" style="--size: 4px; --left: 65%; --delay: 1.8s; --duration: 14s;"></span>
        <span class="particle-qn" style="--size: 6px; --left: 75%; --delay: 4.2s; --duration: 19s;"></span>
        <span class="particle-qn" style="--size: 3px; --left: 85%; --delay: 2.8s; --duration: 13s;"></span>
        <span class="particle-qn" style="--size: 5px; --left: 95%; --delay: 0.3s; --duration: 17s;"></span>
        <span class="particle-qn" style="--size: 4px; --left: 5%; --delay: 3.8s; --duration: 22s;"></span>
        <span class="particle-qn" style="--size: 6px; --left: 12%; --delay: 1.2s; --duration: 15s;"></span>
    </div>

    <!-- Content Overlay -->
    <div class="content-overlay-qn">
        <h1 class="hero-title-qn">Welcome to the Future</h1>
        <p class="hero-subtitle-qn">Experience the power of pure CSS animations</p>
        <button class="hero-btn-qn">Get Started</button>
    </div>
</body>
</html>
