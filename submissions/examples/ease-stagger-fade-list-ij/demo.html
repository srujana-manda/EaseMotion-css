<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stagger Fade List - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Team Members</h1>
    <button id="sflBtn" class="sfl-btn">Load Members</button>
    <ul class="sfl-list" id="sflList">
      <li class="sfl-item" style="--sfl-i: 0;">Alice Chen — Designer</li>
      <li class="sfl-item" style="--sfl-i: 1;">Bob Martinez — Developer</li>
      <li class="sfl-item" style="--sfl-i: 2;">Carol Smith — Manager</li>
      <li class="sfl-item" style="--sfl-i: 3;">David Kim — Tester</li>
      <li class="sfl-item" style="--sfl-i: 4;">Eva Johnson — Writer</li>
    </ul>
  </div>
  <script>
    const list = document.getElementById('sflList');
    const btn = document.getElementById('sflBtn');
    btn.addEventListener('click', () => {
      list.classList.toggle('sfl-visible');
      btn.textContent = list.classList.contains('sfl-visible') ? 'Hide' : 'Load Members';
    });
  </script>
</body>
</html>
