<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Zoom-In Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Glassmorphism Carousel</h1>

  <div class="carousel">

    <div class="card active" tabindex="0">
      <h2>Dashboard</h2>
      <p>Overview</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Analytics</h2>
      <p>Insights</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Settings</h2>
      <p>Preferences</p>
    </div>

  </div>

</div>

</body>
</html>
