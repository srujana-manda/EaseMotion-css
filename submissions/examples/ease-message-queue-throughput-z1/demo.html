<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Message Queue Throughput</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="queue-panel">

<h2>Message Queue</h2>

<div class="queue healthy">
<div>
<h3>Orders Queue</h3>
<p>1,240 msg/min • 6 Consumers</p>
</div>
<span>Healthy</span>
</div>

<div class="queue busy">
<div>
<h3>Payments Queue</h3>
<p>2,870 msg/min • Queue: 315</p>
</div>
<span>High Load</span>
</div>

<div class="queue processing">
<div>
<h3>Emails Queue</h3>
<p>820 msg/min • Processing</p>
</div>
<span>Active</span>
</div>

<div class="queue warning">
<div>
<h3>Notifications</h3>
<p>Queue: 1,042 • Retry Pending</p>
</div>
<span>Backlog</span>
</div>

</section>

</body>
</html>
