<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Service Maintenance Window Timeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Maintenance Timeline</h2>

<div class="event completed">
<div>
<h3>Database Upgrade</h3>
<p>Completed • 02:15 UTC</p>
</div>
<span>Done</span>
</div>

<div class="event active">
<div>
<h3>API Gateway Update</h3>
<p>In Progress • Estimated 30 min</p>
</div>
<span>Running</span>
</div>

<div class="event upcoming">
<div>
<h3>Cache Cluster Restart</h3>
<p>Starts at 05:00 UTC</p>
</div>
<span>Upcoming</span>
</div>

<div class="event emergency">
<div>
<h3>Security Patch</h3>
<p>Immediate maintenance required</p>
</div>
<span>Alert</span>
</div>

</section>

</body>
</html>
