<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Skew-Active Carousel - Dashboard Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Analytics Overview</h1>
            <p>Key performance indicators and platform metrics</p>
        </header>

        <section class="carousel-wrapper" aria-roledescription="carousel" aria-label="Dashboard Metrics Carousel">
            <!-- Hidden Radio Inputs for State Management -->
            <!-- We keep these focusable for keyboard navigation (arrow keys) -->
            <input type="radio" name="slider" id="slide-1" class="slider-radio" checked aria-label="View Total Revenue">
            <input type="radio" name="slider" id="slide-2" class="slider-radio" aria-label="View Active Users">
            <input type="radio" name="slider" id="slide-3" class="slider-radio" aria-label="View Conversion Rate">
            
            <div class="carousel-viewport">
                <div class="carousel-track">
                    <!-- Slide 1: Revenue -->
                    <article class="carousel-slide slide-1" role="group" aria-roledescription="slide" aria-label="1 of 3">
                        <div class="dashboard-card">
                            <div class="card-header">
                                <h3>Total Revenue</h3>
                                <span class="badge positive">+14.5%</span>
                            </div>
                            <div class="card-value">$84,592.00</div>
                            <div class="card-chart">
                                <div class="bar" style="height: 40%"></div>
                                <div class="bar" style="height: 60%"></div>
                                <div class="bar" style="height: 45%"></div>
                                <div class="bar" style="height: 80%"></div>
                                <div class="bar" style="height: 55%"></div>
                                <div class="bar" style="height: 90%"></div>
                                <div class="bar" style="height: 100%"></div>
                            </div>
                        </div>
                    </article>

                    <!-- Slide 2: Active Users -->
                    <article class="carousel-slide slide-2" role="group" aria-roledescription="slide" aria-label="2 of 3">
                        <div class="dashboard-card">
                            <div class="card-header">
                                <h3>Active Users</h3>
                                <span class="badge positive">+5.2%</span>
                            </div>
                            <div class="card-value">12,845</div>
                            <div class="card-chart line-chart">
                                <svg viewBox="0 0 100 40" class="sparkline" preserveAspectRatio="none">
                                    <path d="M0 35 Q 10 25, 20 28 T 40 18 T 60 22 T 80 10 T 100 15" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                                    <path d="M0 35 Q 10 25, 20 28 T 40 18 T 60 22 T 80 10 T 100 15 L 100 40 L 0 40 Z" fill="url(#gradient)" stroke="none"/>
                                    <defs>
                                        <linearGradient id="gradient" x1="0" x2="0" y1="0" y2="1">
                                            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
                                            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
                                        </linearGradient>
                                    </defs>
                                </svg>
                            </div>
                        </div>
                    </article>

                    <!-- Slide 3: Conversion Rate -->
                    <article class="carousel-slide slide-3" role="group" aria-roledescription="slide" aria-label="3 of 3">
                        <div class="dashboard-card">
                            <div class="card-header">
                                <h3>Conversion Rate</h3>
                                <span class="badge negative">-1.2%</span>
                            </div>
                            <div class="card-value">4.28%</div>
                            <div class="card-chart">
                                <div class="bar" style="height: 70%; background-color: var(--danger-color)"></div>
                                <div class="bar" style="height: 75%; background-color: var(--danger-color)"></div>
                                <div class="bar" style="height: 65%; background-color: var(--danger-color)"></div>
                                <div class="bar" style="height: 60%; background-color: var(--danger-color)"></div>
                                <div class="bar" style="height: 50%; background-color: var(--danger-color)"></div>
                                <div class="bar" style="height: 45%; background-color: var(--danger-color)"></div>
                                <div class="bar" style="height: 40%; background-color: var(--danger-color)"></div>
                            </div>
                        </div>
                    </article>
                </div>
            </div>

            <!-- Carousel Dot Controls -->
            <div class="carousel-controls" aria-hidden="true">
                <label for="slide-1" class="control-dot" title="Go to Total Revenue"></label>
                <label for="slide-2" class="control-dot" title="Go to Active Users"></label>
                <label for="slide-3" class="control-dot" title="Go to Conversion Rate"></label>
            </div>
        </section>
    </div>
</body>
</html>
