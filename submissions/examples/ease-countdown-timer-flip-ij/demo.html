<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer Flip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Countdown</h1>
    <div class="ctf-display">
      <div class="ctf-digit" id="ctfMinutes">05</div>
      <span class="ctf-colon">:</span>
      <div class="ctf-digit" id="ctfSeconds">00</div>
    </div>
    <div class="ctf-controls">
      <button id="ctfStart" class="ctf-btn">Start</button>
      <button id="ctfReset" class="ctf-btn">Reset</button>
    </div>
  </div>
  <script>
    var totalSec = 300;
    var interval = null;
    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function updateDisplay() {
      var m = Math.floor(totalSec / 60);
      var s = totalSec % 60;
      document.getElementById('ctfMinutes').textContent = pad(m);
      document.getElementById('ctfSeconds').textContent = pad(s);
    }
    document.getElementById('ctfStart').addEventListener('click', function() {
      if (interval) return;
      interval = setInterval(function() {
        if (totalSec <= 0) { clearInterval(interval); interval = null; return; }
        totalSec--;
        updateDisplay();
      }, 1000);
    });
    document.getElementById('ctfReset').addEventListener('click', function() {
      if (interval) { clearInterval(interval); interval = null; }
      totalSec = 300;
      updateDisplay();
    });
    updateDisplay();
  </script>
</body>
</html>
