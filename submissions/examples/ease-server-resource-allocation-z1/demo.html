<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Resource Allocation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="resource-card">
<h2>Server Resources</h2>

<div class="resource-grid">

<div class="resource cpu">
<h3>CPU</h3>
<p>12 vCores</p>
<span>68% Allocated</span>
</div>

<div class="resource ram">
<h3>Memory</h3>
<p>32 GB</p>
<span>74% Allocated</span>
</div>

<div class="resource disk">
<h3>Storage</h3>
<p>1 TB SSD</p>
<span>48% Allocated</span>
</div>

<div class="resource network">
<h3>Network</h3>
<p>10 Gbps</p>
<span>82% Allocated</span>
</div>

</div>

</section>

</body>
</html>
