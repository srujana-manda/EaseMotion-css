<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Terminal Window - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-wrapper-qn">
        <h2>Developer Terminal</h2>
        <p>Watch the commands execute automatically</p>

        <!-- Terminal Window -->
        <div class="terminal-window-qn">
            <!-- Terminal Header -->
            <div class="terminal-header-qn">
                <div class="terminal-buttons-qn">
                    <span class="terminal-btn-qn btn-close-qn"></span>
                    <span class="terminal-btn-qn btn-minimize-qn"></span>
                    <span class="terminal-btn-qn btn-maximize-qn"></span>
                </div>
                <div class="terminal-title-qn">user@ease-motion: ~</div>
            </div>
            
            <!-- Terminal Body -->
            <div class="terminal-body-qn">
                <!-- Line 1: Command -->
                <div class="terminal-line-qn line-1-qn">
                    <span class="prompt-qn">$</span>
                    <span class="command-qn cmd-1-qn">npm install easemotion-css</span>
                </div>
                
                <!-- Line 2: Output -->
                <div class="terminal-line-qn line-2-qn">
                    <span class="output-qn">added 1 package in 2s</span>
                </div>
                
                <!-- Line 3: Command -->
                <div class="terminal-line-qn line-3-qn">
                    <span class="prompt-qn">$</span>
                    <span class="command-qn cmd-2-qn">echo "Hello, Animation!"</span>
                </div>
                
                <!-- Line 4: Output -->
                <div class="terminal-line-qn line-4-qn">
                    <span class="output-qn">Hello, Animation!</span>
                </div>
                
                <!-- Line 5: Next Prompt with Cursor -->
                <div class="terminal-line-qn line-5-qn">
                    <span class="prompt-qn">$</span>
                    <span class="cursor-qn"></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
