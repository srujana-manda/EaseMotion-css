<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Countdown Timer</h1>
    <p class="desc">Circular countdown with animated ring via --cd-progress</p>
    <div class="cd-card">
      <div class="cd-ring-wrap">
        <svg class="cd-svg" viewBox="0 0 120 120">
          <defs>
            <linearGradient id="cdGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e94560" />
              <stop offset="100%" stop-color="#fbbf24" />
            </linearGradient>
          </defs>
          <circle class="cd-track" cx="60" cy="60" r="52" />
          <circle class="cd-fill" cx="60" cy="60" r="52" style="--cd-progress: 1; stroke-dashoffset: calc(327 * (1 - var(--cd-progress)));" />
        </svg>
        <div class="cd-time">
          <span class="cd-seconds" id="cdSeconds">10</span>
          <span class="cd-label">seconds</span>
        </div>
      </div>
      <div class="cd-controls">
        <button id="cdStart">Start</button>
        <button id="cdReset">Reset</button>
      </div>
    </div>
  </div>
  <script>
    const fill = document.querySelector('.cd-fill');
    const secondsEl = document.getElementById('cdSeconds');
    let totalSec = 10;
    let remaining = totalSec;
    let timer = null;
    let running = false;

    function updateDisplay() {
      const pct = remaining / totalSec;
      fill.style.setProperty('--cd-progress', pct);
      secondsEl.textContent = remaining;
    }

    document.getElementById('cdStart').addEventListener('click', () => {
      if (running) return;
      running = true;
      timer = setInterval(() => {
        remaining--;
        updateDisplay();
        if (remaining <= 0) {
          clearInterval(timer);
          running = false;
        }
      }, 1000);
    });

    document.getElementById('cdReset').addEventListener('click', () => {
      clearInterval(timer);
      running = false;
      remaining = totalSec;
      updateDisplay();
    });

    updateDisplay();
  </script>
</body>
</html>
