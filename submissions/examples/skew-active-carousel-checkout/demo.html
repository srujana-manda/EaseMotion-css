<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skew-Active Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="wrapper">
    <h1>Checkout Steps</h1>

    <div class="skew-carousel">
        <div class="card active" tabindex="0">
            <h2>Cart</h2>
            <p>Review selected items.</p>
        </div>

        <div class="card" tabindex="0">
            <h2>Shipping</h2>
            <p>Enter delivery details.</p>
        </div>

        <div class="card" tabindex="0">
            <h2>Payment</h2>
            <p>Choose payment method.</p>
        </div>

        <div class="card" tabindex="0">
            <h2>Order</h2>
            <p>Confirm and place order.</p>
        </div>
    </div>
</section>

</body>
</html>
