<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotate Toast Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    
    <div class="rotate-toast-ag" role="alert" aria-live="assertive">
      <div class="toast-icon-ag">🔔</div>
      <div class="toast-content-ag">
        <strong>New Notification</strong>
        <p>You have a new message waiting.</p>
      </div>
    </div>

  </div>
</body>
</html>
