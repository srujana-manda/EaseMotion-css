<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-password-strength-meter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="psm-wrapper">
    <div class="psm-container" style="--strength: 0">
      <label class="psm-label" for="psm-input">Password</label>
      <input type="password" id="psm-input" class="psm-input" placeholder="Enter password" autocomplete="off">
      <div class="psm-bar"><div class="psm-fill"></div></div>
      <span class="psm-text">Enter a password</span>
    </div>
  </div>
  <script>
    (function() {
      var input = document.getElementById('psm-input');
      var container = document.querySelector('.psm-container');
      var text = document.querySelector('.psm-text');

      input.addEventListener('input', function() {
        var val = this.value;
        var strength = 0;

        if (val.length > 0) strength = 10;
        if (val.length >= 4) strength = 25;
        if (val.length >= 6) strength = 40;
        if (val.length >= 8) strength = 55;
        if (/[A-Z]/.test(val)) strength += 10;
        if (/[0-9]/.test(val)) strength += 15;
        if (/[^A-Za-z0-9]/.test(val)) strength += 20;

        strength = Math.min(100, strength);
        container.style.setProperty('--strength', strength);

        if (strength === 0) text.textContent = 'Enter a password';
        else if (strength < 40) text.textContent = 'Weak';
        else if (strength < 70) text.textContent = 'Medium';
        else text.textContent = 'Strong';
      });
    })();
  </script>
</body>
</html>
