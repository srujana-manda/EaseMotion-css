<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease CI Pipeline Stage Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="pipeline-card">

<h2>CI Pipeline</h2>

<div class="pipeline">

<div class="stage success">
<h3>Build</h3>
<p>Completed</p>
</div>

<div class="stage running">
<h3>Test</h3>
<p>Running</p>
</div>

<div class="stage waiting">
<h3>Deploy</h3>
<p>Queued</p>
</div>

<div class="stage pending">
<h3>Verify</h3>
<p>Pending</p>
</div>

</div>

</section>

</body>
</html>
