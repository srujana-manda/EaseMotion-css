<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-loading-spinner-overlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lso-page">
    <div class="lso-content">
      <h1>Page Content</h1>
      <p>This content is behind the overlay when loading.</p>
      <button class="lso-btn" onclick="toggleLoading()">Toggle Loading</button>
    </div>
    <div class="lso-overlay" style="--loading: 0">
      <div class="lso-spinner"></div>
      <span class="lso-text">Loading...</span>
    </div>
  </div>
  <script>
    function toggleLoading() {
      const overlay = document.querySelector('.lso-overlay');
      const current = overlay.style.getPropertyValue('--loading').trim();
      overlay.style.setProperty('--loading', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
