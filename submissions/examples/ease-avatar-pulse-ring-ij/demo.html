<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Pulse Ring - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Online Status</h1>
    <div class="apr-group">
      <div class="apr-avatar" style="--apr-color: #10b981;">
        <div class="apr-ring"></div>
        <span class="apr-initials">SJ</span>
      </div>
      <div class="apr-avatar" style="--apr-color: #e94560;">
        <div class="apr-ring"></div>
        <span class="apr-initials">AK</span>
      </div>
      <div class="apr-avatar" style="--apr-color: #f97316;">
        <div class="apr-ring"></div>
        <span class="apr-initials">ML</span>
      </div>
    </div>
  </div>
</body>
</html>
