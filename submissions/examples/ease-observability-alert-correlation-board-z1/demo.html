<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Observability Alert Correlation Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Alert Correlation Board</h2>

<div class="alert healthy">
<div>
<h3>Infrastructure</h3>
<p>CPU spike resolved after autoscaling</p>
</div>
<span>Resolved</span>
</div>

<div class="alert active">
<div>
<h3>Application</h3>
<p>API latency linked to database load</p>
</div>
<span>Investigating</span>
</div>

<div class="alert warning">
<div>
<h3>Database</h3>
<p>Slow queries detected on primary node</p>
</div>
<span>Monitor</span>
</div>

<div class="alert critical">
<div>
<h3>Root Cause</h3>
<p>Storage I/O saturation impacting services</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
