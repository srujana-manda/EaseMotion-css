<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Statistics Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Statistics Cards</h1>

<div class="stats-grid">

<div class="card">
<div class="icon">📈</div>
<h2>12.5K</h2>
<p>Total Visitors</p>
</div>

<div class="card">
<div class="icon">💰</div>
<h2>$84K</h2>
<p>Revenue</p>
</div>

<div class="card">
<div class="icon">👥</div>
<h2>3.2K</h2>
<p>Active Users</p>
</div>

<div class="card">
<div class="icon">⭐</div>
<h2>4.9</h2>
<p>Average Rating</p>
</div>

</div>

</div>

</body>
</html>
