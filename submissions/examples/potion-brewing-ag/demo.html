<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Potion Brewing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="potion-stage">

    <input type="radio" name="color" id="color-purple" class="color-input" checked>
    <input type="radio" name="color" id="color-blue" class="color-input">
    <input type="radio" name="color" id="color-green" class="color-input">
    <input type="radio" name="color" id="color-red" class="color-input">
    <input type="radio" name="color" id="color-gold" class="color-input">
    <input type="radio" name="color" id="color-pink" class="color-input">
    <input type="radio" name="color" id="color-cyan" class="color-input">
    <input type="radio" name="color" id="color-orange" class="color-input">
    <input type="checkbox" id="brew-toggle" class="brew-input">

    <div class="potion-flask">
      <label for="brew-toggle" class="flask-cork"></label>
      <div class="flask-neck"></div>
      <div class="flask-glass">
        <div class="flask-liquid">
          <div class="bubbles">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="flask-shine"></div>
      </div>
      <div class="steam">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="sparkles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="potion-readout">
      <span class="color-dot"></span>
      <span class="color-name">Purple</span>
    </div>

    <div class="potion-controls">
      <label for="brew-toggle" class="btn btn-primary">Brew</label>

      <label for="color-purple" class="btn swatch swatch-purple">Purple</label>
      <label for="color-blue" class="btn swatch swatch-blue">Blue</label>
      <label for="color-green" class="btn swatch swatch-green">Green</label>
      <label for="color-red" class="btn swatch swatch-red">Red</label>
      <label for="color-gold" class="btn swatch swatch-gold">Gold</label>
      <label for="color-pink" class="btn swatch swatch-pink">Pink</label>
      <label for="color-cyan" class="btn swatch swatch-cyan">Cyan</label>
      <label for="color-orange" class="btn swatch swatch-orange">Orange</label>
    </div>

  </div>
</body>
</html>
