<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Fade-In Carousel Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-carousel-bg">
  <div class="carousel-container-sap">
    
    <input type="radio" name="carousel-group" id="slide-1" class="carousel-state-sap" checked>
    <input type="radio" name="carousel-group" id="slide-2" class="carousel-state-sap">
    <input type="radio" name="carousel-group" id="slide-3" class="carousel-state-sap">
    
    <div class="carousel-viewport-sap">
      
      <div class="carousel-slide-sap item-1-sap">
        <div class="slide-image-sap" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80');"></div>
        <div class="slide-content-sap">
          <span class="slide-meta-sap">CONCEPT ART / 01</span>
          <h2 class="slide-title-sap">ABSTRAC DESIGN LAB</h2>
        </div>
      </div>

      <div class="carousel-slide-sap item-2-sap">
        <div class="slide-image-sap" style="background-image: url('https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?auto=format&fit=crop&w=800&q=80');"></div>
        <div class="slide-content-sap">
          <span class="slide-meta-sap">MINIMALISM / 02</span>
          <h2 class="slide-title-sap">GEOMETRIC DIMENSIONS</h2>
        </div>
      </div>

      <div class="carousel-slide-sap item-3-sap">
        <div class="slide-image-sap" style="background-image: url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?auto=format&fit=crop&w=800&q=80');"></div>
        <div class="slide-content-sap">
          <span class="slide-meta-sap">BRANDING / 03</span>
          <h2 class="slide-title-sap">KINETIC TYPOGRAPHY</h2>
        </div>
      </div>

    </div>

    <div class="carousel-nav-sap">
      <label for="slide-1" class="nav-dot-sap" aria-label="Go to slide 1"></label>
      <label for="slide-2" class="nav-dot-sap" aria-label="Go to slide 2"></label>
      <label for="slide-3" class="nav-dot-sap" aria-label="Go to slide 3"></label>
    </div>

  </div>

</body>
</html>
