<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumb Current Highlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Breadcrumb Current Highlight</h1>
    <p class="desc">
      Click any breadcrumb item to make it the active page. The active item pulses with an animated underline glow.
    </p>

    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="#" class="crumb" data-index="0">Home</a>
      <span class="sep">›</span>
      <a href="#" class="crumb" data-index="1">Products</a>
      <span class="sep">›</span>
      <a href="#" class="crumb" data-index="2">Electronics</a>
      <span class="sep">›</span>
      <a href="#" class="crumb active" data-index="3">Headphones</a>
    </nav>

    <p class="hint" id="status">Active: Headphones</p>
  </div>

  <script>
    document.querySelectorAll('.crumb').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.crumb').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('status').textContent = 'Active: ' + el.textContent;
      });
    });
  </script>
</body>
</html>
