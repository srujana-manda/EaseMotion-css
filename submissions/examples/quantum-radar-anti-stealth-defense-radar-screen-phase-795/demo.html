<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Radar Anti-Stealth Defense Radar Screen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="radar-header">
    <h1>Quantum Radar Anti-Stealth Defense Radar Screen</h1>
    <p>Real-time entangled-photon detection sweeping for stealth-evading contacts</p>
  </header>

  <main class="radar-grid">

    <section class="panel sweep-panel">
      <div class="panel-title">Radar Sweep</div>
      <div class="sweep-view">
        <span class="radar-ring ring-1"></span>
        <span class="radar-ring ring-2"></span>
        <span class="radar-ring ring-3"></span>
        <span class="sweep-arm"></span>
        <span class="contact-blip blip-1"></span>
        <span class="contact-blip blip-2"></span>
      </div>
    </section>

    <section class="panel signal-panel">
      <div class="panel-title">Detection Confidence</div>
      <div class="signal-meter">
        <div class="signal-fill"></div>
        <span class="signal-value">95%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Contacts Tracked</span>
        <span class="metric-number">4</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Sweep Range</span>
        <span class="metric-number">420km</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Entangled Pairs</span>
        <span class="metric-number">12.6K</span>
      </div>
    </section>

  </main>

</body>
</html>
