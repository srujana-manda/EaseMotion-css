<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate Fade Pricing Table</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="pricing">

    <div class="card">
        <h2>Basic</h2>
        <h3>$10/mo</h3>
        <p>Perfect for beginners.</p>
        <button>Choose</button>
    </div>

    <div class="card featured">
        <h2>Pro</h2>
        <h3>$30/mo</h3>
        <p>Best for professionals.</p>
        <button>Choose</button>
    </div>

    <div class="card">
        <h2>Premium</h2>
        <h3>$80/mo</h3>
        <p>For large teams.</p>
        <button>Choose</button>
    </div>

</section>

</body>
</html>
