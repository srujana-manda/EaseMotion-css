<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 421 - Semiconductor Supply Chain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>Semiconductor Supply Chain</h1>
        <div class="hero-stats">
            <div class="stat-card"><span class="stat-value">87%</span><span class="stat-label">Fab Capacity</span></div>
            <div class="stat-card"><span class="stat-value">245K</span><span class="stat-label">Wafers/Month</span></div>
            <div class="stat-card"><span class="stat-value">98%</span><span class="stat-label">Supplier Health</span></div>
            <div class="stat-card"><span class="stat-value">Medium</span><span class="stat-label">Risk</span></div>
        </div>
    </header>
    <main class="dashboard">
        <section class="section">
            <h2>Production Analytics</h2>
            <div class="grid-4">
                <div class="card"><h3>TSMC</h3><div class="value success">95%</div></div>
                <div class="card"><h3>Samsung</h3><div class="value">89%</div></div>
                <div class="card"><h3>Intel</h3><div class="value warning">78%</div></div>
                <div class="card"><h3>GlobalFoundries</h3><div class="value">82%</div></div>
            </div>
        </section>
        <section class="section executive">
            <h2>Executive Insights</h2>
            <div class="grid-3">
                <div class="exec-card"><h3>Inventory</h3><div class="exec-value">45 Days</div></div>
                <div class="exec-card"><h3>Lead Time</h3><div class="exec-value">12 Weeks</div></div>
                <div class="exec-card"><h3>Yield</h3><div class="exec-value success">94.5%</div></div>
            </div>
        </section>
    </main>
</body>
</html>
