<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Container Autoscaling Overview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Container Autoscaling</h2>

<div class="scale healthy">
<div>
<h3>Replica Count</h3>
<p>12 Running Pods</p>
</div>
<span>Healthy</span>
</div>

<div class="scale active">
<div>
<h3>CPU Utilization</h3>
<p>Average Usage: 64%</p>
</div>
<span>Scaling</span>
</div>

<div class="scale warning">
<div>
<h3>Scaling Event</h3>
<p>+3 Pods Added in Last 10 Minutes</p>
</div>
<span>Recent</span>
</div>

<div class="scale critical">
<div>
<h3>Capacity Alert</h3>
<p>Maximum Replica Limit Approaching</p>
</div>
<span>Review</span>
</div>

</section>

</body>
</html>
