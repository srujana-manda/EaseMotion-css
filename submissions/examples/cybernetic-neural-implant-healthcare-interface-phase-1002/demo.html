<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybernetic Neural Implant Interface (Phase #1002)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="em-biomed-grid"></div>

  <header style="margin-bottom: 40px; border-bottom: 1px solid rgba(16,185,129,0.15); padding-bottom: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
      <div>
        <h1 style="margin: 0; font-size: 1.6rem; font-weight: 400; letter-spacing: 2px;">NEURAL IMPLANT HEALTHCARE MATRIX</h1>
        <p style="margin: 4px 0 0 0; color: var(--text-muted); font-size: 0.85rem;">CORTICAL LINK TELEMETRY // CORE PHASE #1002</p>
      </div>
      <div class="em-status-pill">
        <span class="em-pulse-dot"></span>
        <span style="color: var(--neon-green); font-weight: 600;">LINK STABLE</span>
      </div>
    </div>
  </header>

  <main class="em-interface-main">
    <section class="em-med-card">
      <h2 class="em-card-title">Cortical Synapse Frequency</h2>
      <div class="em-wave-container">
        <div class="em-wave-bar"></div><div class="em-wave-bar"></div>
        <div class="em-wave-bar"></div><div class="em-wave-bar"></div>
        <div class="em-wave-bar"></div><div class="em-wave-bar"></div>
        <div class="em-wave-bar"></div><div class="em-wave-bar"></div>
        <div class="em-wave-bar"></div><div class="em-wave-bar"></div>
        <div class="em-wave-bar"></div><div class="em-wave-bar"></div>
        <div class="em-wave-bar"></div><div class="em-wave-bar"></div>
      </div>
      <p style="margin: 15px 0 0 0; font-size: 0.8rem; color: var(--text-muted); text-align: center;">REAL-TIME SYNAPTIC RENDERING AT 60FPS COMPOSITE LAYER</p>
    </section>

    <section class="em-med-card">
      <h2 class="em-card-title">Hardware Telemetry Blocks</h2>
      
      <div class="em-metric-group">
        <div class="em-metric-meta"><span>Neuro-Receiver Efficiency</span><span>94.2%</span></div>
        <div class="em-track-bg"><div class="em-track-fill" style="--fill-target: 94.2%; background: var(--neon-green);"></div></div>
      </div>

      <div class="em-metric-group">
        <div class="em-metric-meta"><span>Thermal Dissipation Level</span><span>38.6°C</span></div>
        <div class="em-track-bg"><div class="em-track-fill" style="--fill-target: 38.6%;"></div></div>
      </div>

      <div class="em-metric-group">
        <div class="em-metric-meta"><span>Memory Bank Allocation</span><span>61.5%</span></div>
        <div class="em-track-bg"><div class="em-track-fill" style="--fill-target: 61.5%; background: var(--neon-blue);"></div></div>
      </div>
    </section>
  </main>

</body>
</html>
