<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Reveal Character - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Text Reveal</h1>
    <p class="desc">Characters animate in one by one with stagger</p>
    <div class="reveal-card">
      <p class="reveal-text" id="revealText">Hello, World!</p>
      <button class="rev-btn" id="revBtn">Replay</button>
    </div>
  </div>
  <script>
    const textEl = document.getElementById('revealText');
    const btn = document.getElementById('revBtn');
    const text = 'Hello, World!';

    function buildChars() {
      textEl.innerHTML = '';
      const chars = text.split('');
      chars.forEach((char, i) => {
        const span = document.createElement('span');
        span.textContent = char === ' ' ? '\u00A0' : char;
        span.className = 'rev-char';
        span.style.setProperty('--rc-index', i);
        textEl.appendChild(span);
      });
    }

    function replay() {
      textEl.classList.remove('playing');
      void textEl.offsetWidth;
      textEl.classList.add('playing');
    }

    buildChars();
    textEl.classList.add('playing');
    btn.addEventListener('click', replay);
  </script>
</body>
</html>
