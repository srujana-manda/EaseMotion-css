<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade-In Carousel Example</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="carousel-page-vk">

        <section
            class="carousel-vk"
            aria-label="Dashboard Analytics Carousel">

            <div class="carousel-track-vk">

                <article class="carousel-slide-vk">
                    <span class="carousel-badge-vk">Revenue</span>
                    <h2>$128.4K</h2>
                    <p>Monthly revenue increased by 18% compared to the previous month.</p>
                </article>

                <article class="carousel-slide-vk">
                    <span class="carousel-badge-vk">Users</span>
                    <h2>24,680</h2>
                    <p>Active users continue to grow steadily across all supported platforms.</p>
                </article>

                <article class="carousel-slide-vk">
                    <span class="carousel-badge-vk">Conversion</span>
                    <h2>6.8%</h2>
                    <p>Optimized onboarding improved conversion rates throughout the quarter.</p>
                </article>

            </div>

        </section>

    </main>

</body>
</html>
