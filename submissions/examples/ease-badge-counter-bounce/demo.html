<head>

<body>
  <h1>Badge Counter Bounce</h1>
  <p class="subtitle">A badge counter with bounce animation — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="badge-wrapper"><button class="badge-btn">Notifications</button><span class="badge-counter">3</span></div><div class="badge-wrapper"><button class="badge-btn">Messages</button><span class="badge-counter danger">7</span></div><div class="badge-wrapper"><button class="badge-btn">Updates</button><span class="badge-counter success">1</span></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;div class=&quot;badge-wrapper&quot;&gt;
  &lt;button class=&quot;badge-btn&quot;&gt;Label&lt;/button&gt;

&lt;/div&gt;</code></pre></section>
