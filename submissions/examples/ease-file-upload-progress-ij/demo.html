<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Progress - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Upload Progress</h1>
    <p class="desc">Simulated file upload with animated progress bar</p>
    <div class="fu-card">
      <div class="fu-drop" id="fuDrop">
        <span class="fu-icon">📁</span>
        <p>Click to simulate upload</p>
      </div>
      <div class="fu-progress-wrap" id="fuProgress" style="--fu-pct: 0;">
        <div class="fu-bar">
          <div class="fu-fill"></div>
        </div>
        <span class="fu-pct">0%</span>
      </div>
      <div class="fu-file" id="fuFile">
        <span class="fu-name">report.pdf</span>
        <span class="fu-size">2.4 MB</span>
        <span class="fu-status" id="fuStatus">Pending</span>
      </div>
      <button class="fu-btn" id="fuBtn">Upload</button>
    </div>
  </div>
  <script>
    const btn = document.getElementById('fuBtn');
    const progress = document.getElementById('fuProgress');
    const pctEl = document.querySelector('.fu-pct');
    const status = document.getElementById('fuStatus');
    let interval = null;

    btn.addEventListener('click', () => {
      if (interval) return;
      btn.disabled = true;
      btn.textContent = 'Uploading...';
      status.textContent = 'Uploading';
      let pct = 0;
      interval = setInterval(() => {
        pct += Math.random() * 8 + 2;
        if (pct >= 100) {
          pct = 100;
          clearInterval(interval);
          interval = null;
          btn.disabled = false;
          btn.textContent = 'Upload';
          status.textContent = 'Complete ✓';
          status.style.color = '#34d399';
        }
        progress.style.setProperty('--fu-pct', pct / 100);
        pctEl.textContent = Math.round(pct) + '%';
      }, 200);
    });
  </script>
</body>
</html>
