<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Dashboard Carousel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="carousel" aria-label="Dashboard Carousel">

    <button class="card">
        <h3>Revenue</h3>
        <h2>$28.4K</h2>
        <span class="up">▲ +12%</span>
    </button>

    <button class="card">
        <h3>Users</h3>
        <h2>14,250</h2>
        <span class="up">▲ +8%</span>
    </button>

    <button class="card">
        <h3>Orders</h3>
        <h2>1,248</h2>
        <span class="down">▼ -3%</span>
    </button>

    <button class="card">
        <h3>Conversion</h3>
        <h2>5.1%</h2>
        <span class="up">▲ +1.2%</span>
    </button>

</section>

</body>
</html>
