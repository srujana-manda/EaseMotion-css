<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holographic Cards - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-center ease-bg-dark">
  <main class="ease-flex ease-flex-wrap ease-gap-6 ease-justify-center ease-p-8">
    
    <!-- Card 1 -->
    <article class="holo-card ease-hover-lift ease-fade-in ease-delay-100">
      <div class="holo-card__content">
        <h2 class="ease-text-primary ease-mb-2">Neon Pulse</h2>
        <p class="ease-text-muted">A futuristic card with animated gradient borders and smooth hover transitions.</p>
        <button class="ease-btn ease-btn-primary ease-mt-4">Explore</button>
      </div>
    </article>

    <!-- Card 2 -->
    <article class="holo-card ease-hover-lift ease-fade-in ease-delay-200">
      <div class="holo-card__content">
        <h2 class="ease-text-secondary ease-mb-2">Cyber Grid</h2>
        <p class="ease-text-muted">Leveraging CSS conic gradients and pseudo-elements for a dynamic holographic effect.</p>
        <button class="ease-btn ease-btn-secondary ease-mt-4">Discover</button>
      </div>
    </article>

    <!-- Card 3 -->
    <article class="holo-card ease-hover-lift ease-fade-in ease-delay-300">
      <div class="holo-card__content">
        <h2 class="ease-text-accent ease-mb-2">Prism Shift</h2>
        <p class="ease-text-muted">Zero JavaScript required. Pure CSS magic combined with EaseMotion utilities.</p>
        <button class="ease-btn ease-btn-accent ease-mt-4">Learn More</button>
      </div>
    </article>

  </main>
</body>
</html>
