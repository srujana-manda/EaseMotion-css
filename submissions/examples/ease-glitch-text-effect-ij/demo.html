<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch Text Effect - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Glitch Effect</h1>
    <p class="desc">A sporadic digital distortion that makes text glitch</p>
    <div class="gte-glitch" data-text="EaseMotion">
      <span class="gte-main">EaseMotion</span>
      <span class="gte-layer gte-layer-1" aria-hidden="true">EaseMotion</span>
      <span class="gte-layer gte-layer-2" aria-hidden="true">EaseMotion</span>
    </div>
    <div class="gte-trigger">
      <button class="gte-btn" id="gteBtn">Trigger Glitch</button>
    </div>
  </section>
  <script>
    const glitchEl = document.querySelector('.gte-glitch');
    const btn = document.getElementById('gteBtn');
    btn.addEventListener('click', () => {
      glitchEl.classList.remove('gte-active');
      void glitchEl.offsetWidth;
      glitchEl.classList.add('gte-active');
      setTimeout(() => glitchEl.classList.remove('gte-active'), 1000);
    });
  </script>
</body>
</html>
