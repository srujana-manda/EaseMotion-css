<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Status Ring - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Avatar Status</h1>
    <p class="desc">Avatars with animated online status rings</p>
    <div class="avatar-grid">
      <div class="avatar-item">
        <div class="avatar-ring" style="--as-color: #34d399;">
          <div class="av-circle" style="background-image: url('https://i.pravatar.cc/80?img=1');"></div>
          <div class="as-dot online"></div>
        </div>
        <span class="av-name">Alice</span>
      </div>
      <div class="avatar-item">
        <div class="avatar-ring" style="--as-color: #fbbf24;">
          <div class="av-circle" style="background-image: url('https://i.pravatar.cc/80?img=2');"></div>
          <div class="as-dot away"></div>
        </div>
        <span class="av-name">Bob</span>
      </div>
      <div class="avatar-item">
        <div class="avatar-ring" style="--as-color: #e94560;">
          <div class="av-circle" style="background-image: url('https://i.pravatar.cc/80?img=3');"></div>
          <div class="as-dot offline"></div>
        </div>
        <span class="av-name">Carol</span>
      </div>
      <div class="avatar-item">
        <div class="avatar-ring" style="--as-color: #60a5fa;">
          <div class="av-circle" style="background-image: url('https://i.pravatar.cc/80?img=4');"></div>
          <div class="as-dot busy"></div>
        </div>
        <span class="av-name">Dave</span>
      </div>
    </div>
    <p class="description">Status ring color via <code>--as-color</code>. Dot pulses for online status, solid for others.</p>
  </div>
</body>
</html>
