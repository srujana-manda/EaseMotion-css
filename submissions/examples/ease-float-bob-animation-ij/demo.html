<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Float Bob Animation</title>
</head>
<body>
  <div class="container">
    <div class="bob-demo">Hover me</div>
    <button class="toggle" id="toggleBob">Toggle Bob</button>
  </div>
  <script>
    const el = document.querySelector('.bob-demo');
    document.getElementById('toggleBob').addEventListener('click', () => {
      const current = el.style.getPropertyValue('--bob').trim() || '0';
      el.style.setProperty('--bob', current === '1' ? '0' : '1');
    });
  </script>
</body>
</html>
