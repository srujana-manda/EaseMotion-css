<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glitch Animation Effect Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #ff00c1;
      --ease-color-bg:             #030712;
      --ease-color-surface:        #0f172a;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #1e293b;
      --ease-font-mono:            'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
      --ease-shadow-lg:            0 10px 30px rgba(255, 0, 193, 0.1);
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-mono);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(255, 0, 193, 0.05) 0%, transparent 80%),
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100%, 100% 4px, 6px 100%;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #00f0ff;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ── Cyberpunk Card Showcase ── */
    .showcase-container {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-primary);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 4px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 600px;
      text-align: center;
      position: relative;
    }

    /* Decorative corner brackets */
    .showcase-container::before {
      content: "";
      position: absolute;
      top: -2px;
      left: -2px;
      width: 20px;
      height: 20px;
      border-top: 3px solid #00f0ff;
      border-left: 3px solid #00f0ff;
    }

    .showcase-container::after {
      content: "";
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 20px;
      height: 20px;
      border-bottom: 3px solid #00f0ff;
      border-right: 3px solid #00f0ff;
    }

    .glitch-title {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 600px) {
      .glitch-title {
        font-size: 2rem;
      }
    }

    .terminal-output {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.6;
      border-top: 1px solid #1e293b;
      padding-top: 1.5rem;
    }

    .terminal-output span {
      color: #00f0ff;
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Cyberpunk Glitch Animation</h1>
    <p>
      An RGB-splitting text distortion system constructed completely with CSS clipping masks.
    </p>
  </header>

  <main class="showcase-container">
    
    <h2 class="text-glitch-uj glitch-title" data-text="SYSTEM ERROR">
      SYSTEM ERROR
    </h2>

    <div class="terminal-output">
      <p>> CRITICAL THREAD DETECTED... <span>[FAIL]</span></p>
      <p>> CORE PROTOCOL BYPASS INITIATED...</p>
    </div>

  </main>

</body>
</html>
