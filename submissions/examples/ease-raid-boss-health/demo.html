<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raid Boss Health – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>👾 Raid Boss Health</h1>
    <p class="subtitle">Boss health bar with phases</p>

    <div class="rb-container">
      <div class="rb-scene">
        <!-- Raid Boss Health Bar -->
        <div class="boss-health">
          <!-- Boss info -->
          <div class="boss-info">
            <div class="boss-icon">👾</div>
            <div class="boss-name">Shadow Dragon</div>
            <div class="boss-title">- The Eternal Darkness -</div>
          </div>

          <!-- Health bar container -->
          <div class="health-bar-wrapper">
            <!-- Health bar segments (phases) -->
            <div class="health-segments">
              <div class="segment seg-1 active" data-phase="1"></div>
              <div class="segment seg-2" data-phase="2"></div>
              <div class="segment seg-3" data-phase="3"></div>
              <div class="segment seg-4" data-phase="4"></div>
            </div>

            <!-- Health bar fill -->
            <div class="health-fill" id="healthFill">
              <div class="health-fill-inner"></div>
              <div class="health-particles"></div>
            </div>

            <!-- Health bar border -->
            <div class="health-border">
              <div class="border-corner bc-tl"></div>
              <div class="border-corner bc-tr"></div>
              <div class="border-corner bc-bl"></div>
              <div class="border-corner bc-br"></div>
            </div>

            <!-- Health text -->
            <div class="health-text">
              <span class="health-current" id="healthCurrent">100</span>
              <span class="health-separator">/</span>
              <span class="health-max" id="healthMax">100</span>
              <span class="health-percent" id="healthPercent">100%</span>
            </div>

            <!-- Phase indicator -->
            <div class="phase-indicator" id="phaseIndicator">
              <span class="phase-label">Phase</span>
              <span class="phase-number" id="phaseNumber">1</span>
            </div>
          </div>

          <!-- Phase effects -->
          <div class="phase-effects">
            <div class="phase-transition" id="phaseTransition"></div>
            <div class="phase-glows">
              <div class="phase-glow pg-1"></div>
              <div class="phase-glow pg-2"></div>
              <div class="phase-glow pg-3"></div>
              <div class="phase-glow pg-4"></div>
            </div>
          </div>

          <!-- Damage flash -->
          <div class="damage-flash" id="damageFlash"></div>

          <!-- Heal glow -->
          <div class="heal-glow" id="healGlow"></div>

          <!-- Shield indicator -->
          <div class="shield-indicator" id="shieldIndicator">
            <span>🛡️</span>
            <span class="shield-value" id="shieldValue">0</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="boss-controls">
          <button id="damageBtn">⚔️ Damage</button>
          <button id="healBtn">💚 Heal</button>
          <button id="phaseBtn">🔄 Next Phase</button>
          <button id="resetBtn">⟳ Reset</button>
          <label>
            Speed
            <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const healthFill = document.getElementById('healthFill');
      const healthCurrent = document.getElementById('healthCurrent');
      const healthMax = document.getElementById('healthMax');
      const healthPercent = document.getElementById('healthPercent');
      const phaseNumber = document.getElementById('phaseNumber');
      const phaseTransition = document.getElementById('phaseTransition');
      const damageFlash = document.getElementById('damageFlash');
      const healGlow = document.getElementById('healGlow');
      const shieldValue = document.getElementById('shieldValue');
      const segments = document.querySelectorAll('.segment');

      const damageBtn = document.getElementById('damageBtn');
      const healBtn = document.getElementById('healBtn');
      const phaseBtn = document.getElementById('phaseBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');

      let speedMultiplier = 1;
      let maxHealth = 100;
      let currentHealth = 100;
      let currentPhase = 1;
      let shield = 0;
      let isAnimating = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // Phase thresholds
      const phaseThresholds = {
        1: { min: 76, max: 100, color: '#ff4444', glow: 'rgba(255,68,68,0.1)' },
        2: { min: 51, max: 75, color: '#ff8844', glow: 'rgba(255,136,68,0.1)' },
        3: { min: 26, max: 50, color: '#ffcc44', glow: 'rgba(255,204,68,0.1)' },
        4: { min: 0, max: 25, color: '#44ddff', glow: 'rgba(68,221,255,0.1)' }
      };

      // ----- Apply speed -----
      function applySpeed() {
        // Health transitions
        healthFill.style.setProperty('--health-duration', (0.5 / speedMultiplier) + 's');

        // Phase transition
        phaseTransition.style.setProperty('--phase-duration', (1.2 / speedMultiplier) + 's');

        // Damage flash
        damageFlash.style.setProperty('--flash-duration', (0.3 / speedMultiplier) + 's');

        // Heal glow
        healGlow.style.setProperty('--heal-duration', (0.8 / speedMultiplier) + 's');
      }

      // ----- Update health -----
      function updateHealth(amount, isHeal = false) {
        if (isAnimating) return;
        isAnimating = true;

        // Apply shield first for damage
        if (!isHeal && shield > 0) {
          const shieldDamage = Math.min(shield, amount);
          shield -= shieldDamage;
          amount -= shieldDamage;
          updateShield();

          if (amount <= 0) {
            isAnimating = false;
            return;
          }
        }

        const newHealth = Math.max(0, Math.min(maxHealth, currentHealth + (isHeal ? amount : -amount)));
        const actualAmount = Math.abs(newHealth - currentHealth);

        if (actualAmount === 0) {
          isAnimating = false;
          return;
        }

        currentHealth = newHealth;

        // Update display
        const percent = (currentHealth / maxHealth) * 100;
        healthFill.style.width = percent + '%';
        healthCurrent.textContent = Math.round(currentHealth);
        healthPercent.textContent = Math.round(percent) + '%';

        // Trigger effects
        if (!isHeal) {
          damageFlash.classList.add('active');
          setTimeout(() => {
            damageFlash.classList.remove('active');
          }, 300 / speedMultiplier);
        } else {
          healGlow.classList.add('active');
          setTimeout(() => {
            healGlow.classList.remove('active');
          }, 800 / speedMultiplier);
        }

        // Check phase change
        checkPhase();

        setTimeout(() => {
          isAnimating = false;
        }, 500 / speedMultiplier);
      }

      // ----- Check phase -----
      function checkPhase() {
        const percent = (currentHealth / maxHealth) * 100;
        let newPhase = 1;

        if (percent <= 25) newPhase = 4;
        else if (percent <= 50) newPhase = 3;
        else if (percent <= 75) newPhase = 2;
        else newPhase = 1;

        if (newPhase !== currentPhase) {
          currentPhase = newPhase;
          updatePhase();
        }
      }

      // ----- Update phase -----
      function updatePhase() {
        // Update phase indicator
        phaseNumber.textContent = currentPhase;

        // Update segments
        segments.forEach((seg, i) => {
          const phaseNum = i + 1;
          if (phaseNum <= currentPhase) {
            seg.classList.add('active');
            seg.classList.remove('inactive');
          } else {
            seg.classList.remove('active');
            seg.classList.add('inactive');
          }
        });

        // Phase transition effect
        phaseTransition.classList.remove('active');
        void phaseTransition.offsetWidth;
        phaseTransition.classList.add('active');

        // Update bar color based on phase
        const phaseData = phaseThresholds[currentPhase];
        healthFill.style.setProperty('--health-color', phaseData.color);
        healthFill.style.setProperty('--health-glow', phaseData.glow);

        // Update button text
        phaseBtn.textContent = `🔄 Phase ${currentPhase}`;

        // Add phase-specific effects
        const glows = document.querySelectorAll('.phase-glow');
        glows.forEach((glow, i) => {
          if (i + 1 === currentPhase) {
            glow.classList.add('active');
          } else {
            glow.classList.remove('active');
          }
        });

        // Trigger shield in phase 2+
        if (currentPhase >= 2 && shield === 0) {
          shield = 20;
          updateShield();
        }

        setTimeout(() => {
          phaseTransition.classList.remove('active');
        }, 1200 / speedMultiplier);
      }

      // ----- Update shield -----
      function updateShield() {
        shieldValue.textContent = shield;
        const shieldIndicator = document.getElementById('shieldIndicator');
        if (shield > 0) {
          shieldIndicator.classList.add('active');
        } else {
          shieldIndicator.classList.remove('active');
        }
      }

      // ----- Damage -----
      function damage() {
        const amount = 8 + Math.floor(Math.random() * 12);
        updateHealth(amount, false);
      }

      // ----- Heal -----
      function heal() {
        const amount = 5 + Math.floor(Math.random() * 10);
        updateHealth(amount, true);
      }

      // ----- Next phase -----
      function nextPhase() {
        if (isAnimating) return;

        // Find next phase threshold
        const targetPhase = Math.min(currentPhase + 1, 4);
        const threshold = phaseThresholds[targetPhase];
        const targetHealth = (threshold.min + threshold.max) / 2;
        const targetPercent = (targetHealth / maxHealth) * 100;

        // Set health to target phase
        const newHealth = (targetPercent / 100) * maxHealth;
        const amount = currentHealth - newHealth;

        if (amount > 0) {
          updateHealth(amount, false);
        }
      }

      // ----- Reset -----
      function resetBoss() {
        if (isAnimating) return;

        currentHealth = maxHealth;
        currentPhase = 1;
        shield = 0;

        healthFill.style.width = '100%';
        healthCurrent.textContent = Math.round(maxHealth);
        healthPercent.textContent = '100%';
        shieldValue.textContent = '0';
        document.getElementById('shieldIndicator').classList.remove('active');

        segments.forEach((seg, i) => {
          if (i === 0) {
            seg.classList.add('active');
            seg.classList.remove('inactive');
          } else {
            seg.classList.remove('active');
            seg.classList.add('inactive');
          }
        });

        phaseNumber.textContent = '1';
        phaseBtn.textContent = '🔄 Next Phase';

        const phaseData = phaseThresholds[1];
        healthFill.style.setProperty('--health-color', phaseData.color);
        healthFill.style.setProperty('--health-glow', phaseData.glow);

        document.querySelectorAll('.phase-glow').forEach((glow, i) => {
          if (i === 0) glow.classList.add('active');
          else glow.classList.remove('active');
        });

        damageFlash.classList.remove('active');
        healGlow.classList.remove('active');
        phaseTransition.classList.remove('active');

        isAnimating = false;
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Animate health particles
        const particles = document.querySelector('.health-particles');
        if (particles) {
          const intensity = (currentHealth / maxHealth) * 0.5 + 0.1;
          particles.style.opacity = intensity;
          particles.style.transform = `scale(${0.9 + (1 - currentHealth / maxHealth) * 0.2})`;
        }

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        resetBoss();

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-damage after 1.5 seconds to show effect
        setTimeout(() => {
          damage();
        }, 1500);

        // Auto-damage again
        setTimeout(() => {
          damage();
        }, 3000);

        // Auto-phase transition
        setTimeout(() => {
          nextPhase();
        }, 4500);

        // Auto-damage after phase
        setTimeout(() => {
          damage();
        }, 6000);

        // Auto-heal
        setTimeout(() => {
          heal();
        }, 7500);
      }

      // ----- Event listeners -----
      damageBtn.addEventListener('click', damage);
      healBtn.addEventListener('click', heal);
      phaseBtn.addEventListener('click', nextPhase);
      resetBtn.addEventListener('click', resetBoss);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
