<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Notification Dot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Pulse Notification Dot</h1>

        <div class="examples">

            <div class="status">
                <span class="pulse-dot success"></span>
                Online
            </div>

            <div class="status">
                <span class="pulse-dot warning"></span>
                Warning
            </div>

            <div class="status">
                <span class="pulse-dot danger"></span>
                Alert
            </div>

        </div>
    </div>

</body>
</html>
