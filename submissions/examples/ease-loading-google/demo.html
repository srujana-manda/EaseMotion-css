<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Loading Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="demo-section">
    <h2 class="demo-title">Google Loading</h2>
    <p class="demo-desc">Indeterminate progress with Google-style dots &amp; bar</p>

    <div class="google-loader">
      <!-- 4-dot wave (Google colors) -->
      <div class="dot-wave">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <!-- Progress bar -->
      <div class="lpb-bar">
        <div class="lpb-fill"></div>
      </div>

      <p class="lpb-label">
        <span>Loading</span>
        <span class="ellipsis">...</span>
      </p>
    </div>
  </section>
</body>
</html>
