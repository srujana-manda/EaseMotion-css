<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Image Hover - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Image Tooltip</h1>
    <p class="desc">Hover a name to see the tooltip image</p>
    <div class="ti-card">
      <div class="ti-row">
        <div class="ti-item" style="--ti-img: 'https://i.pravatar.cc/60?img=1'; --ti-bg: #e94560;">
          <span class="ti-name">Alice</span>
          <div class="ti-tooltip">
            <div class="ti-tip-img" style="background-image: url('https://i.pravatar.cc/120?img=1');"></div>
            <div class="ti-tip-info">
              <strong>Alice</strong>
              <span>Designer</span>
            </div>
          </div>
        </div>
        <div class="ti-item" style="--ti-bg: #60a5fa;">
          <span class="ti-name">Bob</span>
          <div class="ti-tooltip">
            <div class="ti-tip-img" style="background-image: url('https://i.pravatar.cc/120?img=2');"></div>
            <div class="ti-tip-info">
              <strong>Bob</strong>
              <span>Developer</span>
            </div>
          </div>
        </div>
        <div class="ti-item" style="--ti-bg: #34d399;">
          <span class="ti-name">Carol</span>
          <div class="ti-tooltip">
            <div class="ti-tip-img" style="background-image: url('https://i.pravatar.cc/120?img=3');"></div>
            <div class="ti-tip-info">
              <strong>Carol</strong>
              <span>Manager</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
