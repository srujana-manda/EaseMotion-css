<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Range Slider Component Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .demo-info {
      text-align: center;
      max-width: 420px;
      margin-bottom: 24px;
    }
    .demo-info h1 { font-size: 1.5rem; color: #0f172a; margin: 0 0 8px 0; }
    .demo-info p { font-size: 0.9rem; color: #64748b; margin: 0; }
  </style>
</head>
<body>

  <div class="demo-info">
    <h1>Custom Range Slider</h1>
    <p>Slide the input handle to witness hardware-accelerated progress transitions and elastic thumb state scale responses.</p>
  </div>

  <div class="em-slider-container">
    <div class="em-slider-header">
      <label for="customRange" class="em-slider-title">Volume Threshold</label>
      <span class="em-slider-value" id="sliderValue">50%</span>
    </div>
    <input 
      type="range" 
      id="customRange" 
      class="em-slider-input" 
      min="0" 
      max="100" 
      value="50"
      style="--slider-progress: 50%;"
      oninput="updateSlider(this)"
    >
  </div>

  <script>
    function updateSlider(slider) {
      const valueDisplay = document.getElementById('sliderValue');
      const value = slider.value;
      
      // Update displayed value
      valueDisplay.textContent = `${value}%`;
      
      // Update webkit gradient progress variable
      slider.style.setProperty('--slider-progress', `${value}%`);
    }
  </script>
</body>
</html>
