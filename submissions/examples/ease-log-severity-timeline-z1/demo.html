<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Log Severity Timeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="timeline-card">

<h2>System Log Timeline</h2>

<div class="log info">
<span class="dot"></span>
<div>
<h3>INFO</h3>
<p>User session initialized successfully.</p>
</div>
<time>09:15</time>
</div>

<div class="log warning">
<span class="dot"></span>
<div>
<h3>WARNING</h3>
<p>Memory usage reached 78%.</p>
</div>
<time>09:28</time>
</div>

<div class="log error">
<span class="dot"></span>
<div>
<h3>ERROR</h3>
<p>Database connection timeout detected.</p>
</div>
<time>09:34</time>
</div>

<div class="log success">
<span class="dot"></span>
<div>
<h3>RECOVERED</h3>
<p>Database connection restored.</p>
</div>
<time>09:36</time>
</div>

</section>

</body>
</html>
