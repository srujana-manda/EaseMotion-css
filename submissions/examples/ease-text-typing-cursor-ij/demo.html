<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Typing Cursor | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button onclick="startTyping()">Start Typing</button>
    <div class="typing-wrapper">
      <div class="typing-track" aria-hidden="true">Hello, EaseMotion!</div>
      <div class="typing-text" id="typingText" style="--progress: 0">Hello, EaseMotion!</div>
      <span class="cursor">|</span>
    </div>
    <input type="range" id="progressSlider" min="0" max="100" value="0" oninput="updateProgress(this.value)">
    <label for="progressSlider">Progress: <span id="progressLabel">0</span>%</label>
  </div>
  <script>
    function updateProgress(val) {
      document.getElementById('progressLabel').textContent = val;
      document.getElementById('typingText').style.setProperty('--progress', val);
    }
    function startTyping() {
      const el = document.getElementById('typingText');
      const text = el.textContent;
      let i = 0;
      el.style.setProperty('--progress', 0);
      const interval = setInterval(() => {
        i++;
        const pct = Math.round((i / text.length) * 100);
        el.style.setProperty('--progress', pct);
        document.getElementById('progressSlider').value = pct;
        document.getElementById('progressLabel').textContent = pct;
        if (i >= text.length) clearInterval(interval);
      }, 120);
    }
  </script>
</body>
</html>
