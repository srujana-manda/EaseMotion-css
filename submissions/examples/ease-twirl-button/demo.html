<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twirl Button · 360° spin on hover</title>

    <!-- Font Awesome for the icon (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>✨ Twirl Button</h2>
        <p class="sub">icon spins 360° on hover</p>

        <!-- === TWIRL BUTTON === -->
        <button class="twirl-btn" id="twirlButton">
            <span class="icon-wrapper">
                <i class="fas fa-sync-alt spin-icon"></i>
            </span>
            <span class="btn-text">Refresh</span>
        </button>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover or click · pure CSS spin + JS feedback
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const button = document.getElementById('twirlButton');
            const icon = document.querySelector('.spin-icon');

            // --- Optional: add a click feedback (without interfering with CSS hover) ---
            if (button) {
                button.addEventListener('click', function(e) {
                    // tiny haptic feedback – just a console log + subtle pulse
                    console.log('🔄 Twirl button clicked!');

                    // Add a quick pulse class (removes after animation)
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // You could also trigger a custom spin via JS, but CSS hover already handles it.
                    // For extra delight, we force a re-spin if the icon is already spinning? 
                    // but we keep it clean – CSS does the 360° on hover.
                });
            }

            // (optional) Extra: log when hover starts/ends – just for demo
            if (icon) {
                const parent = icon.closest('.twirl-btn');
                if (parent) {
                    parent.addEventListener('mouseenter', () => {
                        // you could add a data attribute or class – but we keep it pure CSS
                        // console.log('🔄 spin started');
                    });
                    parent.addEventListener('mouseleave', () => {
                        // console.log('⏸️ spin stopped');
                    });
                }
            }

        })();
    </script>

</body>
</html>
