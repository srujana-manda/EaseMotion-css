<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Hydroponic Vertical Forest Skyscraper Studio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="forest-header">
    <h1>Smart Hydroponic Vertical Forest Skyscraper Studio</h1>
    <p>Monitoring canopy growth, irrigation cycles, and air quality across the vertical forest</p>
  </header>

  <main class="forest-grid">

    <section class="panel canopy-panel">
      <div class="panel-title">Canopy Growth</div>
      <div class="canopy-view">
        <span class="leaf-cluster cluster-1"></span>
        <span class="leaf-cluster cluster-2"></span>
        <span class="leaf-cluster cluster-3"></span>
        <span class="mist-particle p-1"></span>
        <span class="mist-particle p-2"></span>
      </div>
    </section>

    <section class="panel irrigation-panel">
      <div class="panel-title">Irrigation Cycle</div>
      <div class="irrigation-meter">
        <div class="irrigation-fill"></div>
        <span class="irrigation-value">73%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">CO2 Absorbed</span>
        <span class="metric-number">1.2t/day</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Active Floors</span>
        <span class="metric-number">28</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Oxygen Output</span>
        <span class="metric-number">+64%</span>
      </div>
    </section>

  </main>

</body>
</html>
