<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Scroll Snap Showcase</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-snap-page">

    <section class="ease-snap-section">
      <h2 class="ease-snap-heading">Horizontal Scroll Snap</h2>
      <p class="ease-snap-hint">Scroll or swipe sideways →</p>
      <div class="ease-snap-h-track">
        <div class="ease-snap-h-card" style="background:#6c63ff;">1</div>
        <div class="ease-snap-h-card" style="background:#22c55e;">2</div>
        <div class="ease-snap-h-card" style="background:#f59e0b;">3</div>
        <div class="ease-snap-h-card" style="background:#ef4444;">4</div>
        <div class="ease-snap-h-card" style="background:#38bdf8;">5</div>
      </div>
    </section>

    <section class="ease-snap-section">
      <h2 class="ease-snap-heading">Vertical Scroll Snap</h2>
      <p class="ease-snap-hint">Scroll down inside the box ↓</p>
      <div class="ease-snap-v-track">
        <div class="ease-snap-v-slide" style="background:#7c3aed;">Slide 1</div>
        <div class="ease-snap-v-slide" style="background:#0ea5e9;">Slide 2</div>
        <div class="ease-snap-v-slide" style="background:#16a34a;">Slide 3</div>
      </div>
    </section>

  </div>
</body>
</html>
