<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Badge Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-ag">
        <h2>Notifications</h2>
        <div class="icon-wrapper-ag" aria-label="Messages">
            <span class="icon-ag">📧</span>
            <!-- The Ripple Badge -->
            <span class="ease-ripple-badge-ag" role="status" aria-label="3 Unread messages">3</span>
        </div>
        <p class="description-ag">The badge pulses continuously to draw attention.</p>
    </div>
</body>
</html>
