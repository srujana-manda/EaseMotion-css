<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Text Effects Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 50px; }
        h1 { font-size: 3rem; }
        .container { text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="em-text-fade-up">Fade Up Effect</h1>
    </div>

    <div class="container">
        <h1 class="em-text-expand">Expanding Letters</h1>
    </div>

    <div class="container">
        <h1 class="em-text-glitch">Glitch Animation</h1>
    </div>

</body>
</html>
