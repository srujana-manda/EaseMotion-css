<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Network Firewall Rule Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="firewall-panel">

<h2>Firewall Rules</h2>

<div class="rule allow">
<div>
<h3>Allow HTTPS</h3>
<p>TCP • Port 443 • Internet → Web</p>
</div>
<span>Allowed</span>
</div>

<div class="rule allow">
<div>
<h3>Allow SSH</h3>
<p>TCP • Port 22 • VPN → Server</p>
</div>
<span>Allowed</span>
</div>

<div class="rule warning">
<div>
<h3>Database Access</h3>
<p>TCP • Port 5432 • Internal Only</p>
</div>
<span>Restricted</span>
</div>

<div class="rule deny">
<div>
<h3>Block Telnet</h3>
<p>TCP • Port 23 • Any Source</p>
</div>
<span>Blocked</span>
</div>

</section>

</body>
</html>
