<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Magnet Icon Demo (uj)</title>

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:       #6c63ff;
      --ease-color-primary-hover: #5b52e5;
      --ease-color-bg:            #0f172a;
      --ease-color-surface:       #1e293b;
      --ease-color-text:          #f8fafc;
      --ease-color-muted:         #64748b;
      --ease-color-border:        #334155;
      --ease-font-sans:           system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:           0 10px 15px -3px rgba(0,0,0,0.35);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:        #f8fafc;
        --ease-color-surface:   #ffffff;
        --ease-color-text:      #0f172a;
        --ease-color-muted:     #94a3b8;
        --ease-color-border:    #e2e8f0;
        --ease-shadow-lg:       0 10px 15px -3px rgba(0,0,0,0.06);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header { text-align: center; max-width: 520px; }
    .page-header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .page-header p  { color: var(--ease-color-muted); font-size: 0.9rem; line-height: 1.6; }

    /* ── Showcase card ── */
    .showcase-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-border);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2rem;
    }

    .variant-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ease-color-muted);
    }

    .variant-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--ease-color-border);
    }

    /* ── Base button reset ── */
    .btn-base {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.75rem;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .btn-base:active { transform: scale(0.97); }

    /* Solid primary */
    .btn-solid {
      background: var(--ease-color-primary);
      color: #fff;
    }
    .btn-solid:hover { background: var(--ease-color-primary-hover); }

    /* Outlined */
    .btn-outline {
      background: transparent;
      color: var(--ease-color-primary);
      border: 2px solid var(--ease-color-primary);
    }
    .btn-outline:hover { background: rgba(108, 99, 255, 0.08); }

    /* Ghost */
    .btn-ghost {
      background: transparent;
      color: var(--ease-color-text);
      border: 1px solid var(--ease-color-border);
    }
    .btn-ghost:hover { background: var(--ease-color-border); }

    /* Emerald CTA */
    .btn-emerald {
      background: #10b981;
      color: #fff;
    }
    .btn-emerald:hover { background: #059669; }
  </style>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Interactive Magnet Icon</h1>
    <p>Hover over each button to see its icon spring forward — a lightweight micro-interaction that guides user attention.</p>
  </header>

  <main class="showcase-card">

    <!-- Variant 1: right-arrow slide -->
    <div class="variant-row">
      <span class="variant-label">Slide Right →</span>
      <button class="btn-base btn-solid magnet-arrow-btn-uj" id="btn-right">
        Get Started <span class="magnet-icon-uj" aria-hidden="true">→</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Variant 2: up-arrow slide -->
    <div class="variant-row">
      <span class="variant-label">Slide Up ↑</span>
      <button class="btn-base btn-outline magnet-up-btn-uj" id="btn-up">
        Launch App <span class="magnet-icon-uj" aria-hidden="true">↑</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Variant 3: diagonal slide -->
    <div class="variant-row">
      <span class="variant-label">Slide Diagonal ↗</span>
      <button class="btn-base btn-ghost magnet-diagonal-btn-uj" id="btn-diagonal">
        Open Link <span class="magnet-icon-uj" aria-hidden="true">↗</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Variant 4: icon spin -->
    <div class="variant-row">
      <span class="variant-label">Icon Spin ⚙</span>
      <button class="btn-base btn-emerald magnet-spin-btn-uj" id="btn-spin">
        Configure <span class="magnet-icon-uj" aria-hidden="true">⚙</span>
      </button>
    </div>

  </main>

</body>
</html>
