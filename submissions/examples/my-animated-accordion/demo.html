<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Accordion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="accordion-container">
    <h1>EaseMotion Accordion</h1>

    <div class="accordion-item">
        <button class="accordion-header">
            What is EaseMotion CSS?
            <span class="icon">+</span>
        </button>
        <div class="accordion-content">
            <p>EaseMotion CSS is an animation-first CSS framework with reusable UI components and modern effects.</p>
        </div>
    </div>

    <div class="accordion-item">
        <button class="accordion-header">
            Is it beginner friendly?
            <span class="icon">+</span>
        </button>
        <div class="accordion-content">
            <p>Yes. EaseMotion uses human-readable class names and requires minimal setup.</p>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll(".accordion-header").forEach(header => {
        header.addEventListener("click", () => {
            const content = header.nextElementSibling;
            const isOpen = content.classList.contains("active");

            // Close all others
            document.querySelectorAll(".accordion-content").forEach(c => {
                c.classList.remove("active");
                c.style.maxHeight = null;
            });
            document.querySelectorAll(".icon").forEach(i => i.textContent = "+");

            // Open clicked
            if (!isOpen) {
                content.classList.add("active");
                content.style.maxHeight = content.scrollHeight + "px";
                header.querySelector(".icon").textContent = "−";
            }
        });
    });
</script>
</body>
</html>
