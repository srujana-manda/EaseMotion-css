<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Button Interactions Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            margin: 0;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 50px;
            width: 100%;
            max-width: 1000px;
        }
        .demo-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .demo-card h3 {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Special background for the dark button demo */
        #dark-card { background: #1a1a1a; }
        #dark-card h3 { color: #555; }
    </style>
</head>
<body>

    <h1>Button Micro-interactions</h1>
    <p style="color: #666; margin-bottom: 60px;">Tactile UI feedback patterns</p>

    <div class="container">
        <!-- Glow Button -->
        <div class="demo-card">
            <button class="em-btn-glow">Get Started</button>
            <h3>Magnetic Glow</h3>
        </div>

        <!-- Liquid Button -->
        <div class="demo-card">
            <button class="em-btn-liquid">Learn More</button>
            <h3>Liquid Fill</h3>
        </div>

        <!-- Neumorphic Button -->
        <div class="demo-card">
            <button class="em-btn-neu">Click Me</button>
            <h3>Neumorphic</h3>
        </div>

        <!-- Border Trace Button -->
        <div class="demo-card" id="dark-card">
            <button class="em-btn-trace">Premium Pro</button>
            <h3>Border Trace</h3>
        </div>
    </div>

</body>
</html>
