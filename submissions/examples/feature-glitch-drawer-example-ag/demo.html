<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch Drawer Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    
    <input type="checkbox" id="drawer-toggle-ag" class="drawer-toggle-ag" aria-hidden="true" />
    <label for="drawer-toggle-ag" class="drawer-btn-ag" role="button" tabindex="0">Toggle Drawer</label>

    <div class="glitch-drawer-ag">
      <div class="drawer-content-ag">
        <h2>System Data</h2>
        <p>This panel experiences severe digital interference when interacted with.</p>
        <button class="drawer-inner-btn-ag">Access</button>
      </div>
    </div>

  </div>
</body>
</html>
