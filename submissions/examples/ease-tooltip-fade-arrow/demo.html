<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Fade Arrow — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tooltip Fade Arrow</h1>
  <p class="subtitle">A tooltip with fade-in and arrow indicator — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="tooltip-grid"><div class="tooltip-wrap"><button class="trigger">Hover Top</button><span class="tooltip top">Top tooltip<span class="arrow"></span></span></div><div class="tooltip-wrap"><button class="trigger">Hover Right</button><span class="tooltip right">Right tooltip<span class="arrow"></span></span></div><div class="tooltip-wrap"><button class="trigger">Hover Bottom</button><span class="tooltip bottom">Bottom tooltip<span class="arrow"></span></span></div><div class="tooltip-wrap"><button class="trigger">Hover Left</button><span class="tooltip left">Left tooltip<span class="arrow"></span></span></div></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;div class=&quot;tooltip-wrap&quot;&gt;
  &lt;button&gt;Hover&lt;/button&gt;
  &lt;span class=&quot;tooltip top&quot;&gt;Tooltip text&lt;span class=&quot;arrow&quot;&gt;&lt;/span&gt;&lt;/span&gt;
&lt;/div&gt;</code></pre></section>
</body>
</html>
