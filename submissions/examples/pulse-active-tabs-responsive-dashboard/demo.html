<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Active Tabs Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <h1>Analytics Dashboard</h1>

    <div class="tabs" role="tablist">

        <button class="tab active" 
        role="tab" 
        aria-selected="true">
            Overview
        </button>

        <button class="tab"
        role="tab"
        aria-selected="false">
            Analytics
        </button>

        <button class="tab"
        role="tab"
        aria-selected="false">
            Reports
        </button>

        <button class="tab"
        role="tab"
        aria-selected="false">
            Settings
        </button>

    </div>


    <section class="card">

        <h2>Dashboard Overview</h2>

        <p>
            Responsive CSS Pulse-Active Tabs
            for dashboard interfaces.
        </p>

        <div class="stats">

            <div class="box">
                Users
                <strong>12K</strong>
            </div>

            <div class="box">
                Revenue
                <strong>$25K</strong>
            </div>

            <div class="box">
                Growth
                <strong>85%</strong>
            </div>

        </div>

    </section>


</div>


</body>
</html>
