<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-counter-number-scroll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cns-container">
    <div class="cns-display">
      <span class="cns-number" id="cnsNumber">0</span>
    </div>
    <div class="cns-controls">
      <button class="cns-btn" onclick="increment()">+</button>
      <button class="cns-btn" onclick="reset()">Reset</button>
    </div>
  </div>
  <script>
    let count = 0;

    function increment() {
      count += Math.floor(Math.random() * 50) + 10;
      document.getElementById('cnsNumber').textContent = count;
    }

    function reset() {
      count = 0;
      document.getElementById('cnsNumber').textContent = count;
    }
  </script>
</body>
</html>
