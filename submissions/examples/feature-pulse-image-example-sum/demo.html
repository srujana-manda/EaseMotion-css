<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Image Example</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="pulse-image-page-sum">
      <h1>Pulse Image</h1>
      <p>Click dismiss to play a pulse exit animation on the image card.</p>

      <div
        class="pulse-image-sum"
        id="pulse-image-sum"
        role="img"
        aria-label="Preview image"
        aria-live="polite"
      >
        <span class="pulse-image-sum__label" aria-hidden="true">IMG</span>
        <button
          type="button"
          class="pulse-image-sum__dismiss"
          id="pulse-image-dismiss-sum"
          aria-label="Dismiss image"
        >
          Dismiss
        </button>
      </div>
    </main>

    <script>
      (function () {
        var card = document.getElementById('pulse-image-sum');
        var dismiss = document.getElementById('pulse-image-dismiss-sum');

        dismiss.addEventListener('click', function () {
          card.classList.add('is-exiting-sum');
          card.addEventListener(
            'animationend',
            function () {
              card.hidden = true;
            },
            { once: true }
          );
        });
      })();
    </script>
  </body>
</html>
