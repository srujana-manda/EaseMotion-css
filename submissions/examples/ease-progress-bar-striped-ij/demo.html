<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-progress-bar-striped</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pbs-container">
    <div class="pbs-bar">
      <div class="pbs-fill" style="--progress: 0"></div>
    </div>
    <span class="pbs-label" id="pbsLabel">0%</span>
    <div class="pbs-controls">
      <input class="pbs-slider" type="range" min="0" max="100" value="0" oninput="setProgress(this.value)">
      <button class="pbs-btn" onclick="setProgress(100)">Complete</button>
    </div>
  </div>
  <script>
    function setProgress(val) {
      const fill = document.querySelector('.pbs-fill');
      const label = document.getElementById('pbsLabel');
      fill.style.setProperty('--progress', val);
      label.textContent = val + '%';
    }
  </script>
</body>
</html>
