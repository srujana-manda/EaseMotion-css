<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Text Animation - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Wave Text</h1>
    <p class="wta-desc">Text letters wave like ocean in sequence.</p>
    <div class="wta-wave" id="wtaWave">
      <span class="wta-char" style="animation-delay:0.00s">W</span>
      <span class="wta-char" style="animation-delay:0.05s">a</span>
      <span class="wta-char" style="animation-delay:0.10s">v</span>
      <span class="wta-char" style="animation-delay:0.15s">e</span>
      <span class="wta-char" style="animation-delay:0.20s">&nbsp;</span>
      <span class="wta-char" style="animation-delay:0.25s">T</span>
      <span class="wta-char" style="animation-delay:0.30s">e</span>
      <span class="wta-char" style="animation-delay:0.35s">x</span>
      <span class="wta-char" style="animation-delay:0.40s">t</span>
    </div>
    <div class="wta-wave wta-wave--lg" id="wtaWave2">
      <span class="wta-char" style="animation-delay:0.00s">H</span>
      <span class="wta-char" style="animation-delay:0.04s">e</span>
      <span class="wta-char" style="animation-delay:0.08s">l</span>
      <span class="wta-char" style="animation-delay:0.12s">l</span>
      <span class="wta-char" style="animation-delay:0.16s">o</span>
      <span class="wta-char" style="animation-delay:0.20s">&nbsp;</span>
      <span class="wta-char" style="animation-delay:0.24s">W</span>
      <span class="wta-char" style="animation-delay:0.28s">o</span>
      <span class="wta-char" style="animation-delay:0.32s">r</span>
      <span class="wta-char" style="animation-delay:0.36s">l</span>
      <span class="wta-char" style="animation-delay:0.40s">d</span>
      <span class="wta-char" style="animation-delay:0.44s">!</span>
    </div>
  </section>
</body>
</html>
