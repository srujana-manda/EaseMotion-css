<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Backup Retention Compliance Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Backup Retention Compliance</h2>

<div class="backup healthy">
<div>
<h3>Daily Backups</h3>
<p>Last backup completed successfully</p>
</div>
<span>Healthy</span>
</div>

<div class="backup active">
<div>
<h3>Retention Policy</h3>
<p>365-Day Archive Policy Applied</p>
</div>
<span>Compliant</span>
</div>

<div class="backup warning">
<div>
<h3>Archive Storage</h3>
<p>7 Backup Sets Await Verification</p>
</div>
<span>Review</span>
</div>

<div class="backup critical">
<div>
<h3>Policy Violation</h3>
<p>2 Servers Missing Weekly Backup</p>
</div>
<span>Alert</span>
</div>

</section>

</body>
</html>
