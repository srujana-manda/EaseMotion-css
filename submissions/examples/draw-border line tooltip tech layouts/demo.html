<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Border Tooltip</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="demo">

    <h1>Draw Border Tooltip</h1>

    <p>
        Hover or focus the button to reveal the tooltip.
    </p>

    <div class="tooltip-wrapper">

        <button
            class="tooltip-trigger"
            aria-describedby="tooltip">
            Hover Me
        </button>

        <span
            class="tooltip"
            id="tooltip"
            role="tooltip">

            Some Tooltip text
            
        </span>

    </div>

</main>

</body>
</html>
