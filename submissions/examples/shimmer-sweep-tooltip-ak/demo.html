<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shimmer Sweep Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="hero">
        <section aria-labelledby="tooltip-title">

        <h1 id="tooltip-title">Shimmer Sweep Tooltip</h1>
        

        <p>
            Hover over the button to preview the shimmer sweep tooltip effect.
        </p>

        <button
            class="tooltip-trigger"
            type="button"
            aria-describedby="tooltip"
        >
            Hover Me

            <span
                class="tooltip"
                id="tooltip"
                role="tooltip"
            >
                ✨ Smooth shimmer animation with pure CSS.
            </span>

        </button>
    </section>

    </main>

</body>
</html>
