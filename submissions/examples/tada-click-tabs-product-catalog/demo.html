<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tada-Click Tabs - Product Catalog</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
    <input type="radio" id="electronics" name="tab" checked>
    <label for="electronics">Electronics</label>

    <input type="radio" id="fashion" name="tab">
    <label for="fashion">Fashion</label>

    <input type="radio" id="home" name="tab">
    <label for="home">Home</label>

    <div class="content">
        <div class="panel">Browse the latest electronic products.</div>
        <div class="panel">Explore trending fashion collections.</div>
        <div class="panel">Discover stylish home essentials.</div>
    </div>
</div>

</body>
</html>
