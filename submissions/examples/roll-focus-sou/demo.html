<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roll Loader — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>Roll Loader</h1>
      <p class="subtitle">A looping horizontal roll animation for loading indicators.</p>
    </header>

    <!-- Variant 1: Default single-ball roll loader -->
    <section class="demo-block">
      <h2 class="demo-title">Default Roll</h2>
      <div class="roll-loader">
        <span class="roll-ball"></span>
      </div>
    </section>

    <!-- Variant 2: Multi-ball roll loader -->
    <section class="demo-block">
      <h2 class="demo-title">Multi-Ball Roll</h2>
      <div class="roll-loader roll-loader--multi">
        <span class="roll-ball roll-ball--sm"></span>
        <span class="roll-ball roll-ball--sm roll-ball--delay-1"></span>
        <span class="roll-ball roll-ball--sm roll-ball--delay-2"></span>
      </div>
    </section>

    <!-- Variant 3: Large accent-colored roll loader -->
    <section class="demo-block">
      <h2 class="demo-title">Large Accent Roll</h2>
      <div class="roll-loader roll-loader--lg">
        <span class="roll-ball roll-ball--accent"></span>
      </div>
    </section>

    <!-- Variant 4: Inline usage inside a button -->
    <section class="demo-block">
      <h2 class="demo-title">Inline Inside a Button</h2>
      <button class="btn" type="button" disabled>
        <span class="roll-loader roll-loader--inline">
          <span class="roll-ball roll-ball--xs"></span>
        </span>
        Loading data...
      </button>
    </section>

    <footer class="page-footer">
      <p>Author: <strong>soumyasekharshee265-ux</strong></p>
    </footer>
  </main>
</body>
</html>
