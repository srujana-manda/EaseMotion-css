<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swing Exit Animation — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="stage">
    <section class="card" aria-label="Swing exit demo card">
      <header class="card__header">
        <h1 class="card__title">Swing Exit</h1>
        <p class="card__subtitle">EaseMotion CSS Demo</p>
      </header>

      <p class="card__text">
        Hover over this card to watch it swing from its top edge,
        rock left and right, then fall away while fading out.
      </p>

      <footer class="card__footer">
        <button type="button" class="btn">Exit</button>
      </footer>
    </section>
  </main>

</body>
</html>
