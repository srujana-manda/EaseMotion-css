<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification Slide - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Notifications</h1>
    <button id="tnsBtn" class="tns-trigger">Show Toast</button>
    <div class="tns-container" id="tnsContainer"></div>
  </div>
  <script>
    var container = document.getElementById('tnsContainer');
    document.getElementById('tnsBtn').addEventListener('click', function() {
      var toast = document.createElement('div');
      toast.className = 'tns-toast';
      toast.innerHTML = '<span class="tns-msg">Action completed successfully!</span><span class="tns-bar"></span>';
      container.appendChild(toast);
      setTimeout(function() {
        toast.classList.add('tns-hide');
        setTimeout(function() { toast.remove(); }, 350);
      }, 3000);
    });
  </script>
</body>
</html>
