<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI Pipeline Build Verification Status</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ci-container">
        <h2 class="ci-title">CI Pipeline Monitor</h2>
        <p class="ci-subtitle">Simulated status validation for EaseMotion-css builds</p>
        
        <div class="pipeline-card">
            <div class="step-row success">
                <span class="status-badge">✓ Pass</span>
                <span class="step-name">Code Checkout & Env Setup</span>
            </div>
            <div class="step-row success">
                <span class="status-badge">✓ Pass</span>
                <span class="step-name">Stylelint Syntax Validation</span>
            </div>
            <div class="step-row standard">
                <span class="status-badge processing">⟳ Running</span>
                <span class="step-name">GSSoC Submission Directory Layout Match Check</span>
            </div>
        </div>
    </div>
</body>
</html>
