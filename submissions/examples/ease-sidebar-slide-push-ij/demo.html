<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-sidebar-slide-push</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ssp-wrapper" style="--sidebar-open: 0">
    <aside class="ssp-sidebar">
      <nav class="ssp-nav">
        <a href="#" class="ssp-link">Dashboard</a>
        <a href="#" class="ssp-link">Profile</a>
        <a href="#" class="ssp-link">Settings</a>
        <a href="#" class="ssp-link">Help</a>
      </nav>
    </aside>
    <main class="ssp-main">
      <button class="ssp-toggle" onclick="toggleSidebar()">&#9776;</button>
      <div class="ssp-content">
        <h1>Main Content</h1>
        <p>This is the main content area. It shifts to the right when the sidebar opens.</p>
      </div>
    </main>
  </div>
  <script>
    function toggleSidebar() {
      const wrapper = document.querySelector('.ssp-wrapper');
      const current = wrapper.style.getPropertyValue('--sidebar-open').trim();
      wrapper.style.setProperty('--sidebar-open', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
