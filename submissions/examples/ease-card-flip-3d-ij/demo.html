<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Flip 3D - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>3D Flip Card</h1>
    <p class="desc">Hover or click to flip — CSS handles 3D rotation via --cf-flipped</p>
    <div class="flip-card" id="flipCard" style="--cf-flipped: 0;">
      <div class="flip-inner">
        <div class="flip-front">
          <div class="flip-icon">✦</div>
          <h2>Front</h2>
          <p>Click to flip</p>
        </div>
        <div class="flip-back">
          <div class="flip-icon">★</div>
          <h2>Back</h2>
          <p>CSS 3D transform</p>
        </div>
      </div>
    </div>
  </div>
  <script>
    const card = document.getElementById('flipCard');
    card.addEventListener('click', () => {
      const f = card.style.getPropertyValue('--cf-flipped') === '1' ? '0' : '1';
      card.style.setProperty('--cf-flipped', f);
    });
  </script>
</body>
</html>
