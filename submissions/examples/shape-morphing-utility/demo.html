<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Morphing — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Shape Morphing Utility</h1>
  <p class="subtitle">A CSS clip-path shape morphing and transition utility — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="morph-grid"><div class="morph-box" style="--morph-shape: circle(50%)"></div><div class="morph-box" style="--morph-shape: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)"></div><div class="morph-box" style="--morph-shape: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)"></div><div class="morph-box" style="--morph-shape: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)"></div></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>.element { clip-path: var(--morph-shape, circle(50%)); transition: clip-path 0.5s ease; }
.element:hover { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }</code></pre></section>
</body>
</html>
