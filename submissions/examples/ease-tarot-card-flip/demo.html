<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Card Flip – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🃏 Tarot Card Flip</h1>
    <p class="subtitle">Tarot card flipping with glowing back</p>

    <div class="tc-container">
      <div class="tc-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Tarot Card -->
        <div class="tarot-card" id="tarotCard">
          <div class="card-inner">
            <!-- Front of card -->
            <div class="card-front">
              <div class="card-border">
                <div class="card-corner ctl"></div>
                <div class="card-corner ctr"></div>
                <div class="card-corner cbl"></div>
                <div class="card-corner cbr"></div>
              </div>
              <div class="card-number">VII</div>
              <div class="card-title">THE CHARIOT</div>
              <div class="card-art">
                <div class="chariot-body"></div>
                <div class="chariot-wheel w1"></div>
                <div class="chariot-wheel w2"></div>
                <div class="chariot-star s1"></div>
                <div class="chariot-star s2"></div>
                <div class="chariot-star s3"></div>
                <div class="chariot-star s4"></div>
              </div>
              <div class="card-suit">♈</div>
              <div class="card-bottom">VII · THE CHARIOT</div>
            </div>

            <!-- Back of card -->
            <div class="card-back">
              <div class="back-pattern">
                <div class="back-circle"></div>
                <div class="back-circle"></div>
                <div class="back-circle"></div>
                <div class="back-circle"></div>
                <div class="back-circle"></div>
                <div class="back-circle"></div>
                <div class="back-circle"></div>
                <div class="back-circle"></div>
                <div class="back-center"></div>
              </div>
              <div class="back-glow"></div>
            </div>
          </div>
        </div>

        <!-- Glow overlay -->
        <div class="card-glow" id="cardGlow"></div>

        <!-- Floating particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
      </div>
    </div>

    <div class="controls">
      <button id="flipBtn">🃏 Flip Card</button>
      <button id="resetBtn">⟳ Reset</button>
      <label>
        Flip Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
    </div>
  </div>

  <script>
    (function() {
      const tarotCard = document.getElementById('tarotCard');
      const cardGlow = document.getElementById('cardGlow');
      const particles = document.querySelectorAll('.particle');

      const flipBtn = document.getElementById('flipBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isFlipped = false;
      let isAnimating = false;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        const duration = 0.8 / speedMultiplier;
        tarotCard.style.setProperty('--flip-duration', duration + 's');

        // Particles
        particles.forEach((p, i) => {
          const d = (3 + i * 0.3) / speedMultiplier;
          p.style.setProperty('--particle-duration', d + 's');
          p.style.setProperty('--particle-delay', ((i * 0.05) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        const glowOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        cardGlow.style.setProperty('--glow-intensity', glowOpacity);
        const glowSize = 300 * intensityMultiplier;
        cardGlow.style.setProperty('--glow-size', glowSize + 'px');

        // Card back glow
        const backGlow = document.querySelector('.back-glow');
        if (backGlow) {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          backGlow.style.opacity = opacity;
        }

        // Particles
        particles.forEach((p) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          p.style.setProperty('--particle-opacity', opacity);
        });
      }

      // ----- Flip card -----
      function flipCard() {
        if (isAnimating) return;
        isAnimating = true;

        isFlipped = !isFlipped;

        if (isFlipped) {
          tarotCard.classList.add('flipped');
          tarotCard.classList.remove('unflipped');

          // Glow intensifies on flip
          cardGlow.classList.add('active');
          setTimeout(() => {
            cardGlow.classList.remove('active');
          }, 800 / speedMultiplier);

          // Particles burst
          particles.forEach((p, i) => {
            p.classList.add('active');
            const angle = Math.random() * Math.PI * 2;
            const dist = 40 + Math.random() * 60;
            p.style.setProperty('--burst-x', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--burst-y', Math.sin(angle) * dist + 'px');
            setTimeout(() => {
              p.classList.remove('active');
            }, 3000 / speedMultiplier);
          });

          flipBtn.textContent = '🃏 Flipping...';
          setTimeout(() => {
            flipBtn.textContent = '🃏 Flip Back';
            isAnimating = false;
          }, 800 / speedMultiplier);

        } else {
          tarotCard.classList.remove('flipped');
          tarotCard.classList.add('unflipped');

          flipBtn.textContent = '🃏 Flipping...';
          setTimeout(() => {
            flipBtn.textContent = '🃏 Flip Card';
            isAnimating = false;
          }, 800 / speedMultiplier);
        }
      }

      // ----- Reset -----
      function resetCard() {
        if (isAnimating) return;

        isFlipped = false;
        tarotCard.classList.remove('flipped', 'unflipped');
        cardGlow.classList.remove('active');
        particles.forEach(p => {
          p.classList.remove('active');
        });
        flipBtn.textContent = '🃏 Flip Card';
        isAnimating = false;
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Subtle card float
        if (!isFlipped) {
          const floatY = Math.sin(timestamp / 3000) * 4;
          tarotCard.style.transform = `translate(-50%, -50%) translateY(${floatY}px)`;
        }

        // Card glow pulse when active
        if (cardGlow.classList.contains('active')) {
          const pulse = Math.sin(timestamp / 300) * 0.2 + 0.8;
          cardGlow.style.transform = `translate(-50%, -50%) scale(${0.9 + pulse * 0.1})`;
        }

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-flip after 1.5 seconds
        setTimeout(() => {
          flipCard();
        }, 1500);

        // Auto-flip back after 3.5 seconds
        setTimeout(() => {
          flipCard();
        }, 4000);

        // Auto-flip again
        setTimeout(() => {
          flipCard();
        }, 5500);

        // Auto-flip back
        setTimeout(() => {
          flipCard();
        }, 7000);
      }

      // ----- Event listeners -----
      flipBtn.addEventListener('click', flipCard);
      resetBtn.addEventListener('click', resetCard);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      // Click on card to flip
      tarotCard.addEventListener('click', flipCard);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
