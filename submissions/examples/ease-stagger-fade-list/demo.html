<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stagger Fade List — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">

<body>
  <h1>Stagger Fade List</h1>
  <p class="subtitle">A list with staggered fade-in items using animation-delay — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><ul class="stagger-list"><li style="--i:1">Item One</li><li style="--i:2">Item Two</li><li style="--i:3">Item Three</li><li style="--i:4">Item Four</li><li style="--i:5">Item Five</li><li style="--i:6">Item Six</li></ul></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;ul class=&quot;stagger-list&quot;&gt;
  &lt;li style=&quot;--i:1&quot;&gt;Item&lt;/li&gt;
  &lt;li style=&quot;--i:2&quot;&gt;Item&lt;/li&gt;
&lt;/ul&gt;</code></pre></section>
</body>
</html>
