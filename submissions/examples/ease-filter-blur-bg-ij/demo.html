<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter Blur BG | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" style="--blur: 0">
    <h2>Blur Background</h2>
    <p>Toggle the button to blur the background behind this card.</p>
    <button onclick="toggleBlur()">Toggle Blur</button>
  </div>
  <script>
    function toggleBlur() {
      const card = document.querySelector('.card');
      const current = card.style.getPropertyValue('--blur');
      card.style.setProperty('--blur', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
