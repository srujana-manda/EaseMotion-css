<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading Card Utility — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="demo-container" id="demo-root">

    <div class="demo-header">
      <h1>Skeleton Loading Card Utility</h1>
      <p>Perceived performance loading animation placeholders. Toggle state to simulate data fetching.</p>
    </div>

    <!-- Toolbar controls -->
    <div class="demo-toolbar">
      <button class="btn-toggle" id="toggleStateBtn">Simulate Content Loaded</button>
      <button class="btn-toggle" id="toggleThemeBtn">Toggle Light / Dark Theme</button>
    </div>

    <!-- Cards Grid -->
    <div class="demo-grid" id="cardsGrid">

      <!-- Card 1: Standard Article Skeleton (Matches #53628 HTML snippet) -->
      <div class="skeleton-card" id="card1-skeleton">
        <div class="skeleton-image"></div>
        <div class="skeleton-content">
          <div class="skeleton-title"></div>
          <div class="skeleton-text"></div>
          <div class="skeleton-text short"></div>
        </div>
      </div>

      <!-- Card 2: Composable User Profile Skeleton -->
      <div class="skeleton-card" id="card2-skeleton">
        <div class="skeleton-header-row">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-content" style="flex:1;">
            <div class="skeleton-title" style="width:50%;height:16px;"></div>
            <div class="skeleton-text tiny"></div>
          </div>
        </div>
        <div class="skeleton-content">
          <div class="skeleton-text"></div>
          <div class="skeleton-text short"></div>
        </div>
        <div class="skeleton-footer-row">
          <div class="skeleton-badge"></div>
          <div class="skeleton-btn"></div>
        </div>
      </div>

    </div>

  </div>

  <script>
    const toggleStateBtn = document.getElementById('toggleStateBtn');
    const toggleThemeBtn = document.getElementById('toggleThemeBtn');
    const demoRoot = document.getElementById('demo-root');
    const cardsGrid = document.getElementById('cardsGrid');

    let isLoading = true;

    toggleStateBtn.addEventListener('click', () => {
      isLoading = !isLoading;

      if (isLoading) {
        toggleStateBtn.innerText = 'Simulate Content Loaded';
        cardsGrid.innerHTML = `
          <!-- Card 1: Standard Article Skeleton -->
          <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-content">
              <div class="skeleton-title"></div>
              <div class="skeleton-text"></div>
              <div class="skeleton-text short"></div>
            </div>
          </div>

          <!-- Card 2: Composable User Profile Skeleton -->
          <div class="skeleton-card">
            <div class="skeleton-header-row">
              <div class="skeleton-avatar"></div>
              <div class="skeleton-content" style="flex:1;">
                <div class="skeleton-title" style="width:50%;height:16px;"></div>
                <div class="skeleton-text tiny"></div>
              </div>
            </div>
            <div class="skeleton-content">
              <div class="skeleton-text"></div>
              <div class="skeleton-text short"></div>
            </div>
            <div class="skeleton-footer-row">
              <div class="skeleton-badge"></div>
              <div class="skeleton-btn"></div>
            </div>
          </div>
        `;
      } else {
        toggleStateBtn.innerText = 'Show Skeleton Loading State';
        cardsGrid.innerHTML = `
          <!-- Real Loaded Card 1 -->
          <div class="real-card">
            <svg class="real-image" viewBox="0 0 320 180" fill="#1e1b4b"><rect width="320" height="180" fill="#312e81"/><circle cx="160" cy="90" r="40" fill="#6366f1"/></svg>
            <h3 class="real-title">Exploring Design Tokens</h3>
            <p class="real-text">Perceived performance improves when users see familiar content structures during loading states.</p>
          </div>

          <!-- Real Loaded Card 2 -->
          <div class="real-card">
            <div style="display:flex;align-items:center;gap:12px;">
              <svg width="44" height="44" viewBox="0 0 44 44" fill="#0891b2" style="border-radius:50%;"><circle cx="22" cy="22" r="22" fill="#0891b2"/><circle cx="22" cy="18" r="9" fill="#fff"/></svg>
              <div>
                <h4 style="margin:0;color:#fff;font-size:0.95rem;">Aparna Sharma</h4>
                <span style="color:#64748b;font-size:0.78rem;">Senior Contributor</span>
              </div>
            </div>
            <p class="real-text">Building composable utilities for EaseMotion CSS library with lightweight animations.</p>
          </div>
        `;
      }
    });

    toggleThemeBtn.addEventListener('click', () => {
      demoRoot.classList.toggle('light-theme');
    });
  </script>

</body>
</html>
