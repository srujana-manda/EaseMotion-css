<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-badge-pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bdp-wrapper">
    <div class="bdp-container" style="--pulse: 0">
      <div class="bdp-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"></path>
          <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
        </svg>
        <span class="bdp-badge"></span>
      </div>
    </div>
    <button class="bdp-btn">Toggle Pulse</button>
  </div>
  <script>
    document.querySelector('.bdp-btn').addEventListener('click', function() {
      var el = document.querySelector('.bdp-container');
      var current = parseInt(el.style.getPropertyValue('--pulse')) || 0;
      var next = current === 1 ? 0 : 1;
      el.style.setProperty('--pulse', next);
    });
  </script>
</body>
</html>
