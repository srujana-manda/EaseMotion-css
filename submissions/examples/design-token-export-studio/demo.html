<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Token Export Studio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🎨 Design Token Export Studio</h1>

<div class="editor">

<div class="control">
<label>Primary Color</label>
<input type="color" id="primary" value="#6366f1">
</div>

<div class="control">
<label>Secondary Color</label>
<input type="color" id="secondary" value="#ec4899">
</div>

<div class="control">
<label>Border Radius</label>
<input type="range" id="radius" min="0" max="30" value="12">
<span id="radiusValue">12px</span>
</div>

<div class="control">
<label>Spacing</label>
<input type="range" id="spacing" min="4" max="40" value="16">
<span id="spacingValue">16px</span>
</div>

<div class="control">
<label>Animation Speed</label>
<input type="range" id="speed" min="100" max="1000" step="100" value="300">
<span id="speedValue">300ms</span>
</div>

<div class="buttons">
<button id="reset">Reset</button>
</div>

</div>

<h2>Live Preview</h2>

<div class="preview">

<div class="card">
<h3>Example Card</h3>
<p>This card updates instantly.</p>

<button class="btn">Primary Button</button>

<span class="badge">Badge</span>

</div>

</div>

<div class="output">

<div>

<h2>CSS Export</h2>

<textarea id="cssOutput" readonly></textarea>

<button id="copyCSS">Copy CSS</button>

</div>

<div>

<h2>JSON Export</h2>

<textarea id="jsonOutput" readonly></textarea>

<button id="copyJSON">Copy JSON</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
