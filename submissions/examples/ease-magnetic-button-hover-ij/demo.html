<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Button Hover - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Magnetic Effect</h1>
    <div class="mbh-btn" id="mbhBtn">
      <span class="mbh-text">Hover Me</span>
    </div>
  </div>
  <script>
    var btn = document.getElementById('mbhBtn');
    btn.addEventListener('mousemove', function(e) {
      var rect = btn.getBoundingClientRect();
      var x = (e.clientX - rect.left - rect.width / 2) / (rect.width / 2);
      var y = (e.clientY - rect.top - rect.height / 2) / (rect.height / 2);
      btn.style.setProperty('--mbh-x', x * 8);
      btn.style.setProperty('--mbh-y', y * 8);
    });
    btn.addEventListener('mouseleave', function() {
      btn.style.setProperty('--mbh-x', 0);
      btn.style.setProperty('--mbh-y', 0);
    });
  </script>
</body>
</html>
