<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion – Animated Progress Indicators</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Animated Progress Indicators</h1>

  <!-- Simple progress bar -->
  <section>
    <h2>Simple Progress Bar</h2>
    <div class="progress-container">
      <div class="progress-bar" data-progress="70%">70%</div>
    </div>
  </section>

  <!-- Striped animated progress bar -->
  <section>
    <h2>Striped Progress Bar</h2>
    <div class="progress-container striped">
      <div class="progress-bar striped" data-progress="85%">85%</div>
    </div>
  </section>

  <!-- Gradient animated progress bar -->
  <section>
    <h2>Gradient Progress Bar</h2>
    <div class="progress-container multicolor">
      <div class="progress-bar multi" data-progress="60%">60%</div>
    </div>
  </section>
</body>
</html>
