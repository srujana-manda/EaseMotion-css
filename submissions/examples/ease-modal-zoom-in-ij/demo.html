<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-modal-zoom-in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mzi-container">
    <button class="mzi-open-btn" onclick="openModal()">Open Modal</button>
    <div class="mzi-overlay" id="mzi-overlay" style="--open: 0">
      <div class="mzi-modal">
        <div class="mzi-header">
          <h2 class="mzi-title">Modal Title</h2>
          <button class="mzi-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="mzi-body">
          <p>This modal zooms in with a smooth scale transition. The backdrop fades in simultaneously.</p>
          <p>Click outside or the X button to close.</p>
        </div>
        <div class="mzi-footer">
          <button class="mzi-btn mzi-btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="mzi-btn mzi-btn-primary" onclick="closeModal()">Confirm</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    function openModal() { document.getElementById('mzi-overlay').style.setProperty('--open', 1); }
    function closeModal() { document.getElementById('mzi-overlay').style.setProperty('--open', 0); }
    document.getElementById('mzi-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
  </script>
</body>
</html>
