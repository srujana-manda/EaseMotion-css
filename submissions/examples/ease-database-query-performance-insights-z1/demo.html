<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Database Query Performance Insights</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Database Query Performance</h2>

<div class="metric healthy">
<div>
<h3>Query Cache</h3>
<p>Hit Rate: 97.8%</p>
</div>
<span>Excellent</span>
</div>

<div class="metric active">
<div>
<h3>Active Connections</h3>
<p>126 / 200 Connected</p>
</div>
<span>Stable</span>
</div>

<div class="metric warning">
<div>
<h3>Slow Queries</h3>
<p>14 Queries > 1 Second</p>
</div>
<span>Review</span>
</div>

<div class="metric critical">
<div>
<h3>Longest Query</h3>
<p>Execution Time: 8.4 Seconds</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
