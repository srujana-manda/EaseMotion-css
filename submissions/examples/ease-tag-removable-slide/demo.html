<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag Removable Slide — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tag Removable Slide</h1>
  <p class="subtitle">A removable tag with slide-out animation — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="tag-container"><span class="removable-tag">CSS<span class="tag-close">×</span></span><span class="removable-tag">HTML<span class="tag-close">×</span></span><span class="removable-tag">JavaScript<span class="tag-close">×</span></span><span class="removable-tag">React<span class="tag-close">×</span></span></div><p class="hint">Hover over a tag to see the close button, click areas are visual.</p></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;span class=&quot;removable-tag&quot;&gt;Label
  &lt;span class=&quot;tag-close&quot;&gt;&amp;times;&lt;/span&gt;
&lt;/span&gt;</code></pre></section>
</body>
</html>
