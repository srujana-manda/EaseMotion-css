<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Slide-Up Carousel - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="catalog-container">
        <header class="catalog-header">
            <span class="eyebrow">Summer Collection</span>
            <h1>Featured Footwear</h1>
            <p>Discover our latest arrivals designed for ultimate comfort and style.</p>
        </header>

        <section class="carousel-wrapper" aria-roledescription="carousel" aria-label="Featured Products">
            <!-- Hidden Radio Inputs for State Management -->
            <input type="radio" name="product-slider" id="slide-1" class="slider-radio" checked aria-label="View Nova Pro">
            <input type="radio" name="product-slider" id="slide-2" class="slider-radio" aria-label="View Elevate Max">
            <input type="radio" name="product-slider" id="slide-3" class="slider-radio" aria-label="View Cloud Runner">
            
            <div class="carousel-viewport">
                <div class="carousel-track">
                    <!-- Slide 1: Product -->
                    <article class="carousel-slide slide-1" role="group" aria-roledescription="slide" aria-label="1 of 3">
                        <div class="product-card">
                            <div class="card-badge">New</div>
                            <div class="product-image-container img-bg-1">
                                <!-- Dummy SVG replacing real shoe image -->
                                <svg class="product-svg" viewBox="0 0 100 60" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 40 Q 20 20, 50 25 T 90 40 L 90 50 L 10 50 Z" fill="rgba(255,255,255,0.1)"/>
                                    <path d="M20 40 Q 30 10, 60 15" stroke-linecap="round"/>
                                    <circle cx="25" cy="50" r="4"/>
                                    <circle cx="75" cy="50" r="4"/>
                                </svg>
                            </div>
                            <div class="product-info">
                                <span class="product-category">Running Shoes</span>
                                <h3 class="product-title">Nova Pro Velocity</h3>
                                <div class="price-row">
                                    <span class="product-price">$145.00</span>
                                    <div class="color-swatches">
                                        <div class="swatch active" style="background-color: #f43f5e;"></div>
                                        <div class="swatch" style="background-color: #1e293b;"></div>
                                    </div>
                                </div>
                                <button class="add-to-cart-btn" tabindex="-1">Add to Cart</button>
                            </div>
                        </div>
                    </article>

                    <!-- Slide 2: Product -->
                    <article class="carousel-slide slide-2" role="group" aria-roledescription="slide" aria-label="2 of 3">
                        <div class="product-card">
                            <div class="card-badge sale">Sale -20%</div>
                            <div class="product-image-container img-bg-2">
                                <svg class="product-svg" viewBox="0 0 100 60" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M15 45 L 25 15 L 60 10 L 85 45 Z" fill="rgba(255,255,255,0.1)"/>
                                    <path d="M30 15 L 70 45" stroke-linecap="round"/>
                                    <circle cx="30" cy="45" r="4"/>
                                    <circle cx="70" cy="45" r="4"/>
                                </svg>
                            </div>
                            <div class="product-info">
                                <span class="product-category">Lifestyle Sneakers</span>
                                <h3 class="product-title">Elevate Max Low</h3>
                                <div class="price-row">
                                    <span class="product-price sale-price">$95.00 <del>$120.00</del></span>
                                    <div class="color-swatches">
                                        <div class="swatch active" style="background-color: #eab308;"></div>
                                        <div class="swatch" style="background-color: #ffffff; border: 1px solid #cbd5e1;"></div>
                                        <div class="swatch" style="background-color: #3b82f6;"></div>
                                    </div>
                                </div>
                                <button class="add-to-cart-btn" tabindex="-1">Add to Cart</button>
                            </div>
                        </div>
                    </article>

                    <!-- Slide 3: Product -->
                    <article class="carousel-slide slide-3" role="group" aria-roledescription="slide" aria-label="3 of 3">
                        <div class="product-card">
                            <div class="product-image-container img-bg-3">
                                <svg class="product-svg" viewBox="0 0 100 60" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M5 35 Q 30 30, 50 15 T 95 35 L 80 55 L 20 55 Z" fill="rgba(255,255,255,0.1)"/>
                                    <circle cx="35" cy="55" r="4"/>
                                    <circle cx="65" cy="55" r="4"/>
                                </svg>
                            </div>
                            <div class="product-info">
                                <span class="product-category">Trail Running</span>
                                <h3 class="product-title">Cloud Runner GTX</h3>
                                <div class="price-row">
                                    <span class="product-price">$160.00</span>
                                    <div class="color-swatches">
                                        <div class="swatch active" style="background-color: #22c55e;"></div>
                                        <div class="swatch" style="background-color: #0f172a;"></div>
                                    </div>
                                </div>
                                <button class="add-to-cart-btn" tabindex="-1">Add to Cart</button>
                            </div>
                        </div>
                    </article>
                </div>
            </div>

            <!-- Carousel Controls -->
            <div class="carousel-controls" aria-hidden="true">
                <label for="slide-1" class="control-dot" title="Nova Pro Velocity"></label>
                <label for="slide-2" class="control-dot" title="Elevate Max Low"></label>
                <label for="slide-3" class="control-dot" title="Cloud Runner GTX"></label>
            </div>
        </section>
    </div>
</body>
</html>
