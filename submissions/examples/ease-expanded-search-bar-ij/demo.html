<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expanded Search Bar - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="esb-wrapper">
    <h1>Expanded Search Bar</h1>
    <p class="esb-desc">Click the search icon to expand the input field.</p>
    <div class="esb-container" id="esbContainer">
      <span class="esb-icon">&#x1F50D;</span>
      <button class="esb-btn" id="esbBtn" aria-label="Toggle search">&#x1F50D;</button>
      <input type="text" class="esb-input" id="esbInput" placeholder="Search anything..." />
    </div>
  </div>
  <script>
    var container = document.getElementById('esbContainer');
    var btn = document.getElementById('esbBtn');
    var input = document.getElementById('esbInput');

    btn.addEventListener('click', function () {
      container.classList.toggle('esb-expanded');
      if (container.classList.contains('esb-expanded')) {
        input.focus();
      }
    });

    input.addEventListener('blur', function () {
      if (!input.value) {
        container.classList.remove('esb-expanded');
      }
    });
  </script>
</body>
</html>
