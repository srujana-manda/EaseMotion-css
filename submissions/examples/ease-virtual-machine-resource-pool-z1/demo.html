<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Virtual Machine Resource Pool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="pool-panel">

<h2>VM Resource Pools</h2>

<div class="pool healthy">
<div>
<h3>Production Pool</h3>
<p>18 VMs • CPU 62% • RAM 58%</p>
</div>
<span>Stable</span>
</div>

<div class="pool active">
<div>
<h3>Development Pool</h3>
<p>12 VMs • CPU 74% • RAM 66%</p>
</div>
<span>Active</span>
</div>

<div class="pool warning">
<div>
<h3>Analytics Pool</h3>
<p>9 VMs • CPU 91% • Scale Recommended</p>
</div>
<span>High Load</span>
</div>

<div class="pool maintenance">
<div>
<h3>Testing Pool</h3>
<p>5 VMs • Maintenance Window</p>
</div>
<span>Updating</span>
</div>

</section>

</body>
</html>
