<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Color Gradient Fill Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Showcase layout ── */
    .showcase-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 560px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      align-items: center;
    }

    /* Common Button Reset */
    .btn-style {
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      outline: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      width: 100%;
      max-width: 280px;
    }

    .btn-style:active {
      transform: scale(0.97);
    }

    /* Variant 1: Outlined Violet-Indigo Fill */
    .violet-fill {
      --gradient-fill-start:   #6c63ff;
      --gradient-fill-end:     #8b5cf6;
      --gradient-base-bg:      transparent;
      --gradient-border-color: #6c63ff;
      --gradient-text-color:   #6c63ff;
    }

    @media (prefers-color-scheme: dark) {
      .violet-fill {
        --gradient-text-color: #f8fafc;
      }
    }

    /* Variant 2: Solid Dark to Cyan-Emerald Gradient */
    .cyan-fill {
      --gradient-fill-start:        #06b6d4;
      --gradient-fill-end:          #10b981;
      --gradient-base-bg:           #0f172a;
      --gradient-border-color:      #1e293b;
      --gradient-text-color:        #f8fafc;
      --gradient-text-hover-color:  #0f172a;
    }

    @media (prefers-color-scheme: light) {
      .cyan-fill {
        --gradient-base-bg:         #f1f5f9;
        --gradient-border-color:    #cbd5e1;
        --gradient-text-color:      #0f172a;
      }
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Hover Color Gradient Fill</h1>
    <p>
      Hover over the buttons below to watch a smooth color gradient sweep across their backgrounds.
    </p>
  </header>

  <main class="showcase-card">

    <!-- Outlined Button variant -->
    <button class="gradient-fill-button-uj btn-style violet-fill">
      Explore Features
    </button>

    <!-- Dark-to-light filled button variant -->
    <button class="gradient-fill-button-uj btn-style cyan-fill">
      Get Started Free
    </button>

  </main>

</body>
</html>
