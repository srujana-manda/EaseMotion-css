<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Counter Bounce - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Notifications</h1>
    <div class="bcb-bell">
      <span class="bcb-icon">&#x1F514;</span>
      <span class="bcb-badge" id="bcbBadge" style="--bcb-count: 0;">0</span>
    </div>
    <div class="bcb-controls">
      <button id="bcbAdd" class="bcb-btn">+1</button>
      <button id="bcbReset" class="bcb-btn">Reset</button>
    </div>
  </div>
  <script>
    const badge = document.getElementById('bcbBadge');
    let count = 0;

    function updateBadge() {
      badge.style.setProperty('--bcb-count', count);
      badge.textContent = count;
      badge.classList.remove('bcb-bounce');
      void badge.offsetWidth;
      badge.classList.add('bcb-bounce');
    }

    document.getElementById('bcbAdd').addEventListener('click', () => {
      count++;
      updateBadge();
    });

    document.getElementById('bcbReset').addEventListener('click', () => {
      count = 0;
      updateBadge();
    });
  </script>
</body>
</html>
