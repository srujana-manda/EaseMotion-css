<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Fade-In Hero Section (Creative Portfolio)</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="hero-stage">

    <!-- Restrained background glow orb -->
    <div class="hero-glow-orb" aria-hidden="true"></div>

    <section class="hero-container" aria-labelledby="hero-title">

      <!-- 1. Availability / status pill -->
      <div class="hero-badge ease-fade-in ease-delay-100">
        <span class="hero-badge-dot" aria-hidden="true"></span>
        <span class="hero-badge-text">Available for Selected Projects</span>
      </div>

      <!-- 2. Main headline -->
      <h1 id="hero-title" class="hero-title ease-fade-in ease-delay-200">
        Crafting <span class="hero-title-gradient">digital motion</span> &amp; visual identities with elegance
      </h1>

      <!-- 3. Supporting description -->
      <p class="hero-description ease-fade-in ease-delay-300">
        Independent Creative Director &amp; Interface Specialist crafting fluid web experiences, modern design systems,
        and performant motion architectures.
      </p>

      <!-- 4. CTA group -->
      <div class="hero-actions ease-fade-in ease-delay-400">
        <a href="#work" class="hero-btn hero-btn-primary" role="button">
          <span>Explore Work</span>
          <svg class="hero-btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
        <a href="#contact" class="hero-btn hero-btn-secondary" role="button">
          <span>Start a Project</span>
        </a>
      </div>

    </section>
  </main>
</body>

</html>
