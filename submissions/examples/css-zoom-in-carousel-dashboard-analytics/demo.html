<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Zoom-In Carousel - Dashboard Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Dashboard Analytics Carousel</h1>

  <div class="carousel">
    <div class="card active" tabindex="0">
      <h2>Revenue</h2>
      <p>$24,850</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Users</h2>
      <p>12.4K Active</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Growth</h2>
      <p>+18%</p>
    </div>
  </div>

</div>

</body>
</html>
