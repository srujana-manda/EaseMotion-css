<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Card Effects Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #f0f2f5; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            gap: 40px; 
            margin: 0;
        }
        .container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        h2 { color: #333; margin-bottom: 10px; }
        .section { display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <h1>EaseMotion Card Effects</h1>

    <div class="container">
        <!-- Section 1 -->
        <div class="section">
            <h2>3D Lift</h2>
            <div class="em-card-lift">
                <h3>Card One</h3>
                <p>Hover over me to see the 3D lift effect.</p>
            </div>
        </div>

        <!-- Section 2 -->
        <div class="section">
            <h2>Neon Glow</h2>
            <div class="em-card-glow">
                <h3>Card Two</h3>
                <p>Hover for neon glow.</p>
            </div>
        </div>

        <!-- Section 3 -->
        <div class="section">
            <h2>Floating</h2>
            <div class="em-card-float">
                <span>Float!</span>
            </div>
        </div>
    </div>

</body>
</html>
