<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Border Draw Animate</title>
</head>
<body>
  <div class="container">
    <div class="draw-box" id="drawBox">
      <span class="draw-label">EaseMotion</span>
    </div>
    <button class="toggle" id="toggleDraw">Toggle Draw</button>
  </div>
  <script>
    const el = document.querySelector('.draw-box');
    document.getElementById('toggleDraw').addEventListener('click', () => {
      const current = el.style.getPropertyValue('--draw').trim() || '0';
      el.style.setProperty('--draw', current === '1' ? '0' : '1');
    });
  </script>
</body>
</html>
