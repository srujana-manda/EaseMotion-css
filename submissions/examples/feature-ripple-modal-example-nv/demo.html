<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Modal Exit Animation Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="demo-container-nv">
        <header class="demo-header-nv">
            <h1>Ripple Modal Exit Animation</h1>
            <p>Click the trigger button to open the modal, then close it to view the smooth circular ripple exit effect.</p>
        </header>

        <!-- Trigger Button -->
        <button type="button" class="btn-trigger-nv" id="openModalBtn-nv" aria-haspopup="dialog" aria-controls="rippleModal-nv">
            Open Modal
        </button>

        <!-- Modal Backdrop and Window -->
        <div class="modal-backdrop-nv hidden-nv" id="modalBackdrop-nv" role="dialog" aria-modal="true" aria-labelledby="modalTitle-nv" invisible>
            <div class="modal-content-nv" id="modalContent-nv">
                <h2 id="modalTitle-nv">Polished UI Interfaces</h2>
                <p>This entry demonstrates a standalone implementation of a smooth ripple exit animation for modern web applications.</p>
                
                <!-- Close Button -->
                <button type="button" class="btn-close-nv" id="closeModalBtn-nv" aria-label="Close modal">
                    Dismiss
                </button>
            </div>
        </div>
    </main>

    <script>
        const openBtn = document.getElementById('openModalBtn-nv');
        const closeBtn = document.getElementById('closeModalBtn-nv');
        const backdrop = document.getElementById('modalBackdrop-nv');
        const content = document.getElementById('modalContent-nv');

        // Open modal tracking focus
        openBtn.addEventListener('click', () => {
            backdrop.classList.remove('hidden-nv');
            backdrop.classList.remove('exit-active-nv');
            content.classList.remove('exit-active-nv');
            closeBtn.focus();
        });

        // Trigger ripple exit animation sequence
        closeBtn.addEventListener('click', () => {
            backdrop.classList.add('exit-active-nv');
            content.classList.add('exit-active-nv');

            // Safely hide display after CSS transition completes (400ms)
            setTimeout(() => {
                backdrop.classList.add('hidden-nv');
            }, 400);

            openBtn.focus();
        });

        // Keyboard accessibility (ESC key to dismiss)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !backdrop.classList.contains('hidden-nv')) {
                closeBtn.click();
            }
        });
    </script>
</body>
</html>
