<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Tooltip - Cyberpunk Neon</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cyber-layout">
    <div class="hud-interface">
      <h1 class="glitch" data-text="SYSTEM ALERTS">SYSTEM ALERTS</h1>
      
      <div class="hud-grid">
        <!-- Node 1 -->
        <div class="tooltip-container">
          <button class="cyber-trigger danger" aria-describedby="tooltip-cyber-1">
            WARN_SYS_01
            <div class="cyber-decor"></div>
          </button>
          
          <!-- Tooltip Wrapper -->
          <div class="tooltip-wrapper" id="tooltip-cyber-1" role="tooltip">
            <div class="tooltip-box">
              <!-- SVG for the glowing draw-border effect -->
              <svg class="tooltip-border-svg" aria-hidden="true" width="100%" height="100%">
                <rect x="0" y="0" width="100%" height="100%" pathLength="100" />
              </svg>
              
              <div class="tooltip-text">
                <strong>CRITICAL CORE TEMP</strong>
                <p>Thermal variance exceeded. Initiate coolant flush sequence immediately to prevent hardware meltdown.</p>
                <div class="scanline"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Node 2 -->
        <div class="tooltip-container">
          <button class="cyber-trigger info" aria-describedby="tooltip-cyber-2">
            INFO_NET_44
            <div class="cyber-decor"></div>
          </button>
          
          <!-- Tooltip Wrapper -->
          <div class="tooltip-wrapper" id="tooltip-cyber-2" role="tooltip">
            <div class="tooltip-box info-box">
              <!-- SVG for the glowing draw-border effect -->
              <svg class="tooltip-border-svg" aria-hidden="true" width="100%" height="100%">
                <rect x="0" y="0" width="100%" height="100%" pathLength="100" />
              </svg>
              
              <div class="tooltip-text">
                <strong>UPLINK ESTABLISHED</strong>
                <p>Encrypted tunnel active. Bandwidth allocation at 94%. Monitoring for unauthorized packet sniffing.</p>
                <div class="scanline"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
