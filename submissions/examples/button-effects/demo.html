<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EaseMotion Button Effects Demo</title>
<link rel="stylesheet" href="style.css" />
<style>
  body { 
    background: #f0f2f5; 
    font-family: 'Arial', sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
    gap: 50px; 
    margin: 0;
  }
  h1 { margin-bottom: 20px; }
  .buttons { display: flex; gap: 30px; flex-wrap: wrap; }
</style>
</head>
<body>

<h1>EaseMotion Button Effects</h1>
<div class="buttons">
  <button class="btn-gradient">Gradient Hover</button>
  <button class="btn-shadow">Shadow Lift</button>
  <button class="btn-pulse">Pulse Effect</button>
</div>

</body>
</html>
