<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Pricing Toggle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Pricing Toggle</h1>

<input type="checkbox" id="pricing-toggle">

<label class="toggle" for="pricing-toggle">
    <span>Monthly</span>
    <div class="switch"></div>
    <span>Yearly</span>
</label>

<div class="pricing">

<div class="card">
    <h2>Starter</h2>

    <div class="price monthly">$9<span>/mo</span></div>
    <div class="price yearly">$90<span>/yr</span></div>

    <ul>
        <li>✔ 5 Projects</li>
        <li>✔ Email Support</li>
        <li>✔ Community Access</li>
    </ul>

    <button>Choose Plan</button>
</div>

<div class="card featured">
    <h2>Pro</h2>

    <div class="price monthly">$19<span>/mo</span></div>
    <div class="price yearly">$190<span>/yr</span></div>

    <ul>
        <li>✔ Unlimited Projects</li>
        <li>✔ Priority Support</li>
        <li>✔ Team Collaboration</li>
    </ul>

    <button>Get Started</button>
</div>

</div>

</div>

</body>
</html>
