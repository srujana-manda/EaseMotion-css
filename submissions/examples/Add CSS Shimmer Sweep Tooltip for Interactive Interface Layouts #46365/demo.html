<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Shimmer Sweep Tooltip - Interactive Interface</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="interactive-layout">
    <div class="control-panel">
      <h3 class="panel-title">System Controls</h3>
      
      <div class="controls-grid">
        <!-- Control Node 1 (Tooltip Trigger) -->
        <div class="tooltip-container">
          <button class="control-btn" aria-describedby="tooltip-shimmer-1">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
          </button>
          
          <div class="tooltip-wrapper" id="tooltip-shimmer-1" role="tooltip">
            <div class="tooltip-content shimmer-sweep">
              <strong>Overclock Mode</strong>
              <p>Boosts processing power by 150% at the cost of higher thermal output.</p>
              <div class="shimmer-overlay"></div>
            </div>
          </div>
        </div>
        
        <!-- Control Node 2 -->
        <div class="tooltip-container">
          <button class="control-btn" aria-describedby="tooltip-shimmer-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
          </button>
          
          <div class="tooltip-wrapper" id="tooltip-shimmer-2" role="tooltip">
            <div class="tooltip-content shimmer-sweep">
              <strong>Economy Mode</strong>
              <p>Conserves energy by limiting background data syncing.</p>
              <div class="shimmer-overlay"></div>
            </div>
          </div>
        </div>
        
        <!-- Control Node 3 -->
        <div class="tooltip-container">
          <button class="control-btn" aria-describedby="tooltip-shimmer-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          
          <div class="tooltip-wrapper" id="tooltip-shimmer-3" role="tooltip">
            <div class="tooltip-content shimmer-sweep">
              <strong>Stealth Protocol</strong>
              <p>Masks your digital footprint on the local network.</p>
              <div class="shimmer-overlay"></div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</body>
</html>
