<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Message Bubble - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Chat</h1>
    <div class="cmb-chat" id="cmbChat">
      <div class="cmb-bubble cmb-received">Hey! How are you?</div>
      <div class="cmb-bubble cmb-sent">I'm good, thanks!</div>
      <div class="cmb-bubble cmb-received">Want to grab coffee?</div>
    </div>
    <div class="cmb-input-row">
      <input type="text" id="cmbInput" class="cmb-input" placeholder="Type a message...">
      <button id="cmbSend" class="cmb-send">Send</button>
    </div>
  </div>
  <script>
    var chat = document.getElementById('cmbChat');
    var input = document.getElementById('cmbInput');
    document.getElementById('cmbSend').addEventListener('click', function() {
      var text = input.value.trim();
      if (!text) return;
      var bubble = document.createElement('div');
      bubble.className = 'cmb-bubble cmb-sent';
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
      input.value = '';
    });
  </script>
</body>
</html>
