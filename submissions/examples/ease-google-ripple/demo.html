<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Ripple Bars - Sound Wave Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="demo-section">
    <h2 class="demo-title">Google Ripple Bars</h2>
    <p class="demo-desc">Sound wave style loading with Google colors</p>

    <div class="ripple-container">
      <!-- Standard Ripple Bars -->
      <div class="ripple-bars">
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
      </div>

      <!-- Large Ripple Bars -->
      <div class="ripple-bars ripple-bars-large">
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
      </div>

      <!-- Small Ripple Bars (Compact) -->
      <div class="ripple-bars ripple-bars-small">
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
      </div>

      <!-- Google Gradient Bars -->
      <div class="ripple-bars ripple-bars-gradient">
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
        <span class="ripple-bar"></span>
      </div>

      <!-- Loading Label -->
      <p class="ripple-label">
        <span>Loading</span>
        <span class="ellipsis">...</span>
      </p>
    </div>
  </section>
</body>
</html>
