<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tabs - SaaS Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <input type="radio" id="tab1" name="tabs" checked>
  <label for="tab1">Overview</label>

  <input type="radio" id="tab2" name="tabs">
  <label for="tab2">Pricing</label>

  <input type="radio" id="tab3" name="tabs">
  <label for="tab3">Support</label>

  <div class="content">
    <div class="panel panel1">Welcome to our SaaS Platform</div>
    <div class="panel panel2">Flexible Pricing Plans</div>
    <div class="panel panel3">24/7 Customer Support</div>
  </div>
</div>

</body>
</html>
