<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Webhook Delivery History</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="history-card">

<div class="event success">
<div>

</div>

<div>
<h3>payment.failed</h3>

</div>

<div class="event error">
<div>
<h3>invoice.sent</h3>
<p>10:31 AM • Retry: 5</p>
</div>
<span>500</span>
</div>

<div class="event success">
<div>
<h3>user.updated</h3>
<p>10:25 AM • Retry: 0</p>
</div>
<span>204</span>
</div>

</section>

</body>
</html>
