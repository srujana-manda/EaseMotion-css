<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broom Flight – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🧹 Broom Flight</h1>
    <p class="subtitle">Broomstick flying with star trail</p>

    <div class="bf-container">
      <div class="bf-scene">
        <!-- Sky background -->
        <div class="sky"></div>

        <!-- Background stars -->
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
        <div class="star s8"></div>
        <div class="star s9"></div>
        <div class="star s10"></div>
        <div class="star s11"></div>
        <div class="star s12"></div>
        <div class="star s13"></div>
        <div class="star s14"></div>
        <div class="star s15"></div>

        <!-- Moon -->
        <div class="moon"></div>

        <!-- Clouds -->
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>

        <!-- Broomstick -->
        <div class="broom">
          <!-- Broom handle -->
          <div class="handle"></div>

          <!-- Broom bristles -->
          <div class="bristles">
            <div class="bristle b1"></div>
            <div class="bristle b2"></div>
            <div class="bristle b3"></div>
            <div class="bristle b4"></div>
            <div class="bristle b5"></div>
            <div class="bristle b6"></div>
            <div class="bristle b7"></div>
            <div class="bristle b8"></div>
            <div class="bristle b9"></div>
            <div class="bristle b10"></div>
          </div>

          <!-- Broom glow -->
          <div class="broom-glow"></div>

          <!-- Star trail particles -->
          <div class="star-trail t1"></div>
          <div class="star-trail t2"></div>
          <div class="star-trail t3"></div>
          <div class="star-trail t4"></div>
          <div class="star-trail t5"></div>
          <div class="star-trail t6"></div>
          <div class="star-trail t7"></div>
          <div class="star-trail t8"></div>
          <div class="star-trail t9"></div>
          <div class="star-trail t10"></div>
          <div class="star-trail t11"></div>
          <div class="star-trail t12"></div>
          <div class="star-trail t13"></div>
          <div class="star-trail t14"></div>
          <div class="star-trail t15"></div>
          <div class="star-trail t16"></div>
          <div class="star-trail t17"></div>
          <div class="star-trail t18"></div>
          <div class="star-trail t19"></div>
          <div class="star-trail t20"></div>

          <!-- Sparkles -->
          <div class="sparkle sp1"></div>
          <div class="sparkle sp2"></div>
          <div class="sparkle sp3"></div>
          <div class="sparkle sp4"></div>
          <div class="sparkle sp5"></div>
          <div class="sparkle sp6"></div>
          <div class="sparkle sp7"></div>
          <div class="sparkle sp8"></div>
          <div class="sparkle sp9"></div>
          <div class="sparkle sp10"></div>
        </div>

        <!-- Witch silhouette (passenger) -->
        <div class="witch">
          <div class="witch-body"></div>
          <div class="witch-head"></div>
          <div class="witch-hat">
            <div class="hat-brim"></div>
            <div class="hat-crown"></div>
          </div>
          <div class="witch-hair"></div>
          <div class="witch-cloak"></div>
        </div>

        <!-- Ambient glow -->
        <div class="ambient-glow"></div>
      </div>
    </div>

    <div class="controls">
      <button id="flyBtn">🧹 Fly</button>
      <button id="resetBtn">⟳ Reset</button>
      <label>
        Flight Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Trail Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
    </div>
  </div>

  <script>
    (function() {
      const broom = document.querySelector('.broom');
      const witch = document.querySelector('.witch');
      const starTrails = document.querySelectorAll('.star-trail');
      const sparkles = document.querySelectorAll('.sparkle');
      const broomGlow = document.querySelector('.broom-glow');
      const ambientGlow = document.querySelector('.ambient-glow');
      const clouds = document.querySelectorAll('.cloud');

      const flyBtn = document.getElementById('flyBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isFlying = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let flightPhase = 0;
      let trailIndex = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Broom flight
        broom.style.setProperty('--flight-duration', (3 / speedMultiplier) + 's');

        // Witch bob
        witch.style.setProperty('--bob-duration', (0.6 / speedMultiplier) + 's');

        // Star trails
        starTrails.forEach((t, i) => {
          const duration = (0.8 + (i % 4) * 0.05) / speedMultiplier;
          t.style.setProperty('--trail-duration', duration + 's');
          t.style.setProperty('--trail-delay', ((i * 0.01) / speedMultiplier) + 's');
        });

        // Sparkles
        sparkles.forEach((sp, i) => {
          const duration = (1 + (i % 3) * 0.1) / speedMultiplier;
          sp.style.setProperty('--sparkle-duration', duration + 's');
          sp.style.setProperty('--sparkle-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Broom glow
        broomGlow.style.setProperty('--glow-duration', (1.5 / speedMultiplier) + 's');

        // Ambient glow
        ambientGlow.style.setProperty('--ambient-duration', (3 / speedMultiplier) + 's');

        // Clouds
        clouds.forEach((c, i) => {
          const duration = (20 + i * 3) / speedMultiplier;
          c.style.setProperty('--cloud-duration', duration + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Star trails
        starTrails.forEach((t) => {
          const opacity = Math.min(0.4 * intensityMultiplier, 0.8);
          t.style.setProperty('--trail-intensity', opacity);
          const size = 2 * intensityMultiplier;
          t.style.setProperty('--trail-size', size + 'px');
        });

        // Sparkles
        sparkles.forEach((sp) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          sp.style.setProperty('--sparkle-intensity', opacity);
          const size = 3 * intensityMultiplier;
          sp.style.setProperty('--sparkle-size', size + 'px');
        });

        // Broom glow
        const glowOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        broomGlow.style.setProperty('--glow-intensity', glowOpacity);
        const glowSize = 120 * intensityMultiplier;
        broomGlow.style.setProperty('--glow-size', glowSize + 'px');

        // Ambient glow
        const ambientOpacity = Math.min(0.04 * intensityMultiplier, 0.08);
        ambientGlow.style.setProperty('--ambient-intensity', ambientOpacity);
        const ambientSize = 300 * intensityMultiplier;
        ambientGlow.style.setProperty('--ambient-size', ambientSize + 'px');
      }

      // ----- Fly -----
      function fly() {
        if (isFlying) {
          stopFlying();
          return;
        }

        isFlying = true;
        flightPhase = 0;

        broom.classList.add('flying');
        broom.style.opacity = '1';

        // Reset trails
        starTrails.forEach(t => {
          t.style.opacity = '0';
          t.style.transform = 'scale(0)';
          t.classList.remove('active');
        });

        // Start trails after short delay
        setTimeout(() => {
          starTrails.forEach((t, i) => {
            setTimeout(() => {
              t.classList.add('active');
              t.style.opacity = '0.6';
            }, i * 20 / speedMultiplier);
          });
        }, 200 / speedMultiplier);

        // Sparkles
        sparkles.forEach((sp, i) => {
          setTimeout(() => {
            sp.classList.add('active');
            sp.style.opacity = '0.8';
            setTimeout(() => {
              sp.classList.remove('active');
              sp.style.opacity = '0';
            }, 1000 / speedMultiplier);
          }, i * 50 / speedMultiplier + 300 / speedMultiplier);
        });

        // Glow intensifies
        broomGlow.classList.add('glowing');
        ambientGlow.classList.add('glowing');

        flyBtn.textContent = '🧹 Flying...';
        setTimeout(() => {
          flyBtn.textContent = '🧹 Land';
        }, 500 / speedMultiplier);

        // Auto-land after 6 seconds
        setTimeout(() => {
          if (isFlying) {
            stopFlying();
          }
        }, 6000 / speedMultiplier);
      }

      // ----- Stop flying -----
      function stopFlying() {
        isFlying = false;
        broom.classList.remove('flying');
        broom.style.opacity = '0.8';

        starTrails.forEach(t => {
          t.classList.remove('active');
          t.style.opacity = '0';
          t.style.transform = 'scale(0)';
        });

        sparkles.forEach(sp => {
          sp.classList.remove('active');
          sp.style.opacity = '0';
        });

        broomGlow.classList.remove('glowing');
        ambientGlow.classList.remove('glowing');

        flyBtn.textContent = '🧹 Fly';
      }

      // ----- Reset -----
      function resetBroom() {
        if (isFlying) {
          stopFlying();
        }

        broom.style.opacity = '0.8';
        broom.style.transform = 'translateX(-50%) translateY(0)';
        broom.classList.remove('flying');

        starTrails.forEach(t => {
          t.classList.remove('active');
          t.style.opacity = '0';
          t.style.transform = 'scale(0)';
        });

        sparkles.forEach(sp => {
          sp.classList.remove('active');
          sp.style.opacity = '0';
        });

        broomGlow.classList.remove('glowing');
        ambientGlow.classList.remove('glowing');

        flyBtn.textContent = '🧹 Fly';
        flightPhase = 0;
        lastTimestamp = 0;
      }

      // ----- Update flight -----
      function updateFlight(timestamp) {
        if (!isFlying) return;

        const speed = 0.005 * speedMultiplier;
        flightPhase += speed;

        if (flightPhase > 1) flightPhase = 0;

        // Broom arc path
        const x = 50 + Math.sin(flightPhase * Math.PI * 2) * 20;
        const y = 45 + Math.sin(flightPhase * Math.PI * 2 * 0.6) * 15;
        broom.style.left = x + '%';
        broom.style.top = y + '%';

        // Broom tilt
        const tilt = Math.sin(flightPhase * Math.PI * 2 + 0.5) * 8;
        broom.style.transform = `translate(-50%, -50%) rotate(${tilt}deg)`;

        // Witch bob
        const bob = Math.sin(timestamp / 600 + flightPhase * 5) * 2;
        witch.style.transform = `translateX(-50%) translateY(${bob}px) rotate(${tilt * 0.3}deg)`;

        // Trail positions follow broom
        starTrails.forEach((t, i) => {
          if (t.classList.contains('active')) {
            const offset = i * 2;
            const angle = flightPhase * Math.PI * 2 + i * 0.1;
            const tx = x + Math.cos(angle + offset) * (5 + i * 0.5);
            const ty = y + Math.sin(angle * 0.7 + offset) * (3 + i * 0.3);
            t.style.left = tx + '%';
            t.style.top = ty + '%';
          }
        });

        // Update glow pulse
        const pulse = Math.sin(timestamp / 800) * 0.15 + 0.85;
        broomGlow.style.transform = `translate(-50%, -50%) scale(${pulse})`;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateFlight(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Set initial state
        broom.style.opacity = '0.8';
        broom.style.left = '50%';
        broom.style.top = '55%';

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-fly after 1.5 seconds
        setTimeout(() => {
          fly();
        }, 1500);

        // Auto-land and fly again
        setTimeout(() => {
          if (isFlying) {
            stopFlying();
          }
          setTimeout(() => {
            fly();
          }, 500 / speedMultiplier);
        }, 8000 / speedMultiplier);
      }

      // ----- Event listeners -----
      flyBtn.addEventListener('click', fly);
      resetBtn.addEventListener('click', resetBroom);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      // Click on broom to fly
      broom.addEventListener('click', fly);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
