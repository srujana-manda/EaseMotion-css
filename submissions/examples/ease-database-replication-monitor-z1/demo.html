<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Database Replication Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="replication-card">

<h2>Database Replication</h2>

<div class="replica synced">
<div>
<h3>Primary DB</h3>
<p>Last Sync: 2 sec ago</p>
</div>
<span>Synced</span>
</div>

<div class="replica syncing">
<div>
<h3>Replica 01</h3>
<p>Lag: 3 sec</p>
</div>
<span>Syncing</span>
</div>

<div class="replica warning">
<div>
<h3>Replica 02</h3>
<p>Lag: 28 sec</p>
</div>
<span>Delayed</span>
</div>

<div class="replica offline">
<div>
<h3>Replica 03</h3>
<p>No Response</p>
</div>
<span>Offline</span>
</div>

</section>

</body>
</html>
