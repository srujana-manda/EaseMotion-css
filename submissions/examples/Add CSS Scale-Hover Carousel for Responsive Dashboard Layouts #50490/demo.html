<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale-Hover Carousel for Responsive Dashboards</title>
    <meta name="description" content="Pure CSS animated carousel featuring a smooth scale-hover interaction transition, designed for dashboard metrics.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <div>
                <h1>Platform Overview</h1>
                <p>Swipe or scroll to explore key performance metrics.</p>
            </div>
            <div class="header-actions">
                <button class="btn">Export Report</button>
            </div>
        </header>

        <!-- The Pure CSS Carousel -->
        <div class="carousel-container">
            <ul class="carousel-track" tabindex="0" aria-label="Dashboard Metrics Carousel">
                
                <!-- Card 1 -->
                <li class="carousel-item">
                    <article class="widget-card" tabindex="0">
                        <div class="widget-header">
                            <div class="widget-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            </div>
                            <span class="widget-trend positive">+12.5%</span>
                        </div>
                        <h3 class="widget-title">Total Active Users</h3>
                        <div class="widget-value">124,592</div>
                        <div class="widget-chart bar-chart">
                            <div class="bar" style="height: 40%"></div>
                            <div class="bar" style="height: 60%"></div>
                            <div class="bar" style="height: 30%"></div>
                            <div class="bar" style="height: 80%"></div>
                            <div class="bar" style="height: 50%"></div>
                            <div class="bar" style="height: 90%"></div>
                        </div>
                    </article>
                </li>

                <!-- Card 2 -->
                <li class="carousel-item">
                    <article class="widget-card" tabindex="0">
                        <div class="widget-header">
                            <div class="widget-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            </div>
                            <span class="widget-trend positive">+8.2%</span>
                        </div>
                        <h3 class="widget-title">Monthly Revenue</h3>
                        <div class="widget-value">$45,231.89</div>
                        <div class="widget-chart line-chart">
                            <svg viewBox="0 0 100 30" class="sparkline" preserveAspectRatio="none">
                                <path d="M0,25 L20,20 L40,28 L60,10 L80,15 L100,5" fill="none" stroke="#10b981" stroke-width="2"/>
                            </svg>
                        </div>
                    </article>
                </li>

                <!-- Card 3 -->
                <li class="carousel-item">
                    <article class="widget-card" tabindex="0">
                        <div class="widget-header">
                            <div class="widget-icon" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                            </div>
                            <span class="widget-trend negative">-3.1%</span>
                        </div>
                        <h3 class="widget-title">System Latency</h3>
                        <div class="widget-value">42ms</div>
                        <div class="widget-chart line-chart">
                            <svg viewBox="0 0 100 30" class="sparkline" preserveAspectRatio="none">
                                <path d="M0,15 L20,10 L40,25 L60,18 L80,22 L100,28" fill="none" stroke="#ef4444" stroke-width="2"/>
                            </svg>
                        </div>
                    </article>
                </li>

                <!-- Card 4 -->
                <li class="carousel-item">
                    <article class="widget-card" tabindex="0">
                        <div class="widget-header">
                            <div class="widget-icon" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                            </div>
                            <span class="widget-trend positive">+15.4%</span>
                        </div>
                        <h3 class="widget-title">API Requests</h3>
                        <div class="widget-value">1.2M</div>
                        <div class="widget-chart bar-chart">
                            <div class="bar" style="height: 70%; background: #8b5cf6;"></div>
                            <div class="bar" style="height: 50%; background: #8b5cf6;"></div>
                            <div class="bar" style="height: 80%; background: #8b5cf6;"></div>
                            <div class="bar" style="height: 60%; background: #8b5cf6;"></div>
                            <div class="bar" style="height: 90%; background: #8b5cf6;"></div>
                            <div class="bar" style="height: 100%; background: #8b5cf6;"></div>
                        </div>
                    </article>
                </li>
                
                 <!-- Card 5 -->
                <li class="carousel-item">
                    <article class="widget-card" tabindex="0">
                        <div class="widget-header">
                            <div class="widget-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
                                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            </div>
                            <span class="widget-trend neutral">0.0%</span>
                        </div>
                        <h3 class="widget-title">Blocked Threats</h3>
                        <div class="widget-value">8,341</div>
                        <div class="widget-chart bar-chart">
                            <div class="bar" style="height: 20%; background: #f59e0b;"></div>
                            <div class="bar" style="height: 30%; background: #f59e0b;"></div>
                            <div class="bar" style="height: 15%; background: #f59e0b;"></div>
                            <div class="bar" style="height: 40%; background: #f59e0b;"></div>
                            <div class="bar" style="height: 25%; background: #f59e0b;"></div>
                            <div class="bar" style="height: 10%; background: #f59e0b;"></div>
                        </div>
                    </article>
                </li>

            </ul>
        </div>
    </main>

</body>
</html>
