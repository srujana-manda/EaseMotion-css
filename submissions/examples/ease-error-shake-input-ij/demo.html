<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-error-shake-input</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="esi-container">
    <div class="esi-field" style="--error: 0">
      <label class="esi-label" for="esiInput">Email</label>
      <input class="esi-input" id="esiInput" type="text" placeholder="Enter your email">
      <span class="esi-message">Please enter a valid email</span>
    </div>
    <button class="esi-btn" onclick="triggerError()">Trigger Error</button>
    <button class="esi-btn esi-btn--secondary" onclick="clearError()">Clear</button>
  </div>
  <script>
    function triggerError() {
      const field = document.querySelector('.esi-field');
      field.style.setProperty('--error', '1');
    }

    function clearError() {
      const field = document.querySelector('.esi-field');
      field.style.setProperty('--error', '0');
    }
  </script>
</body>
</html>
