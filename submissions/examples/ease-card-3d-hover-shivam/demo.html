<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gradient Card - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-center" style="min-height: 100vh; margin: 0; background-color: #0f172a;">
  
  <!-- Component Wrapper using EaseMotion entrance animations -->
  <div class="ease-gradient-card ease-fade-in ease-duration-slow">
    <div class="ease-card-content">
      <h2 class="ease-slide-up ease-delay-100">Gradient Border</h2>
      <p class="ease-slide-up ease-delay-200">
        A pure CSS animated gradient border card that integrates seamlessly with EaseMotion CSS utilities.
      </p>
      <button class="ease-btn ease-btn-primary ease-hover-grow ease-delay-300">
        Explore More
      </button>
    </div>
  </div>

</body>
</html>
