<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Notification Toasts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Interactive Notification Toasts</h1>

    <div class="buttons">
        <button class="success" onclick="showToast('Success! Your action completed.','success')">
            Success
        </button>

        <button class="warning" onclick="showToast('Warning! Please check your input.','warning')">
            Warning
        </button>

        <button class="error" onclick="showToast('Error! Something went wrong.','error')">
            Error
        </button>
    </div>
</div>

<div id="toast-container"></div>

<script>
function showToast(message,type){
    const toast=document.createElement("div");
    toast.className=`toast ${type}`;
    toast.innerHTML=`
        <span>${message}</span>
        <button onclick="this.parentElement.remove()">×</button>
    `;

    document.getElementById("toast-container").appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },3000);
}
</script>

</body>
</html>
