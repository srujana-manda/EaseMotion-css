<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combo Counter – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🔥 Combo Counter</h1>
    <p class="subtitle">Combo counter with flames</p>

    <div class="cc-container">
      <div class="cc-scene">
        <!-- Combo Counter -->
        <div class="combo-counter">
          <!-- Combo display -->
          <div class="combo-display">
            <div class="combo-number" id="comboNumber">0</div>
            <div class="combo-label">COMBO</div>
            <div class="combo-multiplier" id="comboMultiplier">×1</div>
          </div>

          <!-- Flame particles -->
          <div class="flame-particle fp1"></div>
          <div class="flame-particle fp2"></div>
          <div class="flame-particle fp3"></div>
          <div class="flame-particle fp4"></div>
          <div class="flame-particle fp5"></div>
          <div class="flame-particle fp6"></div>
          <div class="flame-particle fp7"></div>
          <div class="flame-particle fp8"></div>
          <div class="flame-particle fp9"></div>
          <div class="flame-particle fp10"></div>
          <div class="flame-particle fp11"></div>
          <div class="flame-particle fp12"></div>
          <div class="flame-particle fp13"></div>
          <div class="flame-particle fp14"></div>
          <div class="flame-particle fp15"></div>
          <div class="flame-particle fp16"></div>
          <div class="flame-particle fp17"></div>
          <div class="flame-particle fp18"></div>
          <div class="flame-particle fp19"></div>
          <div class="flame-particle fp20"></div>

          <!-- Combo glow -->
          <div class="combo-glow"></div>

          <!-- Hit effect -->
          <div class="hit-effect"></div>

          <!-- Ring pulse -->
          <div class="ring-pulse"></div>
        </div>

        <!-- Controls -->
        <div class="combo-controls">
          <button id="hitBtn">💥 Hit!</button>
          <button id="missBtn">❌ Miss</button>
          <button id="resetBtn">⟳ Reset</button>
          <label>
            Speed
            <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const comboNumber = document.getElementById('comboNumber');
      const comboMultiplier = document.getElementById('comboMultiplier');
      const comboGlow = document.querySelector('.combo-glow');
      const hitEffect = document.querySelector('.hit-effect');
      const ringPulse = document.querySelector('.ring-pulse');
      const flameParticles = document.querySelectorAll('.flame-particle');
      const comboDisplay = document.querySelector('.combo-display');

      const hitBtn = document.getElementById('hitBtn');
      const missBtn = document.getElementById('missBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');

      let combo = 0;
      let speedMultiplier = 1;
      let isAnimating = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let comboTimeout = null;

      // ----- Apply speed -----
      function applySpeed() {
        // Flame particles
        flameParticles.forEach((p, i) => {
          const duration = (0.8 + (i % 4) * 0.1) / speedMultiplier;
          p.style.setProperty('--flame-duration', duration + 's');
          p.style.setProperty('--flame-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Combo glow
        comboGlow.style.setProperty('--glow-duration', (1.2 / speedMultiplier) + 's');

        // Ring pulse
        ringPulse.style.setProperty('--ring-duration', (0.6 / speedMultiplier) + 's');

        // Hit effect
        hitEffect.style.setProperty('--hit-duration', (0.3 / speedMultiplier) + 's');
      }

      // ----- Add hit -----
      function addHit() {
        if (isAnimating) return;
        isAnimating = true;

        combo++;

        // Clear timeout
        if (comboTimeout) {
          clearTimeout(comboTimeout);
          comboTimeout = null;
        }

        // Update display
        comboNumber.textContent = combo;
        updateMultiplier();

        // Scale animation
        comboNumber.style.transform = 'scale(1.4)';
        setTimeout(() => {
          comboNumber.style.transform = 'scale(1)';
        }, 150 / speedMultiplier);

        // Hit effect flash
        hitEffect.classList.add('active');
        setTimeout(() => {
          hitEffect.classList.remove('active');
        }, 300 / speedMultiplier);

        // Ring pulse
        ringPulse.classList.add('active');
        setTimeout(() => {
          ringPulse.classList.remove('active');
        }, 600 / speedMultiplier);

        // Glow intensity
        const intensity = Math.min(0.2 + combo * 0.02, 0.8);
        comboGlow.style.opacity = intensity;
        comboGlow.style.transform = `translate(-50%, -50%) scale(${1 + Math.min(combo * 0.01, 0.3)})`;

        // Flame particles
        flameParticles.forEach((p) => {
          p.classList.remove('active');
          void p.offsetWidth;
          p.classList.add('active');
        });

        // Update button
        hitBtn.textContent = '💥 HIT!';
        setTimeout(() => {
          hitBtn.textContent = '💥 Hit!';
        }, 300 / speedMultiplier);

        // Auto-reset after 2 seconds of inactivity
        comboTimeout = setTimeout(() => {
          if (combo > 0) {
            resetCombo();
          }
        }, 2000 / speedMultiplier);

        isAnimating = false;
      }

      // ----- Miss -----
      function miss() {
        if (combo === 0) return;
        resetCombo();
        missBtn.textContent = '❌ MISS!';
        setTimeout(() => {
          missBtn.textContent = '❌ Miss';
        }, 500 / speedMultiplier);
      }

      // ----- Reset combo -----
      function resetCombo() {
        combo = 0;
        comboNumber.textContent = '0';
        comboMultiplier.textContent = '×1';
        comboGlow.style.opacity = '0.05';
        comboGlow.style.transform = 'translate(-50%, -50%) scale(1)';
        ringPulse.classList.remove('active');
        hitEffect.classList.remove('active');
        flameParticles.forEach(p => p.classList.remove('active'));

        if (comboTimeout) {
          clearTimeout(comboTimeout);
          comboTimeout = null;
        }

        hitBtn.textContent = '💥 Hit!';
      }

      // ----- Update multiplier -----
      function updateMultiplier() {
        let multiplier = 1;
        if (combo >= 5) multiplier = 2;
        if (combo >= 10) multiplier = 3;
        if (combo >= 20) multiplier = 4;
        if (combo >= 35) multiplier = 5;
        if (combo >= 50) multiplier = 6;
        if (combo >= 75) multiplier = 7;
        if (combo >= 100) multiplier = 8;
        comboMultiplier.textContent = `×${multiplier}`;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Animate combo number pulse
        if (combo > 0) {
          const pulse = Math.sin(timestamp / 1500) * 0.02 + 0.98;
          comboNumber.style.transform = `scale(${pulse})`;
        }

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        resetCombo();

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-hit after 1 second to show effect
        setTimeout(() => {
          addHit();
        }, 1000);

        // Auto-hit again
        setTimeout(() => {
          addHit();
        }, 1800);

        // Auto-hit again
        setTimeout(() => {
          addHit();
        }, 2600);

        // Auto-miss after 3.5 seconds
        setTimeout(() => {
          miss();
        }, 4000);
      }

      // ----- Event listeners -----
      hitBtn.addEventListener('click', addHit);
      missBtn.addEventListener('click', miss);
      resetBtn.addEventListener('click', resetCombo);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      // Spacebar to hit
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !e.repeat) {
          e.preventDefault();
          addHit();
        }
        if (e.code === 'KeyM' && !e.repeat) {
          miss();
        }
      });

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (comboTimeout) clearTimeout(comboTimeout);
      });

      init();
    })();
  </script>

</body>
</html>
