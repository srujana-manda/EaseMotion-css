<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio - Bounce-Pulse Tooltip Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="portfolio-tooltip-canvas">
    <div class="portfolio-card-frame">
      
      <div class="card-meta-header">
        <span class="category-tag">DEEP TECH DEPLOYMENT</span>
        <h3>Space Robotics Architecture</h3>
      </div>

      <div class="tooltip-display-area">
        <!-- Pure CSS Bounce-Pulse Tooltip Wrapper -->
        <div class="bounce-pulse-tooltip-container">
          <button class="tooltip-trigger-btn" aria-describedby="tooltip-info">
            <span>Verify Registration</span>
          </button>

          <div id="tooltip-info" class="bounce-tooltip-card" role="tooltip">
            <div class="tooltip-arrow-node"></div>
            <div class="tooltip-content-body">
              <div class="pulse-header-row">
                <span class="pulse-beacon-dot"></span>
                <h4>UK Design Registered</h4>
              </div>
              <p>Hardware specification blueprint verified and indexed for autonomous orbital docking.</p>
            </div>
          </div>
        </div>
      </div>

      <p class="panel-caption-footer">Hover or focus the button to trigger elastic bounce entry with continuous ambient pulse feedback loops.</p>
    </div>
  </main>

</body>
</html>
