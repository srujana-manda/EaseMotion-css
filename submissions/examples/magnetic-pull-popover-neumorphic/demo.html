<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Magnetic Pull Popover</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <h1>Magnetic Pull Popover</h1>
    <p>Neumorphic Soft Layout</p>

    <div class="magnetic-popover">

      <button class="magnetic-trigger">
        Show Details
      </button>

      <div class="popover-content">
        <h2>Soft UI Card</h2>
        <p>
          A smooth CSS-only magnetic pull popover
          designed for neumorphic interfaces.
        </p>
      </div>

    </div>

  </main>

</body>
</html>
