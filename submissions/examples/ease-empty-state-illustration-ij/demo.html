<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Empty State Illustration</title>
</head>
<body>
  <main>
    <h1>Empty State Illustration</h1>
    <p class="desc">A gentle floating folder icon to indicate no content yet.</p>

    <div class="card">
      <div class="illustration" aria-hidden="true">
        <div class="folder">
          <div class="folder-tab"></div>
          <div class="folder-body"></div>
          <div class="folder-paper"></div>
        </div>
      </div>
      <h2 class="card-title">No items yet</h2>
      <p class="card-desc">When you add your first item, it will appear here. Get started by creating something new.</p>
      <button class="btn">Create item</button>
    </div>
  </main>
</body>
</html>
