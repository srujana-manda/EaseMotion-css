<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Clipboard Copy Button - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Ambient background glow elements -->
  <div class="bg-decor"></div>
  <div class="bg-decor-2"></div>

  <!-- Showcase Playground Panel -->
  <main class="playground-container">
    <header class="header">
      <h1>EaseMotion Copy Button</h1>
      <p>
        A modern, lightweight, fully accessible, and responsive copy-to-clipboard component
        featuring custom success animations, tooltips, and light/dark theme support.
      </p>
    </header>

    <div class="showcase-section">
      <!-- 1. Code Block Copy Showcase -->
      <h2 class="showcase-title">Code Block Integration</h2>
      <div class="code-wrapper">
        <header class="code-header">
          <span class="code-lang">bash</span>
          <button 
            class="btn-copy" 
            type="button" 
            data-target="terminal-code"
            data-tooltip="Copy to Clipboard"
            aria-label="Copy code command"
            aria-live="polite"
          >
            <!-- Copy Icon (Double Document sheets) -->
            <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <!-- Checkmark Icon -->
            <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span class="btn-text-copy">Copy</span>
            <span class="btn-text-copied">Copied!</span>
          </button>
        </header>
        <div class="code-body">
          <pre id="terminal-code">npm install easemotion-css --save-dev</pre>
        </div>
      </div>

      <!-- 2. Text Input Copy Showcase -->
      <h2 class="showcase-title">Field Input Copy Integration</h2>
      <div class="input-copy-container">
        <input 
          class="copy-input" 
          id="email-input" 
          type="text" 
          value="contribute@easemotioncss.org" 
          readonly 
          aria-label="API Endpoint Email"
        >
        <button 
          class="btn-copy" 
          type="button" 
          data-target="email-input"
          data-tooltip="Copy Email"
          aria-label="Copy email address"
          aria-live="polite"
        >
          <!-- Copy Icon -->
          <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <!-- Checkmark Icon -->
          <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span class="btn-text-copy">Copy</span>
          <span class="btn-text-copied">Copied!</span>
        </button>
      </div>
    </div>

    <!-- Theme Control Selector -->
    <div class="theme-section">
      <button id="theme-toggle" class="btn-theme" type="button" aria-label="Toggle light or dark theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span>Dark Mode</span>
      </button>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const copyButtons = document.querySelectorAll(".btn-copy");

      // Bind clipboard copy interaction
      copyButtons.forEach(btn => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const targetId = btn.getAttribute("data-target");
          const targetElement = document.getElementById(targetId);

          if (!targetElement) return;

          // Get target value (handle input fields vs text nodes)
          const textToCopy = targetElement.tagName === "INPUT" 
            ? targetElement.value 
            : targetElement.textContent.trim();

          try {
            // Execute system write clipboard action
            await navigator.clipboard.writeText(textToCopy);

            // Set dynamic properties for state updates
            btn.setAttribute("data-success", "true");
            btn.setAttribute("data-tooltip", "Copied!");
            btn.setAttribute("aria-label", "Copied text to clipboard");

            // Automatically reset status after 2.5 seconds
            setTimeout(() => {
              btn.removeAttribute("data-success");
              // Restore initial accessibility values
              btn.setAttribute("data-tooltip", targetElement.tagName === "INPUT" ? "Copy Email" : "Copy to Clipboard");
              btn.setAttribute("aria-label", targetElement.tagName === "INPUT" ? "Copy email address" : "Copy code command");
            }, 2500);

          } catch (err) {
            console.error("Clipboard write execution failed: ", err);
          }
        });
      });

      // Simple theme manager toggler logic
      const themeToggle = document.getElementById("theme-toggle");
      const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)");

      const getSavedTheme = () => {
        const saved = localStorage.getItem("theme");
        if (saved) return saved;
        return systemPrefersDark.matches ? "dark" : "light";
      };

      const applyTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);

        const isDark = theme === "dark";
        themeToggle.innerHTML = isDark
          ? `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <span>Light Mode</span>
          `
          : `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <span>Dark Mode</span>
          `;
      };

      // Initialize default theme configuration
      applyTheme(getSavedTheme());

      // Toggle Theme Listener
      themeToggle.addEventListener("click", () => {
        const activeTheme = document.documentElement.getAttribute("data-theme");
        const nextTheme = activeTheme === "dark" ? "light" : "dark";
        applyTheme(nextTheme);
      });
    });
  </script>
</body>
</html>
