<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nanotech Molecular Assembler Control Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="nano-header">
    <h1>Nanotech Molecular Assembler Control Panel</h1>
    <p>Tracking molecular bonding, assembly progress, and reactor telemetry in real time</p>
  </header>

  <main class="nano-grid">

    <section class="panel assembly-panel">
      <div class="panel-title">Molecular Assembly</div>
      <div class="assembly-view">
        <span class="orbit-ring ring-1"></span>
        <span class="orbit-ring ring-2"></span>
        <span class="molecule-dot dot-1"></span>
        <span class="molecule-dot dot-2"></span>
        <span class="molecule-dot dot-3"></span>
      </div>
    </section>

    <section class="panel yield-panel">
      <div class="panel-title">Assembly Yield</div>
      <div class="yield-meter">
        <div class="yield-fill"></div>
        <span class="yield-value">76%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Active Assemblers</span>
        <span class="metric-number">64</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Bonds Formed</span>
        <span class="metric-number">9,320</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Contamination Risk</span>
        <span class="metric-number">Low</span>
      </div>
    </section>

  </main>

</body>
</html>
