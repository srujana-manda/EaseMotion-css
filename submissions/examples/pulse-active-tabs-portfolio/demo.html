<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Active Portfolio Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="portfolio">

    <h1>Creative Portfolio</h1>

    <div class="tabs" role="tablist">

        <button class="tab active" role="tab">
            Projects
        </button>

        <button class="tab" role="tab">
            Designs
        </button>

        <button class="tab" role="tab">
            Skills
        </button>

        <button class="tab" role="tab">
            Contact
        </button>

    </div>


    <div class="portfolio-card">

        <h2>Creative Work Showcase</h2>

        <p>
            A CSS-only Pulse Active Tabs component
            designed for portfolio layouts.
        </p>

    </div>


</section>


</body>
</html>
