<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Password Input Toggle Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>Password Input Toggle</h1>
    <p>Click the eye icon to show or hide the password.</p>

    <form class="password-toggle-form">
      <div class="password-field-mp">
        <label for="pwd-mp">Password</label>
        <div class="password-input-wrap-mp">
          <input
            type="password"
            id="pwd-mp"
            class="password-input-mp"
            placeholder="Enter your password"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="password-toggle-btn-mp"
            aria-label="Show password"
            aria-pressed="false"
          >
            <svg class="icon-eye-mp" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
              <circle cx="12" cy="12" r="2.2"/>
            </svg>
            <svg class="icon-eye-off-mp" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" style="display:none;">
              <path d="M3.5 3.5l17 17-1.4 1.4-2.9-2.9A11.9 11.9 0 0 1 12 19c-7 0-10-7-10-7a17.6 17.6 0 0 1 4.6-5.8L2.1 4.9 3.5 3.5zm5.6 5.6a3.5 3.5 0 0 0 4.8 4.8l-4.8-4.8zM12 5c7 0 10 7 10 7a17.3 17.3 0 0 1-2.6 3.8l-2.3-2.3a3.5 3.5 0 0 0-4.6-4.6L9.9 6.3A11.9 11.9 0 0 1 12 5z"/>
            </svg>
          </button>
        </div>
      </div>
    </form>
  </div>

<script>
  const toggleBtn = document.querySelector('.password-toggle-btn-mp');
  const pwdInput = document.querySelector('.password-input-mp');
  const eyeIcon = document.querySelector('.icon-eye-mp');
  const eyeOffIcon = document.querySelector('.icon-eye-off-mp');

  toggleBtn.addEventListener('click', () => {
    const isPassword = pwdInput.type === 'password';
    pwdInput.type = isPassword ? 'text' : 'password';

    toggleBtn.setAttribute('aria-pressed', String(isPassword));
    toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');

    eyeIcon.style.display = isPassword ? 'none' : 'block';
    eyeOffIcon.style.display = isPassword ? 'block' : 'none';
  });
</script>

</body>
</html>
