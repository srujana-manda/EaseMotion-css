<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EaseMotion Navbar</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="alm-navbar">

        <!-- Logo -->

        <a href="#" class="alm-navbar-brand">
            <img src="https://raw.githubusercontent.com/saptarshi-coder/EaseMotion-css/main/docs/assets/logo.svg"
                alt="EaseMotion CSS">
        </a>

        <!-- Navigation -->

        <ul class="alm-navbar-menu">

            <li>
                <a href="#buttons" class="alm-navbar-item">
                    Buttons
                </a>
            </li>

            <li>
                <a href="#cards" class="alm-navbar-item">
                    Cards
                </a>
            </li>

            <li>
                <a href="#scroll-progress" class="alm-navbar-item">
                    Scroll Progress
                </a>
            </li>

            <li>
                <a href="#animations" class="alm-navbar-item">
                    Animations
                </a>
            </li>

            <li>
                <a href="#layout" class="alm-navbar-item">
                    Layout
                </a>
            </li>

            <li>
                <a href="../docs/index.html" class="alm-navbar-item">
                    Docs
                </a>
            </li>

        </ul>

        <!-- Right Side -->

        <div class="alm-navbar-actions">

            <a href="https://github.com/saptarshi-coder/easemotion-css"
                target="_blank"
                class="alm-navbar-github">

                GitHub ↗

            </a>

            <button class="alm-theme-toggle" aria-label="Toggle Theme">

                <!-- Sun Icon -->

                <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round">

                    <circle cx="12" cy="12" r="5"></circle>

                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.72" x2="5.64" y2="18.3"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>

                </svg>

            </button>

        </div>

    </nav>

</body>

</html>
