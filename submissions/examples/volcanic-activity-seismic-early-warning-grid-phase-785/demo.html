<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volcanic Activity & Seismic Early Warning Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="seismic-header">
    <h1>Volcanic Activity & Seismic Early Warning Grid</h1>
    <p>Tracking tremor activity, magma pressure, and sensor network status in real time</p>
  </header>

  <main class="seismic-grid">

    <section class="panel network-panel">
      <div class="panel-title">Sensor Network</div>
      <div class="network-view">
        <span class="tremor-wave wave-1"></span>
        <span class="tremor-wave wave-2"></span>
        <span class="sensor-dot dot-1"></span>
        <span class="sensor-dot dot-2"></span>
        <span class="sensor-dot dot-3"></span>
      </div>
    </section>

    <section class="panel pressure-panel">
      <div class="panel-title">Magma Pressure</div>
      <div class="pressure-meter">
        <div class="pressure-fill"></div>
        <span class="pressure-value">42%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Active Sensors</span>
        <span class="metric-number">96</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Tremor Magnitude</span>
        <span class="metric-number">2.1</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Eruption Risk</span>
        <span class="metric-number">Low</span>
      </div>
    </section>

  </main>

</body>
</html>
