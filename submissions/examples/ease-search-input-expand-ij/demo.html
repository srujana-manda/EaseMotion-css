<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Input Expand - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Search</h1>
    <div class="sie-bar" id="sieBar">
      <span class="sie-icon">&#x1F50D;</span>
      <input type="text" class="sie-input" id="sieInput" placeholder="Search...">
    </div>
  </div>
  <script>
    var bar = document.getElementById('sieBar');
    var input = document.getElementById('sieInput');
    bar.addEventListener('click', function() { bar.classList.add('sie-expanded'); input.focus(); });
    input.addEventListener('blur', function() { if (!input.value) bar.classList.remove('sie-expanded'); });
  </script>
</body>
</html>
