<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Biodiversity Ecological Protection Network</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="bio-header">
    <h1>Global Biodiversity Ecological Protection Network</h1>
    <p>Monitoring species health, habitat coverage, and conservation zones worldwide</p>
  </header>

  <main class="bio-grid">

    <section class="panel network-panel">
      <div class="panel-title">Conservation Network</div>
      <div class="network-view">
        <span class="zone-node node-1"></span>
        <span class="zone-node node-2"></span>
        <span class="zone-node node-3"></span>
        <span class="zone-node node-4"></span>
        <span class="zone-node node-5"></span>
      </div>
    </section>

    <section class="panel index-panel">
      <div class="panel-title">Biodiversity Index</div>
      <div class="index-meter">
        <div class="index-fill"></div>
        <span class="index-value">73%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Protected Habitats</span>
        <span class="metric-number">1,204</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Species Tracked</span>
        <span class="metric-number">8,930</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Recovery Rate</span>
        <span class="metric-number">+4.1%</span>
      </div>
    </section>

  </main>

</body>
</html>
