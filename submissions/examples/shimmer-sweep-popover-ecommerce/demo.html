<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Shimmer Sweep Popover (E-Commerce)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="checkout-viewport">
    <!-- Component Anchor Base Context -->
    <div class="popover-anchor em-fade-in">
      
      <!-- Pure CSS Interactive State Controller Toggle -->
      <input type="checkbox" id="promo-popover-toggle" class="popover-state-checkbox">
      
      <!-- Interactive Checkout Action Trigger -->
      <label for="promo-popover-toggle" class="checkout-trigger-btn" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false" id="trigger-label">
        <svg class="icon-tag" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
          <line x1="7" y1="7" x2="7.01" y2="7"></line>
        </svg>
        <span>Apply Promo Code</span>
      </label>

      <!-- Shimmer Sweep Popover Container Node -->
      <div class="shimmer-popover-card" role="dialog" aria-describedby="trigger-label">
        
        <!-- Animated Shimmer Sweep Layer Overlay -->
        <div class="popover-shimmer-sweep"></div>
        
        <div class="popover-inner">
          <div class="popover-header">
            <span class="bag-icon-wrapper">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
              </svg>
            </span>
            <h3>Exclusive Checkout Reward</h3>
          </div>
          
          <p class="popover-body">
            Unlock an extra <b>15% off</b> your current order total plus complimentary express shipping.
          </p>
          
          <div class="promo-box">
            <span class="promo-code">SAVINGS15</span>
            <button class="apply-inner-btn" type="button">Claim</button>
          </div>
        </div>

        <!-- Structural Alignment Arrow Pointer -->
        <div class="popover-arrow"></div>
      </div>

    </div>
  </div>

  <script>
    // Essential E-Commerce Accessibility: Triggers checkbox click event natively via Space or Enter keys
    document.getElementById('trigger-label').addEventListener('keydown', function(e) {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('promo-popover-toggle').click();
        const expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !expanded);
      }
    });
  </script>
</body>
</html>
