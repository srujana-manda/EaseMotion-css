<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Pop Alert Banner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="alert-banner ease-pop">
  <span class="icon">⚠️</span>
  <div class="content">
    <h3>System Update</h3>
    <p>Your analytics dashboard has been successfully updated.</p>
  </div>
  <button class="close-btn" aria-label="Close Alert">✕</button>
</div>

</body>
</html>
