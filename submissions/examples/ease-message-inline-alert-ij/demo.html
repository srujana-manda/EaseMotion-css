<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-message-inline-alert</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mia-container">
    <div class="mia-alert mia-alert--success" style="--visible: 1">
      <span class="mia-icon">&#10003;</span>
      <span class="mia-text">Operation completed successfully</span>
      <button class="mia-dismiss" onclick="this.parentElement.style.setProperty('--visible', 0)">&times;</button>
    </div>
    <div class="mia-alert mia-alert--error" style="--visible: 1">
      <span class="mia-icon">&#10007;</span>
      <span class="mia-text">Something went wrong. Please try again.</span>
      <button class="mia-dismiss" onclick="this.parentElement.style.setProperty('--visible', 0)">&times;</button>
    </div>
    <div class="mia-alert mia-alert--warning" style="--visible: 1">
      <span class="mia-icon">&#9888;</span>
      <span class="mia-text">Your session is about to expire</span>
      <button class="mia-dismiss" onclick="this.parentElement.style.setProperty('--visible', 0)">&times;</button>
    </div>
  </div>
</body>
</html>
