<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-popover-arrow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="poa-wrapper">
    <div class="poa-container" style="--open: 0">
      <button class="poa-trigger">Toggle Popover</button>
      <div class="poa-popover">
        <div class="poa-arrow"></div>
        <div class="poa-content">
          <h3>Popover Title</h3>
          <p>This is a popover with an arrow pointing down to the trigger button.</p>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.querySelector('.poa-trigger').addEventListener('click', function() {
      var el = document.querySelector('.poa-container');
      var current = parseInt(el.style.getPropertyValue('--open')) || 0;
      var next = current === 1 ? 0 : 1;
      el.style.setProperty('--open', next);
    });
  </script>
</body>
</html>
