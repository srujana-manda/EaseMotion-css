<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Active Tabs - Neumorphic Soft Layout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Neumorphic Pulse Tabs</h1>

    <div class="tabs" role="tablist">

        <button class="tab active" role="tab" aria-selected="true">
            Dashboard
        </button>

        <button class="tab" role="tab" aria-selected="false">
            Profile
        </button>

        <button class="tab" role="tab" aria-selected="false">
            Settings
        </button>

    </div>


    <div class="panel">

        <h2>Soft UI Experience</h2>

        <p>
            A pure CSS Pulse-Active Tabs component
            designed for neumorphic interfaces.
        </p>

    </div>

</div>

</body>

</html>
