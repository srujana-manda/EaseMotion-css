<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide-Up Carousel - Minimalist Tech</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="carousel">

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/320/220?1" alt="AI">
        <div class="overlay">
            <h3>Artificial Intelligence</h3>
            <p>Simple. Smart. Modern.</p>
        </div>
    </div>

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/320/220?2" alt="Cloud">
        <div class="overlay">
            <h3>Cloud Services</h3>
            <p>Reliable infrastructure.</p>
        </div>
    </div>

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/320/220?3" alt="Security">
        <div class="overlay">
            <h3>Cyber Security</h3>
            <p>Protect your business.</p>
        </div>
    </div>

</div>

</body>
</html>
