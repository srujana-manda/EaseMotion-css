<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 420 - AI Governance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>AI Governance Command</h1>
        <div class="hero-stats">
            <div class="stat-card"><span class="stat-value">234</span><span class="stat-label">Governed Models</span></div>
            <div class="stat-card"><span class="stat-value">96%</span><span class="stat-label">Compliance</span></div>
            <div class="stat-card"><span class="stat-value">3</span><span class="stat-label">Critical Risks</span></div>
            <div class="stat-card"><span class="stat-value">94%</span><span class="stat-label">Responsible AI</span></div>
        </div>
    </header>
    <main class="dashboard">
        <section class="section">
            <h2>Model Registry</h2>
            <div class="grid-4">
                <div class="card"><h3>Production</h3><div class="value">87</div></div>
                <div class="card"><h3>Staging</h3><div class="value">45</div></div>
                <div class="card"><h3>Bias Alerts</h3><div class="value warning">12</div></div>
                <div class="card"><h3>Pending Review</h3><div class="value">23</div></div>
            </div>
        </section>
        <section class="section executive">
            <h2>Executive Governance</h2>
            <div class="grid-3">
                <div class="exec-card"><h3>Audit Progress</h3><div class="exec-value">78%</div></div>
                <div class="exec-card"><h3>Policy Adoption</h3><div class="exec-value">92%</div></div>
                <div class="exec-card"><h3>Risk Score</h3><div class="exec-value success">Low</div></div>
            </div>
        </section>
    </main>
</body>
</html>
