<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Character Bounce Sequence Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -2px rgba(0,0,0,0.15);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Navigation Container Showcase ── */
    .showcase-container {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 1.5rem 3rem;
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Logo and Links */
    .brand-logo {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--ease-color-primary);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-item {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ease-color-text);
      text-decoration: none;
    }

    /* Spacing between bounce letters */
    .nav-bounce-chars-uj span {
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Interactive state */
    .nav-bounce-chars-uj:hover {
      color: var(--ease-color-primary);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Text Character Bounce Sequence</h1>
    <p>
      Hover over the brand logo or individual navigation items below to watch the characters perform a sequential wave bounce.
    </p>
  </header>

  <main class="showcase-container">
    
    <!-- Logo with character bounce -->
    <div class="brand-logo nav-bounce-chars-uj">
      <span>E</span><span>a</span><span>s</span><span>e</span><span>M</span><span>o</span><span>t</span><span>i</span><span>o</span><span>n</span>
    </div>

    <!-- Navigation links -->
    <nav class="nav-links">
      <a href="#" class="nav-item nav-bounce-chars-uj">
        <span>H</span><span>o</span><span>m</span><span>e</span>
      </a>
      <a href="#" class="nav-item nav-bounce-chars-uj">
        <span>W</span><span>o</span><span>r</span><span>k</span><span>s</span>
      </a>
      <a href="#" class="nav-item nav-bounce-chars-uj">
        <span>A</span><span>b</span><span>o</span><span>u</span><span>t</span>
      </a>
    </nav>

  </main>

</body>
</html>
