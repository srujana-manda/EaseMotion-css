<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobble Focus Tabs - Dashboard Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <input type="radio" id="overview" name="tabs" checked>
  <label for="overview">Overview</label>

  <input type="radio" id="reports" name="tabs">
  <label for="reports">Reports</label>

  <input type="radio" id="sales" name="tabs">
  <label for="sales">Sales</label>

  <div class="content">
    <div class="panel panel1">
      <h2>Overview</h2>
      <p>Dashboard overview and KPIs.</p>
    </div>

    <div class="panel panel2">
      <h2>Reports</h2>
      <p>Monthly and yearly reports.</p>
    </div>

    <div class="panel panel3">
      <h2>Sales</h2>
      <p>Sales analytics and revenue insights.</p>
    </div>
  </div>
</div>

</body>
</html>
