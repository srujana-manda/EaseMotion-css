<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Carousel - Dashboard Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Accessibility Announcement -->
    <div class="sr-only" aria-live="polite">Use left and right arrow keys to navigate the analytics widgets.</div>

    <div class="analytics-carousel">
        <!-- Radio inputs for pure CSS state matrix -->
        <input type="radio" name="dash-slider" id="panel-1" class="analytics-input" checked aria-label="Panel 1: Monthly Revenue">
        <input type="radio" name="dash-slider" id="panel-2" class="analytics-input" aria-label="Panel 2: Active Users">
        <input type="radio" name="dash-slider" id="panel-3" class="analytics-input" aria-label="Panel 3: Conversion Rate">

        <div class="analytics-track">
            <!-- Panel 1: Revenue -->
            <div class="analytics-slide">
                <div class="analytics-card">
                    <div class="analytics-header">
                        <h2 class="analytics-title">Monthly Revenue</h2>
                        <span class="analytics-trend positive">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                            +12.4%
                        </span>
                    </div>
                    <div class="analytics-value">$124,500.00</div>
                    <div class="analytics-chart">
                        <!-- Pure CSS Bar Chart -->
                        <div class="chart-bars">
                            <div class="bar-col"><div class="bar fill-blue" style="height: 40%"></div><span class="bar-label">Jan</span></div>
                            <div class="bar-col"><div class="bar fill-blue" style="height: 60%"></div><span class="bar-label">Feb</span></div>
                            <div class="bar-col"><div class="bar fill-blue" style="height: 45%"></div><span class="bar-label">Mar</span></div>
                            <div class="bar-col"><div class="bar fill-blue" style="height: 80%"></div><span class="bar-label">Apr</span></div>
                            <div class="bar-col"><div class="bar fill-blue" style="height: 65%"></div><span class="bar-label">May</span></div>
                            <div class="bar-col"><div class="bar fill-blue" style="height: 100%"></div><span class="bar-label">Jun</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Panel 2: Traffic -->
            <div class="analytics-slide">
                <div class="analytics-card">
                    <div class="analytics-header">
                        <h2 class="analytics-title">Active Users</h2>
                        <span class="analytics-trend neutral">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="12" x2="2" y2="12"></line></svg>
                            0.0%
                        </span>
                    </div>
                    <div class="analytics-value">45,210</div>
                    <div class="analytics-chart">
                        <!-- Pure CSS Line Chart (SVG approximation) -->
                        <div class="chart-line">
                            <svg viewBox="0 0 100 40" preserveAspectRatio="none">
                                <path d="M0,40 L0,30 L20,10 L40,25 L60,5 L80,15 L100,0 L100,40 Z" fill="rgba(16, 185, 129, 0.1)"></path>
                                <polyline points="0,30 20,10 40,25 60,5 80,15 100,0" fill="none" stroke="#10b981" stroke-width="2"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Panel 3: Conversion -->
            <div class="analytics-slide">
                <div class="analytics-card">
                    <div class="analytics-header">
                        <h2 class="analytics-title">Conversion Rate</h2>
                        <span class="analytics-trend negative">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                            -2.1%
                        </span>
                    </div>
                    <div class="analytics-value">3.24%</div>
                    <div class="analytics-chart">
                        <!-- Pure CSS Circular Progress -->
                        <div class="chart-donut">
                            <div class="donut-ring"></div>
                            <div class="donut-fill"></div>
                            <div class="donut-text">Goal</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="analytics-controls">
            <label for="panel-1" class="analytics-dot"></label>
            <label for="panel-2" class="analytics-dot"></label>
            <label for="panel-3" class="analytics-dot"></label>
        </div>
    </div>
</body>
</html>
