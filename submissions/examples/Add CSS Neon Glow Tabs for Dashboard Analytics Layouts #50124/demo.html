<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glow Tabs for Dashboard Analytics</title>
    <meta name="description" content="Pure CSS animated tabs with a smooth neon glow transition, styled for dashboard interfaces. Fully responsive and keyboard accessible.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <h1>Analytics Overview</h1>
            <p>Real-time performance metrics</p>
        </header>

        <div class="tabs-wrapper">
            <!-- Hidden Radio Inputs for State Management -->
            <input type="radio" id="tab-overview" name="dashboard-tabs" class="tab-input" checked>
            <input type="radio" id="tab-audience" name="dashboard-tabs" class="tab-input">
            <input type="radio" id="tab-revenue" name="dashboard-tabs" class="tab-input">

            <!-- Tabs Navigation -->
            <div class="tabs-header" role="tablist">
                <label for="tab-overview" class="tab-label" role="tab" tabindex="0">
                    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    Overview
                </label>
                <label for="tab-audience" class="tab-label" role="tab" tabindex="0">
                    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Audience
                </label>
                <label for="tab-revenue" class="tab-label" role="tab" tabindex="0">
                    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Revenue
                </label>
                
                <!-- The Animated Neon Glow Slider -->
                <div class="tab-slider">
                    <div class="slider-glow"></div>
                </div>
            </div>

            <!-- Tabs Content Panels -->
            <div class="tabs-panels">
                <!-- Overview Panel -->
                <div class="tab-content content-overview">
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <span class="metric-title">Total Users</span>
                            <div class="metric-value">124,592</div>
                            <span class="metric-trend positive">+12.5%</span>
                        </div>
                        <div class="metric-card">
                            <span class="metric-title">Active Sessions</span>
                            <div class="metric-value">8,193</div>
                            <span class="metric-trend positive">+4.2%</span>
                        </div>
                        <div class="metric-card">
                            <span class="metric-title">Bounce Rate</span>
                            <div class="metric-value">32.4%</div>
                            <span class="metric-trend negative">-1.8%</span>
                        </div>
                    </div>
                </div>

                <!-- Audience Panel -->
                <div class="tab-content content-audience">
                    <div class="chart-placeholder">
                        <div class="chart-bar" style="height: 60%;"></div>
                        <div class="chart-bar" style="height: 85%;"></div>
                        <div class="chart-bar" style="height: 40%;"></div>
                        <div class="chart-bar" style="height: 95%;"></div>
                        <div class="chart-bar" style="height: 55%;"></div>
                        <div class="chart-bar" style="height: 70%;"></div>
                        <div class="chart-bar" style="height: 30%;"></div>
                    </div>
                    <p class="panel-desc">Weekly user demographic breakdown and engagement statistics.</p>
                </div>

                <!-- Revenue Panel -->
                <div class="tab-content content-revenue">
                    <div class="revenue-stats">
                        <div class="rev-main">
                            <h3>Monthly Recurring</h3>
                            <div class="rev-amount">$45,231.89</div>
                        </div>
                        <ul class="rev-list">
                            <li><span>Enterprise</span> <span>$22,500</span></li>
                            <li><span>Pro Plan</span> <span>$15,300</span></li>
                            <li><span>Basic Plan</span> <span>$7,431.89</span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Keyboard Accessibility Script: Maps Enter/Space on label to Radio check -->
    <script>
        document.querySelectorAll('.tab-label').forEach(label => {
            label.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    document.getElementById(label.getAttribute('for')).checked = true;
                }
            });
        });
    </script>
</body>
</html>
