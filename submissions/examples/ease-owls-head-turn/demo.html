<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owl's Head Turn – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🦉 Owl's Head Turn</h1>
    <p class="subtitle">Owl turning head with big eyes</p>

    <div class="ot-container">
      <div class="ot-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Moon -->
        <div class="moon">
          <div class="moon-glow"></div>
        </div>

        <!-- Stars -->
        <div class="star st1"></div>
        <div class="star st2"></div>
        <div class="star st3"></div>
        <div class="star st4"></div>
        <div class="star st5"></div>
        <div class="star st6"></div>
        <div class="star st7"></div>
        <div class="star st8"></div>
        <div class="star st9"></div>
        <div class="star st10"></div>

        <!-- Branch -->
        <div class="branch">
          <div class="branch-1"></div>
          <div class="branch-2"></div>
          <div class="branch-3"></div>
        </div>

        <!-- Owl -->
        <div class="owl">
          <!-- Owl body -->
          <div class="owl-body">
            <!-- Body shape -->
            <div class="body-shape"></div>

            <!-- Feather texture -->
            <div class="feather-pattern"></div>

            <!-- Belly -->
            <div class="belly"></div>

            <!-- Feet -->
            <div class="foot f-left"></div>
            <div class="foot f-right"></div>

            <!-- Wings -->
            <div class="wing wing-left"></div>
            <div class="wing wing-right"></div>

            <!-- Head (rotating) -->
            <div class="head" id="owlHead">
              <!-- Head shape -->
              <div class="head-shape"></div>

              <!-- Ear tufts -->
              <div class="ear-tuft tuft-left"></div>
              <div class="ear-tuft tuft-right"></div>

              <!-- Facial disc -->
              <div class="facial-disc disc-left"></div>
              <div class="facial-disc disc-right"></div>

              <!-- Left eye -->
              <div class="eye eye-left">
                <div class="eye-ring"></div>
                <div class="eye-white"></div>
                <div class="pupil">
                  <div class="pupil-glow"></div>
                </div>
                <div class="eye-shine"></div>
              </div>

              <!-- Right eye -->
              <div class="eye eye-right">
                <div class="eye-ring"></div>
                <div class="eye-white"></div>
                <div class="pupil">
                  <div class="pupil-glow"></div>
                </div>
                <div class="eye-shine"></div>
              </div>

              <!-- Beak -->
              <div class="beak"></div>

              <!-- Facial disc details -->
              <div class="disc-line dl1"></div>
              <div class="disc-line dl2"></div>
              <div class="disc-line dl3"></div>
              <div class="disc-line dl4"></div>
            </div>
          </div>

          <!-- Owl glow -->
          <div class="owl-glow"></div>

          <!-- Feather particles -->
          <div class="feather-particle fp1"></div>
          <div class="feather-particle fp2"></div>
          <div class="feather-particle fp3"></div>
          <div class="feather-particle fp4"></div>
          <div class="feather-particle fp5"></div>
          <div class="feather-particle fp6"></div>
        </div>

        <!-- Ambient glow -->
        <div class="ambient-glow"></div>
      </div>
    </div>

    <div class="controls">
      <button id="turnBtn">🔄 Turn Head</button>
      <button id="resetBtn">⟳ Reset</button>
      <label>
        Turn Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Eye Glow
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
    </div>
  </div>

  <script>
    (function() {
      const owlHead = document.getElementById('owlHead');
      const owlGlow = document.querySelector('.owl-glow');
      const ambientGlow = document.querySelector('.ambient-glow');
      const eyes = document.querySelectorAll('.eye');
      const pupils = document.querySelectorAll('.pupil');
      const pupilGlows = document.querySelectorAll('.pupil-glow');
      const featherParticles = document.querySelectorAll('.feather-particle');

      const turnBtn = document.getElementById('turnBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let currentAngle = 0;
      let targetAngle = 0;
      let isTurning = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let turnTimeout = null;

      // ----- Apply speed -----
      function applySpeed() {
        // Head turn
        owlHead.style.setProperty('--turn-duration', (0.8 / speedMultiplier) + 's');

        // Eye blink
        eyes.forEach((eye) => {
          eye.style.setProperty('--blink-duration', (0.12 / speedMultiplier) + 's');
        });

        // Pupil glow
        pupilGlows.forEach((glow) => {
          glow.style.setProperty('--pupil-duration', (1.5 / speedMultiplier) + 's');
        });

        // Owl glow
        owlGlow.style.setProperty('--glow-duration', (2.5 / speedMultiplier) + 's');

        // Ambient glow
        ambientGlow.style.setProperty('--ambient-duration', (3 / speedMultiplier) + 's');

        // Feather particles
        featherParticles.forEach((p, i) => {
          const duration = (3 + (i % 3) * 0.5) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.05) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Pupil glow
        pupilGlows.forEach((glow) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          glow.style.setProperty('--pupil-intensity', opacity);
          const size = 30 * intensityMultiplier;
          glow.style.setProperty('--pupil-size', size + 'px');
        });

        // Owl glow
        const owlOpacity = Math.min(0.08 * intensityMultiplier, 0.15);
        owlGlow.style.setProperty('--owl-glow-intensity', owlOpacity);
        const owlSize = 200 * intensityMultiplier;
        owlGlow.style.setProperty('--owl-glow-size', owlSize + 'px');

        // Ambient glow
        const ambientOpacity = Math.min(0.04 * intensityMultiplier, 0.08);
        ambientGlow.style.setProperty('--ambient-intensity', ambientOpacity);
        const ambientSize = 250 * intensityMultiplier;
        ambientGlow.style.setProperty('--ambient-size', ambientSize + 'px');

        // Feather particles
        featherParticles.forEach((p) => {
          const opacity = Math.min(0.08 * intensityMultiplier, 0.15);
          p.style.setProperty('--particle-intensity', opacity);
        });

        // Eye ring brightness
        document.querySelectorAll('.eye-ring').forEach((ring) => {
          const opacity = Math.min(0.1 * intensityMultiplier, 0.2);
          ring.style.setProperty('--ring-intensity', opacity);
        });
      }

      // ----- Turn head -----
      function turnHead() {
        if (isTurning) {
          // If already turning, complete the turn and reverse
          targetAngle = targetAngle === 180 ? 0 : 180;
          return;
        }

        isTurning = true;
        targetAngle = currentAngle === 0 ? 180 : 0;

        owlHead.classList.add('turning');
        owlHead.style.transform = `translateX(-50%) rotateY(${targetAngle}deg)`;

        // Eye glow intensifies on turn
        eyes.forEach(eye => {
          eye.classList.add('glowing');
        });

        // Pupil glow pulse
        pupilGlows.forEach(glow => {
          glow.style.opacity = '0.8';
          setTimeout(() => {
            glow.style.opacity = '0.3';
          }, 300 / speedMultiplier);
        });

        // Feather particles burst
        featherParticles.forEach((p, i) => {
          setTimeout(() => {
            p.classList.add('active');
            setTimeout(() => {
              p.classList.remove('active');
            }, 1500 / speedMultiplier);
          }, i * 30 / speedMultiplier);
        });

        // Glow flash
        owlGlow.classList.add('glowing');
        setTimeout(() => {
          owlGlow.classList.remove('glowing');
        }, 500 / speedMultiplier);

        turnBtn.textContent = '🔄 Turning...';
        setTimeout(() => {
          turnBtn.textContent = '🔄 Turn Head';
          isTurning = false;
          currentAngle = targetAngle;
        }, 800 / speedMultiplier);

        // Auto-blink after turn
        setTimeout(() => {
          eyes.forEach(eye => {
            eye.classList.add('blinking');
            setTimeout(() => {
              eye.classList.remove('blinking');
            }, 120 / speedMultiplier);
          });
        }, 400 / speedMultiplier);

        // Auto-turn back after 3 seconds
        if (turnTimeout) {
          clearTimeout(turnTimeout);
          turnTimeout = null;
        }
        turnTimeout = setTimeout(() => {
          if (!isTurning && currentAngle === 180) {
            turnHead();
          }
        }, 3500 / speedMultiplier);
      }

      // ----- Blink -----
      function blink() {
        eyes.forEach(eye => {
          eye.classList.add('blinking');
          setTimeout(() => {
            eye.classList.remove('blinking');
          }, 120 / speedMultiplier);
        });

        const nextBlink = 2500 + Math.random() * 3500;
        setTimeout(blink, nextBlink / speedMultiplier);
      }

      // ----- Reset -----
      function resetOwl() {
        if (isTurning) {
          isTurning = false;
        }

        currentAngle = 0;
        targetAngle = 0;
        owlHead.classList.remove('turning');
        owlHead.style.transform = 'translateX(-50%) rotateY(0deg)';

        eyes.forEach(eye => {
          eye.classList.remove('glowing', 'blinking');
        });

        pupilGlows.forEach(glow => {
          glow.style.opacity = '0.2';
        });

        featherParticles.forEach(p => {
          p.classList.remove('active');
        });

        owlGlow.classList.remove('glowing');

        if (turnTimeout) {
          clearTimeout(turnTimeout);
          turnTimeout = null;
        }

        turnBtn.textContent = '🔄 Turn Head';
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Subtle body sway
        const sway = Math.sin(timestamp / 4000) * 1.5;
        document.querySelector('.owl-body').style.transform = `translateX(-50%) rotate(${sway * 0.2}deg)`;

        // Pupil glow pulse
        pupilGlows.forEach((glow) => {
          if (!glow.style.opacity || parseFloat(glow.style.opacity) < 0.5) {
            const pulse = Math.sin(timestamp / 1200) * 0.1 + 0.2;
            glow.style.opacity = pulse;
          }
        });

        // Eye shine movement
        document.querySelectorAll('.eye-shine').forEach((shine, i) => {
          const x = Math.sin(timestamp / 2000 + i * 0.5) * 2;
          const y = Math.cos(timestamp / 2500 + i * 0.3) * 2;
          shine.style.transform = `translate(${x}px, ${y}px)`;
        });

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Start blinking after 1 second
        setTimeout(() => {
          blink();
        }, 1000 / speedMultiplier);

        // Auto-turn after 1.5 seconds
        setTimeout(() => {
          turnHead();
        }, 1500 / speedMultiplier);

        // Auto-turn back after 5 seconds
        setTimeout(() => {
          if (currentAngle === 180 && !isTurning) {
            turnHead();
          }
        }, 5500 / speedMultiplier);

        // Auto-turn again after 7.5 seconds
        setTimeout(() => {
          if (currentAngle === 0 && !isTurning) {
            turnHead();
          }
        }, 8000 / speedMultiplier);
      }

      // ----- Event listeners -----
      turnBtn.addEventListener('click', turnHead);
      resetBtn.addEventListener('click', resetOwl);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      // Click on owl to turn head
      document.querySelector('.owl').addEventListener('click', turnHead);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (turnTimeout) clearTimeout(turnTimeout);
      });

      init();
    })();
  </script>

</body>
</html>
