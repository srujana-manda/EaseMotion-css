<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atmospheric Carbon Capture Grid — Phase #759</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Layers -->
  <div class="wind-layer"></div>

  <!-- Header -->
  <header class="app-header fade-in">
    <div class="brand">AERO-CAP GRID ALPHA</div>
    <div class="global-stats">
      <div class="stat">
        <span class="stat-v">14.2 kT/d</span>
        <span class="stat-l">Capture Rate</span>
      </div>
      <div class="stat">
        <span class="stat-v" style="color: var(--clr-green)">98.5%</span>
        <span class="stat-l">Grid Uptime</span>
      </div>
      <div class="stat">
        <span class="stat-v">412 ppm</span>
        <span class="stat-l">Ambient CO₂</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Atmospheric Composition -->
    <aside class="panel fade-up">
      <div class="panel-title">Atmospheric Intake</div>
      
      <div class="circle-chart"></div>

      <div class="comp-list">
        <div class="comp-item">
          <div class="comp-hdr"><span>Nitrogen (N₂)</span> <span class="comp-val" style="color: var(--clr-text-dim)">78.08%</span></div>
        </div>
        <div class="comp-item">
          <div class="comp-hdr"><span>Oxygen (O₂)</span> <span class="comp-val" style="color: var(--clr-text-dim)">20.95%</span></div>
        </div>
        <div class="comp-item" style="border-color: var(--clr-sky); background: rgba(56,189,248,0.05);">
          <div class="comp-hdr"><span>Carbon Dioxide (CO₂)</span> <span class="comp-val">412 ppm</span></div>
          <div style="font-size: 0.75rem; color: var(--clr-text-dim);">Post-filter: 5 ppm (Target)</div>
        </div>
      </div>
    </aside>

    <!-- Center: Capture Array Grid Visualizer -->
    <section class="panel array-panel fade-in delay-1" style="padding: 1rem; background: transparent; border: none; box-shadow: none;">
      <div class="array-view">
        <div class="airflow"></div>
        
        <!-- Generate 16 fan units -->
        <div class="fan-unit fast"><div class="fan-blade"></div></div>
        <div class="fan-unit"><div class="fan-blade"></div></div>
        <div class="fan-unit"><div class="fan-blade"></div></div>
        <div class="fan-unit fast"><div class="fan-blade"></div></div>
        
        <div class="fan-unit"><div class="fan-blade"></div></div>
        <div class="fan-unit fast"><div class="fan-blade"></div></div>
        <div class="fan-unit maint"><div class="fan-blade"></div></div>
        <div class="fan-unit"><div class="fan-blade"></div></div>
        
        <div class="fan-unit fast"><div class="fan-blade"></div></div>
        <div class="fan-unit"><div class="fan-blade"></div></div>
        <div class="fan-unit"><div class="fan-blade"></div></div>
        <div class="fan-unit fast"><div class="fan-blade"></div></div>
        
        <div class="fan-unit"><div class="fan-blade"></div></div>
        <div class="fan-unit fast"><div class="fan-blade"></div></div>
        <div class="fan-unit"><div class="fan-blade"></div></div>
        <div class="fan-unit fast"><div class="fan-blade"></div></div>
      </div>
    </section>

    <!-- Right Sidebar: Storage & Efficiency -->
    <aside class="panel fade-up delay-2">
      <div class="panel-title">Geologic Sequestration</div>
      
      <div class="storage-tank">
        <div class="tank-bg"></div>
        <div class="tank-fill"></div>
        <div class="tank-lbl">Well #4 (Basalt)</div>
        <div class="tank-val">62% FULL</div>
      </div>

      <div class="panel-title">Sorbent Efficiency</div>
      
      <div class="eff-box">
        <div class="eff-row">
          <span class="eff-lbl">Mod-A</span>
          <div class="eff-bar"><div class="eff-fill" style="width: 95%;"></div></div>
          <span style="font-family: var(--font-data); font-size: 0.8rem;">95%</span>
        </div>
        <div class="eff-row">
          <span class="eff-lbl">Mod-B</span>
          <div class="eff-bar"><div class="eff-fill" style="width: 82%;"></div></div>
          <span style="font-family: var(--font-data); font-size: 0.8rem;">82%</span>
        </div>
        <div class="eff-row">
          <span class="eff-lbl">Mod-C</span>
          <div class="eff-bar"><div class="eff-fill" style="width: 45%; background: var(--clr-alert)"></div></div>
          <span style="font-family: var(--font-data); font-size: 0.8rem; color: var(--clr-alert);">45%</span>
        </div>
      </div>
    </aside>

  </main>

</body>
</html>
