<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exit Animations Demo</title>
<link rel="stylesheet" href="style.css">
<style>
  body { font-family: system-ui, sans-serif; padding: 2rem; background: #f8fafc; }
  .box { width: 160px; height: 80px; background: #6c63ff; color: #fff; display: flex;
         align-items: center; justify-content: center; border-radius: 8px; margin: 1rem 0; cursor: pointer; }
</style>
</head>
<body>
  <h1>Exit Animation Demo</h1>
  <p>Click each box to replay its exit animation.</p>

  <div class="box slide-down-varsha" onclick="this.classList.remove('slide-down-varsha'); void this.offsetWidth; this.classList.add('slide-down-varsha');">
    slide-down-varsha
  </div>

  <div class="box slide-out-left-varsha" onclick="this.classList.remove('slide-out-left-varsha'); void this.offsetWidth; this.classList.add('slide-out-left-varsha');">
    slide-out-left-varsha
  </div>
</body>
</html>
