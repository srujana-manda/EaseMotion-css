<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-success-checkmark</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scm-container">
    <div class="scm-checkmark" style="--show: 0">
      <svg class="scm-svg" viewBox="0 0 52 52">
        <circle class="scm-circle" cx="26" cy="26" r="24" fill="none" stroke="#2ed573" stroke-width="4"/>
        <path class="scm-path" fill="none" stroke="#2ed573" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M14 27l7 7 16-16"/>
      </svg>
    </div>
    <button class="scm-btn" onclick="toggleCheck()">Show Checkmark</button>
  </div>
  <script>
    function toggleCheck() {
      const el = document.querySelector('.scm-checkmark');
      const current = el.style.getPropertyValue('--show').trim();
      el.style.setProperty('--show', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
