<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion — Animated Circular Progress Ring</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Demo page chrome only — not part of the component. */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%);
      color: #1f2937;
      padding: 3rem 1.5rem;
      box-sizing: border-box;
    }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-header h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
    }

    .page-header p {
      margin: 0;
      color: #6b7280;
    }

    /* Responsive grid of examples. */
    .ring-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .ring-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 20px -12px rgba(0, 0, 0, 0.25);
    }

    .ring-card figcaption {
      font-weight: 600;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>Animated Circular Progress Ring</h1>
    <p>Pure HTML &amp; CSS &middot; <code>conic-gradient()</code> &middot; No SVG &middot; No JavaScript</p>
  </header>

  <div class="ring-grid">

    <!-- 0% -->
    <figure class="ring-card">
      <div
        class="ease-progress-ring"
        style="--progress: 0"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      >
        <span class="ease-progress-ring__label">0%</span>
      </div>
      <figcaption>0%</figcaption>
    </figure>

    <!-- 25% -->
    <figure class="ring-card">
      <div
        class="ease-progress-ring"
        style="--progress: 25"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="25"
      >
        <span class="ease-progress-ring__label">25%</span>
      </div>
      <figcaption>25%</figcaption>
    </figure>

    <!-- 50% -->
    <figure class="ring-card">
      <div
        class="ease-progress-ring"
        style="--progress: 50"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="50"
      >
        <span class="ease-progress-ring__label">50%</span>
      </div>
      <figcaption>50%</figcaption>
    </figure>

    <!-- 75% -->
    <figure class="ring-card">
      <div
        class="ease-progress-ring"
        style="--progress: 75"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="75"
      >
        <span class="ease-progress-ring__label">75%</span>
      </div>
      <figcaption>75%</figcaption>
    </figure>

    <!-- 90% -->
    <figure class="ring-card">
      <div
        class="ease-progress-ring"
        style="--progress: 90"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="90"
      >
        <span class="ease-progress-ring__label">90%</span>
      </div>
      <figcaption>90%</figcaption>
    </figure>

    <!-- 100% (also demonstrates theming via CSS variables) -->
    <figure class="ring-card">
      <div
        class="ease-progress-ring"
        style="--progress: 100; --ease-primary: #10b981"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="100"
      >
        <span class="ease-progress-ring__label">100%</span>
      </div>
      <figcaption>100%</figcaption>
    </figure>

  </div>
</body>
</html>
