<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Sidebar Collapse Icon Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <p class="instruction">Click the icon to test the sidebar collapse transition</p>
        
        <button class="collapse-btn" id="collapse-trigger" aria-label="Toggle Sidebar">
            <div class="icon-bar bar-top"></div>
            <div class="icon-bar bar-middle"></div>
            <div class="icon-bar bar-bottom"></div>
        </button>
    </div>

    <script>
        const trigger = document.getElementById('collapse-trigger');
        trigger.addEventListener('click', () => {
            trigger.classList.toggle('collapsed');
        });
    </script>
</body>
</html>
