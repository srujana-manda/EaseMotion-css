<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bounce Image Example</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="bounce-image-page-sum">
      <h1>Bounce Image</h1>
      <p>Image card that bounces to seek attention. Hover or focus to bounce again.</p>

      <div
        class="bounce-image-sum"
        role="img"
        aria-label="Featured product image"
        tabindex="0"
      >
        <span class="bounce-image-sum__label" aria-hidden="true">IMG</span>
      </div>
    </main>
  </body>
</html>
