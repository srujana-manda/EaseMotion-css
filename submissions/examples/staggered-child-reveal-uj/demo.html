<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staggered Child Reveal Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-primary-hover:  #5b52e5;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── List Showcase ── */
    .showcase-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .demo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .list-item {
      background: var(--ease-color-bg);
      border: 1px solid var(--ease-color-neutral-200);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background: rgba(108, 99, 255, 0.15);
      color: var(--ease-color-primary);
      border-radius: 4px;
      font-weight: 700;
    }

    .replay-btn {
      background: var(--ease-color-primary);
      color: white;
      border: none;
      padding: 0.8rem;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: background 0.2s ease;
    }

    .replay-btn:hover {
      background: var(--ease-color-primary-hover);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Staggered Child Reveal</h1>
    <p>
      Watch the items load sequentially. Click the replay button to restart the staggered animation.
    </p>
  </header>

  <main class="showcase-card">

    <ul class="stagger-list-uj demo-list" id="staggerList">
      <li class="list-item">
        <span>Dashboard Config</span>
        <span class="item-tag">Settings</span>
      </li>
      <li class="list-item">
        <span>Database Migration</span>
        <span class="item-tag">Data</span>
      </li>
      <li class="list-item">
        <span>Security Verification</span>
        <span class="item-tag">Network</span>
      </li>
      <li class="list-item">
        <span>Deployment Pipeline</span>
        <span class="item-tag">CI/CD</span>
      </li>
    </ul>

    <button class="replay-btn" onclick="replayAnimation()">
      Replay Entrance
    </button>

  </main>

  <script>
    function replayAnimation() {
      const list = document.getElementById('staggerList');
      const items = Array.from(list.children);
      
      // Detach children to force re-render/reflow
      list.innerHTML = '';
      
      // Append them back
      items.forEach(item => {
        list.appendChild(item);
      });
    }
  </script>

</body>
</html>
