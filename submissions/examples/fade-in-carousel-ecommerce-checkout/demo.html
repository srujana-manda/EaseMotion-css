<!DOCTYPE html>
<html lang="en">
<head>

<title>Fade-In Carousel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fade-carousel">

    <img src="https://picsum.photos/id/1015/700/350" alt="">
    <div class="caption">
        <h2>Fast Checkout</h2>
        <p>Secure payment in seconds.</p>
    </div>
</div>

<div class="slide">
    <img src="https://picsum.photos/id/1016/700/350" alt="">
    <div class="caption">
        <h2>Free Shipping</h2>
        <p>Worldwide delivery.</p>
    </div>
</div>

<div class="slide">
    <img src="https://picsum.photos/id/1025/700/350" alt="">
    <div class="caption">
        <h2>Easy Returns</h2>
        <p>30-day return policy.</p>
    </div>
</div>

</div>

</body>
</html>
