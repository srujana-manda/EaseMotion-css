<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Slide-Up Carousel - Neumorphic Soft</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="neumorphic-container">
        <header class="container-header">
            <h1>Smart Home</h1>
            <p>Control your connected devices</p>
        </header>

        <section class="carousel-wrapper" aria-roledescription="carousel" aria-label="Smart Home Devices">
            <!-- Hidden Radio Inputs for State Management -->
            <input type="radio" name="neu-slider" id="slide-1" class="slider-radio" checked aria-label="View Living Room Thermostat">
            <input type="radio" name="neu-slider" id="slide-2" class="slider-radio" aria-label="View Security Camera">
            <input type="radio" name="neu-slider" id="slide-3" class="slider-radio" aria-label="View Smart Lighting">
            
            <div class="carousel-viewport">
                <div class="carousel-track">
                    <!-- Slide 1: Thermostat -->
                    <article class="carousel-slide slide-1" role="group" aria-roledescription="slide" aria-label="1 of 3">
                        <div class="neu-card">
                            <div class="card-icon">
                                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></svg>
                            </div>
                            <h3>Thermostat</h3>
                            <p class="subtitle">Living Room</p>
                            <div class="neu-dial">
                                <div class="dial-inner">
                                    <span class="value">72&deg;</span>
                                </div>
                            </div>
                            <div class="status-indicator active">Heating On</div>
                        </div>
                    </article>

                    <!-- Slide 2: Security -->
                    <article class="carousel-slide slide-2" role="group" aria-roledescription="slide" aria-label="2 of 3">
                        <div class="neu-card">
                            <div class="card-icon">
                                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            </div>
                            <h3>Security</h3>
                            <p class="subtitle">Front Door</p>
                            <div class="neu-toggle-wrapper">
                                <div class="neu-toggle">
                                    <div class="toggle-knob"></div>
                                </div>
                                <span class="toggle-label">Armed</span>
                            </div>
                            <div class="status-indicator alert">Motion Detected</div>
                        </div>
                    </article>

                    <!-- Slide 3: Lighting -->
                    <article class="carousel-slide slide-3" role="group" aria-roledescription="slide" aria-label="3 of 3">
                        <div class="neu-card">
                            <div class="card-icon">
                                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                            </div>
                            <h3>Lighting</h3>
                            <p class="subtitle">Master Bedroom</p>
                            <div class="neu-slider-track">
                                <div class="neu-slider-fill" style="width: 75%;"></div>
                                <div class="neu-slider-thumb" style="left: 75%;"></div>
                            </div>
                            <div class="status-indicator">75% Brightness</div>
                        </div>
                    </article>
                </div>
            </div>

            <!-- Carousel Controls -->
            <div class="carousel-controls" aria-hidden="true">
                <label for="slide-1" class="neu-dot" title="Thermostat"></label>
                <label for="slide-2" class="neu-dot" title="Security"></label>
                <label for="slide-3" class="neu-dot" title="Lighting"></label>
            </div>
        </section>
    </div>
</body>
</html>
