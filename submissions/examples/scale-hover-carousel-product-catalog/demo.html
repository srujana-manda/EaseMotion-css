<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="carousel" tabindex="0" aria-label="Product Catalog">

  <article class="card">
    <img src="https://picsum.photos/280/200?1" alt="Product 1">
    <h3>Wireless Earbuds</h3>
    <p>₹2,499</p>
    <button>View Details</button>
  </article>

  <article class="card">
    <img src="https://picsum.photos/280/200?2" alt="Product 2">
    <h3>Smart Watch</h3>
    <p>₹4,999</p>
    <button>View Details</button>
  </article>

  <article class="card">
    <img src="https://picsum.photos/280/200?3" alt="Product 3">
    <h3>Bluetooth Speaker</h3>
    <p>₹3,299</p>
    <button>View Details</button>
  </article>

</section>

</body>
</html>
