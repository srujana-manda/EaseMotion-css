<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Autonomous Cargo Airship Navigation System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="nav-header">
    <h1>Autonomous Cargo Airship Navigation System</h1>
    <p>Real-time route planning and atmospheric telemetry for unmanned airships</p>
  </header>

  <main class="nav-grid">

    <section class="panel route-panel">
      <div class="panel-title">Flight Path</div>
      <div class="route-map">
        <svg class="route-line" viewBox="0 0 260 160">
          <path d="M20,140 C80,40 180,120 240,30" />
        </svg>
        <span class="route-marker marker-start"></span>
        <span class="route-marker marker-end"></span>
      </div>
    </section>

    <section class="panel altitude-panel">
      <div class="panel-title">Altitude Hold</div>
      <div class="altitude-meter">
        <div class="altitude-fill"></div>
        <span class="altitude-value">3,140m</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Cargo Load</span>
        <span class="metric-number">82%</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Wind Speed</span>
        <span class="metric-number">14 km/h</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">ETA</span>
        <span class="metric-number">02:14</span>
      </div>
    </section>

  </main>

</body>
</html>
