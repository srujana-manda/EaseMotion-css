<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Ring Accent Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Showcase layout ── */
    .showcase-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--ease-color-bg);
      border: 1px solid var(--ease-color-neutral-200);
      border-radius: 8px;
    }

    .row-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .row-title {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .row-desc {
      color: var(--ease-color-muted);
      font-size: 0.8rem;
    }

    /* Status badges holding the dot */
    .badge-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      background: var(--ease-color-surface);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Pulse Ring Accent</h1>
    <p>
      Live system dashboard showcasing status indicators that emit continuous expanding attention rings.
    </p>
  </header>

  <main class="showcase-card">

    <!-- Status 1: Online -->
    <div class="status-row">
      <div class="row-info">
        <div class="row-title">API Server</div>
        <div class="row-desc">Primary cluster node</div>
      </div>
      <div class="badge-wrapper" style="color: #10b981;">
        <span class="pulse-ring-indicator-uj" style="--pulse-color: #10b981; --pulse-dot-size: 8px;"></span>
        <span>Online</span>
      </div>
    </div>

    <!-- Status 2: Warning -->
    <div class="status-row">
      <div class="row-info">
        <div class="row-title">Build Pipeline</div>
        <div class="row-desc">Running test checks</div>
      </div>
      <div class="badge-wrapper" style="color: #3b82f6;">
        <span class="pulse-ring-indicator-uj" style="--pulse-color: #3b82f6; --pulse-dot-size: 8px; --pulse-duration: 1.2s;"></span>
        <span>Running</span>
      </div>
    </div>

    <!-- Status 3: Error -->
    <div class="status-row">
      <div class="row-info">
        <div class="row-title">Database replica</div>
        <div class="row-desc">Failed synchronization</div>
      </div>
      <div class="badge-wrapper" style="color: #ef4444;">
        <span class="pulse-ring-indicator-uj" style="--pulse-color: #ef4444; --pulse-dot-size: 8px; --pulse-duration: 0.9s;"></span>
        <span>Critical</span>
      </div>
    </div>

  </main>

</body>
</html>
