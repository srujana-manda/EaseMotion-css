<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybernetic Neural Implant Healthcare Interface - Phase 802</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="matrix-overlay"></div>
    
    <header class="biomed-header">
        <div class="system-title">NEURAL-LINK // DIAGNOSTIC_SUITE</div>
        <div class="telemetry-pulse">IMPLANT STATUS: ONLINE // SYNAPSE LINK STABLE</div>
    </header>

    <main class="interface-grid">
        <section class="widget neural-card">
            <h3>[01] SYNAPTIC SIGNAL SIMULATION</h3>
            <div class="synapse-container">
                <div class="synapse-node core-node"></div>
                <div class="synapse-pulse ray-1"></div>
                <div class="synapse-pulse ray-2"></div>
                <div class="synapse-pulse ray-3"></div>
            </div>
        </section>

        <section class="widget neural-card main-display">
            <h3>[02] CORTICAL ACTIVITY TELEMETRY</h3>
            <div class="graph-display">
                <div class="grid-lines"></div>
                <div class="telemetry-wave"></div>
                <div class="scan-bar"></div>
            </div>
        </section>

        <section class="widget neural-card">
            <h3>[03] IMPLANT SYSTEM METRICS</h3>
            <div class="metrics-stream">
                <div class="metric-row">
                    <span>CEREBRAL LOAD:</span>
                    <span class="value stable">12.4 GFLOPs</span>
                </div>
                <div class="metric-row">
                    <span>BANDWIDTH UTILITY:</span>
                    <span class="value stable">98.2%</span>
                </div>
                <div class="metric-row">
                    <span>NEURAL SPIKE DETECTED:</span>
                    <span class="value anomaly">STAGE-2 VOLTAGE FLUX</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
