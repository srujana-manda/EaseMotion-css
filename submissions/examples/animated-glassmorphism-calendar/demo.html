<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphism Calendar Widget — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calendar-card">
    <div class="calendar-header">
      <p class="calendar-title">March 2026</p>
      <div class="calendar-nav">
        <button class="calendar-nav-btn" aria-label="Previous month">‹</button>
        <button class="calendar-nav-btn" aria-label="Next month">›</button>
      </div>
    </div>

    <div class="calendar-weekdays">
      <span>Su</span>
      <span>Mo</span>
      <span>Tu</span>
      <span>We</span>
      <span>Th</span>
      <span>Fr</span>
      <span>Sa</span>
    </div>

    <div class="calendar-days">
      <!-- Trailing days from previous month -->
      <div class="calendar-day calendar-day--muted">22</div>
      <div class="calendar-day calendar-day--muted">23</div>
      <div class="calendar-day calendar-day--muted">24</div>
      <div class="calendar-day calendar-day--muted">25</div>
      <div class="calendar-day calendar-day--muted">26</div>
      <div class="calendar-day calendar-day--muted">27</div>
      <div class="calendar-day calendar-day--muted">28</div>

      <!-- Current month -->
      <div class="calendar-day">1</div>
      <div class="calendar-day">2</div>
      <div class="calendar-day calendar-day--event">3</div>
      <div class="calendar-day">4</div>
      <div class="calendar-day">5</div>
      <div class="calendar-day">6</div>
      <div class="calendar-day">7</div>

      <div class="calendar-day">8</div>
      <div class="calendar-day">9</div>
      <div class="calendar-day">10</div>
      <div class="calendar-day calendar-day--event">11</div>
      <div class="calendar-day">12</div>
      <div class="calendar-day calendar-day--selected">13</div>
      <div class="calendar-day">14</div>

      <div class="calendar-day">15</div>
      <div class="calendar-day">16</div>
      <div class="calendar-day">17</div>
      <div class="calendar-day--today calendar-day calendar-day--event">18</div>
      <div class="calendar-day">19</div>
      <div class="calendar-day">20</div>
      <div class="calendar-day">21</div>

      <div class="calendar-day">22</div>
      <div class="calendar-day">23</div>
      <div class="calendar-day">24</div>
      <div class="calendar-day">25</div>
      <div class="calendar-day">26</div>
      <div class="calendar-day">27</div>
      <div class="calendar-day">28</div>

      <div class="calendar-day">29</div>
      <div class="calendar-day">30</div>
      <div class="calendar-day">31</div>

      <!-- Leading days from next month -->
      <div class="calendar-day calendar-day--muted">1</div>
      <div class="calendar-day calendar-day--muted">2</div>
      <div class="calendar-day calendar-day--muted">3</div>
      <div class="calendar-day calendar-day--muted">4</div>
    </div>
  </div>

</body>
</html>
