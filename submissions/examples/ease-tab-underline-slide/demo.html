<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Underline Slide — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tab Underline Slide</h1>
  <p class="subtitle">A tab bar with sliding underline indicator — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="tab-bar"><label class="tab" for="tab1"><input type="radio" name="tabs" id="tab1" checked><span class="tab-label">Home</span></label><label class="tab" for="tab2"><input type="radio" name="tabs" id="tab2"><span class="tab-label">Explore</span></label><label class="tab" for="tab3"><input type="radio" name="tabs" id="tab3"><span class="tab-label">Library</span></label><label class="tab" for="tab4"><input type="radio" name="tabs" id="tab4"><span class="tab-label">Settings</span></label><div class="tab-slider"></div></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;div class=&quot;tab-bar&quot;&gt;
  &lt;label class=&quot;tab&quot;&gt;
    &lt;input type=&quot;radio&quot; name=&quot;tabs&quot; checked&gt;
    &lt;span class=&quot;tab-label&quot;&gt;Tab&lt;/span&gt;
  &lt;/label&gt;
  &lt;div class=&quot;tab-slider&quot;&gt;&lt;/div&gt;
&lt;/div&gt;</code></pre></section>
</body>
</html>
