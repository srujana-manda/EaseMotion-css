<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Breadcrumbs - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>Animated Breadcrumbs Navigation</h2>
        <p>Hover over the breadcrumb items to see the animations</p>
        
        <!-- Breadcrumb Navigation -->
        <nav class="breadcrumb-nav-qn" aria-label="Breadcrumb">
            <ol class="breadcrumb-list-qn">
                <li class="breadcrumb-item-qn">
                    <a href="#" class="breadcrumb-link-qn">
                        <svg class="breadcrumb-icon-qn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>Home</span>
                    </a>
                </li>
                
                <li class="breadcrumb-separator-qn" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </li>
                
                <li class="breadcrumb-item-qn">
                    <a href="#" class="breadcrumb-link-qn">
                        <span>Products</span>
                    </a>
                </li>
                
                <li class="breadcrumb-separator-qn" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </li>
                
                <li class="breadcrumb-item-qn">
                    <a href="#" class="breadcrumb-link-qn">
                        <span>Electronics</span>
                    </a>
                </li>
                
                <li class="breadcrumb-separator-qn" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </li>
                
                <li class="breadcrumb-item-qn active-qn" aria-current="page">
                    <span class="breadcrumb-current-qn">Smartphones</span>
                </li>
            </ol>
        </nav>

        <!-- Alternative Style: With Background -->
        <h3 style="margin-top: 60px;">Alternative Style</h3>
        <nav class="breadcrumb-nav-qn breadcrumb-style-2-qn" aria-label="Breadcrumb">
            <ol class="breadcrumb-list-qn">
                <li class="breadcrumb-item-qn">
                    <a href="#" class="breadcrumb-link-qn">Dashboard</a>
                </li>
                <li class="breadcrumb-separator-qn" aria-hidden="true">/</li>
                <li class="breadcrumb-item-qn">
                    <a href="#" class="breadcrumb-link-qn">Settings</a>
                </li>
                <li class="breadcrumb-separator-qn" aria-hidden="true">/</li>
                <li class="breadcrumb-item-qn active-qn" aria-current="page">
                    <span class="breadcrumb-current-qn">Profile</span>
                </li>
            </ol>
        </nav>
    </div>
</body>
</html>
