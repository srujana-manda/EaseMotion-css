<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Forest Studio — Phase #744</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="studio-header fade-in">
    <div class="brand">
      <div class="brand-icon"></div>
      ECO-TOWER ALPHA
    </div>
    <div class="env-stat">
      <div class="stat-box">
        <span class="stat-val" style="color: var(--clr-green-leaf)">Optimal</span>
        <span class="stat-lbl">Ecosystem Health</span>
      </div>
      <div class="stat-box">
        <span class="stat-val">120k tons</span>
        <span class="stat-lbl">CO2 Absorbed / Yr</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Hydration Systems -->
    <aside class="panel fade-up">
      <div class="panel-title">HYDRATION & NUTRIENTS</div>
      
      <div class="hydro-list">
        <div class="hydro-item">
          <div class="h-hdr">
            <span class="h-name">Main Aquifer Flow</span>
            <span class="h-val">85 L/min</span>
          </div>
          <div class="drop-track">
            <div class="drop-fill" style="width: 80%;"></div>
            <div class="droplet"></div>
          </div>
        </div>
        
        <div class="hydro-item">
          <div class="h-hdr">
            <span class="h-name">Nutrient Mix (N-P-K)</span>
            <span class="h-val" style="color: var(--clr-earth)">Balanced</span>
          </div>
          <div class="drop-track">
            <div class="drop-fill" style="width: 100%; background: rgba(120,53,15,0.2);"></div>
            <div class="droplet d2" style="background: var(--clr-earth)"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Center: Vertical Forest Cross-Section -->
    <section class="panel forest-panel fade-in delay-1" style="padding: 0; border: none; box-shadow: none;">
      <div class="forest-view">
        
        <div class="sun"></div>
        
        <div class="skyscraper">
          
          <div class="floor">
            <div class="vine left"></div>
            <div class="vine right"></div>
          </div>
          
          <div class="floor">
            <div class="vine left" style="animation-delay: 0.5s"></div>
            <div class="vine right" style="height: 140px; animation-delay: 1.5s"></div>
          </div>
          
          <div class="floor">
            <div class="vine left" style="height: 60px;"></div>
            <div class="vine right" style="height: 100px;"></div>
          </div>

        </div>

      </div>
    </section>

    <!-- Right Sidebar: Climate & Solar -->
    <aside class="panel fade-up delay-2">
      
      <div class="weather-card">
        <div class="wc-temp">24°C</div>
        <div class="wc-lbl">Micro-Climate Core</div>
      </div>

      <div class="panel-title">SOLAR TRACKING</div>
      
      <div class="climate-grid">
        <div class="cg-item">
          <div class="cg-val">78%</div>
          <div class="cg-lbl">Lux Exposure</div>
        </div>
        <div class="cg-item">
          <div class="cg-val" style="color: var(--clr-sun)">South</div>
          <div class="cg-lbl">Panel Azimuth</div>
        </div>
        <div class="cg-item">
          <div class="cg-val" style="color: var(--clr-water)">65%</div>
          <div class="cg-lbl">Humidity</div>
        </div>
        <div class="cg-item">
          <div class="cg-val" style="color: var(--clr-text)">12 km/h</div>
          <div class="cg-lbl">Wind Load</div>
        </div>
      </div>

    </aside>

  </main>

</body>
</html>
