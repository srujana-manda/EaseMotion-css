<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
    <input type="radio" id="tab1" name="tabs" checked>
    <label for="tab1">Overview</label>

    <input type="radio" id="tab2" name="tabs">
    <label for="tab2">Features</label>

    <input type="radio" id="tab3" name="tabs">
    <label for="tab3">Pricing</label>

    <div class="content">
        <div class="panel panel1">
            <h2>Overview</h2>
            <p>Interactive interface using pure CSS 3D flip tabs.</p>
        </div>

        <div class="panel panel2">
            <h2>Features</h2>
            <p>Responsive, accessible and customizable.</p>
        </div>

        <div class="panel panel3">
            <h2>Pricing</h2>
            <p>Easy to integrate into any project.</p>
        </div>
    </div>
</div>

</body>
</html>
