<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Pagination Underline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="display: flex; flex-direction: column; gap: 40px; align-items: center;">
    
    <div>
      <p style="text-align: center; color: var(--ease-text-muted); margin-bottom: 12px; font-family: var(--ease-font);">Page 1 Active</p>
      <!-- Pagination Component -->
      <!-- Set --active-index to control underline position -->
      <nav class="ease-pagination-underline" style="--active-index: 1;" aria-label="Pagination">
        
        <button class="ease-page-link active" aria-current="page">1</button>
        <button class="ease-page-link">2</button>
        <button class="ease-page-link">3</button>
        <button class="ease-page-link">4</button>
        <button class="ease-page-link">5</button>
        
        <!-- Sliding Indicator -->
        <div class="ease-underline-indicator" aria-hidden="true"></div>
      </nav>
    </div>

    <div>
      <p style="text-align: center; color: var(--ease-text-muted); margin-bottom: 12px; font-family: var(--ease-font);">Page 3 Active</p>
      <nav class="ease-pagination-underline" style="--active-index: 3;" aria-label="Pagination">
        
        <button class="ease-page-link">1</button>
        <button class="ease-page-link">2</button>
        <button class="ease-page-link active" aria-current="page">3</button>
        <button class="ease-page-link">4</button>
        <button class="ease-page-link">5</button>
        
        <div class="ease-underline-indicator" aria-hidden="true"></div>
      </nav>
    </div>

    <div>
      <p style="text-align: center; color: var(--ease-text-muted); margin-bottom: 12px; font-family: var(--ease-font);">Interactive Demo (Hover to slide indicator via CSS :has)</p>
      <nav class="ease-pagination-underline interactive-demo" style="--active-index: 1;" aria-label="Pagination">
        
        <button class="ease-page-link active">1</button>
        <button class="ease-page-link">2</button>
        <button class="ease-page-link">3</button>
        <button class="ease-page-link">4</button>
        <button class="ease-page-link">5</button>
        
        <div class="ease-underline-indicator" aria-hidden="true"></div>
      </nav>
    </div>

  </div>

  <!-- Optional CSS to make the third demo interactive via hover using modern CSS :has() -->
  <style>
    .interactive-demo:has(button:nth-child(1):hover) { --active-index: 1 !important; }
    .interactive-demo:has(button:nth-child(2):hover) { --active-index: 2 !important; }
    .interactive-demo:has(button:nth-child(3):hover) { --active-index: 3 !important; }
    .interactive-demo:has(button:nth-child(4):hover) { --active-index: 4 !important; }
    .interactive-demo:has(button:nth-child(5):hover) { --active-index: 5 !important; }
    
    /* Update active text color on hover */
    .interactive-demo button.active { color: var(--ease-text); font-weight: 500; }
    .interactive-demo:has(button:nth-child(1):hover) button:nth-child(1) { color: var(--ease-primary); font-weight: 700; }
    .interactive-demo:has(button:nth-child(2):hover) button:nth-child(2) { color: var(--ease-primary); font-weight: 700; }
    .interactive-demo:has(button:nth-child(3):hover) button:nth-child(3) { color: var(--ease-primary); font-weight: 700; }
    .interactive-demo:has(button:nth-child(4):hover) button:nth-child(4) { color: var(--ease-primary); font-weight: 700; }
    .interactive-demo:has(button:nth-child(5):hover) button:nth-child(5) { color: var(--ease-primary); font-weight: 700; }
  </style>

</body>
</html>
