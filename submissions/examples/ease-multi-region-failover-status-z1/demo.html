<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Multi Region Failover Status</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Multi-Region Failover</h2>

<div class="region healthy">
<div>
<h3>Primary Region</h3>
<p>Mumbai • Healthy • 99.99% Uptime</p>
</div>
<span>Online</span>
</div>

<div class="region active">
<div>
<h3>Replication</h3>
<p>Last Sync: 18 Seconds Ago</p>
</div>
<span>Synced</span>
</div>

<div class="region warning">
<div>
<h3>Secondary Region</h3>
<p>Latency Increased to 142 ms</p>
</div>
<span>Monitor</span>
</div>

<div class="region critical">
<div>
<h3>Failover Readiness</h3>
<p>DNS Validation Pending</p>
</div>
<span>Action</span>
</div>

</section>

</body>
</html>
