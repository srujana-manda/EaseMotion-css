<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glass Card - EaseMotion CSS</title>
    
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- EaseMotion CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
    
    <!-- Local Custom Styles -->
    <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-center">

    <!-- Glass Card Container with Entrance Animation -->
    <div class="glass-card ease-fade-in ease-duration-slow">
        
        <!-- Staggered Content Reveal -->
        <div class="card-content ease-slide-up ease-delay-200">
            <h2 class="ease-hover-glow">Neon Glass Card</h2>
            <p>A modern glassmorphism UI component enhanced with expressive, zero-dependency EaseMotion CSS animations.</p>
            
            <!-- Interactive Button with Hover Animation -->
            <button class="ease-btn ease-btn-primary ease-hover-lift ease-duration-fast">
                Explore More →
            </button>
        </div>
        
    </div>

</body>
</html>
