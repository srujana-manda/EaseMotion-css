<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skew Active Marketing Carousel</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="landing">

    <h1>Marketing Solutions</h1>
    <p class="subtitle">
        Explore our powerful marketing features
    </p>


    <div class="skew-carousel">

        <article class="slide active" tabindex="0">
            <h2>Campaigns</h2>
            <p>Create high converting campaigns easily.</p>
            <button>Explore</button>
        </article>


        <article class="slide" tabindex="0">
            <h2>Analytics</h2>
            <p>Track customer behaviour and growth.</p>
            <button>View Data</button>
        </article>


        <article class="slide" tabindex="0">
            <h2>Growth</h2>
            <p>Scale your business with smart tools.</p>
            <button>Start Now</button>
        </article>


        <article class="slide" tabindex="0">
            <h2>Automation</h2>
            <p>Automate marketing workflows.</p>
            <button>Learn More</button>
        </article>

    </div>

</section>

</body>
</html>
