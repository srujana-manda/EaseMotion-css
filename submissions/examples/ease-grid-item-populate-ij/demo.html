<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Item Populate | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button onclick="togglePopulate()">Toggle Populate</button>
    <div class="grid" style="--populate: 0">
      <div class="grid-item" style="--i: 1">1</div>
      <div class="grid-item" style="--i: 2">2</div>
      <div class="grid-item" style="--i: 3">3</div>
      <div class="grid-item" style="--i: 4">4</div>
      <div class="grid-item" style="--i: 5">5</div>
      <div class="grid-item" style="--i: 6">6</div>
      <div class="grid-item" style="--i: 7">7</div>
      <div class="grid-item" style="--i: 8">8</div>
      <div class="grid-item" style="--i: 9">9</div>
    </div>
  </div>
  <script>
    function togglePopulate() {
      const grid = document.querySelector('.grid');
      const current = grid.style.getPropertyValue('--populate');
      grid.style.setProperty('--populate', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
