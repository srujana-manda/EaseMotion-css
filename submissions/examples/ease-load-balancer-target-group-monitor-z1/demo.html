<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Load Balancer Target Group Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Load Balancer Target Groups</h2>

<div class="target healthy">
<div>
<h3>Web Servers</h3>
<p>12/12 Healthy • 18 ms Avg Response</p>
</div>
<span>Healthy</span>
</div>

<div class="target active">
<div>
<h3>API Cluster</h3>
<p>4,820 Requests/min</p>
</div>
<span>Serving</span>
</div>

<div class="target warning">
<div>
<h3>Analytics Service</h3>
<p>2 Unhealthy Targets</p>
</div>
<span>Warning</span>
</div>

<div class="target critical">
<div>
<h3>Legacy Backend</h3>
<p>Health Checks Failing</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
