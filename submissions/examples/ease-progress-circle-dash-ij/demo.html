<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Circle Dash - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pcd-wrapper">
    <h1>Progress Circle Dash</h1>
    <p class="pcd-desc">SVG circle progress with stroke-dasharray animation</p>
    <div class="pcd-card">
      <div class="pcd-ring" id="pcdRing" style="--pcd-progress: 0.65;">
        <svg viewBox="0 0 120 120" class="pcd-svg">
          <circle cx="60" cy="60" r="52" class="pcd-bg" />
          <circle cx="60" cy="60" r="52" class="pcd-fill" style="stroke-dashoffset: calc(326.7 * (1 - var(--pcd-progress)));" />
        </svg>
        <span class="pcd-label" id="pcdLabel">65%</span>
      </div>
      <input type="range" class="pcd-slider" id="pcdSlider" min="0" max="100" value="65" />
      <p class="pcd-hint">Slide to set progress (0–100)</p>
    </div>
  </div>
  <script>
    const ring = document.getElementById('pcdRing');
    const slider = document.getElementById('pcdSlider');
    const label = document.getElementById('pcdLabel');

    slider.addEventListener('input', () => {
      const val = slider.value / 100;
      ring.style.setProperty('--pcd-progress', val);
      label.textContent = Math.round(val * 100) + '%';
    });
  </script>
</body>
</html>
