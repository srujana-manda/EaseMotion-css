<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquee Scroll Text - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Marquee Scroll</h1>
    <div class="mst-marquee">
      <div class="mst-track">
        <span class="mst-text">✦ EaseMotion CSS — Smooth animations for the modern web ✦ </span>
        <span class="mst-text">✦ EaseMotion CSS — Smooth animations for the modern web ✦ </span>
      </div>
    </div>
    <div class="mst-marquee mst-reverse">
      <div class="mst-track">
        <span class="mst-text">● Infinite scroll ● Pure CSS ● No JavaScript ● </span>
        <span class="mst-text">● Infinite scroll ● Pure CSS ● No JavaScript ● </span>
      </div>
    </div>
    <div class="mst-controls">
      <label class="mst-label">
        <input type="checkbox" id="mstPause" class="mst-checkbox">
        Pause Marquee
      </label>
    </div>
  </section>
  <script>
    const pauseCheck = document.getElementById('mstPause');
    const marquees = document.querySelectorAll('.mst-marquee');
    pauseCheck.addEventListener('change', () => {
      marquees.forEach((m) => m.classList.toggle('mst-paused', pauseCheck.checked));
    });
  </script>
</body>
</html>
