<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Radar Screen — Phase #745</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="radar-header fade-in">
    <div class="brand">AEGIS QUANTUM ARRAY</div>
    <div class="def-stat">
      <div class="stat-box">
        <span class="stat-lbl">Entanglement Status</span>
        <span class="stat-val">COHERENT</span>
      </div>
      <div class="stat-box">
        <span class="stat-lbl">Threat Level</span>
        <span class="stat-val" style="color: var(--clr-red); text-shadow: var(--glow-red)">ELEVATED</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Sensor Calibration -->
    <aside class="panel fade-in delay-1">
      <div class="panel-title">SENSOR CALIBRATION</div>
      
      <div class="sensor-grp">
        <div class="s-hdr"><span>Photon Noise Filter</span> <span class="s-val">ACTIVE</span></div>
        <div class="wave-box"><div class="wave-line"></div></div>
      </div>

      <div class="panel-title" style="margin-top: 1rem;">ENTANGLEMENT MATRIX</div>
      
      <div class="matrix-grid">
        <div class="m-cell"></div><div class="m-cell active"></div><div class="m-cell"></div>
        <div class="m-cell"></div><div class="m-cell"></div><div class="m-cell active"></div>
        <div class="m-cell active"></div><div class="m-cell"></div><div class="m-cell"></div>
        <div class="m-cell"></div><div class="m-cell active"></div><div class="m-cell"></div>
        <div class="m-cell"></div><div class="m-cell"></div><div class="m-cell"></div>
        <div class="m-cell active"></div><div class="m-cell"></div><div class="m-cell active"></div>
      </div>
    </aside>

    <!-- Center: Quantum Radar Screen -->
    <section class="panel radar-panel fade-in" style="padding: 0; background: transparent; border: none; box-shadow: none; backdrop-filter: none;">
      <div class="radar-view">
        <div class="radar-display">
          <div class="sweeper"></div>
          
          <!-- Targets -->
          <div class="blip b1"></div>
          <div class="blip b2"></div>
          <div class="blip b3"></div>
        </div>
      </div>
    </section>

    <!-- Right Sidebar: Target Analysis -->
    <aside class="panel slide-in-right delay-2">
      <div class="panel-title">TARGET ANALYSIS</div>
      
      <div class="target-list">
        
        <div class="target-card">
          <div class="tc-hdr">
            <span class="tc-id">UAP-77</span>
            <span class="tc-class">Unknown</span>
          </div>
          <div class="tc-data">
            <div><span class="td-lbl">Alt:</span> <span class="td-val">42k ft</span></div>
            <div><span class="td-lbl">Spd:</span> <span class="td-val">M 1.2</span></div>
            <div><span class="td-lbl">Cross:</span> <span class="td-val">0.01m²</span></div>
            <div><span class="td-lbl">Sig:</span> <span class="td-val" style="color: var(--clr-blue)">Anomalous</span></div>
          </div>
        </div>

        <div class="target-card hostile">
          <div class="tc-hdr">
            <span class="tc-id">BGY-09</span>
            <span class="tc-class">Hostile</span>
          </div>
          <div class="tc-data">
            <div><span class="td-lbl">Alt:</span> <span class="td-val">200 ft</span></div>
            <div><span class="td-lbl">Spd:</span> <span class="td-val">M 2.4</span></div>
            <div><span class="td-lbl">Cross:</span> <span class="td-val">0.05m²</span></div>
            <div><span class="td-lbl">Sig:</span> <span class="td-val" style="color: var(--clr-red)">Missile</span></div>
          </div>
        </div>

      </div>
    </aside>

  </main>

</body>
</html>
