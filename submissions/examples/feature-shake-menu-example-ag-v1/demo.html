<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shake Menu Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-menu-container-ag">
        <h3>Settings</h3>
        <ul class="ease-menu-list-ag" role="menu">
            <li role="none">
                <a href="#profile" role="menuitem" class="ease-menu-item-ag">Profile</a>
            </li>
            <li role="none">
                <a href="#notifications" role="menuitem" class="ease-menu-item-ag">Notifications</a>
            </li>
            <li role="none">
                <a href="#privacy" role="menuitem" class="ease-menu-item-ag">Privacy</a>
            </li>
            <li role="none" class="ease-menu-item-disabled-ag" aria-disabled="true">
                <a href="#advanced" role="menuitem" class="ease-menu-item-ag ease-shake-menu-ag" tabindex="-1">Advanced (Locked)</a>
            </li>
        </ul>
    </div>
</body>
</html>
