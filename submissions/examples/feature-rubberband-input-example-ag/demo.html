<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RubberBand Input Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    <div class="input-group-ag">
      <label for="email-ag">Email Address (Attention Seeker)</label>
      <!-- The rubberband effect triggers on :focus and :invalid (when not empty) -->
      <input type="email" id="email-ag" class="rubberband-input-ag" placeholder="Enter your email" required pattern="[^@\s]+@[^@\s]+\.[^@\s]+" />
      <span class="error-msg-ag">Please enter a valid email address.</span>
    </div>
  </div>
</body>
</html>
