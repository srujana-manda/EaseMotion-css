<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Kubernetes Pod Lifecycle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="pods">

<h2>Kubernetes Pods</h2>

<div class="pod running">
<div>
<h3>auth-service</h3>
<p>Node: worker-01 • Restarts: 0</p>
</div>
<span>Running</span>
</div>

<div class="pod pending">
<div>
<h3>payment-api</h3>
<p>Node: Scheduling • Restarts: 0</p>
</div>
<span>Pending</span>
</div>

<div class="pod warning">
<div>
<h3>analytics-worker</h3>
<p>Node: worker-03 • Restarts: 5</p>
</div>
<span>CrashLoop</span>
</div>

<div class="pod completed">
<div>
<h3>backup-job</h3>
<p>Node: worker-02 • Restarts: 0</p>
</div>
<span>Completed</span>
</div>

</section>

</body>
</html>
