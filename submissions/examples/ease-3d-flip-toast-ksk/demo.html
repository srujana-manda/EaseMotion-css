<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D-Flip Toast — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Pure CSS Toast Controller Checkbox -->
  <input type="checkbox" id="toast-trigger" class="toast-checkbox">

  <!-- Main Showcase Dashboard Page -->
  <div class="demo-page" id="app-root">

    <div class="demo-card">
      <h1 class="demo-title">3D-Flip Toast Notification</h1>
      <p class="demo-desc">
        A premium non-blocking toast alert designed for creative portfolios. 
        Click "Trigger Notification" below to check the input state and launch the 3D-Flip entrance.
      </p>

      <div class="demo-toolbar">
        <!-- Clicking this label checks the checkbox, launching the toast! -->
        <label for="toast-trigger" class="btn-action" role="button" tabindex="0">
          Trigger Notification
        </label>
        
        <button class="btn-action btn-secondary" id="themeBtn">
          Toggle Theme
        </button>
      </div>
    </div>

  </div>

  <!-- Toast Notification fixed bottom-right (Perspective Viewport Container) -->
  <div class="toast-container" role="alert" aria-live="polite">
    <div class="ease-3d-toast">
      
      <!-- Toast Main Body -->
      <div class="toast-body">
        
        <!-- Animated success indicator icon -->
        <div class="toast-badge-circle" aria-hidden="true">
          ✓
        </div>

        <!-- Text details -->
        <div class="toast-info">
          <h4 class="toast-title">Project Saved</h4>
          <p class="toast-desc">Successfully uploaded layout assets to the creative cloud sync directory.</p>
        </div>

        <!-- Close Button (Checks checkbox to hide toast) -->
        <label for="toast-trigger" class="toast-close-btn" aria-label="Dismiss Alert" role="button" tabindex="0">
          &times;
        </label>

      </div>

      <!-- Animated timer bar (Visual only - pure CSS progress bar draining) -->
      <div class="toast-progress-bar" aria-hidden="true">
        <div class="toast-progress-fill"></div>
      </div>

    </div>
  </div>

  <script>
    // Theme toggle bind helper
    const themeBtn = document.getElementById('themeBtn');
    const appRoot = document.getElementById('app-root');
    themeBtn.addEventListener('click', () => {
      appRoot.classList.toggle('light-theme');
      document.querySelector('.toast-container').classList.toggle('light-theme');
    });

    // Auto-dismiss helper (Optional: unchecks checkbox after 5 seconds to simulate auto close)
    const toastCheckbox = document.getElementById('toast-trigger');
    let autoDismissTimer = null;

    toastCheckbox.addEventListener('change', () => {
      if (toastCheckbox.checked) {
        if (autoDismissTimer) clearTimeout(autoDismissTimer);
        // Automatically uncheck after 4.5 seconds to match progress animation
        autoDismissTimer = setTimeout(() => {
          toastCheckbox.checked = false;
        }, 4500);
      }
    });
  </script>

</body>
</html>
