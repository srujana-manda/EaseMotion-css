<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargo Airship Nav — Phase #741</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="nav-header fade-in">
    <div class="brand">
      <div class="brand-icon"></div>
      AERO-HAUL COMMAND
    </div>
    <div class="header-stat">
      <div class="stat-box">
        <span class="stat-val">Mach 0.18</span>
        <span class="stat-lbl">Airspeed</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" style="color: var(--clr-sky); text-shadow: 0 0 10px var(--clr-sky)">Auto</span>
        <span class="stat-lbl">Pilot Mode</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Navigation & Altitude -->
    <aside class="panel fade-up">
      <div class="panel-title">LIDAR NAVIGATION</div>
      
      <div class="radar-view">
        <div class="radar-grid"></div>
        <div class="radar-sweep"></div>
        <div class="radar-blip"></div>
        <div class="radar-blip" style="top: 70%; left: 30%; animation-delay: 1.5s; width: 4px; height: 4px;"></div>
      </div>

      <div class="nav-data">
        <div class="nd-item">
          <div class="nd-val">12,450 ft</div>
          <div class="nd-lbl">Altitude (MSL)</div>
        </div>
        <div class="nd-item">
          <div class="nd-val">214° SW</div>
          <div class="nd-lbl">Heading</div>
        </div>
        <div class="nd-item">
          <div class="nd-val" style="color: var(--clr-sky)">Clear</div>
          <div class="nd-lbl">Weather Radar</div>
        </div>
        <div class="nd-item">
          <div class="nd-val" style="color: var(--clr-cargo)">410 NM</div>
          <div class="nd-lbl">Dist to Dest</div>
        </div>
      </div>
    </aside>

    <!-- Center: Airship Profile View -->
    <section class="panel center-panel fade-in delay-1" style="padding: 0; background: transparent; border: none; box-shadow: none;">
      <div class="flight-panel">
        
        <div class="speed-lines"></div>

        <div class="airship">
          <div class="envelope"></div>
          
          <div class="thruster left"><div class="t-flame"></div></div>
          <div class="thruster right"><div class="t-flame"></div></div>
          
          <div class="gondola">
            <div class="g-window"></div>
            <div class="g-window"></div>
            <div class="g-window"></div>
          </div>
        </div>

      </div>
    </section>

    <!-- Right Sidebar: Cargo & Payload -->
    <aside class="panel fade-up delay-2">
      
      <div class="panel-title">PAYLOAD STATUS</div>
      
      <div class="payload-card">
        <div>
          <div class="pc-val">84.2 T</div>
          <div class="pc-lbl">Total Cargo Mass</div>
        </div>
        <div style="font-size: 2rem; color: var(--clr-cargo);">📦</div>
      </div>

      <div class="bay-list">
        
        <div class="bay-item">
          <div class="bi-hdr">
            <span class="bi-name">Bay 1 (Forward)</span>
            <span class="bi-stat">Secured</span>
          </div>
          <div class="bi-bar"><div class="bi-fill" style="width: 100%;"></div></div>
        </div>

        <div class="bay-item">
          <div class="bi-hdr">
            <span class="bi-name">Bay 2 (Center)</span>
            <span class="bi-stat">Secured</span>
          </div>
          <div class="bi-bar"><div class="bi-fill" style="width: 85%;"></div></div>
        </div>

        <div class="bay-item" style="border-left-color: var(--clr-cargo);">
          <div class="bi-hdr">
            <span class="bi-name">Bay 3 (Aft)</span>
            <span class="bi-stat" style="color: var(--clr-cargo)">Loading...</span>
          </div>
          <div class="bi-bar"><div class="bi-fill" style="width: 40%; background: var(--clr-cargo)"></div></div>
        </div>

        <div class="bay-item" style="border-left-color: var(--clr-text-dim);">
          <div class="bi-hdr">
            <span class="bi-name">Buoyancy Gas (He)</span>
            <span class="bi-stat" style="color: var(--clr-text-dim)">94% Vol</span>
          </div>
        </div>

      </div>

    </aside>

  </main>

</body>
</html>
