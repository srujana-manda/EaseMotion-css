<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Fade Arrow - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Hover for Info</h1>
    <div class="tfa-group">
      <span class="tfa-target">
        Hover me
        <span class="tfa-tip">Hello! I'm a tooltip</span>
      </span>
      <span class="tfa-target">
        Another tooltip
        <span class="tfa-tip tfa-bottom">I can appear below too</span>
      </span>
    </div>
  </div>
</body>
</html>
