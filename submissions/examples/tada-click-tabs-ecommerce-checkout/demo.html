<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tada Click Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
    <input type="radio" id="cart" name="tabs" checked>
    <label for="cart">Cart</label>

    <input type="radio" id="shipping" name="tabs">
    <label for="shipping">Shipping</label>

    <input type="radio" id="payment" name="tabs">
    <label for="payment">Payment</label>

    <div class="content">
        <div class="panel">Shopping Cart Summary</div>
        <div class="panel">Shipping Details</div>
        <div class="panel">Secure Payment</div>
    </div>
</div>

</body>
</html>
