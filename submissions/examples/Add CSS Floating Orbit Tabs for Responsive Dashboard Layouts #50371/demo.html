<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Floating Orbit Tabs - Dashboard Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-widget">
    <div class="widget-header">
      <h2>Activity Overview</h2>
    </div>
    
    <div class="tabs-container">
      
      <!-- Hidden Focusable Inputs -->
      <input type="radio" name="dash-tabs" id="tab1" class="sr-only" checked>
      <input type="radio" name="dash-tabs" id="tab2" class="sr-only">
      <input type="radio" name="dash-tabs" id="tab3" class="sr-only">
      <input type="radio" name="dash-tabs" id="tab4" class="sr-only">

      <!-- Tab Header Container -->
      <div class="tabs-header">
        <label for="tab1" class="tab-label">Daily</label>
        <label for="tab2" class="tab-label">Weekly</label>
        <label for="tab3" class="tab-label">Monthly</label>
        <label for="tab4" class="tab-label">Yearly</label>

        <!-- Fluid Orbit Indicator -->
        <div class="orbit-indicator">
          <div class="orbit-floater">
            <div class="orbit-inner"></div>
            <!-- Orbiting data nodes -->
            <div class="satellite satellite-1"></div>
            <div class="satellite satellite-2"></div>
          </div>
        </div>
      </div>

      <!-- Tab Content Panels -->
      <div class="tabs-content">
        <!-- Panel 1 -->
        <div class="tab-panel" id="panel1">
          <div class="dashboard-metrics">
            <div class="metric-card">
              <span class="metric-title">Active Users</span>
              <span class="metric-value">1,245</span>
              <span class="metric-trend positive">↑ 12%</span>
            </div>
            <div class="metric-card">
              <span class="metric-title">Server Load</span>
              <span class="metric-value">42%</span>
              <span class="metric-trend negative">↓ 3%</span>
            </div>
            <div class="metric-card">
              <span class="metric-title">Errors</span>
              <span class="metric-value">12</span>
              <span class="metric-trend positive">↓ 5%</span>
            </div>
          </div>
        </div>
        
        <!-- Panel 2 -->
        <div class="tab-panel" id="panel2">
          <div class="dashboard-metrics">
            <div class="metric-card">
              <span class="metric-title">Active Users</span>
              <span class="metric-value">8,430</span>
              <span class="metric-trend positive">↑ 8%</span>
            </div>
            <div class="metric-card">
              <span class="metric-title">Avg Session</span>
              <span class="metric-value">4m 12s</span>
              <span class="metric-trend positive">↑ 15s</span>
            </div>
          </div>
        </div>

        <!-- Panel 3 -->
        <div class="tab-panel" id="panel3">
          <div class="dashboard-metrics">
            <div class="metric-card">
              <span class="metric-title">Monthly Revenue</span>
              <span class="metric-value">$45,200</span>
              <span class="metric-trend positive">↑ 24%</span>
            </div>
            <div class="metric-card">
              <span class="metric-title">New Signups</span>
              <span class="metric-value">1,402</span>
              <span class="metric-trend positive">↑ 12%</span>
            </div>
          </div>
        </div>

        <!-- Panel 4 -->
        <div class="tab-panel" id="panel4">
          <div class="dashboard-metrics">
            <div class="metric-card">
              <span class="metric-title">Year to Date</span>
              <span class="metric-value">$452,000</span>
              <span class="metric-trend positive">↑ 34%</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
