<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shake Error Input - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Shake Error Input</h1>
    <p class="sei-desc">Click the button to trigger an error shake animation.</p>
    <div class="sei-field">
      <label class="sei-label" for="seiInput">Email address</label>
      <input id="seiInput" class="sei-input" type="email" placeholder="Enter your email" value="invalid-email">
      <span class="sei-error" id="seiError">Please enter a valid email address.</span>
    </div>
    <button class="sei-btn" id="seiBtn">Validate</button>
  </section>
  <script>
    var input = document.getElementById('seiInput');
    var btn = document.getElementById('seiBtn');
    var err = document.getElementById('seiError');
    btn.addEventListener('click', function() {
      input.classList.remove('sei-shake');
      void input.offsetWidth;
      input.classList.add('sei-shake');
      err.style.display = 'block';
    });
  </script>
</body>
</html>
