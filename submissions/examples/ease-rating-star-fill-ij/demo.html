<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating Star Fill - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Rate Us</h1>
    <div class="rsf-stars" id="rsfStars" style="--rsf-value: 0;">
      <span class="rsf-star" data-i="1">&#9733;</span>
      <span class="rsf-star" data-i="2">&#9733;</span>
      <span class="rsf-star" data-i="3">&#9733;</span>
      <span class="rsf-star" data-i="4">&#9733;</span>
      <span class="rsf-star" data-i="5">&#9733;</span>
    </div>
    <p class="rsf-label" id="rsfLabel">Click a star</p>
  </div>
  <script>
    var stars = document.getElementById('rsfStars');
    var label = document.getElementById('rsfLabel');
    var starEls = stars.querySelectorAll('.rsf-star');

    starEls.forEach(function(s) {
      s.addEventListener('click', function() {
        var val = parseInt(this.getAttribute('data-i'));
        stars.style.setProperty('--rsf-value', val);
        label.textContent = val + ' / 5';
      });
      s.addEventListener('mouseenter', function() {
        var val = parseInt(this.getAttribute('data-i'));
        stars.style.setProperty('--rsf-hover', val);
      });
      s.addEventListener('mouseleave', function() {
        stars.style.setProperty('--rsf-hover', 0);
      });
    });
  </script>
</body>
</html>
