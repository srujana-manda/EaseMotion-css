<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAB Speed Dial - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Speed Dial</h1>
    <div class="fsd-fab" id="fsdFab">
      <button class="fsd-main">+</button>
      <div class="fsd-menu" style="--fsd-open: 0;">
        <button class="fsd-item" style="--fsd-i: 0;">Edit</button>
        <button class="fsd-item" style="--fsd-i: 1;">Share</button>
        <button class="fsd-item" style="--fsd-i: 2;">Delete</button>
      </div>
    </div>
  </div>
  <script>
    var fab = document.getElementById('fsdFab');
    fab.querySelector('.fsd-main').addEventListener('click', function() {
      var menu = fab.querySelector('.fsd-menu');
      var open = menu.style.getPropertyValue('--fsd-open') === '1' ? '0' : '1';
      menu.style.setProperty('--fsd-open', open);
    });
  </script>
</body>
</html>
