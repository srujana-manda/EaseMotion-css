<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Secrets Vault Access Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="vault-card">

<h2>Secrets Vault</h2>

<div class="secret">
<div>
<h3>Database Credentials</h3>
<p>Rotation: Every 30 days</p>
</div>
<span class="secure">Protected</span>
</div>

<div class="secret">
<div>
<h3>Stripe API Key</h3>
<p>Access: Backend Team</p>
</div>
<span class="review">Review</span>
</div>

<div class="secret">
<div>
<h3>JWT Signing Key</h3>
<p>Rotation: Due Tomorrow</p>
</div>
<span class="warning">Expiring</span>
</div>

<div class="secret">
<div>
<h3>AWS Access Token</h3>
<p>Access: DevOps Team</p>
</div>
<span class="secure">Protected</span>
</div>

</section>

</body>
</html>
