<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Cyber-Physical Power Grid Command</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="grid-header">
    <h1>Smart Cyber-Physical Power Grid Command</h1>
    <p>Real-time monitoring of load balancing, substations, and grid resilience</p>
  </header>

  <main class="power-grid">

    <section class="panel network-panel">
      <div class="panel-title">Grid Topology</div>
      <div class="network-view">
        <span class="node node-1"></span>
        <span class="node node-2"></span>
        <span class="node node-3"></span>
        <span class="node node-4"></span>
        <span class="line-conn conn-1"></span>
        <span class="line-conn conn-2"></span>
        <span class="line-conn conn-3"></span>
      </div>
    </section>

    <section class="panel load-panel">
      <div class="panel-title">Load Balance</div>
      <div class="load-meter">
        <div class="load-fill"></div>
        <span class="load-value">64%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Active Substations</span>
        <span class="metric-number">218</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Power Draw</span>
        <span class="metric-number">4.7 GW</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Grid Stability</span>
        <span class="metric-number">99.7%</span>
      </div>
    </section>

  </main>

</body>
</html>
