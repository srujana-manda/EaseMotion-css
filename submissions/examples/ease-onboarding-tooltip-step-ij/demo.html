<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Tooltip Step — EaseMotion CSS</title>
  <meta name="description" content="Step-through onboarding tooltip with fade-and-slide transitions, step indicators, and prev/next navigation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ots-container">
    <header>
      <span class="ots-badge">EaseMotion CSS — Onboarding</span>
      <h1>Onboarding Tooltip Step</h1>
      <p class="ots-desc">
        Step-by-step tooltip walkthrough. Use the controls to navigate between steps;
        each tooltip fades and slides into position with a smooth scale transition.
      </p>
    </header>

    <div class="ots-stage">
      <div class="ots-demo-ui">
        <div class="ots-target-wrapper">
          <div class="ots-target" id="otsTarget">
            <span class="ots-target-icon">&#9881;</span>
            <span class="ots-target-label">Settings</span>
          </div>
          <div class="ots-tooltip" id="otsTooltip">
            <div class="ots-tooltip-arrow"></div>
            <div class="ots-tooltip-body">
              <h3 class="ots-tooltip-title" id="otsTitle">Welcome!</h3>
              <p class="ots-tooltip-text" id="otsText">Click the gear icon to adjust your preferences.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="ots-controls">
        <button class="ots-btn ots-btn-prev" id="otsPrev" type="button" aria-label="Previous step">Prev</button>
        <div class="ots-steps" id="otsSteps">
          <span class="ots-step is-active" data-step="0"></span>
          <span class="ots-step" data-step="1"></span>
          <span class="ots-step" data-step="2"></span>
        </div>
        <button class="ots-btn ots-btn-next" id="otsNext" type="button" aria-label="Next step">Next</button>
      </div>
    </div>
  </div>

  <script>
    const steps = [
      { title: 'Welcome!', text: 'Click the gear icon to adjust your preferences.', position: 'bottom' },
      { title: 'Customise', text: 'Choose from light, dark, or system theme modes.', position: 'bottom' },
      { title: 'Notifications', text: 'Toggle alerts for updates and activity.', position: 'top' }
    ];

    const tooltip = document.getElementById('otsTooltip');
    const titleEl = document.getElementById('otsTitle');
    const textEl = document.getElementById('otsText');
    const prevBtn = document.getElementById('otsPrev');
    const nextBtn = document.getElementById('otsNext');
    const stepDots = document.querySelectorAll('.ots-step');
    let current = 0;

    function setStep(index) {
      const step = steps[index];
      titleEl.textContent = step.title;
      textEl.textContent = step.text;
      tooltip.className = 'ots-tooltip ots-tooltip--' + step.position;

      stepDots.forEach(function(dot, i) {
        dot.classList.toggle('is-active', i === index);
      });

      tooltip.classList.remove('ots-active');
      void tooltip.offsetWidth;
      tooltip.classList.add('ots-active');
    }

    nextBtn.addEventListener('click', function() {
      current = (current + 1) % steps.length;
      setStep(current);
    });

    prevBtn.addEventListener('click', function() {
      current = (current - 1 + steps.length) % steps.length;
      setStep(current);
    });

    setStep(0);
  </script>

</body>
</html>
