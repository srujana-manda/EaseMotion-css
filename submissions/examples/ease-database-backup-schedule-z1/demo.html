<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Database Backup Schedule</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Database Backup Schedule</h2>

<div class="backup success">
<div>
<h3>Production DB</h3>
<p>Last Backup: Today • 02:00 AM</p>
</div>
<span>Completed</span>
</div>

<div class="backup info">
<div>
<h3>Analytics DB</h3>
<p>Next Backup: Today • 11:30 PM</p>
</div>
<span>Scheduled</span>
</div>

<div class="backup warning">
<div>
<h3>Archive DB</h3>
<p>Storage Used: 82%</p>
</div>
<span>Review</span>
</div>

<div class="backup danger">
<div>
<h3>Development DB</h3>
<p>Backup Failed • Retry Pending</p>
</div>
<span>Failed</span>
</div>

</section>

</body>
</html>
