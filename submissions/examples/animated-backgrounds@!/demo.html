<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Backgrounds - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-font-sans">
  
  <!-- Background 1: Gradient Mesh -->
  <section class="background-section background-mesh ease-fade-in">
    <div class="mesh-bg">
      <div class="mesh-blob mesh-blob--1"></div>
      <div class="mesh-blob mesh-blob--2"></div>
      <div class="mesh-blob mesh-blob--3"></div>
      <div class="mesh-blob mesh-blob--4"></div>
    </div>
    <div class="content-overlay">
      <h1 class="ease-text-5xl ease-font-bold ease-text-white ease-mb-4">Gradient Mesh</h1>
      <p class="ease-text-xl ease-text-white/80">Smooth, flowing gradient blobs</p>
    </div>
  </section>

  <!-- Background 2: Aurora -->
  <section class="background-section background-aurora ease-fade-in">
    <div class="aurora-bg">
      <div class="aurora-layer aurora-layer--1"></div>
      <div class="aurora-layer aurora-layer--2"></div>
      <div class="aurora-layer aurora-layer--3"></div>
    </div>
    <div class="content-overlay">
      <h1 class="ease-text-5xl ease-font-bold ease-text-white ease-mb-4">Aurora Borealis</h1>
      <p class="ease-text-xl ease-text-white/80">Northern lights inspired animation</p>
    </div>
  </section>

  <!-- Background 3: Particles -->
  <section class="background-section background-particles ease-fade-in">
    <div class="particles-bg">
      <div class="particle" style="--i: 1"></div>
      <div class="particle" style="--i: 2"></div>
      <div class="particle" style="--i: 3"></div>
      <div class="particle" style="--i: 4"></div>
      <div class="particle" style="--i: 5"></div>
      <div class="particle" style="--i: 6"></div>
      <div class="particle" style="--i: 7"></div>
      <div class="particle" style="--i: 8"></div>
      <div class="particle" style="--i: 9"></div>
      <div class="particle" style="--i: 10"></div>
      <div class="particle" style="--i: 11"></div>
      <div class="particle" style="--i: 12"></div>
      <div class="particle" style="--i: 13"></div>
      <div class="particle" style="--i: 14"></div>
      <div class="particle" style="--i: 15"></div>
    </div>
    <div class="content-overlay">
      <h1 class="ease-text-5xl ease-font-bold ease-text-white ease-mb-4">Floating Particles</h1>
      <p class="ease-text-xl ease-text-white/80">Dynamic particle system</p>
    </div>
  </section>

  <!-- Background 4: Waves -->
  <section class="background-section background-waves ease-fade-in">
    <div class="waves-bg">
      <svg class="wave wave--1" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"></path>
      </svg>
      <svg class="wave wave--2" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"></path>
      </svg>
      <svg class="wave wave--3" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"></path>
      </svg>
    </div>
    <div class="content-overlay">
      <h1 class="ease-text-5xl ease-font-bold ease-text-white ease-mb-4">Ocean Waves</h1>
      <p class="ease-text-xl ease-text-white/80">Smooth, flowing wave animation</p>
    </div>
  </section>

  <!-- Interactive Background (Mouse Follow) -->
  <section class="background-section background-interactive ease-fade-in" id="interactiveSection">
    <div class="interactive-bg" id="interactiveBg">
      <div class="interactive-glow"></div>
    </div>
    <div class="content-overlay">
      <h1 class="ease-text-5xl ease-font-bold ease-text-white ease-mb-4">Interactive Glow</h1>
      <p class="ease-text-xl ease-text-white/80">Move your mouse to see the effect</p>
    </div>
  </section>

  <script>
    // Interactive background with mouse movement
    const interactiveSection = document.getElementById('interactiveSection');
    const interactiveBg = document.getElementById('interactiveBg');
    
    interactiveSection.addEventListener('mousemove', (e) => {
      const rect = interactiveSection.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      interactiveBg.style.setProperty('--mouse-x', `${x}px`);
      interactiveBg.style.setProperty('--mouse-y', `${y}px`);
    });
  </script>
</body>
</html>
