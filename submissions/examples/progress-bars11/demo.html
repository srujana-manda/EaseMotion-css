<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion – Animated Progress Bars</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Animated Progress Bars</h1>

  <!-- 1️⃣ Simple horizontal bar -->
  <section>
    <h2>Simple Bar</h2>
    <div class="progress-container">
      <div class="progress-bar" data-progress="70%">70%</div>
    </div>
  </section>

  <!-- 2️⃣ Striped animated bar -->
  <section>
    <h2>Striped Bar</h2>
    <div class="progress-container striped">
      <div class="progress-bar striped" data-progress="85%">85%</div>
    </div>
  </section>

  <!-- 3️⃣ Multi‑color gradient bar -->
  <section>
    <h2>Gradient Bar</h2>
    <div class="progress-container multicolor">
      <div class="progress-bar multi" data-progress="60%">60%</div>
    </div>
  </section>
</body>
</html>
