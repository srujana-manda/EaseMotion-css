<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Cloud Resource Quota Overview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Cloud Resource Quotas</h2>

<div class="quota healthy">
<div>
<h3>vCPU Quota</h3>
<p>128 of 200 vCPUs Allocated</p>
</div>
<span>64%</span>
</div>

<div class="quota active">
<div>
<h3>Memory Quota</h3>
<p>410 GB of 512 GB Used</p>
</div>
<span>80%</span>
</div>

<div class="quota warning">
<div>
<h3>Persistent Storage</h3>
<p>8.9 TB of 10 TB Consumed</p>
</div>
<span>89%</span>
</div>

<div class="quota critical">
<div>
<h3>Public IP Addresses</h3>
<p>98 of 100 Assigned</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
