<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Card - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Skeleton Card</h1>
    <p class="desc">Card skeleton with shimmer wave animation</p>
    <div class="sk-card">
      <div class="sk-banner"></div>
      <div class="sk-body">
        <div class="sk-line sk-line-lg" style="--sk-w: 70%;"></div>
        <div class="sk-line" style="--sk-w: 100%;"></div>
        <div class="sk-line" style="--sk-w: 90%;"></div>
        <div class="sk-line sk-line-sm" style="--sk-w: 50%;"></div>
      </div>
    </div>
  </div>
</body>
</html>
