<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Progress Tracker Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1 class="ease-fade-in">
Checkout Progress
</h1>

<div class="tracker">

<div class="line"></div>

<div class="step completed ease-slide-up">
<div class="circle">✓</div>
<p>Cart</p>
</div>

<div class="step completed ease-slide-up">
<div class="circle">✓</div>
<p>Shipping</p>
</div>

<div class="step active ease-slide-up">
<div class="circle">3</div>
<p>Payment</p>
</div>

<div class="step ease-slide-up">
<div class="circle">4</div>
<p>Complete</p>
</div>

</div>

</div>

</body>
</html>
