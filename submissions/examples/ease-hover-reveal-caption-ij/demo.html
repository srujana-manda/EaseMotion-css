<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Reveal Caption - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Hover to Reveal</h1>
    <div class="hrc-card">
      <div class="hrc-img" style="background: linear-gradient(135deg, #8b5cf6, #3b82f6);">
        <span class="hrc-icon">&#x1F30C;</span>
      </div>
      <div class="hrc-overlay">
        <span class="hrc-caption">Explore the Universe</span>
      </div>
    </div>
    <div class="hrc-card" style="--hrc-color: #e94560;">
      <div class="hrc-img" style="background: linear-gradient(135deg, #e94560, #f97316);">
        <span class="hrc-icon">&#x1F3AE;</span>
      </div>
      <div class="hrc-overlay">
        <span class="hrc-caption">Play &amp; Create</span>
      </div>
    </div>
  </div>
</body>
</html>
