<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanotech Assembler — Phase #734</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      NANO<span>CORE</span>
    </div>
    <div class="status-bar">
      <div class="status-item">
        <span class="status-val">99.8%</span>
        <span class="status-lbl">Purity</span>
      </div>
      <div class="status-item">
        <span class="status-val" style="color: var(--clr-orange);">ACTV</span>
        <span class="status-lbl">Chamber</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Material Feed -->
    <aside class="panel slide-in-left">
      <div class="panel-title">Feedstock</div>
      
      <div class="mat-list">
        
        <div class="mat-item">
          <div class="mat-header">
            <span class="mat-lbl">Carbon (C)</span>
            <span class="mat-val">84%</span>
          </div>
          <div class="mat-track"><div class="mat-fill c" style="width: 84%;"></div></div>
        </div>

        <div class="mat-item">
          <div class="mat-header">
            <span class="mat-lbl">Titanium (Ti)</span>
            <span class="mat-val">62%</span>
          </div>
          <div class="mat-track"><div class="mat-fill" style="width: 62%;"></div></div>
        </div>

        <div class="mat-item">
          <div class="mat-header">
            <span class="mat-lbl">Silicon (Si)</span>
            <span class="mat-val">95%</span>
          </div>
          <div class="mat-track"><div class="mat-fill g" style="width: 95%;"></div></div>
        </div>

      </div>
    </aside>

    <!-- Center: Fabrication Chamber -->
    <section class="panel scale-in" style="background: transparent; border: none; box-shadow: none;">
      <div class="fab-chamber">
        <div class="fab-ring"></div>
        <div class="fab-core">
          <div class="fab-target"></div>
        </div>
        <div class="fab-overlay">SYNTHESIZING</div>
      </div>
    </section>

    <!-- Right Sidebar: Swarm Control -->
    <aside class="panel slide-in-right">
      <div class="panel-title">Swarm Status</div>
      
      <div class="swarm-grid">
        <div class="bot-node active"></div><div class="bot-node active"></div><div class="bot-node busy"></div><div class="bot-node busy"></div>
        <div class="bot-node active"></div><div class="bot-node err"></div><div class="bot-node"></div><div class="bot-node active"></div>
        <div class="bot-node busy"></div><div class="bot-node busy"></div><div class="bot-node active"></div><div class="bot-node active"></div>
        <div class="bot-node active"></div><div class="bot-node active"></div><div class="bot-node active"></div><div class="bot-node"></div>
      </div>

      <div class="log-box">
        <div class="log-entry info">> Swarm initialized.</div>
        <div class="log-entry">> Matrix alignment... OK.</div>
        <div class="log-entry warn">> Node 0x06 offline. Rerouting.</div>
        <div class="log-entry">> Deposition rate: 4.2k atm/s</div>
        <div class="log-entry">> Thermal envelope nominal.</div>
      </div>
    </aside>

  </main>

</body>
</html>
