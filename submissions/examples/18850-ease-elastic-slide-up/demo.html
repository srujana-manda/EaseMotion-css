<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Elastic Slide Up Demo</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fa;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 450px;
    }

    h1 {
      margin-bottom: 1rem;
    }

    p {
      color: #555;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="card">
  <h1 class="ease-elastic-slide-up">
    Welcome to EaseMotion CSS
  </h1>

  <p class="ease-elastic-slide-up">
    A modern elastic entrance animation combining fade, slide, and bounce for a polished user experience.
  </p>
</div>

</body>
</html>
