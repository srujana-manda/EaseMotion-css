<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Neon Rotate Carousel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="carousel" aria-label="Cyberpunk Neon Carousel">

    <button class="card">
        <span class="icon">⚡</span>
        <h2>Power</h2>
        <p>High-speed futuristic performance.</p>
    </button>

    <button class="card">
        <span class="icon">🤖</span>
        <h2>AI Core</h2>
        <p>Smart automation for tomorrow.</p>
    </button>

    <button class="card">
        <span class="icon">🌐</span>
        <h2>Network</h2>
        <p>Connected with neon-speed systems.</p>
    </button>

    <button class="card">
        <span class="icon">🚀</span>
        <h2>Launch</h2>
        <p>Experience futuristic interfaces.</p>
    </button>

</section>

</body>
</html>
