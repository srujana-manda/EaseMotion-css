<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tada-Click Tabs</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">

    <input type="radio" id="overview" name="tab" checked>
    <label for="overview">Overview</label>

    <input type="radio" id="features" name="tab">
    <label for="features">Features</label>

    <input type="radio" id="pricing" name="tab">
    <label for="pricing">Pricing</label>

    <div class="content">
        <div class="panel">
            Discover our powerful marketing platform.
        </div>

        <div class="panel">
            Fast, responsive and customizable components.
        </div>

        <div class="panel">
            Flexible pricing plans for every business.
        </div>
    </div>

</div>

</body>
</html>
