<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease IAM Access Review Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>IAM Access Review</h2>

<div class="access healthy">
<div>

<p>128 Users Reviewed</p>
</div>
<span>Approved</span>
</div>

<div class="access active">
<div>
<h3>Pending Requests</h3>

</div>
<span>Pending</span>
</div>

<div class="access warning">
<div>

<p>17 Accounts Inactive for 90+ Days</p>
</div>
<span>Review</span>
</div>

<div class="access critical">
<div>
<h3>Admin Privileges</h3>
<p>4 Excess Privileged Accounts</p>
</div>
<span>Critical</span>
</div>

</section>

</html>
