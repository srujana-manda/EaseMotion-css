<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expand Text Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-expand-text-container-ag">
        <h2>
            <a href="#" class="ease-expand-text-link-ag">
                Hover over this text to expand
            </a>
        </h2>
        
        <p class="ease-expand-text-paragraph-ag">
            You can also apply it to paragraphs. <span class="ease-expand-text-inline-ag">This specific phrase</span> will expand when hovered.
        </p>
    </div>
</body>
</html>
