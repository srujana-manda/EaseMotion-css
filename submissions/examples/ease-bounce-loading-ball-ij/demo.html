<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Bounce Loading Ball</title>
</head>
<body>
  <div class="container">
    <div class="bounce-ball" id="bounceEl">
      <div class="ball"></div>
    </div>
    <button class="toggle" id="toggleBounce">Toggle Bounce</button>
  </div>
  <script>
    const el = document.querySelector('.bounce-ball');
    document.getElementById('toggleBounce').addEventListener('click', () => {
      const current = el.style.getPropertyValue('--bounce').trim() || '0';
      el.style.setProperty('--bounce', current === '1' ? '0' : '1');
    });
  </script>
</body>
</html>
