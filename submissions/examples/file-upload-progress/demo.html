<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Progress — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>File Upload Progress</h1>
  <p class="subtitle">A CSS-only file upload progress bar with animated fill — pure CSS.</p>
  <section><h2>Demo</h2><div class="upload"><div class="upload-icon">↑</div><p class="upload-text">Drag & drop files here</p><div class="progress"><div class="progress-fill"></div></div><span class="pct">Uploading 68%</span></div></section>
  <section><h2>How It Works</h2><p>The progress bar animates <code>width</code> from 0 to a target percentage using CSS keyframes, creating a smooth upload progress effect.</p></section>
</body>
</html>
