<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing Hover Tabs - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="checkout-container">

  <h1>Checkout Process</h1>

  <div class="tabs" role="tablist">

    <button class="tab active" role="tab">
      Cart
    </button>

    <button class="tab" role="tab">
      Shipping
    </button>

    <button class="tab" role="tab">
      Payment
    </button>

    <button class="tab" role="tab">
      Confirmation
    </button>

  </div>

  <div class="content">
    <h2>Order Details</h2>
    <p>
      Complete your shopping process using animated checkout tabs.
    </p>
  </div>

</section>

</body>
</html>
