<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-avatar-stack-overlap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="aso-container">
    <div class="aso-stack" style="--hovered: 0">
      <div class="aso-avatar" style="--i: 0">
        <div class="aso-avatar-img" style="background: #6c63ff">JD</div>
        <span class="aso-name">Jane Doe</span>
      </div>
      <div class="aso-avatar" style="--i: 1">
        <div class="aso-avatar-img" style="background: #ff6584">JM</div>
        <span class="aso-name">John Miles</span>
      </div>
      <div class="aso-avatar" style="--i: 2">
        <div class="aso-avatar-img" style="background: #45c4a0">AL</div>
        <span class="aso-name">Alice Liu</span>
      </div>
      <div class="aso-avatar" style="--i: 3">
        <div class="aso-avatar-img" style="background: #f2b705">BR</div>
        <span class="aso-name">Bob Reyes</span>
      </div>
    </div>
    <label class="aso-toggle">
      <input type="checkbox" onchange="document.querySelector('.aso-stack').style.setProperty('--hovered', this.checked ? 1 : 0)">
      <span>Hover avatars</span>
    </label>
  </div>
</body>
</html>
