<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rating Stars UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Rating Stars UI Example</h1>
      <p>Interactive star ratings with smooth hover and click animations.</p>
    </header>

    <section class="rating-grid">
      <div class="rating-group">
        <h3>Default Rating</h3>
        <div class="star-rating" data-rating="0">
          <button class="star" data-value="1" aria-label="Rate 1 star"></button>
          <button class="star" data-value="2" aria-label="Rate 2 stars"></button>
          <button class="star" data-value="3" aria-label="Rate 3 stars"></button>
          <button class="star" data-value="4" aria-label="Rate 4 stars"></button>
          <button class="star" data-value="5" aria-label="Rate 5 stars"></button>
        </div>
      </div>

      <div class="rating-group">
        <h3>Pre-Rated (3 Stars)</h3>
        <div class="star-rating star-rating--rated" data-rating="3">
          <button class="star star--active" data-value="1" aria-label="Rate 1 star"></button>
          <button class="star star--active" data-value="2" aria-label="Rate 2 stars"></button>
          <button class="star star--active" data-value="3" aria-label="Rate 3 stars"></button>
          <button class="star" data-value="4" aria-label="Rate 4 stars"></button>
          <button class="star" data-value="5" aria-label="Rate 5 stars"></button>
        </div>
      </div>

      <div class="rating-group">
        <h3>Accent Color Variant</h3>
        <div class="star-rating star-rating--accent" data-rating="0">
          <button class="star" data-value="1" aria-label="Rate 1 star"></button>
          <button class="star" data-value="2" aria-label="Rate 2 stars"></button>
          <button class="star" data-value="3" aria-label="Rate 3 stars"></button>
          <button class="star" data-value="4" aria-label="Rate 4 stars"></button>
          <button class="star" data-value="5" aria-label="Rate 5 stars"></button>
        </div>
      </div>

      <div class="rating-group">
        <h3>Read-Only Rating (5 Stars)</h3>
        <div class="star-rating star-rating--readonly" data-rating="5">
          <button class="star star--active" data-value="1" aria-label="Rate 1 star" disabled></button>
          <button class="star star--active" data-value="2" aria-label="Rate 2 stars" disabled></button>
          <button class="star star--active" data-value="3" aria-label="Rate 3 stars" disabled></button>
          <button class="star star--active" data-value="4" aria-label="Rate 4 stars" disabled></button>
          <button class="star star--active" data-value="5" aria-label="Rate 5 stars" disabled></button>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.querySelectorAll(".star-rating:not(.star-rating--readonly)").forEach((rating) => {
      const stars = rating.querySelectorAll(".star");
      stars.forEach((star) => {
        star.addEventListener("click", () => {
          const value = parseInt(star.dataset.value);
          stars.forEach((s, idx) => {
            if (idx < value) {
              s.classList.add("star--active");
            } else {
              s.classList.remove("star--active");
            }
          });
          rating.dataset.rating = value;
        });

        star.addEventListener("mouseenter", () => {
          const value = parseInt(star.dataset.value);
          stars.forEach((s, idx) => {
            if (idx < value) {
              s.classList.add("star--hover");
            } else {
              s.classList.remove("star--hover");
            }
          });
        });
      });

      rating.addEventListener("mouseleave", () => {
        const activeStars = parseInt(rating.dataset.rating);
        stars.forEach((s, idx) => {
          s.classList.remove("star--hover");
        });
      });
    });
  </script>
</body>
</html>
