<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Pulse Glow Ring</title>
</head>
<body>
  <div class="container">
    <div class="pulse-ring" id="pulseEl">
      <span class="core"></span>
    </div>
    <button class="toggle" id="togglePulse">Toggle Pulse</button>
  </div>
  <script>
    const el = document.querySelector('.pulse-ring');
    document.getElementById('togglePulse').addEventListener('click', () => {
      const current = el.style.getPropertyValue('--pulse').trim() || '0';
      el.style.setProperty('--pulse', current === '1' ? '0' : '1');
    });
  </script>
</body>
</html>
