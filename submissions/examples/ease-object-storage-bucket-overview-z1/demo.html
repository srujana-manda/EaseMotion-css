<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Object Storage Bucket Overview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="bucket-panel">

<h2>Object Storage Buckets</h2>

<div class="bucket healthy">
<div>
<h3>media-assets</h3>
<p>1.8 TB • 4.2M Objects</p>
</div>
<span>Healthy</span>
</div>

<div class="bucket archive">
<div>
<h3>backup-archive</h3>
<p>Lifecycle: Glacier • 8.4 TB</p>
</div>
<span>Archived</span>
</div>

<div class="bucket warning">
<div>
<h3>logs-prod</h3>
<p>92% Capacity Used</p>
</div>
<span>Near Limit</span>
</div>

<div class="bucket private">
<div>
<h3>finance-docs</h3>
<p>Private Access • Versioning On</p>
</div>
<span>Secure</span>
</div>

</section>

</body>
</html>
