<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Dropdown Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-dropdown-container-ag">
        <button class="ease-dropdown-trigger-ag" aria-haspopup="true" aria-expanded="false">
            Options <span>▼</span>
        </button>
        
        <!-- The dropdown menu with the pulse entrance animation -->
        <ul class="ease-pulse-dropdown-ag" role="menu">
            <li role="none"><a href="#1" role="menuitem">Account Settings</a></li>
            <li role="none"><a href="#2" role="menuitem">Billing</a></li>
            <li role="none"><a href="#3" role="menuitem">Logout</a></li>
        </ul>
    </div>
</body>
</html>
