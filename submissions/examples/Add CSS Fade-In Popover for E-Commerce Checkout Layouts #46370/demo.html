<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Fade-In Popover - E-Commerce Checkout</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="checkout-layout">
    <div class="checkout-card">
      <div class="order-header">
        <h2>Order Summary</h2>
        <span class="item-count">3 Items</span>
      </div>
      
      <div class="order-total">
        <span>Total</span>
        <span class="amount">$249.00</span>
      </div>

      <div class="checkout-actions">
        <!-- Popover Container -->
        <div class="popover-container">
          <!-- Button acts as trigger -->
          <button class="promo-trigger" aria-expanded="false" aria-controls="promo-popover">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
              <line x1="7" y1="7" x2="7.01" y2="7"></line>
            </svg>
            Add Promo Code
          </button>
          
          <!-- Popover Content -->
          <div class="popover-wrapper" id="promo-popover" role="dialog" aria-label="Promo Code Entry">
            <div class="popover-content">
              <h3>Have a discount code?</h3>
              <p>Enter your promotional code below to apply it to this order.</p>
              
              <div class="input-group">
                <input type="text" placeholder="e.g. SUMMER24" aria-label="Discount Code" />
                <button type="button" class="apply-btn">Apply</button>
              </div>
            </div>
          </div>
        </div>
        
        <button class="checkout-btn">Complete Purchase</button>
      </div>
      
      <div class="security-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span>Secure 256-bit SSL encryption</span>
      </div>
    </div>
  </div>
</body>
</html>
