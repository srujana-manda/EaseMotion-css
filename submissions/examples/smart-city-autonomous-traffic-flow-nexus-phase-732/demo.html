<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Traffic Nexus — Phase #732</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="nexus-header fade-in">
    <div class="brand">
      <div class="brand-icon">N</div>
      TRAFFIC NEXUS
    </div>
    <div class="nexus-stat">
      <div class="stat-box">
        <span class="stat-val">12,450</span>
        <span class="stat-lbl">Active Vehicles</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" style="color: var(--clr-go); text-shadow: 0 0 10px var(--clr-go)">98.2%</span>
        <span class="stat-lbl">Flow Efficiency</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Traffic Density -->
    <aside class="panel fade-up">
      <div class="panel-title">ROUTE DENSITY</div>
      
      <div class="route-list">
        
        <div class="route-item">
          <div class="r-hdr">
            <span class="r-name">Arterial Route A</span>
            <span class="r-speed">65 km/h</span>
          </div>
          <div class="density-bar"><div class="d-fill"></div></div>
        </div>

        <div class="route-item">
          <div class="r-hdr">
            <span class="r-name">Downtown Grid</span>
            <span class="r-speed slow">24 km/h</span>
          </div>
          <div class="density-bar"><div class="d-fill high"></div></div>
        </div>

        <div class="route-item">
          <div class="r-hdr">
            <span class="r-name">Expressway North</span>
            <span class="r-speed" style="color: var(--clr-transit)">110 km/h</span>
          </div>
          <div class="density-bar"><div class="d-fill med" style="background: var(--clr-transit)"></div></div>
        </div>

      </div>
    </aside>

    <!-- Center: Top-Down City Grid Map -->
    <section class="panel map-panel fade-in delay-1" style="padding: 0; background: transparent; border: none; box-shadow: none;">
      <div class="map-view">
        
        <!-- City Blocks -->
        <div class="city-block cb-1"></div>
        <div class="city-block cb-2"></div>
        <div class="city-block cb-3"></div>
        <div class="city-block cb-4"></div>

        <!-- Central Intersection -->
        <div class="intersection">
          <div class="traffic-light"></div>
        </div>

        <!-- Vehicles -->
        <div class="vehicle v-horiz-1"></div>
        <div class="vehicle v-horiz-2"></div>
        <div class="vehicle v-vert-1"></div>
        <div class="vehicle v-vert-2"></div>

      </div>
    </section>

    <!-- Right Sidebar: Fleet Status -->
    <aside class="panel fade-up delay-2">
      
      <div class="fleet-card">
        <div class="fc-val">8,204</div>
        <div class="fc-lbl">Autonomous Fleet Online</div>
      </div>

      <div class="panel-title">SYSTEM DIAGNOSTICS</div>
      
      <div class="status-grid">
        <div class="sg-item">
          <div class="sg-val">14ms</div>
          <div class="sg-lbl">V2X Latency</div>
        </div>
        <div class="sg-item">
          <div class="sg-val" style="color: var(--clr-go)">0</div>
          <div class="sg-lbl">Incidents</div>
        </div>
        <div class="sg-item">
          <div class="sg-val" style="color: var(--clr-warn)">2.4%</div>
          <div class="sg-lbl">Manual Override</div>
        </div>
        <div class="sg-item">
          <div class="sg-val" style="color: var(--clr-fleet)">Optimum</div>
          <div class="sg-lbl">AI Routing</div>
        </div>
      </div>

    </aside>

  </main>

</body>
</html>
