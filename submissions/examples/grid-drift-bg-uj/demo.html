<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background Grid Drift Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-primary-hover:  #5b52e5;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* ── Hero Container ── */
    .hero-container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 3rem 2rem;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--ease-color-neutral-200);
      border-radius: 1.5rem;
      box-shadow: var(--ease-shadow-lg);
    }

    @media (prefers-color-scheme: light) {
      .hero-container {
        background: rgba(255, 255, 255, 0.6);
      }
    }

    .hero-tag {
      background: rgba(108, 99, 255, 0.1);
      color: var(--ease-color-primary);
      padding: 0.35rem 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 50px;
      border: 1px solid rgba(108, 99, 255, 0.2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.25;
      background: linear-gradient(135deg, #6c63ff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-desc {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .hero-btn {
      background: var(--ease-color-primary);
      color: white;
      border: none;
      padding: 0.85rem 2.25rem;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(108, 99, 255, 0.3);
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .hero-btn:hover {
      background: var(--ease-color-primary-hover);
    }

    .hero-btn:active {
      transform: scale(0.98);
    }

    /* Control Panel */
    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .ctrl-btn {
      background: var(--ease-color-surface);
      color: var(--ease-color-text);
      border: 1px solid var(--ease-color-neutral-200);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .ctrl-btn:hover {
      background: var(--ease-color-neutral-200);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background drift wrapper -->
  <div class="grid-drift-bg-uj" id="gridBg"></div>

  <main class="hero-container">
    <span class="hero-tag">Platform Update</span>
    <h1 class="hero-title">Experience Infinite Grid Drift</h1>
    <p class="hero-desc">
      A beautiful, slow-panning background grid animation that adds depth and ambient motion to your hero segments without affecting website rendering speeds.
    </p>
    <button class="hero-btn">Get Started</button>

    <div class="controls">
      <button class="ctrl-btn" onclick="setSpeed('40s')">Slower</button>
      <button class="ctrl-btn" onclick="setSpeed('10s')">Faster</button>
      <button class="ctrl-btn" onclick="changeColor('#c084fc')">Purple Dots</button>
    </div>
  </main>

  <script>
    function setSpeed(duration) {
      document.getElementById('gridBg').style.setProperty('--grid-drift-duration', duration);
    }

    function changeColor(color) {
      document.getElementById('gridBg').style.setProperty('--grid-dot-color', color);
    }
  </script>

</body>
</html>
