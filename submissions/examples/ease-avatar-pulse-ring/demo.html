<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Pulse Ring — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Avatar Pulse Ring</h1>
  <p class="subtitle">An avatar with pulsing status ring — pure CSS.</p>

  <section class="docs"><h2>Usage</h2><pre><code>&lt;div class=&quot;avatar-ring online&quot;&gt;
  &lt;div class=&quot;avatar-img&quot;&gt;JD&lt;/div&gt;
&lt;/div&gt;</code></pre></section>
</body>
</html>
