<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Motion Studio Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- LEFT PANEL -->
<aside class="panel left">

<h3>Animations</h3>
<div id="list"></div>

<h3>Controls</h3>
<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="resetAnim()">Reset</button>

<hr>

<h3>Export</h3>
<button onclick="exportHTML()">Copy HTML</button>
<button onclick="exportCSS()">Copy CSS</button>

</aside>

<!-- CANVAS -->
<main class="canvas">

<div class="stage">
  <div id="box">Motion</div>
</div>

<input id="scrub" type="range" min="0" max="100" value="0">

</main>

<!-- RIGHT PANEL -->
<aside class="panel right">

<h3>Transform</h3>

<label>X</label>
<input id="x" type="range" min="-200" max="200" value="0">

<label>Y</label>
<input id="y" type="range" min="-200" max="200" value="0">

<label>Scale</label>
<input id="scale" type="range" min="0.5" max="2" step="0.1" value="1">

<label>Rotate</label>
<input id="rotate" type="range" min="0" max="360" value="0">

<label>Opacity</label>
<input id="opacity" type="range" min="0" max="1" step="0.1" value="1">

</aside>

</div>

<script>
/* ================================
   1. ANIMATION REGISTRY (40+)
================================ */

const animations = [
  "fade-in","fade-out",
  "slide-up","slide-down","slide-left","slide-right",
  "zoom-in","zoom-out",
  "rotate-in","rotate-out",
  "flip-x","flip-y",
  "bounce","shake","pulse","wobble",
  "swing","tada","jello","rubber-band",
  "flash","heartbeat","pop","squeeze",
  "expand","shrink","skew","blur-in",
  "blur-out","spin","slow-fade","fast-fade",
  "rise","fall","drift","glide",
  "stretch","compress","elastic","spring"
];

let currentAnim = "fade-in";

/* render list */
const list = document.getElementById("list");

animations.forEach(a=>{
  const b = document.createElement("button");
  b.innerText = a;
  b.onclick = ()=> applyAnim(a);
  list.appendChild(b);
});

/* ================================
   2. TIMELINE ENGINE
================================ */

let playing = false;
let progress = 0;
let interval;

const scrub = document.getElementById("scrub");

function play(){
  playing = true;
  interval = setInterval(()=>{
    if(progress >= 100) progress = 0;
    progress += 1;
    scrub.value = progress;
    applyTimeline(progress);
  },30);
}

function pause(){
  playing = false;
  clearInterval(interval);
}

function resetAnim(){
  progress = 0;
  scrub.value = 0;
  applyTimeline(0);
}

/* scrub control */
scrub.oninput = (e)=>{
  progress = e.target.value;
  applyTimeline(progress);
};

/* ================================
   3. UI + TRANSFORM ENGINE
================================ */

const box = document.getElementById("box");

const x = document.getElementById("x");
const y = document.getElementById("y");
const scale = document.getElementById("scale");
const rotate = document.getElementById("rotate");
const opacity = document.getElementById("opacity");

function updateTransform(){
  box.style.transform =
  `translate(${x.value}px,${y.value}px)
   scale(${scale.value})
   rotate(${rotate.value}deg)`;

  box.style.opacity = opacity.value;
}

[x,y,scale,rotate,opacity].forEach(el=>{
  el.oninput = updateTransform;
});

/* ================================
   4. ANIMATION ENGINE
================================ */

function applyAnim(name){
  currentAnim = name;
  box.className = "";
  box.classList.add(name);
}

/* timeline simulation */
function applyTimeline(p){
  const t = p/100;

  box.style.transform =
  `translate(${x.value*t}px,${y.value*t}px)
   scale(${1 + (scale.value-1)*t})
   rotate(${rotate.value*t}deg)`;

  box.style.opacity = 1 - (1-opacity.value)*t;
}

/* ================================
   5. EXPORT ENGINE
================================ */

function exportHTML(){
  const code =
`<div class="${currentAnim}">
  Motion
</div>`;
  navigator.clipboard.writeText(code);
  alert("HTML Copied");
}

function exportCSS(){
  const css =
`.${currentAnim}{
  animation: ${currentAnim} 1s ease;
}`;
  navigator.clipboard.writeText(css);
  alert("CSS Copied");
}

/* init */
updateTransform();

</script>

</body>
</html>
