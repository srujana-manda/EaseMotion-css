<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Ocean Coral Reef Regeneration Monitoring</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="reef-header">
    <h1>AI Ocean Coral Reef Regeneration Monitoring</h1>
    <p>Tracking coral growth, bleaching risk, and reef biodiversity in real time</p>
  </header>

  <main class="reef-grid">

    <section class="panel reef-panel">
      <div class="panel-title">Reef Activity Map</div>
      <div class="reef-map">
        <span class="coral-node node-1"></span>
        <span class="coral-node node-2"></span>
        <span class="coral-node node-3"></span>
        <span class="coral-node node-4"></span>
        <span class="coral-node node-5"></span>
      </div>
    </section>

    <section class="panel health-panel">
      <div class="panel-title">Reef Health Index</div>
      <div class="health-meter">
        <div class="health-fill"></div>
        <span class="health-value">81%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Coral Coverage</span>
        <span class="metric-number">+6.4%</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Water Temp</span>
        <span class="metric-number">27.8°C</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Bleaching Risk</span>
        <span class="metric-number">Low</span>
      </div>
    </section>

  </main>

</body>
</html>
