<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Active Tabs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1>Pulse Active Tabs</h1>

        <div class="tabs" role="tablist">

            <button class="tab active" role="tab">
                Dashboard
            </button>

            <button class="tab" role="tab">
                Analytics
            </button>

            <button class="tab" role="tab">
                Profile
            </button>

            <button class="tab" role="tab">
                Settings
            </button>

        </div>


        <div class="content">
            <h2>Interactive Interface</h2>
            <p>
                CSS only animated pulse-active tabs.
                No JavaScript required.
            </p>
        </div>


    </main>

</body>
</html>
