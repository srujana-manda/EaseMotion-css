<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Group Overlap Deep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Avatar Group Overlap</h1>

    <div class="avatar-group" aria-label="Team Members">

        <img
            src="https://i.pravatar.cc/150?img=1"
            alt="Avatar 1"
            class="avatar">

        <img
            src="https://i.pravatar.cc/150?img=2"
            alt="Avatar 2"
            class="avatar">

        <img
            src="https://i.pravatar.cc/150?img=3"
            alt="Avatar 3"
            class="avatar">

        <img
            src="https://i.pravatar.cc/150?img=4"
            alt="Avatar 4"
            class="avatar">

        <div class="avatar more" aria-label="3 more members">
            +3
        </div>

    </div>

</div>

</body>
</html>
