<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Click Effect - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h2 class="demo-title">Click Anywhere</h2>
    <p class="demo-desc">Click on the element below to see the ripple effect.</p>
    <div class="rce-element" id="rceElement">
      Click Me
      <span class="rce-ripple"></span>
    </div>
  </section>
  <script>
    document.getElementById('rceElement').addEventListener('click', function(e) {
      var rect = this.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var ripple = document.createElement('span');
      ripple.className = 'rce-ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      this.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 700);
    });
  </script>
</body>
</html>
