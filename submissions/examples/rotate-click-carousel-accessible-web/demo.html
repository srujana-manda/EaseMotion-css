<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessible Rotate Click Carousel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="carousel" aria-label="Accessible Carousel">

    <button class="card">
        <span class="icon">♿</span>
        <h2>Accessibility</h2>
        <p>Inclusive interfaces for everyone.</p>
    </button>

    <button class="card">
        <span class="icon">🎯</span>
        <h2>Focus</h2>
        <p>Visible keyboard focus styles.</p>
    </button>

    <button class="card">
        <span class="icon">⚡</span>
        <h2>Performance</h2>
        <p>Pure CSS interaction with no JavaScript.</p>
    </button>

    <button class="card">
        <span class="icon">📱</span>
        <h2>Responsive</h2>
        <p>Works across desktop and mobile devices.</p>
    </button>

</section>

</body>
</html>
