<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Carousel - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="checkout-wrapper">
    <div class="checkout-header">
      <h1 class="checkout-title">Payment Method</h1>
      <p class="checkout-subtitle">Hover or focus a saved card to enter CVV</p>
    </div>

    <!-- Carousel Container -->
    <div class="em-carousel" role="region" aria-label="Saved payment methods">
      
      <!-- Payment Card 1 -->
      <article class="em-flip-card" tabindex="0">
        <div class="em-flip-card-inner">
          
          <!-- Front Face -->
          <div class="em-flip-card-front card-theme-dark">
            <div class="em-card-top">
              <svg class="em-chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
                <line x1="3" y1="10" x2="8" y2="10"></line>
                <line x1="3" y1="14" x2="8" y2="14"></line>
                <line x1="16" y1="10" x2="21" y2="10"></line>
                <line x1="16" y1="14" x2="21" y2="14"></line>
                <line x1="12" y1="5" x2="12" y2="10"></line>
                <line x1="12" y1="14" x2="12" y2="19"></line>
              </svg>
              <div class="em-card-network">Visa</div>
            </div>
            <div class="em-card-number">
              <span>••••</span> <span>••••</span> <span>••••</span> <span>4242</span>
            </div>
            <div class="em-card-bottom">
              <div class="em-card-holder">
                <span class="em-label">Card Holder</span>
                <span class="em-value">John Doe</span>
              </div>
              <div class="em-card-expires">
                <span class="em-label">Expires</span>
                <span class="em-value">12/28</span>
              </div>
            </div>
          </div>
          
          <!-- Back Face -->
          <div class="em-flip-card-back card-theme-dark">
            <div class="em-card-stripe"></div>
            <div class="em-card-cvv-section">
              <span class="em-label">CVV</span>
              <div class="em-cvv-strip">
                <span class="em-cvv-code">•••</span>
              </div>
            </div>
            <div class="em-card-actions">
              <button class="em-btn em-btn-confirm">Confirm Payment</button>
            </div>
          </div>
          
        </div>
      </article>

      <!-- Payment Card 2 -->
      <article class="em-flip-card" tabindex="0">
        <div class="em-flip-card-inner">
          <div class="em-flip-card-front card-theme-blue">
            <div class="em-card-top">
              <svg class="em-chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
                <line x1="3" y1="10" x2="8" y2="10"></line>
                <line x1="3" y1="14" x2="8" y2="14"></line>
                <line x1="16" y1="10" x2="21" y2="10"></line>
                <line x1="16" y1="14" x2="21" y2="14"></line>
                <line x1="12" y1="5" x2="12" y2="10"></line>
                <line x1="12" y1="14" x2="12" y2="19"></line>
              </svg>
              <div class="em-card-network">Mastercard</div>
            </div>
            <div class="em-card-number">
              <span>••••</span> <span>••••</span> <span>••••</span> <span>8823</span>
            </div>
            <div class="em-card-bottom">
              <div class="em-card-holder">
                <span class="em-label">Card Holder</span>
                <span class="em-value">John Doe</span>
              </div>
              <div class="em-card-expires">
                <span class="em-label">Expires</span>
                <span class="em-value">04/26</span>
              </div>
            </div>
          </div>
          
          <div class="em-flip-card-back card-theme-blue">
            <div class="em-card-stripe"></div>
            <div class="em-card-cvv-section">
              <span class="em-label">CVV</span>
              <div class="em-cvv-strip">
                <span class="em-cvv-code">•••</span>
              </div>
            </div>
            <div class="em-card-actions">
              <button class="em-btn em-btn-confirm">Confirm Payment</button>
            </div>
          </div>
        </div>
      </article>

      <!-- Payment Card 3 -->
      <article class="em-flip-card" tabindex="0">
        <div class="em-flip-card-inner">
          <div class="em-flip-card-front card-theme-silver">
            <div class="em-card-top">
              <svg class="em-chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
                <line x1="3" y1="10" x2="8" y2="10"></line>
                <line x1="3" y1="14" x2="8" y2="14"></line>
                <line x1="16" y1="10" x2="21" y2="10"></line>
                <line x1="16" y1="14" x2="21" y2="14"></line>
                <line x1="12" y1="5" x2="12" y2="10"></line>
                <line x1="12" y1="14" x2="12" y2="19"></line>
              </svg>
              <div class="em-card-network">Amex</div>
            </div>
            <div class="em-card-number">
              <span>••••</span> <span>••••••</span> <span>•3009</span>
            </div>
            <div class="em-card-bottom">
              <div class="em-card-holder">
                <span class="em-label">Card Holder</span>
                <span class="em-value">John Doe</span>
              </div>
              <div class="em-card-expires">
                <span class="em-label">Expires</span>
                <span class="em-value">09/27</span>
              </div>
            </div>
          </div>
          
          <div class="em-flip-card-back card-theme-silver">
            <div class="em-card-stripe"></div>
            <div class="em-card-cvv-section" style="justify-content: flex-start; padding-left: 20px;">
              <span class="em-label" style="margin-right: 10px;">CID</span>
              <div class="em-cvv-strip" style="width: 50px;">
                <span class="em-cvv-code">••••</span>
              </div>
            </div>
            <div class="em-card-actions">
              <button class="em-btn em-btn-confirm">Confirm Payment</button>
            </div>
          </div>
        </div>
      </article>

      <!-- Add New Card -->
      <article class="em-flip-card" tabindex="0">
        <div class="em-flip-card-inner" style="box-shadow: none;">
          <div class="em-flip-card-front card-theme-new">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            <span style="margin-top: 1rem; font-weight: 600;">Add New Method</span>
          </div>
        </div>
      </article>

    </div>
  </div>
</body>
</html>
