<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Filter Range</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="em-pfr">
    <h1 class="em-pfr-title">Price Filter Range</h1>
    <p class="em-pfr-desc">Drag the handles to set your min and max price.</p>

    <div class="em-pfr-slider">
      <div class="em-pfr-track"></div>
      <div class="em-pfr-fill" style="--pfr-min: 20%; --pfr-width: 60%;"></div>
      <input type="range" id="pfrMin" class="em-pfr-thumb em-pfr-thumb--min" min="0" max="1000" value="200" step="10" />
      <input type="range" id="pfrMax" class="em-pfr-thumb em-pfr-thumb--max" min="0" max="1000" value="800" step="10" />
    </div>

    <div class="em-pfr-labels">
      <span class="em-pfr-label em-pfr-label--min" id="pfrMinLabel">$200</span>
      <span class="em-pfr-label em-pfr-label--max" id="pfrMaxLabel">$800</span>
    </div>
  </section>

  <script>
    const minEl = document.getElementById('pfrMin');
    const maxEl = document.getElementById('pfrMax');
    const minLabel = document.getElementById('pfrMinLabel');
    const maxLabel = document.getElementById('pfrMaxLabel');
    const fill = document.querySelector('.em-pfr-fill');
    const slider = document.querySelector('.em-pfr-slider');

    function sync() {
      let min = parseFloat(minEl.value);
      let max = parseFloat(maxEl.value);
      if (min > max) {
        [minEl.value, maxEl.value] = [maxEl.value, minEl.value];
        [min, max] = [max, min];
      }
      const total = parseFloat(minEl.max) - parseFloat(minEl.min);
      const minP = ((min - parseFloat(minEl.min)) / total) * 100;
      const maxP = ((max - parseFloat(minEl.min)) / total) * 100;
      slider.style.setProperty('--pfr-min', minP + '%');
      slider.style.setProperty('--pfr-width', (maxP - minP) + '%');
      fill.style.setProperty('--pfr-min', minP + '%');
      fill.style.setProperty('--pfr-width', (maxP - minP) + '%');
      minLabel.textContent = '$' + min;
      maxLabel.textContent = '$' + max;
    }

    minEl.addEventListener('input', sync);
    maxEl.addEventListener('input', sync);
    sync();
  </script>
</body>
</html>
