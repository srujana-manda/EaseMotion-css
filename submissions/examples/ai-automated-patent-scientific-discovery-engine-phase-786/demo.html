<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Automated Patent & Scientific Discovery Engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="patent-header">
    <h1>AI Automated Patent & Scientific Discovery Engine</h1>
    <p>Tracking prior-art scanning, novelty scoring, and discovery pipeline in real time</p>
  </header>

  <main class="patent-grid">

    <section class="panel scan-panel">
      <div class="panel-title">Discovery Map</div>
      <div class="scan-view">
        <span class="scan-ring ring-1"></span>
        <span class="scan-ring ring-2"></span>
        <span class="node-dot dot-1"></span>
        <span class="node-dot dot-2"></span>
        <span class="node-dot dot-3"></span>
      </div>
    </section>

    <section class="panel novelty-panel">
      <div class="panel-title">Novelty Score</div>
      <div class="novelty-meter">
        <div class="novelty-fill"></div>
        <span class="novelty-value">91%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Patents Scanned</span>
        <span class="metric-number">12,480</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Candidates Found</span>
        <span class="metric-number">37</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Overlap Risk</span>
        <span class="metric-number">Low</span>
      </div>
    </section>

  </main>

</body>
</html>
