<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Origami Fold Card - Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="origami-card-tay" style="--fold-direction: top; --fold-count: 2; --perspective: 1200px; --fold-duration: 0.7s; --fold-easing: cubic-bezier(.22,1,.36,1); --shadow-intensity: 0.35;">
    <div class="origami-front-tay">
      <h3>Premium Card</h3>
      <p>Hover to unfold</p>
    </div>

    <div class="origami-panel-tay panel-top-tay"></div>
    <div class="origami-panel-tay panel-bottom-tay"></div>

    <div class="origami-content-tay">
      <h4>Hidden Content</h4>
      <p>Revealed through a staged origami folding animation.</p>
    </div>
  </div>

  <div class="origami-card-tay origami-card-tay--click" style="--fold-direction: left; --fold-count: 2; --shadow-intensity: 0.5;" tabindex="0">
    <div class="origami-front-tay">
      <h3>Click to Unfold</h3>
      <p>Tap / press Enter</p>
    </div>

    <div class="origami-panel-tay panel-left-tay"></div>
    <div class="origami-panel-tay panel-right-tay"></div>

    <div class="origami-content-tay">
      <h4>Team Profile</h4>
      <p>Perfect for portfolios and pricing cards.</p>
    </div>
  </div>

</body>
</html>
