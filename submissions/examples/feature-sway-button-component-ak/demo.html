<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sway Button Demo (feature-sway-button-component-ak)</title>
<link rel="stylesheet" href="style.css" />
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }
  h1 {
    font-size: 1.25rem;
    font-weight: 600;
  }
  .demo-row {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .demo-note {
    font-size: 0.85rem;
    color: #94a3b8;
    max-width: 420px;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>Sway Button — feature-sway-button-component-ak</h1>

  <div class="demo-row" id="root"></div>

  <p class="demo-note">
    Toggle "prefers-reduced-motion: reduce" in your browser/OS settings
    to see the sway animation turn off automatically.
  </p>

  <!-- React + Babel via CDN so this demo runs standalone, no build step -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    function SwayButton({ children, className = "", isLoading = false, ...rest }) {
      return (
        <button
          type="button"
          className={`ease-sway-button-ak ${isLoading ? "ease-sway-button-ak--active" : ""} ${className}`.trim()}
          aria-busy={isLoading || undefined}
          {...rest}
        >
          <span className="ease-sway-button-ak__label">{children}</span>
        </button>
      );
    }

    function Demo() {
      const [loading, setLoading] = useState(false);

      return (
        <>
          <SwayButton onClick={() => alert("Clicked!")}>
            Notify Me
          </SwayButton>

          <SwayButton
            isLoading={loading}
            onClick={() => setLoading((v) => !v)}
          >
            {loading ? "Loading..." : "Toggle Loading State"}
          </SwayButton>

          <SwayButton disabled>Disabled</SwayButton>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
