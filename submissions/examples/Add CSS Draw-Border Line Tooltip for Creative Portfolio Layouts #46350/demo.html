<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Tooltip - Creative Portfolio</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="portfolio-layout">
    <header class="portfolio-header">
      <h1>Selected Works.</h1>
      <p>Hover over the pieces to reveal details.</p>
    </header>
    
    <div class="gallery-grid">
      <!-- Gallery Item 1 with Tooltip -->
      <div class="tooltip-container">
        <button class="gallery-trigger" aria-describedby="tooltip-art-1">
          <img src="https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?auto=format&fit=crop&q=80&w=400&h=400" alt="Abstract painting with vibrant red and blue colors">
          <span class="view-label">View Details</span>
        </button>
        
        <!-- Tooltip Wrapper -->
        <div class="tooltip-wrapper" id="tooltip-art-1" role="tooltip">
          <div class="tooltip-box">
            <!-- Decorative Draw Border SVG -->
            <svg class="tooltip-border-svg" aria-hidden="true" width="100%" height="100%">
              <!-- Sharp corners for creative/editorial aesthetic -->
              <rect x="0" y="0" width="100%" height="100%" rx="0" ry="0" pathLength="100" />
            </svg>
            
            <div class="tooltip-text">
              <span class="art-year">2024</span>
              <strong class="art-title">Chromesthesia</strong>
              <span class="art-medium">Acrylic on Canvas, 48" x 60"</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Gallery Item 2 with Tooltip -->
      <div class="tooltip-container">
        <button class="gallery-trigger" aria-describedby="tooltip-art-2">
          <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&q=80&w=400&h=400" alt="Modern architectural sculpture in concrete">
          <span class="view-label">View Details</span>
        </button>
        
        <!-- Tooltip Wrapper -->
        <div class="tooltip-wrapper" id="tooltip-art-2" role="tooltip">
          <div class="tooltip-box">
            <!-- Decorative Draw Border SVG -->
            <svg class="tooltip-border-svg" aria-hidden="true" width="100%" height="100%">
              <rect x="0" y="0" width="100%" height="100%" rx="0" ry="0" pathLength="100" />
            </svg>
            
            <div class="tooltip-text">
              <span class="art-year">2023</span>
              <strong class="art-title">Brutal Silence</strong>
              <span class="art-medium">Cast Concrete & Steel, Dimensions Variable</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
