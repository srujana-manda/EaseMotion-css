<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Cross Region Replication Health</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Replication Health</h2>

<div class="replication healthy">
<div>
<h3>Primary Region</h3>
<p>Replication Active • Zero Errors</p>
</div>
<span>Healthy</span>
</div>

<div class="replication active">
<div>
<h3>Replication Lag</h3>
<p>Average Delay: 1.4 Seconds</p>
</div>
<span>Stable</span>
</div>

<div class="replication warning">
<div>
<h3>Sync Throughput</h3>
<p>842 MB/min Replicated</p>
</div>
<span>Monitor</span>
</div>

<div class="replication critical">
<div>
<h3>Failover Readiness</h3>
<p>Secondary Validation Pending</p>
</div>
<span>Review</span>
</div>

</section>

</body>
</html>
