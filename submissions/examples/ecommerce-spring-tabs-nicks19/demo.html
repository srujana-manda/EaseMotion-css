<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Physics Tabs Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5e7eb;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .demo-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
        }
        h2 {
            color: #374151;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="demo-wrapper">
        <h2>Checkout Preferences</h2>
        
        <div class="ease-ecom-tabs-container">
            <input type="radio" id="tab1" name="ecom-tabs" checked>
            <input type="radio" id="tab2" name="ecom-tabs">
            <input type="radio" id="tab3" name="ecom-tabs">

            <label for="tab1" class="ease-ecom-tab">Delivery</label>
            <label for="tab2" class="ease-ecom-tab">Pickup</label>
            <label for="tab3" class="ease-ecom-tab">Locker</label>

            <!-- The active background highlight -->
            <div class="ease-ecom-active-indicator"></div>
        </div>
    </div>
</body>
</html>
