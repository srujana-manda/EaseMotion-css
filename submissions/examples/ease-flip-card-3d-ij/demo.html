<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Card 3D - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Hover to Flip</h1>
    <div class="f3d-card">
      <div class="f3d-inner">
        <div class="f3d-front">
          <span class="f3d-icon">&#x2728;</span>
          <p>Front Side</p>
        </div>
        <div class="f3d-back">
          <p>Back Content!</p>
          <span class="f3d-small">3D Flip Effect</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
