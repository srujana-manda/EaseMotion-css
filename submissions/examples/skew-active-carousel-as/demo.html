<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skew Active Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel">

    <input type="radio" name="slider" id="card1" checked>
    <input type="radio" name="slider" id="card2">
    <input type="radio" name="slider" id="card3">

    <div class="cards">

        <label for="card1" class="card">
            <h2>Revenue</h2>
            <p>$24,500</p>
        </label>

        <label for="card2" class="card">
            <h2>Users</h2>
            <p>8,320</p>
        </label>

        <label for="card3" class="card">
            <h2>Orders</h2>
            <p>1,240</p>
        </label>

    </div>

</div>

</body>
</html>
