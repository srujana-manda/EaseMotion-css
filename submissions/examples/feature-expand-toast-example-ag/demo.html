<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expand Toast Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    
    <!-- We wrap it to allow simulating the reappearance for demo purposes -->
    <button id="show-toast-btn-ag" class="btn-ag">Show Toast</button>

    <div id="expand-toast-ag" class="expand-toast-ag" role="alert">
      <div class="toast-content-ag">
        <strong>Success!</strong>
        <p>Your action was completed.</p>
      </div>
      <button id="close-toast-btn-ag" class="close-btn-ag" aria-label="Close Toast">&times;</button>
    </div>

  </div>

  <script>
    const toast = document.getElementById('expand-toast-ag');
    const closeBtn = document.getElementById('close-toast-btn-ag');
    const showBtn = document.getElementById('show-toast-btn-ag');

    closeBtn.addEventListener('click', () => {
      // Add the exit animation class
      toast.classList.add('is-exiting-ag');
      
      // Remove it from flow after animation ends
      toast.addEventListener('animationend', function handleAnimEnd() {
        toast.classList.remove('is-exiting-ag');
        toast.style.display = 'none';
        toast.removeEventListener('animationend', handleAnimEnd);
      });
    });

    showBtn.addEventListener('click', () => {
      toast.style.display = 'flex';
    });
  </script>
</body>
</html>
