<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Zoom Hover Lens (ij)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 1.5rem;
    }

    .page-header { text-align: center; max-width: 540px; }

    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .izl-container {
      width: 600px;
      max-width: 100%;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4);
    }
  </style>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Image Zoom Hover Lens</h1>
    <p>
      Move your cursor over the image to see a magnified circular lens follow along.
    </p>
  </header>

  <div class="izl-container" id="izlContainer">
    <div class="izl-wrapper" id="izlWrapper">
      <img
        src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1200&q=80"
        class="izl-image"
        alt="Landscape"
        id="izlImage"
      />
      <div class="izl-lens" id="izlLens"></div>
    </div>
  </div>

  <script>
    (function () {
      var wrapper = document.getElementById('izlWrapper');
      var lens   = document.getElementById('izlLens');
      var img    = document.getElementById('izlImage');

      if (!wrapper || !lens || !img) return;

      var zoom = 2.5;
      lens.style.backgroundImage = 'url(' + img.src + ')';
      lens.style.backgroundSize = (zoom * 100) + '% auto';

      function calcBgPos(cursor, imgDim, lensDim) {
        var ratio = imgDim / lensDim;
        return -(cursor * ratio - (lensDim / 2)) + 'px';
      }

      function onMove(e) {
        var rect = wrapper.getBoundingClientRect();
        var x = 0;
        var y = 0;

        if (e.touches) {
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = e.clientX - rect.left;
          y = e.clientY - rect.top;
        }

        x = Math.max(0, Math.min(x, rect.width));
        y = Math.max(0, Math.min(y, rect.height));

        wrapper.style.setProperty('--izl-x', x + 'px');
        wrapper.style.setProperty('--izl-y', y + 'px');

        lens.style.setProperty('--izl-x', x + 'px');
        lens.style.setProperty('--izl-y', y + 'px');

        var lw = lens.offsetWidth;
        var lh = lens.offsetHeight;
        lens.style.backgroundPosition =
          calcBgPos(x, rect.width, lw) + ' ' + calcBgPos(y, rect.height, lh);
      }

      function onLeave() {
        lens.style.opacity = '0';
      }

      function onEnter() {
        lens.style.opacity = '1';
      }

      wrapper.addEventListener('mousemove', onMove);
      wrapper.addEventListener('mouseleave', onLeave);
      wrapper.addEventListener('mouseenter', onEnter);

      wrapper.addEventListener('touchmove', onMove, { passive: true });
      wrapper.addEventListener('touchend', onLeave);
    })();
  </script>

</body>
</html>
