<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Fade Slide - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Dropdown Menu</h1>
    <div class="dfs-drop" id="dfsDrop">
      <button class="dfs-toggle">Menu <span class="dfs-arrow"></span></button>
      <div class="dfs-menu" style="--dfs-open: 0;">
        <a class="dfs-item" href="#">Profile</a>
        <a class="dfs-item" href="#">Settings</a>
        <a class="dfs-item" href="#">Help</a>
        <a class="dfs-item" href="#">Sign Out</a>
      </div>
    </div>
  </div>
  <script>
    const toggle = document.querySelector('.dfs-toggle');
    const menu = document.querySelector('.dfs-menu');
    toggle.addEventListener('click', () => {
      const open = menu.style.getPropertyValue('--dfs-open') === '1' ? '0' : '1';
      menu.style.setProperty('--dfs-open', open);
    });
    document.addEventListener('click', (e) => {
      if (!document.getElementById('dfsDrop').contains(e.target)) {
        menu.style.setProperty('--dfs-open', '0');
      }
    });
  </script>
</body>
</html>
