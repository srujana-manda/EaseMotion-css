<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shimmer Text Block Demo (ij)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ease-color-bg:          #0f172a;
      --ease-color-surface:     #1e293b;
      --ease-color-text:        #f8fafc;
      --ease-color-muted:       #64748b;
      --ease-color-neutral-200: #334155;
      --ease-font-sans:         'Inter', system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:         0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:          #f1f5f9;
        --ease-color-surface:     #ffffff;
        --ease-color-text:        #0f172a;
        --ease-color-muted:       #94a3b8;
        --ease-color-neutral-200: #e2e8f0;
        --ease-shadow-lg:         0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .demo-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 600px;
    }

    .demo-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .demo-card p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
  </style>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-card">
    <h1>Shimmer Text Block</h1>
    <p>A placeholder loading pattern that mimics text content with a sweeping shimmer overlay.</p>

    <div class="stb-group">
      <div class="stb-line" style="width: 100%;"></div>
      <div class="stb-line" style="width: 88%;"></div>
      <div class="stb-line" style="width: 92%;"></div>
      <div class="stb-line" style="width: 76%;"></div>
      <div class="stb-line" style="width: 60%;"></div>
      <div class="stb-line" style="width: 95%;"></div>
      <div class="stb-line" style="width: 82%;"></div>
      <div class="stb-line" style="width: 70%;"></div>
      <div class="stb-line" style="width: 55%;"></div>
    </div>
  </div>

</body>
</html>
