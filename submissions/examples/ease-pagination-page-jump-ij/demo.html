<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagination Page Jump - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Pages</h1>
    <div class="ppj-bar" id="ppjBar" style="--ppj-current: 1;">
      <button class="ppj-arrow" id="ppjPrev">&#x276E;</button>
      <button class="ppj-num" data-i="1">1</button>
      <button class="ppj-num" data-i="2">2</button>
      <button class="ppj-num" data-i="3">3</button>
      <button class="ppj-num" data-i="4">4</button>
      <button class="ppj-num" data-i="5">5</button>
      <button class="ppj-arrow" id="ppjNext">&#x276F;</button>
    </div>
    <p class="ppj-info" id="ppjInfo">Page 1 of 5</p>
  </div>
  <script>
    var bar = document.getElementById('ppjBar');
    var info = document.getElementById('ppjInfo');
    var nums = bar.querySelectorAll('.ppj-num');
    function setPage(i) {
      bar.style.setProperty('--ppj-current', i);
      nums.forEach(function(n) { n.classList.toggle('ppj-active', parseInt(n.getAttribute('data-i')) === i); });
      info.textContent = 'Page ' + i + ' of 5';
    }
    nums.forEach(function(n) { n.addEventListener('click', function() { setPage(parseInt(this.getAttribute('data-i'))); }); });
    document.getElementById('ppjPrev').addEventListener('click', function() {
      var cur = parseInt(bar.style.getPropertyValue('--ppj-current')) || 1;
      if (cur > 1) setPage(cur - 1);
    });
    document.getElementById('ppjNext').addEventListener('click', function() {
      var cur = parseInt(bar.style.getPropertyValue('--ppj-current')) || 1;
      if (cur < 5) setPage(cur + 1);
    });
  </script>
</body>
</html>
