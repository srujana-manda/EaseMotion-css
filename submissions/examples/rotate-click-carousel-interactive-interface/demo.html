<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotate-Click Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="carousel" tabindex="0" aria-label="Interactive Interface Carousel">

  <article class="card" tabindex="0">
    <div class="icon">💡</div>
    <h3>Ideas</h3>
    <p>Capture and organize creative thoughts.</p>
  </article>

  <article class="card" tabindex="0">
    <div class="icon">📊</div>
    <h3>Analytics</h3>
    <p>Monitor performance with live insights.</p>
  </article>

  <article class="card" tabindex="0">
    <div class="icon">⚡</div>
    <h3>Automation</h3>
    <p>Automate repetitive tasks effortlessly.</p>
  </article>

  <article class="card" tabindex="0">
    <div class="icon">🔒</div>
    <h3>Security</h3>
    <p>Protect your data with secure access.</p>
  </article>

</section>

</body>
</html>
