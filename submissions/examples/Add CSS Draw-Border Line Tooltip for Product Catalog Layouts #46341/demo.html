<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Tooltip - Product Catalog</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="catalog-layout">
    <div class="product-grid">
      <!-- Product Card -->
      <article class="product-card">
        <div class="product-image">
          <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&q=80&w=400&h=500" alt="Minimalist Cotton T-Shirt in Grey">
          <span class="badge new">New Arrival</span>
        </div>
        
        <div class="product-details">
          <div class="product-header">
            <h3 class="product-title">Essential Cotton Tee</h3>
            <span class="product-price">$35.00</span>
          </div>
          
          <div class="product-meta">
            <!-- Tooltip Trigger inside product meta -->
            <span class="feature-tag">
              Organic Cotton
              <span class="tooltip-container">
                <button class="info-trigger" aria-expanded="false" aria-describedby="tooltip-catalog-1" aria-label="More info about organic cotton">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                  </svg>
                </button>
                
                <!-- Tooltip Wrapper -->
                <span class="tooltip-wrapper" id="tooltip-catalog-1" role="tooltip">
                  <span class="tooltip-box">
                    <!-- SVG for the draw-border effect -->
                    <svg class="tooltip-border-svg" aria-hidden="true" width="100%" height="100%">
                      <rect x="0" y="0" width="100%" height="100%" rx="4" ry="4" pathLength="100" />
                    </svg>
                    
                    <span class="tooltip-text">
                      <strong>100% GOTS Certified</strong><br>
                      Sourced from sustainable farms with no synthetic pesticides, ensuring a softer feel and lower environmental impact.
                    </span>
                  </span>
                </span>
              </span>
            </span>
          </div>
          
          <button class="add-to-cart">Add to Bag</button>
        </div>
      </article>
      
      <!-- Product Card 2 (Just for visual layout) -->
      <article class="product-card">
        <div class="product-image">
          <img src="https://images.unsplash.com/photo-1572495641004-28421ae52e52?auto=format&fit=crop&q=80&w=400&h=500" alt="Minimalist Linen Shirt in White">
        </div>
        <div class="product-details">
          <div class="product-header">
            <h3 class="product-title">Breeze Linen Shirt</h3>
            <span class="product-price">$65.00</span>
          </div>
          <div class="product-meta">
            <span class="feature-tag">Breathable</span>
          </div>
          <button class="add-to-cart">Add to Bag</button>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
