<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiggle Toggle Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-ag">
        <h2>Enable Notifications</h2>
        
        <label class="toggle-wrapper-ag">
            <input type="checkbox" class="toggle-checkbox-ag" aria-label="Toggle notifications">
            <div class="toggle-switch-ag ease-wiggle-target-ag">
                <div class="toggle-knob-ag"></div>
            </div>
            <span class="toggle-label-ag">Receive alerts when updates occur.</span>
        </label>
        
    </div>
</body>
</html>
