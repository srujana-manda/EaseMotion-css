<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blur Entrance Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="carousel" aria-label="Product Catalog Carousel">

  <input type="radio" name="carousel" id="slide1" checked>
  <input type="radio" name="carousel" id="slide2">
  <input type="radio" name="carousel" id="slide3">

  <div class="slides">

    <article class="card card1">
      <h2>Wireless Headphones</h2>
      <p>Premium sound with active noise cancellation.</p>
    </article>

    <article class="card card2">
      <h2>Smart Watch</h2>
      <p>Fitness tracking with seamless connectivity.</p>
    </article>

    <article class="card card3">
      <h2>Mechanical Keyboard</h2>
      <p>Comfortable typing experience for work and gaming.</p>
    </article>

  </div>

  <div class="controls">
    <label for="slide1"></label>
    <label for="slide2"></label>
    <label for="slide3"></label>
  </div>

</div>

</body>
</html>
