<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-toast-stack-bottom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tst-container">
    <button class="tst-add-btn" onclick="addToast()">Add Toast</button>
    <div class="tst-stack" id="tst-stack"></div>
  </div>
  <script>
    const messages = ['Saved successfully', 'Connection lost', 'New message received', 'Upload complete', 'Settings updated'];
    const types = ['default', 'success', 'error', 'warning', 'info'];
    function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function addToast() {
      const stack = document.getElementById('tst-stack');
      const toast = document.createElement('div');
      toast.className = 'tst-toast';
      toast.style.setProperty('--i', stack.children.length);
      const type = random(types);
      if (type === 'success') toast.classList.add('tst-toast--success');
      else if (type === 'error') toast.classList.add('tst-toast--error');
      else if (type === 'warning') toast.classList.add('tst-toast--warning');
      else if (type === 'info') toast.classList.add('tst-toast--info');
      toast.innerHTML = `<span class="tst-text">${random(messages)}</span><button class="tst-dismiss" onclick="this.parentElement.remove()">&times;</button>`;
      stack.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(20px)'; setTimeout(() => toast.remove(), 400); }, 4000);
    }
  </script>
</body>
</html>
