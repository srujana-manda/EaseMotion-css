<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Feature Rollout Progress Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Feature Rollout Progress</h2>

<div class="rollout healthy">
<div>
<h3>Dark Mode v2</h3>
<p>Rollout: 100% Users</p>
</div>
<span>Complete</span>
</div>

<div class="rollout active">
<div>
<h3>New Checkout</h3>
<p>Deployment Ring: 50%</p>
</div>
<span>Rolling</span>
</div>

<div class="rollout warning">
<div>
<h3>Recommendation Engine</h3>
<p>Error Rate Increased</p>
</div>
<span>Observe</span>
</div>

<div class="rollout critical">
<div>
<h3>Search Experience</h3>
<p>Rollback Recommended</p>
</div>
<span>Action</span>
</div>

</section>

</body>
</html>
