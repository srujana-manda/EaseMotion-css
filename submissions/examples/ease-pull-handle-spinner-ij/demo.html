<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pull Handle Spinner - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phs-wrap">
    <div class="phs-pull-area" id="phsArea">
      <div class="phs-spinner" id="phsSpinner" style="--pull-progress: 0;">
        <svg viewBox="0 0 40 40" class="phs-svg">
          <circle cx="20" cy="20" r="16" class="phs-ring" />
        </svg>
      </div>
      <div class="phs-content" id="phsContent">
        <div class="phs-card">Dashboard</div>
        <div class="phs-card">Analytics</div>
        <div class="phs-card">Reports</div>
      </div>
    </div>
  </div>
  <script>
    const area = document.getElementById('phsArea');
    const spinner = document.getElementById('phsSpinner');
    const THRESHOLD = 80;
    let pulling = false, startY = 0;

    area.addEventListener('mousedown', function(e) { pulling = true; startY = e.clientY; });
    area.addEventListener('touchstart', function(e) { pulling = true; startY = e.touches[0].clientY; }, {passive: true});
    document.addEventListener('mousemove', function(e) { if (!pulling) return; movePull(e.clientY); });
    document.addEventListener('touchmove', function(e) { if (!pulling) return; movePull(e.touches[0].clientY); }, {passive: false});
    document.addEventListener('mouseup', endPull);
    document.addEventListener('touchend', endPull);

    function movePull(y) {
      var dist = Math.max(0, y - startY);
      var progress = Math.min(dist / THRESHOLD, 1);
      spinner.style.setProperty('--pull-progress', progress);
    }

    function endPull() {
      if (!pulling) return;
      pulling = false;
      var progress = parseFloat(spinner.style.getPropertyValue('--pull-progress')) || 0;
      if (progress >= 1) {
        spinner.classList.add('phs-refresh');
        setTimeout(function() {
          spinner.classList.remove('phs-refresh');
          spinner.style.setProperty('--pull-progress', '0');
        }, 1200);
      } else {
        spinner.style.setProperty('--pull-progress', '0');
      }
    }
  </script>
</body>
</html>
