          <div class="crystal outer-crystal oc4">

    <div class="controls">
      <label>
        Energy Flow
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Crystal Glow
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset</button>
    </div>
  </div>

  <script>
    (function() {
      const crystals = document.querySelectorAll('.crystal');
      const outerCrystals = document.querySelectorAll('.outer-crystal');
      const centerCrystal = document.querySelector('.center-crystal');
      const energyLines = document.querySelectorAll('.energy-line');
      const energyParticles = document.querySelectorAll('.energy-particle');
      const crystalGlows = document.querySelectorAll('.crystal-glow');

      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let animationFrame = null;
      let lastTimestamp = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Crystal pulse
        centerCrystal.querySelector('.crystal-pulse').style.setProperty('--pulse-duration', (2 / speedMultiplier) + 's');

        // Outer crystals
        outerCrystals.forEach((crystal, i) => {
          const duration = (1.5 + i * 0.08) / speedMultiplier;
          crystal.style.setProperty('--crystal-duration', duration + 's');
          crystal.style.setProperty('--crystal-delay', ((i * 0.05) / speedMultiplier) + 's');
        });

        // Energy lines
        energyLines.forEach((line, i) => {
          const duration = (1.2 + i * 0.05) / speedMultiplier;
          line.style.setProperty('--line-duration', duration + 's');
          line.style.setProperty('--line-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Energy particles
        energyParticles.forEach((p, i) => {
          const duration = (2.5 + (i % 4) * 0.3) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Crystal glows
        crystalGlows.forEach((glow) => {
          glow.style.setProperty('--glow-duration', (1.8 / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Center crystal glow
        const centerGlow = centerCrystal.querySelector('.crystal-glow');
        if (centerGlow) {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          centerGlow.style.setProperty('--glow-intensity', opacity);
          const size = 80 * intensityMultiplier;
          centerGlow.style.setProperty('--glow-size', size + 'px');
        }

        // Outer crystal glows
        outerCrystals.forEach((crystal) => {
          const glow = crystal.querySelector('.crystal-glow');
          if (glow) {
            const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
            glow.style.setProperty('--glow-intensity', opacity);
            const size = 40 * intensityMultiplier;
            glow.style.setProperty('--glow-size', size + 'px');
          }
        });

        // Energy lines
        energyLines.forEach((line) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          line.style.setProperty('--line-intensity', opacity);
        });

        // Energy particles
        energyParticles.forEach((p) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          p.style.setProperty('--particle-intensity', opacity);
          const size = 2 * intensityMultiplier;
          p.style.setProperty('--particle-size', size + 'px');
        });
      }

      // ----- Update grid -----
      function updateGrid(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Update energy particle positions
        energyParticles.forEach((p, i) => {
          const angle = timestamp / (3000 + i * 200) + i * 0.7;
          const radius = 60 + i * 8;
          const x = Math.cos(angle + i) * radius;
          const y = Math.sin(angle * 0.6 + i * 0.3) * radius * 0.5;
          p.style.setProperty('--p-x', x + 'px');
          p.style.setProperty('--p-y', y + 'px');
        });

        // Center crystal rotation
        const rotation = timestamp / 8000;
        centerCrystal.style.transform = `translate(-50%, -50%) rotate(${rotation}deg) scale(${1 + Math.sin(timestamp / 3000) * 0.02})`;
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        updateGrid(timestamp);

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Reset -----
      function resetGrid() {
        lastTimestamp = 0;
        centerCrystal.style.transform = 'translate(-50%, -50%) rotate(0deg) scale(1)';
        energyParticles.forEach(p => {
          p.style.setProperty('--p-x', '0px');
          p.style.setProperty('--p-y', '0px');
        });
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetGrid);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
