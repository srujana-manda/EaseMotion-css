<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Card Effects Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f; /* Dark background to show off effects */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { color: white; margin-top: 50px; }
        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 50px;
        }
        .card-wrapper { text-align: center; color: #888; }
        h3 { margin-top: 15px; font-weight: 400; }
        
        /* Special background for glassmorphism demo */
        .glass-bg-demo {
            background: url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            padding: 100px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>Card Hover Effects</h1>

    <div class="container">
        <!-- Glassmorphism Card -->
        <div class="card-wrapper">
            <div class="glass-bg-demo">
                <div class="em-card-glass">
                    <h2>Glass</h2>
                    <p>Modern Backdrop Blur</p>
                </div>
            </div>
            <h3>Glassmorphism</h3>
        </div>

        <!-- 3D Card -->
        <div class="card-wrapper">
            <div class="em-card-3d">
                <div class="em-card-3d-inner">
                    <h2 style="color: #764ba2;">3D Tilt</h2>
                    <p style="color: #333;">Perspective Shift</p>
                </div>
            </div>
            <h3>3D Perspective</h3>
        </div>

        <!-- Neon Card -->
        <div class="card-wrapper">
            <div class="em-card-neon">
                <h2>Neon</h2>
                <p>Cyberpunk Glow</p>
            </div>
            <h3>Neon Glow</h3>
        </div>
    </div>

</body>
</html>
