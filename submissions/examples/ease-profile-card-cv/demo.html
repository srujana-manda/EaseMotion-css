<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Animated Profile Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="profile-card">

<div class="avatar">
<img src="https://via.placeholder.com/140" alt="Profile Avatar">
</div>

<h2>Alex Johnson</h2>

<p class="role">Frontend Developer</p>

<p class="bio">
Passionate about creating modern, responsive, and animation-first web experiences.
</p>

<div class="stats">
<div>
<h3>128</h3>
<span>Projects</span>
</div>

<div>
<h3>15K</h3>
<span>Followers</span>
</div>

<div>
<h3>4.9★</h3>
<span>Rating</span>
</div>
</div>

<div class="actions">
<a href="#" class="btn primary">Follow</a>
<a href="#" class="btn secondary">Message</a>
</div>

</div>

</div>

</body>
</html>
