<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Certificate Renewal Calendar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="calendar-card">

<h2>Certificate Renewals</h2>

<div class="entry">
<div>
<h3>api.example.com</h3>
<p>Expires in 5 days</p>
</div>
<span class="urgent">Urgent</span>
</div>

<div class="entry">
<div>
<h3>cdn.example.com</h3>
<p>Expires in 18 days</p>
</div>
<span class="warning">Soon</span>
</div>

<div class="entry">
<div>
<h3>mail.example.com</h3>
<p>Expires in 42 days</p>
</div>
<span class="safe">Healthy</span>
</div>

<div class="entry">
<div>
<h3>auth.example.com</h3>
<p>Expires in 76 days</p>
</div>
<span class="safe">Healthy</span>
</div>

</section>

</body>
</html>
