<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Profile Card - EaseMotion CSS</title>
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- EaseMotion CSS CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles for this demo -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-center ease-fade-in">
  
  <div class="glass-card ease-hover-lift ease-fade-in ease-delay-200">
    <div class="card-header ease-slide-up ease-delay-300">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Profile Avatar" class="avatar ease-hover-grow" />
    </div>
    
    <div class="card-body ease-slide-up ease-delay-400">
      <h2 class="ease-text-primary">Alex Morgan</h2>
      <p class="ease-text-muted">Frontend Developer & UI Enthusiast</p>
      <p class="ease-text-secondary">Building beautiful, accessible, and performant web experiences with modern CSS.</p>
    </div>
    
    <div class="card-footer ease-slide-up ease-delay-500">
      <button class="ease-btn ease-btn-primary ease-hover-glow">Follow</button>
      <button class="ease-btn ease-btn-secondary ease-hover-morph-card">Message</button>
    </div>
  </div>

</body>
</html>
