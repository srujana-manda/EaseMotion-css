<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EaseMotion - Progress Bars Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Animated Progress Bars</h1>
  <section>
    <h2>1. Horizontal Progress Bar</h2>
    <div class="progress-container">
      <div class="progress-bar" data-progress="70%">70%</div>
    </div>
  </section>
  <section>
    <h2>2. Striped Progress Bar</h2>
    <div class="progress-container striped">
      <div class="progress-bar striped" data-progress="85%">85%</div>
    </div>
  </section>
  <section>
    <h2>3. Multi-colored Progress Bar</h2>
    <div class="progress-container multicolor">
      <div class="progress-bar multi" data-progress="60%">60%</div>
    </div>
  </section>
</body>
</html>
