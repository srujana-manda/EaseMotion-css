<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Timeline Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Timeline Cards</h1>

<div class="timeline">

<div class="card">
    <div class="dot"></div>
    <div class="content">
        <span class="date">Jan 2026</span>
        <h2>Project Started</h2>
        <p>Initial planning, wireframes, and project setup completed.</p>
    </div>
</div>

<div class="card">
    <div class="dot"></div>
    <div class="content">
        <span class="date">Mar 2026</span>
        <h2>Development</h2>
        <p>Core components and animations implemented.</p>
    </div>
</div>

<div class="card">
    <div class="dot"></div>
    <div class="content">
        <span class="date">Jun 2026</span>
        <h2>Launch</h2>
        <p>Released the project with responsive UI and smooth animations.</p>
    </div>
</div>

</div>

</div>

</body>
</html>
