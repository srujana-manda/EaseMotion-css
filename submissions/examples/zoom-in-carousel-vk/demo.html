<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom-In Carousel Example</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="checkout-carousel-vk">

        <h1 class="carousel-title-vk">
            Recommended for You
        </h1>

        <section
            class="carousel-track-vk"
            aria-label="Product recommendations">

            <article
                class="carousel-card-vk"
                tabindex="0"
                aria-label="Wireless Headphones">

                <div class="product-image-vk" aria-hidden="true">
                    🎧
                </div>

                <h2>Wireless Headphones</h2>

                <p class="product-price-vk">
                    $89
                </p>

            </article>

            <article
                class="carousel-card-vk"
                tabindex="0"
                aria-label="Smart Watch">

                <div class="product-image-vk" aria-hidden="true">
                    ⌚
                </div>

                <h2>Smart Watch</h2>

                <p class="product-price-vk">
                    $149
                </p>

            </article>

            <article
                class="carousel-card-vk"
                tabindex="0"
                aria-label="Running Shoes">

                <div class="product-image-vk" aria-hidden="true">
                    👟
                </div>

                <h2>Running Shoes</h2>

                <p class="product-price-vk">
                    $109
                </p>

            </article>

            <article
                class="carousel-card-vk"
                tabindex="0"
                aria-label="Travel Backpack">

                <div class="product-image-vk" aria-hidden="true">
                    🎒
                </div>

                <h2>Travel Backpack</h2>

                <p class="product-price-vk">
                    $75
                </p>

            </article>

        </section>

    </main>

</body>

</html>
