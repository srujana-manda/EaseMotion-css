<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Navigation - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Dot Navigation</h1>
    <p class="desc">Click dot to navigate. Active dot scales up.</p>
    <div class="dn-slider" id="dnSlider">
      <div class="dn-slide" style="--dn-bg: #e94560;">Slide 1</div>
      <div class="dn-slide" style="--dn-bg: #fbbf24;">Slide 2</div>
      <div class="dn-slide" style="--dn-bg: #34d399;">Slide 3</div>
      <div class="dn-slide" style="--dn-bg: #60a5fa;">Slide 4</div>
      <div class="dn-slide" style="--dn-bg: #a78bfa;">Slide 5</div>
    </div>
    <div class="dn-dots" id="dnDots">
      <button class="dn-dot" data-i="0"></button>
      <button class="dn-dot" data-i="1"></button>
      <button class="dn-dot" data-i="2"></button>
      <button class="dn-dot" data-i="3"></button>
      <button class="dn-dot" data-i="4"></button>
    </div>
  </div>
  <script>
    const slider = document.getElementById('dnSlider');
    const dots = document.querySelectorAll('.dn-dot');
    let current = 0;

    function goTo(i) {
      current = i;
      slider.style.setProperty('--dn-current', i);
      dots.forEach((d, idx) => d.classList.toggle('dn-active', idx === i));
    }

    dots.forEach(d => d.addEventListener('click', () => goTo(parseInt(d.getAttribute('data-i')))));
    goTo(0);
  </script>
</body>
</html>
