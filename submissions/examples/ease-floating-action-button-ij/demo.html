<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Action Button Demo (ij)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ease-color-bg: #0f172a;
      --ease-color-surface: #1e293b;
      --ease-color-text: #f8fafc;
      --ease-color-muted: #64748b;
      --ease-color-neutral-200: #334155;
      --ease-font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg: #f8fafc;
        --ease-color-surface: #ffffff;
        --ease-color-text: #0f172a;
        --ease-color-muted: #94a3b8;
        --ease-color-neutral-200: #e2e8f0;
      }
    }
    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .page-header { text-align: center; max-width: 600px; margin-bottom: 3rem; }
    .page-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .page-header p { color: var(--ease-color-muted); font-size: 0.95rem; line-height: 1.6; }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <h1>Floating Action Button</h1>
    <p>
      A sticky speed-dial FAB that fans out action items with staggered transitions.
      Click the main button to toggle the menu.
    </p>
  </header>

  <div class="fab-container">
    <button class="fab-button" id="fabToggle" aria-label="Toggle menu">
      <svg class="fab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line class="icon-line-top" x1="12" y1="5" x2="12" y2="19" />
        <line class="icon-line-bottom" x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </button>

    <ul class="fab-dial">
      <li class="fab-item" style="--i:1">
        <span class="fab-label">Edit</span>
        <button class="fab-btn" aria-label="Edit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </li>
      <li class="fab-item" style="--i:2">
        <span class="fab-label">Share</span>
        <button class="fab-btn" aria-label="Share">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </li>
      <li class="fab-item" style="--i:3">
        <span class="fab-label">Delete</span>
        <button class="fab-btn" aria-label="Delete">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </li>
      <li class="fab-item" style="--i:4">
        <span class="fab-label">Add</span>
        <button class="fab-btn" aria-label="Add">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
      </li>
    </ul>
  </div>

  <script>
    (function() {
      var toggle = document.getElementById('fabToggle');
      var container = toggle.closest('.fab-container');
      toggle.addEventListener('click', function() {
        container.classList.toggle('fab-open');
      });
    })();
  </script>
</body>
</html>
