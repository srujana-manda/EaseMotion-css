<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Gaming Suite — Phase #760</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hud-container">
    
    <!-- Header -->
    <header class="header fade-in">
      <div class="player-info">
        <div class="level-badge">42</div>
        <div>
          <div class="player-name glitch" data-text="CYBER_NINJA">CYBER_NINJA</div>
          <div class="player-title">Elite Operative</div>
        </div>
      </div>
      <div class="glitch" data-text="SYS.ONLINE" style="font-size: 1.2rem; color: var(--clr-pink);">SYS.ONLINE</div>
    </header>

    <!-- Sidebar Left: Stats -->
    <aside class="sidebar-left">
      <div class="panel slide-in-left delay-1">
        <div class="panel-title">Vitals</div>
        
        <div class="stat-row">
          <div class="stat-label"><span>HP</span><span>850/1000</span></div>
          <div class="stat-bar"><div class="stat-fill hp" style="width: 85%;"></div></div>
        </div>
        
        <div class="stat-row">
          <div class="stat-label"><span>MP</span><span>320/500</span></div>
          <div class="stat-bar"><div class="stat-fill mp" style="width: 64%;"></div></div>
        </div>
        
        <div class="stat-row">
          <div class="stat-label"><span>STAMINA</span><span>90%</span></div>
          <div class="stat-bar"><div class="stat-fill st" style="width: 90%;"></div></div>
        </div>
      </div>

      <div class="panel slide-in-left delay-2">
        <div class="panel-title">Equipped</div>
        <div class="inventory-grid">
          <div class="inv-slot" style="grid-column: span 3; color: var(--clr-pink);">⚔️</div>
          <div class="inv-slot">🛡️</div>
          <div class="inv-slot">🧪</div>
          <div class="inv-slot">🔋</div>
        </div>
      </div>
    </aside>

    <!-- Main View: Hologram -->
    <main class="main-view fade-in delay-1">
      
      <div class="holo-base"></div>
      
      <div class="holo-avatar">
        <div class="holo-scanline"></div>
        <div class="holo-model">👤</div>
      </div>

    </main>

    <!-- Sidebar Right: Quests -->
    <aside class="sidebar-right">
      <div class="panel slide-in-right delay-1" style="flex: 1;">
        <div class="panel-title">Mission Log</div>
        
        <div class="quest-item active">
          <div style="font-weight: 700; color: var(--clr-cyan);">MAIN: Infiltrate Core</div>
          <div style="font-size: 0.85rem; color: var(--clr-white); margin-top: 0.25rem;">Bypass the mainframe firewall and extract the data cube.</div>
        </div>

        <div class="quest-item">
          <div style="font-weight: 700; color: var(--clr-pink);">SIDE: Collect Scrap</div>
          <div style="font-size: 0.85rem; color: var(--clr-white); margin-top: 0.25rem;">Find 5 titanium scraps in Sector 4. (2/5)</div>
        </div>

        <div class="quest-item">
          <div style="font-weight: 700; color: var(--clr-purple);">DAILY: Cyber Arena</div>
          <div style="font-size: 0.85rem; color: var(--clr-white); margin-top: 0.25rem;">Defeat 10 rogue drones.</div>
        </div>
      </div>
    </aside>

    <!-- Footer / Navigation -->
    <footer class="footer fade-in delay-2">
      <button class="nav-btn">Map</button>
      <button class="nav-btn">Inventory</button>
      <button class="nav-btn">Skills</button>
      <button class="nav-btn">Settings</button>
    </footer>

  </div>

</body>
</html>
