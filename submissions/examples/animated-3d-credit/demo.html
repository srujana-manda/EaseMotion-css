<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Credit Card — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <p class="demo-title">Hover the card for a 3D tilt + lighting sheen (pure CSS)</p>

    <!--
      .card-scene provides the perspective; .credit-card itself does
      the 3D rotation on hover. Keeping them separate avoids clipping
      the card's shadow/glow when it tilts.
    -->
    <div class="card-scene">
      <div class="credit-card">
        <div class="card-chip"></div>
        <p class="card-number">•••• •••• •••• 4821</p>

        <div class="card-footer">
          <div>
            <p class="card-label">Card Holder</p>
            <p class="card-holder">Alex Morgan</p>
          </div>
          <div>
            <p class="card-label">Expires</p>
            <p class="card-expiry">09/29</p>
          </div>
          <div class="card-brand">VISA</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
