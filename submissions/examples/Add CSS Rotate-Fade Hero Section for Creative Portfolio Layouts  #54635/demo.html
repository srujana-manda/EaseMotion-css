<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotate-Fade Hero Section</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <section class="hero-section" aria-label="Welcome">
    
    <!-- Animated Abstract Background -->
    <div class="bg-visuals" aria-hidden="true">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
    </div>

    <!-- Hero Content with Staggered Rotate-Fade Entrances -->
    <div class="hero-content">
      <div class="hero-badge rotate-fade-enter delay-1">Creative Studio</div>
      
      <h1 class="hero-title rotate-fade-enter delay-2">
        Designing the future <br><span>one pixel at a time.</span>
      </h1>
      
      <p class="hero-description rotate-fade-enter delay-3">
        We are an independent creative agency specializing in immersive digital experiences, bold branding, and cutting-edge web design.
      </p>
      
      <div class="hero-actions rotate-fade-enter delay-4">
        <a href="#projects" class="btn btn-primary">View Projects</a>
        <a href="#contact" class="btn btn-outline">Start a Vision</a>
      </div>
    </div>

  </section>

</body>
</html>
