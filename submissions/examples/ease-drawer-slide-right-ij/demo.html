<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-drawer-slide-right</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dsr-container">
    <button class="dsr-open-btn" onclick="openDrawer()">Open Drawer</button>
    <div class="dsr-overlay" id="dsr-overlay" style="--open: 0">
      <div class="dsr-drawer">
        <div class="dsr-header">
          <h2 class="dsr-title">Drawer Panel</h2>
          <button class="dsr-close" onclick="closeDrawer()">&times;</button>
        </div>
        <div class="dsr-body">
          <p>This drawer slides in from the right edge.</p>
          <p>The overlay backdrop fades in behind it.</p>
        </div>
        <div class="dsr-footer">
          <button class="dsr-btn dsr-btn-secondary" onclick="closeDrawer()">Cancel</button>
          <button class="dsr-btn dsr-btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    function openDrawer() { document.getElementById('dsr-overlay').style.setProperty('--open', 1); }
    function closeDrawer() { document.getElementById('dsr-overlay').style.setProperty('--open', 0); }
    document.getElementById('dsr-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDrawer();
    });
  </script>
</body>
</html>
