<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Wave V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Grid Wave V2 🌊</h1>

  <div class="grid" id="grid"></div>

  <p class="ease-slide-up">Hover to trigger circular ripple</p>
</section>

<script>
const grid = document.getElementById("grid");
const rows = 12;
const cols = 12;

for (let i = 0; i < rows * cols; i++) {
  const cell = document.createElement("div");
  cell.classList.add("cell");

  cell.addEventListener("mouseenter", () => triggerWave(i));

  grid.appendChild(cell);
}

function triggerWave(index) {
  const cells = document.querySelectorAll(".cell");

  const centerRow = Math.floor(index / cols);
  const centerCol = index % cols;

  cells.forEach((cell, i) => {
    const row = Math.floor(i / cols);
    const col = i % cols;

    const distance = Math.sqrt(
      Math.pow(row - centerRow, 2) +
      Math.pow(col - centerCol, 2)
    );

    setTimeout(() => {
      cell.classList.add("active");
      setTimeout(() => cell.classList.remove("active"), 500);
    }, distance * 40);
  });
}
</script>

</body>
</html>
