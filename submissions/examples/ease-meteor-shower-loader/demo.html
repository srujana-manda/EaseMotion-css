<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteor Shower Loader - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="demo-section">
    <h2 class="demo-title">Meteor Shower Loader</h2>
    <p class="demo-desc">Cosmic-inspired loading with shooting stars</p>

    <div class="meteor-loader">
      <!-- Star field background -->
      <div class="star-field">
        <span class="star" style="--star-delay: 0s; --star-size: 2px; --star-x: 10%; --star-y: 15%;"></span>
        <span class="star" style="--star-delay: 0.5s; --star-size: 3px; --star-x: 25%; --star-y: 5%;"></span>
        <span class="star" style="--star-delay: 1s; --star-size: 1.5px; --star-x: 40%; --star-y: 25%;"></span>
        <span class="star" style="--star-delay: 1.5s; --star-size: 2.5px; --star-x: 55%; --star-y: 10%;"></span>
        <span class="star" style="--star-delay: 2s; --star-size: 2px; --star-x: 70%; --star-y: 20%;"></span>
        <span class="star" style="--star-delay: 0.3s; --star-size: 3.5px; --star-x: 85%; --star-y: 8%;"></span>
        <span class="star" style="--star-delay: 0.8s; --star-size: 2px; --star-x: 15%; --star-y: 45%;"></span>
        <span class="star" style="--star-delay: 1.3s; --star-size: 3px; --star-x: 35%; --star-y: 55%;"></span>
        <span class="star" style="--star-delay: 1.8s; --star-size: 2.5px; --star-x: 50%; --star-y: 40%;"></span>
        <span class="star" style="--star-delay: 2.2s; --star-size: 2px; --star-x: 65%; --star-y: 60%;"></span>
        <span class="star" style="--star-delay: 0.6s; --star-size: 3.5px; --star-x: 80%; --star-y: 45%;"></span>
        <span class="star" style="--star-delay: 1.1s; --star-size: 2px; --star-x: 92%; --star-y: 35%;"></span>
        <span class="star" style="--star-delay: 1.6s; --star-size: 3px; --star-x: 5%; --star-y: 70%;"></span>
        <span class="star" style="--star-delay: 2.1s; --star-size: 2.5px; --star-x: 20%; --star-y: 80%;"></span>
        <span class="star" style="--star-delay: 0.4s; --star-size: 2px; --star-x: 45%; --star-y: 75%;"></span>
        <span class="star" style="--star-delay: 0.9s; --star-size: 3px; --star-x: 60%; --star-y: 85%;"></span>
        <span class="star" style="--star-delay: 1.4s; --star-size: 2.5px; --star-x: 75%; --star-y: 70%;"></span>
        <span class="star" style="--star-delay: 1.9s; --star-size: 2px; --star-x: 90%; --star-y: 80%;"></span>
      </div>

      <!-- Meteor trails -->
      <div class="meteor-trail" style="--delay: 0s"></div>
      <div class="meteor-trail" style="--delay: 1.2s"></div>
      <div class="meteor-trail" style="--delay: 2.4s"></div>
      <div class="meteor-trail" style="--delay: 3.6s"></div>
      <div class="meteor-trail" style="--delay: 4.8s"></div>
      <div class="meteor-trail" style="--delay: 6s"></div>

      <p class="meteor-label">Loading Universe<span class="meteor-dots">...</span></p>
    </div>
  </section>
</body>
</html>
