<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Network Policy Compliance Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Network Policy Compliance</h2>

<div class="policy healthy">
<div>
<h3>Production Namespace</h3>
<p>42 Policies Applied</p>
</div>
<span>Protected</span>
</div>

<div class="policy active">
<div>
<h3>Blocked Traffic</h3>
<p>1,284 Requests Blocked Today</p>
</div>
<span>Active</span>
</div>

<div class="policy warning">
<div>
<h3>Development Namespace</h3>
<p>6 Workloads Missing Policies</p>
</div>
<span>Review</span>
</div>

<div class="policy critical">
<div>
<h3>Compliance Score</h3>
<p>91% Coverage Across Cluster</p>
</div>
<span>Improve</span>
</div>

</section>

</body>
</html>
