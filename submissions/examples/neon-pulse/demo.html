<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pulse Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Neon Pulse Animation</h1>
        <p class="subtitle">A glowing, pulsating effect for buttons and elements</p>
        
        <div class="demo-section">
            <h2>Button Variants</h2>
            <button class="neon-btn neon-blue">Click Me</button>
            <button class="neon-btn neon-pink">Subscribe</button>
            <button class="neon-btn neon-green">Download</button>
            <button class="neon-btn neon-purple">Sign Up</button>
        </div>

        <div class="demo-section">
            <h2>Card Variant</h2>
            <div class="neon-card">
                <h3>Premium Feature</h3>
                <p>Get access to exclusive content and tools</p>
                <button class="neon-btn neon-blue">Learn More</button>
            </div>
        </div>

        <div class="demo-section">
            <h2>Text Variant</h2>
            <p class="neon-text">Glowing Text Effect</p>
        </div>
    </div>
</body>
</html>
