<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Wave Entrance Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-primary-hover:  #5b52e5;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Title Showcase ── */
    .showcase-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 3.5rem 2.5rem;
      width: 100%;
      max-width: 500px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .wave-heading {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #6c63ff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    /* Make sure spaces don't collapse */
    .wave-heading span.space {
      width: 0.25em;
    }

    .replay-btn {
      background: var(--ease-color-primary);
      color: white;
      border: none;
      padding: 0.8rem;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: background 0.2s ease;
    }

    .replay-btn:hover {
      background: var(--ease-color-primary-hover);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Text Wave Entrance</h1>
    <p>
      An elastic sequential bounce entrance for titles. Click the replay button to trigger the wave again.
    </p>
  </header>

  <main class="showcase-card">

    <!-- Staggered Heading -->
    <h2 class="text-wave-entrance-uj wave-heading" id="waveText">
      <span>W</span><span>e</span><span>l</span><span>c</span><span>o</span><span>m</span><span>e</span>
    </h2>

    <button class="replay-btn" onclick="replayWave()">
      Replay Wave
    </button>

  </main>

  <script>
    function replayWave() {
      const parent = document.getElementById('waveText');
      const spans = Array.from(parent.children);
      
      // Clear contents
      parent.innerHTML = '';
      
      // Re-append elements to trigger reflow and animation
      spans.forEach(span => {
        parent.appendChild(span);
      });
    }
  </script>

</body>
</html>
