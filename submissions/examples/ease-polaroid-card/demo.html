<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polaroid Card · Tilt & Shadow Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>📸 Polaroid Card</h2>
        <p class="sub">tilts and drops shadow like a photo</p>

        <!-- === POLAROID CARD === -->
        <div class="polaroid-container">
            <div class="polaroid-card" id="polaroidCard">
                <div class="polaroid-image-wrapper">
                    <img src="https://picsum.photos/seed/42/300/300" alt="Polaroid photo" class="polaroid-image" />
                    <div class="polaroid-caption">
                        <span>✧ Summer memories ✧</span>
                    </div>
                </div>
                <div class="polaroid-footer">
                    <span><i class="fas fa-map-pin"></i> Beach Day</span>
                    <span><i class="fas fa-calendar-alt"></i> 2024</span>
                </div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover · watch the card tilt and drop a realistic shadow
        </p>
    </div>

    <!-- Embedded JavaScript for tilt effect -->
    <script>
        (function() {
            'use strict';

            const card = document.getElementById('polaroidCard');

            if (card) {
                // Click feedback
                card.addEventListener('click', function(e) {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);
                    console.log('📸 Polaroid clicked!');
                });

                // Keyboard accessibility
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });

                // --- Optional 3D tilt following mouse ---
                const container = card.parentElement;

                container.addEventListener('mousemove', function(e) {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = ((y - centerY) / centerY) * -6;
                    const rotateY = ((x - centerX) / centerX) * 6;

                    card.style.transform =
                        `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                    card.style.transition = 'transform 0.1s ease-out';
                });

                container.addEventListener('mouseleave', function() {
                    card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
                    card.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                });

                // Trigger initial tilt on load for demo
                setTimeout(() => {
                    card.style.transform = 'perspective(800px) rotateX(3deg) rotateY(-3deg) scale(1.02)';
                    setTimeout(() => {
                        card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
                    }, 1500);
                }, 500);
            }

        })();
    </script>

</body>
</html>
