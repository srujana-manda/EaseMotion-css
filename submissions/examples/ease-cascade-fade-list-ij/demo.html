<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascade Fade List | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button onclick="toggleCascade()">Toggle Cascade</button>
    <ul class="list" style="--cascade: 0">
      <li style="--i: 1">Item One</li>
      <li style="--i: 2">Item Two</li>
      <li style="--i: 3">Item Three</li>
      <li style="--i: 4">Item Four</li>
      <li style="--i: 5">Item Five</li>
      <li style="--i: 6">Item Six</li>
    </ul>
  </div>
  <script>
    function toggleCascade() {
      const list = document.querySelector('.list');
      const current = list.style.getPropertyValue('--cascade');
      list.style.setProperty('--cascade', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
