<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Checkout Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="carousel" tabindex="0" aria-label="Checkout Products">

  <article class="card">
    <img src="https://picsum.photos/250/180?1" alt="Wireless Headphones">
    <h3>Wireless Headphones</h3>
    <p>$99.99</p>
    <button>Add to Cart</button>
  </article>

  <article class="card">
    <img src="https://picsum.photos/250/180?2" alt="Smart Watch">
    <h3>Smart Watch</h3>
    <p>$149.99</p>
    <button>Add to Cart</button>
  </article>

  <article class="card">
    <img src="https://picsum.photos/250/180?3" alt="Gaming Mouse">
    <h3>Gaming Mouse</h3>
    <p>$59.99</p>
    <button>Add to Cart</button>
  </article>

</section>

</body>
</html>
