<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Menu Flyout - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="mmf-section">
    <h1>Mega Menu Flyout</h1>
    <p class="mmf-desc">Hover "Services" to see the flyout mega menu</p>
    <nav class="mmf-nav">
      <a href="#" class="mmf-link">Home</a>
      <a href="#" class="mmf-link">About</a>
      <div class="mmf-dropdown" data-mmf>
        <a href="#" class="mmf-link mmf-trigger">Services</a>
        <div class="mmf-menu">
          <div class="mmf-col">
            <h3>Web</h3>
            <a href="#">Design</a>
            <a href="#">Development</a>
            <a href="#">SEO</a>
          </div>
          <div class="mmf-col">
            <h3>Mobile</h3>
            <a href="#">iOS</a>
            <a href="#">Android</a>
            <a href="#">Cross-Platform</a>
          </div>
          <div class="mmf-col">
            <h3>Marketing</h3>
            <a href="#">Social Media</a>
            <a href="#">Email Campaigns</a>
            <a href="#">Analytics</a>
          </div>
        </div>
      </div>
      <a href="#" class="mmf-link">Portfolio</a>
      <a href="#" class="mmf-link">Contact</a>
    </nav>
  </section>
  <script>
    const dropdowns = document.querySelectorAll('[data-mmf]');
    dropdowns.forEach(drop => {
      const trigger = drop.querySelector('.mmf-trigger');
      const menu = drop.querySelector('.mmf-menu');
      if (!trigger || !menu) return;
      trigger.addEventListener('mouseenter', () => drop.classList.add('mmf-open'));
      drop.addEventListener('mouseleave', () => drop.classList.remove('mmf-open'));
      menu.addEventListener('mouseenter', () => drop.classList.add('mmf-open'));
      menu.addEventListener('mouseleave', () => drop.classList.remove('mmf-open'));
    });
  </script>
</body>
</html>
