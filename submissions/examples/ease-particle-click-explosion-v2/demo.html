<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Particle V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Particle V2 💥</h1>
  <p>Click anywhere</p>
</section>

<script>
document.addEventListener("click", (e) => {
  for (let i = 0; i < 25; i++) {
    createParticle(e.clientX, e.clientY);
  }
});

function createParticle(x, y) {
  const p = document.createElement("div");
  p.classList.add("particle");

  document.body.appendChild(p);

  let vx = (Math.random() - 0.5) * 10;
  let vy = (Math.random() - 0.5) * 10;

  let posX = x;
  let posY = y;

  const gravity = 0.4;

  const colors = ["#22c55e","#3b82f6","#ec4899","#facc15"];
  p.style.background = colors[Math.floor(Math.random()*colors.length)];

  function animate() {
    vy += gravity;

    posX += vx;
    posY += vy;

    // bounce
    if (posY > window.innerHeight - 10) {
      vy *= -0.6;
      posY = window.innerHeight - 10;
    }

    p.style.left = posX + "px";
    p.style.top = posY + "px";

    p.style.opacity -= 0.02;
    p.style.transform = "scale(" + p.style.opacity + ")";

    if (p.style.opacity <= 0) {
      p.remove();
    } else {
      requestAnimationFrame(animate);
    }
  }

  p.style.opacity = 1;
  animate();
}
</script>

</body>
</html>
