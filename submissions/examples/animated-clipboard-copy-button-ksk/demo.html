<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Clipboard Copy Button — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background: #060813;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 0.4rem;
      letter-spacing: -0.015em;
    }
    .page-header p {
      color: #475569;
      font-size: 0.88rem;
      margin: 0;
    }
    .theme-toggle-bar {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .theme-btn {
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .theme-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Animated Clipboard Copy Button</h1>
    <p>Click the copy button to copy code to your clipboard with smooth success feedback animation.</p>
  </div>

  <!-- Main Code Block Card -->
  <div class="code-block-card" id="app-card">
    <div class="code-block-header">
      <span class="code-block-title">
        <span>📄</span>
        <span>easemotion-example.css</span>
      </span>

      <!-- Animated Copy Button -->
      <button class="copy-btn" id="copyBtn" aria-label="Copy code to clipboard" tabindex="0">
        <span class="copy-icon-wrap" aria-hidden="true">
          <!-- Clipboard Icon (Idle) -->
          <svg class="icon-clipboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>

          <!-- Checkmark Icon (Copied Active) -->
          <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </span>
        <span class="copy-text-label" id="copyText">Copy Code</span>
      </button>
    </div>

    <!-- Code Snippet Container -->
    <div class="code-container">
      <pre class="code-content" id="codeSnippet">npm install easemotion-css --save
import { easeSpring } from 'easemotion-css';

easeSpring('.button', { scale: 1.1, duration: 400 });</pre>
    </div>

    <!-- Theme Switcher -->
    <div class="theme-toggle-bar">
      <button class="theme-btn" id="themeBtn">Toggle Light / Dark Theme</button>
    </div>
  </div>

  <script>
    // Copy button animation & Clipboard API handler
    const copyBtn = document.getElementById('copyBtn');
    const copyText = document.getElementById('copyText');
    const codeSnippet = document.getElementById('codeSnippet');
    let resetTimer = null;

    copyBtn.addEventListener('click', async () => {
      try {
        // Use Clipboard API to copy text
        await navigator.clipboard.writeText(codeSnippet.innerText.trim());

        // Clear any active reset timer
        if (resetTimer) clearTimeout(resetTimer);

        // Apply active copied animation state
        copyBtn.classList.add('copied');
        copyText.innerText = 'Copied!';

        // Automatically reset after 2.5 seconds
        resetTimer = setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyText.innerText = 'Copy Code';
        }, 2500);

      } catch (err) {
        console.error('Failed to copy text: ', err);
        copyText.innerText = 'Error';
      }
    });

    // Theme toggle handler
    const themeBtn = document.getElementById('themeBtn');
    const appCard = document.getElementById('app-card');
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-theme');
      appCard.classList.toggle('light-theme');
    });
  </script>

</body>
</html>
