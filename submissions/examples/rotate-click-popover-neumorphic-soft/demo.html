<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Soft Layout - Rotate Click Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="saas-viewport">
        <!-- Interactive Micro-Frontend SaaS Control Hub Card Layout -->
        <div class="control-container-card">
            <header class="control-header">
                <div class="neon-matrix-badge">SOFT UI</div>
                <h2 class="control-title">Neumorphic Settings</h2>
                <p class="control-subtitle">Click the settings button to reveal a smooth rotating popover designed for modern neumorphic interfaces.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">⚙️</span>
                        <span class="btn-text">Settings</span>
                    </button>

                    <!-- Floating Popover Horizontal Rotate-Click Overlay Menu Shell Box -->
                    <div class="rotate-click-popover ease-rotate-fly">
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Quick Settings</h4>
                            <ul class="telemetry-actions-list">
                                <li class="menu-item"><a href="#scale" class="action-link-node">Appearance</a></li>
                                <li class="menu-item"><a href="#channels" class="action-link-node">Notifications</a></li>
                                <li class="menu-item"><a href="#purge" class="action-link-node action-danger">Privacy</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="control-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Neumorphic Theme Active</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
