<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Kafka Topic Throughput Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Kafka Topic Monitor</h2>

<div class="topic healthy">
<div>
<h3>orders.events</h3>
<p>18.4K Messages / Minute</p>
</div>
<span>Healthy</span>
</div>

<div class="topic active">
<div>
<h3>payments.events</h3>
<p>Consumer Lag: 42 Messages</p>
</div>
<span>Stable</span>
</div>

<div class="topic warning">
<div>
<h3>notifications</h3>
<p>Partition 5 Under Load</p>
</div>
<span>Monitor</span>
</div>

<div class="topic critical">
<div>
<h3>analytics.stream</h3>
<p>Broker Synchronization Delayed</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
