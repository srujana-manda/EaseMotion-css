<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-timeline-horizontal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tlh-wrapper">
    <div class="tlh-timeline" style="--step: 0" data-step="0">
      <div class="tlh-line"><div class="tlh-line-fill"></div></div>
      <div class="tlh-steps">
        <div class="tlh-step" style="--i: 0"><span class="tlh-dot"></span><span class="tlh-label">Step 1</span></div>
        <div class="tlh-step" style="--i: 1"><span class="tlh-dot"></span><span class="tlh-label">Step 2</span></div>
        <div class="tlh-step" style="--i: 2"><span class="tlh-dot"></span><span class="tlh-label">Step 3</span></div>
        <div class="tlh-step" style="--i: 3"><span class="tlh-dot"></span><span class="tlh-label">Step 4</span></div>
        <div class="tlh-step" style="--i: 4"><span class="tlh-dot"></span><span class="tlh-label">Step 5</span></div>
      </div>
    </div>
    <div class="tlh-controls">
      <button class="tlh-btn" data-step="0">Reset</button>
      <button class="tlh-btn" data-step="1">Step 1</button>
      <button class="tlh-btn" data-step="2">Step 2</button>
      <button class="tlh-btn" data-step="3">Step 3</button>
      <button class="tlh-btn" data-step="4">Step 4</button>
    </div>
  </div>
  <script>
    document.querySelectorAll('.tlh-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var s = this.dataset.step;
        var el = document.querySelector('.tlh-timeline');
        el.style.setProperty('--step', s);
        el.dataset.step = s;
      });
    });
  </script>
</body>
</html>
