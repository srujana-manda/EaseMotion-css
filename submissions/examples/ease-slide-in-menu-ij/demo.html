<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide In Menu - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Menu</h1>
    <button class="sim-toggle" id="simToggle">&#9776;</button>
    <nav class="sim-menu" id="simMenu">
      <ul class="sim-list">
        <li class="sim-item" style="--sim-i: 0;">Home</li>
        <li class="sim-item" style="--sim-i: 1;">About</li>
        <li class="sim-item" style="--sim-i: 2;">Services</li>
        <li class="sim-item" style="--sim-i: 3;">Portfolio</li>
        <li class="sim-item" style="--sim-i: 4;">Contact</li>
      </ul>
    </nav>
  </section>
  <script>
    document.getElementById('simToggle').addEventListener('click', function() {
      document.getElementById('simMenu').classList.toggle('sim-open');
    });
  </script>
</body>
</html>
