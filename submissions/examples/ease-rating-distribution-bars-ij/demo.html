<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating Distribution Bars - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Rating Distribution Bars</h1>
    <p class="desc">Breakdown of customer ratings from 5-star to 1-star</p>
    <div class="rdb-container" id="rdbContainer">
      <div class="rdb-row">
        <span class="rdb-label">5&#9733;</span>
        <div class="rdb-track">
          <div class="rdb-bar" style="--rdb-pct: 42%; --rdb-i: 0;"></div>
        </div>
        <span class="rdb-value">42%</span>
      </div>
      <div class="rdb-row">
        <span class="rdb-label">4&#9733;</span>
        <div class="rdb-track">
          <div class="rdb-bar" style="--rdb-pct: 28%; --rdb-i: 1;"></div>
        </div>
        <span class="rdb-value">28%</span>
      </div>
      <div class="rdb-row">
        <span class="rdb-label">3&#9733;</span>
        <div class="rdb-track">
          <div class="rdb-bar" style="--rdb-pct: 15%; --rdb-i: 2;"></div>
        </div>
        <span class="rdb-value">15%</span>
      </div>
      <div class="rdb-row">
        <span class="rdb-label">2&#9733;</span>
        <div class="rdb-track">
          <div class="rdb-bar" style="--rdb-pct: 10%; --rdb-i: 3;"></div>
        </div>
        <span class="rdb-value">10%</span>
      </div>
      <div class="rdb-row">
        <span class="rdb-label">1&#9733;</span>
        <div class="rdb-track">
          <div class="rdb-bar" style="--rdb-pct: 5%; --rdb-i: 4;"></div>
        </div>
        <span class="rdb-value">5%</span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var bars = document.querySelectorAll('.rdb-bar');
      bars.forEach(function(b) {
        var pct = b.style.getPropertyValue('--rdb-pct');
        b.style.setProperty('--rdb-w', pct);
      });
      requestAnimationFrame(function() {
        document.getElementById('rdbContainer').classList.add('rdb-animated');
      });
    })();
  </script>
</body>
</html>
