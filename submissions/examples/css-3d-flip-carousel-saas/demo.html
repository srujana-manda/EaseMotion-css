<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Carousel - Modern SaaS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>3D Flip Carousel</h1>

  <div class="carousel">

    <div class="card" tabindex="0">
      <div class="card-inner">
        <div class="front">
          <h2>Analytics</h2>
        </div>
        <div class="back">
          <p>Track business insights.</p>
        </div>
      </div>
    </div>

    <div class="card" tabindex="0">
      <div class="card-inner">
        <div class="front">
          <h2>Security</h2>
        </div>
        <div class="back">
          <p>Enterprise-grade protection.</p>
        </div>
      </div>
    </div>

    <div class="card" tabindex="0">
      <div class="card-inner">
        <div class="front">
          <h2>Automation</h2>
        </div>
        <div class="back">
          <p>Save time with workflows.</p>
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
