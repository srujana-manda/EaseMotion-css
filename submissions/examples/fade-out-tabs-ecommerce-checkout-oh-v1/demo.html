<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Fade-Out Tabs - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">E-Commerce</span>
      <h1>Fade-Out Tabs</h1>
      <p class="subtitle">Modern checkout flow</p>
    </header>

    <div class="display-area">
      <div class="tabs-container">
        <div class="tabs-nav" role="tablist" aria-label="Checkout navigation tabs">
          <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="tab-panel-1" id="tab-1" data-tab="1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            Cart
          </button>
          <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-panel-2" id="tab-2" data-tab="2">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
            Payment
          </button>
          <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-panel-3" id="tab-3" data-tab="3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
            </svg>
            Shipping
          </button>
          <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-panel-4" id="tab-4" data-tab="4">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            Confirm
          </button>
        </div>
        <div class="tabs-content">
          <div class="tab-panel active" id="tab-panel-1" role="tabpanel" aria-labelledby="tab-1">
            <h2>Shopping Cart</h2>
            <div class="cart-items">
              <div class="cart-item">
                <div class="item-image"><img src="https://picsum.photos/seed/product1/80/80" alt="Product"></div>
                <div class="item-details">
                  <span class="item-name">Premium Headphones</span>
                  <span class="item-price">$299.00</span>
                </div>
                <div class="item-qty"><button class="qty-btn">-</button><span>1</span><button class="qty-btn">+</button></div>
              </div>
              <div class="cart-item">
                <div class="item-image"><img src="https://picsum.photos/seed/product2/80/80" alt="Product"></div>
                <div class="item-details">
                  <span class="item-name">Wireless Keyboard</span>
                  <span class="item-price">$89.00</span>
                </div>
                <div class="item-qty"><button class="qty-btn">-</button><span>2</span><button class="qty-btn">+</button></div>
              </div>
            </div>
            <div class="cart-total"><span>Total:</span><span class="total-price">$477.00</span></div>
          </div>
          <div class="tab-panel" id="tab-panel-2" role="tabpanel" aria-labelledby="tab-2">
            <h2>Payment Method</h2>
            <div class="payment-methods">
              <label class="payment-option selected"><input type="radio" name="payment" checked><span class="payment-icon">💳</span><span class="payment-name">Credit Card</span><span class="payment-check">✓</span></label>
              <label class="payment-option"><input type="radio" name="payment"><span class="payment-icon">🏦</span><span class="payment-name">Bank Transfer</span><span class="payment-check">✓</span></label>
              <label class="payment-option"><input type="radio" name="payment"><span class="payment-icon">📱</span><span class="payment-name">Digital Wallet</span><span class="payment-check">✓</span></label>
            </div>
          </div>
          <div class="tab-panel" id="tab-panel-3" role="tabpanel" aria-labelledby="tab-3">
            <h2>Shipping Information</h2>
            <div class="address-form">
              <input type="text" placeholder="Full Name" class="form-input">
              <input type="text" placeholder="Street Address" class="form-input">
              <div class="form-row"><input type="text" placeholder="City" class="form-input"><input type="text" placeholder="ZIP Code" class="form-input"></div>
            </div>
          </div>
          <div class="tab-panel" id="tab-panel-4" role="tabpanel" aria-labelledby="tab-4">
            <h2>Order Confirmation</h2>
            <div class="confirm-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            <p class="confirm-text">Order #12345 has been placed successfully!</p>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="tabs-variant"><span class="variant-label">Fade</span>
          <div class="tabs-mini tabs-fade"><button class="tab-btn-mini active">01</button><button class="tab-btn-mini">02</button><button class="tab-btn-mini">03</button></div>
        </div>
        <div class="tabs-variant"><span class="variant-label">Slide</span>
          <div class="tabs-mini tabs-slide"><button class="tab-btn-mini active">01</button><button class="tab-btn-mini">02</button><button class="tab-btn-mini">03</button></div>
        </div>
        <div class="tabs-variant"><span class="variant-label">Bounce</span>
          <div class="tabs-mini tabs-bounce"><button class="tab-btn-mini active">01</button><button class="tab-btn-mini">02</button><button class="tab-btn-mini">03</button></div>
        </div>
      </div>
    </section>

  </main>

  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
        btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
        document.querySelectorAll('.tab-panel').forEach(panel => { panel.classList.remove('active'); });
        document.getElementById(`tab-panel-${tabId}`).classList.add('active');
      });
    });
    document.querySelectorAll('.tabs-mini').forEach(tabs => {
      tabs.querySelectorAll('.tab-btn-mini').forEach(btn => {
        btn.addEventListener('click', () => { tabs.querySelectorAll('.tab-btn-mini').forEach(b => b.classList.remove('active')); btn.classList.add('active'); });
      });
    });
  </script>
</body>
</html>
