<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Mouse Follow Light - EaseMotion CSS</title>
</head>
<body>
  <section class="demo-section">
    <div class="mfl-card" id="mflCard">
      <div class="mfl-content">
        <h2 class="mfl-title">Follow the Light</h2>
        <p class="mfl-desc">Move your cursor across the surface</p>
      </div>
    </div>
  </section>
  <script>
    var card = document.getElementById('mflCard');
    card.addEventListener('mousemove', function(e) {
      var rect = card.getBoundingClientRect();
      var x = ((e.clientX - rect.left) / rect.width) * 100;
      var y = ((e.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty('--mfl-x', x + '%');
      card.style.setProperty('--mfl-y', y + '%');
    });
    card.addEventListener('mouseleave', function() {
      card.style.setProperty('--mfl-x', '50%');
      card.style.setProperty('--mfl-y', '50%');
    });
  </script>
</body>
</html>
