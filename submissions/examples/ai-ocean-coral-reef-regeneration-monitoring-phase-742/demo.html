<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coral Regeneration AI — Phase #742</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Particle System -->
  <div class="plankton p1"></div>
  <div class="plankton p2"></div>
  <div class="plankton p3"></div>
  <div class="plankton p4"></div>

  <!-- Header -->
  <header class="monitor-header fade-in">
    <div class="brand">OCEAN-AI DEEP REEF</div>
    <div class="monitor-stat">
      <div class="stat-box">
        <span class="stat-val" style="color: var(--clr-coral)">+14.2%</span>
        <span class="stat-lbl">Growth Rate (30d)</span>
      </div>
      <div class="stat-box">
        <span class="stat-val">Active</span>
        <span class="stat-lbl">AI Sonar Grid</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Water Quality -->
    <aside class="panel fade-up">
      <div class="panel-title">WATER QUALITY</div>
      
      <div class="quality-grp">
        <div class="q-hdr">
          <span class="q-lbl">Temperature</span>
          <div><span class="q-val">26.4</span><span class="q-sub">°C</span></div>
        </div>
        <div class="therm-bar">
          <div class="therm-marker" style="left: 45%;"></div>
        </div>
      </div>

      <div class="quality-grp" style="margin-top: 2.5rem;">
        <div class="q-hdr">
          <span class="q-lbl">Acidity (pH)</span>
          <div><span class="q-val">8.1</span><span class="q-sub">Optimal</span></div>
        </div>
        <div class="ph-graph">
          <div class="ph-wave"></div>
        </div>
      </div>
    </aside>

    <!-- Center: AI Coral Polyp Analyzer -->
    <section class="panel analyzer-panel fade-in delay-1" style="padding: 0; background: transparent; border: none; box-shadow: none;">
      <div class="analyzer-view">
        
        <!-- Sonar Rings -->
        <div class="sonar-center">
          <div class="sonar-ring"></div>
          <div class="sonar-ring"></div>
          <div class="sonar-ring"></div>
        </div>

        <!-- Growing Coral Bed -->
        <div class="reef-bed">
          <div class="polyp pl-1"></div>
          <div class="polyp pl-2"></div>
          <div class="polyp pl-3"></div>
          <div class="polyp pl-4"></div>
        </div>

      </div>
    </section>

    <!-- Right Sidebar: Regeneration Metrics -->
    <aside class="panel fade-up delay-2">
      
      <div class="regen-card">
        <span class="rc-lbl">Biomass Regenerated</span>
        <span class="rc-val">4,250 kg</span>
      </div>

      <div class="panel-title">BIODIVERSITY INDEX</div>
      
      <div class="species-list">
        
        <div class="sp-item">
          <div class="sp-icon">🐟</div>
          <div class="sp-info">
            <span class="sp-name">Reef Fish Population</span>
            <span class="sp-count">~12,500</span>
          </div>
        </div>

        <div class="sp-item">
          <div class="sp-icon">🐢</div>
          <div class="sp-info">
            <span class="sp-name">Marine Turtles</span>
            <span class="sp-count">Active Nesting (14)</span>
          </div>
        </div>

        <div class="sp-item">
          <div class="sp-icon">🦠</div>
          <div class="sp-info">
            <span class="sp-name">Symbiotic Zooxanthellae</span>
            <span class="sp-count" style="color: var(--clr-coral)">Dense Colonies</span>
          </div>
        </div>

      </div>

    </aside>

  </main>

</body>
</html>
