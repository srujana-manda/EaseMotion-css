<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Implant Interface — Phase #752</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Web -->
  <div class="synapse-web"></div>

  <!-- Header -->
  <header class="bci-header fade-in">
    <div class="brand">NEUROLINK // V 7.5.2</div>
    <div class="implant-stat">
      <div class="stat-box">
        <span class="stat-val">98.4%</span>
        <span class="stat-lbl">SYNC</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" style="color: var(--clr-blue)">100%</span>
        <span class="stat-lbl">PWR</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Cortical & Motor -->
    <aside class="panel fade-up">
      <div class="panel-title">CORTICAL ACTIVITY</div>
      
      <div class="eeg-graph">
        <div class="eeg-line"></div>
      </div>

      <div class="panel-title">MOTOR PATHWAYS</div>
      
      <div class="motor-list">
        <div class="motor-item">
          <div class="m-hdr"><span>Primary Motor Cortex</span> <span class="m-val">ACTIVE</span></div>
          <div class="m-bar"><div class="m-fill active" style="width: 85%;"></div></div>
        </div>
        <div class="motor-item">
          <div class="m-hdr"><span>Supplementary Area</span> <span class="m-val" style="color: var(--clr-text-dim)">IDLE</span></div>
          <div class="m-bar"><div class="m-fill" style="width: 20%;"></div></div>
        </div>
        <div class="motor-item">
          <div class="m-hdr"><span>Cerebellum Sync</span> <span class="m-val">ACTIVE</span></div>
          <div class="m-bar"><div class="m-fill active" style="width: 60%; background: var(--clr-pink); box-shadow: var(--glow-pink);"></div></div>
        </div>
      </div>
    </aside>

    <!-- Center: Neural Cortex Visualizer -->
    <section class="panel cortex-panel fade-in delay-1" style="background: transparent; border: none; box-shadow: none; backdrop-filter: none;">
      <div class="cortex-view">
        <div class="brain-core">
          <!-- Neural nodes and connections -->
          <div class="connection c1"></div>
          <div class="connection c2"></div>
          
          <div class="node n1"></div>
          <div class="node n2"></div>
          <div class="node n3"></div>
        </div>
      </div>
    </section>

    <!-- Right Sidebar: Diagnostics & Sensory -->
    <aside class="panel fade-up delay-2">
      <div class="panel-title">IMPLANT DIAGNOSTICS</div>
      
      <div class="diag-grid">
        <div class="diag-box">
          <span class="d-val">37.2°C</span>
          <span class="d-lbl">Core Temp</span>
        </div>
        <div class="diag-box">
          <span class="d-val" style="color: var(--clr-blue)">12ms</span>
          <span class="d-lbl">Latency</span>
        </div>
        <div class="diag-box">
          <span class="d-val" style="color: var(--clr-pink)">104 BPM</span>
          <span class="d-lbl">Heart Rate</span>
        </div>
        <div class="diag-box">
          <span class="d-val" style="color: var(--clr-yellow)">99%</span>
          <span class="d-lbl">O2 Sat</span>
        </div>
      </div>

      <div class="panel-title">SENSORY INPUT STREAM</div>
      
      <div class="sensory-bars">
        <div class="s-bar"></div>
        <div class="s-bar"></div>
        <div class="s-bar"></div>
        <div class="s-bar"></div>
        <div class="s-bar"></div>
        <div class="s-bar"></div>
        <div class="s-bar"></div>
      </div>

    </aside>

  </main>

</body>
</html>
