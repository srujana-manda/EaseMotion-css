<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-badge-dot-ping</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bdp-container">
    <div class="bdp-badge" style="--ping: 1">
      <span class="bdp-text">Notifications</span>
      <span class="bdp-dot-wrapper">
        <span class="bdp-dot"></span>
        <span class="bdp-ring"></span>
        <span class="bdp-ring-2"></span>
      </span>
    </div>
    <label class="bdp-toggle">
      <input type="checkbox" checked onchange="document.querySelector('.bdp-badge').style.setProperty('--ping', this.checked ? 1 : 0)">
      <span>Ping animation</span>
    </label>
  </div>
</body>
</html>
