<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTP Spacecraft Bridge — Phase #739</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HUD Grid Background -->
  <div class="hud-overlay"></div>

  <!-- Bridge Header -->
  <header class="bridge-header slide-up">
    <div class="brand">NTP-CORE // COMMAND</div>
    <div class="velocity">0.04c <span>v_relative</span></div>
    <div class="brand" style="color: var(--clr-blue)">PROMETHEUS-V</div>
  </header>

  <!-- Main Bridge Interface -->
  <main class="app-main">
    
    <!-- Left Sidebar: Propellant Flow (LH2) -->
    <aside class="panel slide-up delay-1">
      <div class="panel-title"><span>LH2 PROPELLANT FLOW</span> <span>NOMINAL</span></div>
      
      <div class="prop-bar">
        <div class="prop-hdr"><span>TANK A INTAKE</span> <span>84%</span></div>
        <div class="prop-track"><div class="prop-fill" style="width: 84%;"></div></div>
      </div>

      <div class="prop-bar">
        <div class="prop-hdr"><span>TANK B INTAKE</span> <span>79%</span></div>
        <div class="prop-track"><div class="prop-fill" style="width: 79%;"></div></div>
      </div>

      <div class="prop-bar" style="margin-top: 3rem;">
        <div class="prop-hdr"><span style="color: var(--clr-orange);">PRE-HEAT CHAMBER</span> <span>1,200 K</span></div>
        <div class="prop-track" style="border-color: rgba(249,115,22,0.3);"><div class="prop-fill" style="width: 60%; background: var(--clr-orange); box-shadow: 0 0 10px var(--clr-orange);"></div></div>
      </div>

    </aside>

    <!-- Center: NTP Reactor Core Visualizer -->
    <section class="panel core-panel hud-zoom" style="background: transparent; border: none; box-shadow: none; backdrop-filter: none;">
      <div class="core-view" style="width: 100%; height: 100%;">
        
        <div class="reactor-core">
          <div class="core-temp">3,100 K</div>
        </div>
        
        <div class="core-ring r1"></div>
        <div class="core-ring r2"></div>

      </div>
    </section>

    <!-- Right Sidebar: Thrust & Shielding -->
    <aside class="panel slide-up delay-2">
      <div class="panel-title"><span>RADIATION SHIELDING</span> <span>ACTIVE</span></div>
      
      <div class="shield-grid">
        <div class="shield-node">
          <div class="s-val">99%</div>
          <div class="s-lbl">FWD SECTOR</div>
        </div>
        <div class="shield-node crit">
          <div class="s-val">42%</div>
          <div class="s-lbl">AFT SECTOR</div>
        </div>
        <div class="shield-node">
          <div class="s-val">98%</div>
          <div class="s-lbl">PORT</div>
        </div>
        <div class="shield-node">
          <div class="s-val">98%</div>
          <div class="s-lbl">STARBOARD</div>
        </div>
      </div>

      <div class="panel-title" style="margin-top: 1rem;"><span>THRUST VECTOR</span></div>
      <div style="font-size: 3rem; text-align: center; color: var(--clr-blue); text-shadow: 0 0 10px var(--clr-blue);">1.2g</div>
      <div style="text-align: center; color: var(--clr-green); letter-spacing: 2px;">CONTINUOUS BURN</div>

      <div class="caution-strip"></div>
    </aside>

  </main>

</body>
</html>
