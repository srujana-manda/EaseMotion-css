<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Redis Cache Insights</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Redis Cache Insights</h2>

<div class="card healthy">
<div>
<h3>Hit Rate</h3>
<p>98.7% Cache Hits</p>
</div>
<span>Excellent</span>
</div>

<div class="card info">
<div>
<h3>Memory Usage</h3>
<p>3.2 GB / 8 GB</p>
</div>
<span>Normal</span>
</div>

<div class="card warning">
<div>
<h3>Connected Clients</h3>
<p>1,248 Active Clients</p>
</div>
<span>Busy</span>
</div>

<div class="card critical">
<div>
<h3>Evicted Keys</h3>
<p>326 Keys (Last Hour)</p>
</div>
<span>Review</span>
</div>

</section>

</body>
</html>
