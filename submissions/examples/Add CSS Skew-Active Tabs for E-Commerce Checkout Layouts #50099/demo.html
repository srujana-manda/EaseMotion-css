<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Skew-Active Tabs - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- Main Checkout Container -->
  <main class="checkout-container">
    
    <!-- Header -->
    <header class="checkout-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
          <line x1="7" y1="7" x2="7.01" y2="7"></line>
        </svg>
        <span>Lumière</span>
      </div>
      <div class="secure-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Secure Checkout
      </div>
    </header>

    <!-- State Management via Visually Hidden Radio Inputs -->
    <input type="radio" id="step-shipping" name="checkout-tabs" class="tab-input" checked>
    <input type="radio" id="step-payment" name="checkout-tabs" class="tab-input">
    <input type="radio" id="step-review" name="checkout-tabs" class="tab-input">

    <!-- Skew-Active Tabs Navigation -->
    <nav class="tabs-nav" aria-label="Checkout Steps">
      <label for="step-shipping" class="tab-label" id="label-shipping">
        <span class="step-num">1</span>
        <span class="step-text">Shipping</span>
      </label>
      
      <label for="step-payment" class="tab-label" id="label-payment">
        <span class="step-num">2</span>
        <span class="step-text">Payment</span>
      </label>
      
      <label for="step-review" class="tab-label" id="label-review">
        <span class="step-num">3</span>
        <span class="step-text">Review</span>
      </label>
    </nav>

    <!-- Checkout Panels -->
    <div class="checkout-panels">
      
      <!-- Panel 1: Shipping -->
      <article class="tab-panel" id="panel-shipping">
        <h2 class="panel-title">Shipping Address</h2>
        <div class="form-grid">
          <div class="input-group full">
            <label>Full Name</label>
            <input type="text" placeholder="Jane Doe">
          </div>
          <div class="input-group full">
            <label>Address Line 1</label>
            <input type="text" placeholder="123 Commerce St">
          </div>
          <div class="input-group">
            <label>City</label>
            <input type="text" placeholder="New York">
          </div>
          <div class="input-group">
            <label>ZIP / Postal Code</label>
            <input type="text" placeholder="10001">
          </div>
        </div>
        
        <div class="panel-footer">
          <!-- Using a label to programmatically check the next radio button -->
          <label for="step-payment" class="btn-primary">Continue to Payment</label>
        </div>
      </article>

      <!-- Panel 2: Payment -->
      <article class="tab-panel" id="panel-payment">
        <h2 class="panel-title">Payment Details</h2>
        
        <!-- CSS Credit Card Mockup -->
        <div class="credit-card-mockup">
           <div class="cc-chip"></div>
           <div class="cc-number">**** **** **** 4242</div>
           <div class="cc-footer">
             <span class="cc-name">JANE DOE</span>
             <span class="cc-exp">12/28</span>
           </div>
        </div>
        
        <div class="form-grid mt-24">
          <div class="input-group full">
            <label>Card Number</label>
            <input type="text" placeholder="0000 0000 0000 0000">
          </div>
          <div class="input-group">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY">
          </div>
          <div class="input-group">
            <label>CVC / CVV</label>
            <input type="password" placeholder="123">
          </div>
        </div>

        <div class="panel-footer dual">
          <!-- Go Back Label -->
          <label for="step-shipping" class="btn-secondary">Back to Shipping</label>
          <!-- Continue Label -->
          <label for="step-review" class="btn-primary">Review Order</label>
        </div>
      </article>

      <!-- Panel 3: Review -->
      <article class="tab-panel" id="panel-review">
        <h2 class="panel-title">Review Your Order</h2>
        
        <div class="order-summary">
          <div class="order-item">
            <div class="item-img" style="background: linear-gradient(135deg, #cbd5e1, #94a3b8);"></div>
            <div class="item-info">
              <h4>Premium Wireless Headphones</h4>
              <p>Color: Matte Black | Qty: 1</p>
            </div>
            <div class="item-price">$299.00</div>
          </div>
          <hr class="divider">
          <div class="order-total">
            <span>Subtotal</span>
            <span>$299.00</span>
          </div>
          <div class="order-total">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="order-total grand">
            <span>Total</span>
            <span>$299.00</span>
          </div>
        </div>

        <div class="panel-footer dual">
          <label for="step-payment" class="btn-secondary">Back to Payment</label>
          <button class="btn-primary" onclick="alert('Order Placed Successfully!')">Place Order</button>
        </div>
      </article>

    </div>
  </main>
</body>
</html>
