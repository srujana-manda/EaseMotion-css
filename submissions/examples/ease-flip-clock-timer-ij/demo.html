<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Clock - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Flip Clock</h1>
    <p class="desc">Number flip animation with perspective transform</p>
    <div class="fc-clock">
      <div class="fc-digit" id="fcDigit1" style="--fc-val: 0;">
        <div class="fc-top">0</div>
        <div class="fc-bottom">0</div>
      </div>
      <div class="fc-digit" id="fcDigit2" style="--fc-val: 0;">
        <div class="fc-top">0</div>
        <div class="fc-bottom">0</div>
      </div>
      <span class="fc-colon">:</span>
      <div class="fc-digit" id="fcDigit3" style="--fc-val: 0;">
        <div class="fc-top">0</div>
        <div class="fc-bottom">0</div>
      </div>
      <div class="fc-digit" id="fcDigit4" style="--fc-val: 0;">
        <div class="fc-top">0</div>
        <div class="fc-bottom">0</div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn" id="fcStart">Start</button>
      <button class="fc-btn" id="fcReset">Reset</button>
    </div>
  </div>
  <script>
    const digits = [1, 2, 3, 4].map(i => document.getElementById('fcDigit' + i));
    let running = false;
    let interval = null;
    let seconds = 0;

    function updateDisplay() {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      const vals = [Math.floor(m / 10), m % 10, Math.floor(s / 10), s % 10];
      digits.forEach((el, i) => {
        const prev = parseInt(el.getAttribute('data-val') || '0');
        if (prev !== vals[i]) {
          el.style.setProperty('--fc-val', vals[i]);
          el.classList.remove('fc-flip');
          void el.offsetWidth;
          el.classList.add('fc-flip');
          el.setAttribute('data-val', vals[i]);
          const top = el.querySelector('.fc-top');
          const bottom = el.querySelector('.fc-bottom');
          bottom.textContent = prev;
          setTimeout(() => { top.textContent = vals[i]; bottom.textContent = vals[i]; }, 300);
        }
      });
    }

    document.getElementById('fcStart').addEventListener('click', () => {
      if (running) { clearInterval(interval); running = false; document.getElementById('fcStart').textContent = 'Start'; return; }
      running = true;
      document.getElementById('fcStart').textContent = 'Stop';
      interval = setInterval(() => { seconds++; updateDisplay(); }, 1000);
    });

    document.getElementById('fcReset').addEventListener('click', () => {
      clearInterval(interval); running = false; seconds = 0;
      document.getElementById('fcStart').textContent = 'Start';
      digits.forEach(el => { el.style.setProperty('--fc-val', 0); el.setAttribute('data-val', '0'); el.querySelector('.fc-top').textContent = '0'; el.querySelector('.fc-bottom').textContent = '0'; });
    });
  </script>
</body>
</html>
