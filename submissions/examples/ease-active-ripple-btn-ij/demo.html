<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-active-ripple-btn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="arb-container">
    <button class="arb-btn" style="--ripple-x: 50%; --ripple-y: 50%;">
      Click Me
    </button>
    <button class="arb-btn" style="--ripple-x: 50%; --ripple-y: 50%;">
      Another Button
    </button>
  </div>
  <script>
    document.querySelectorAll('.arb-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const rect = this.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        this.style.setProperty('--ripple-x', x + '%');
        this.style.setProperty('--ripple-y', y + '%');
        this.classList.remove('arb-ripple');
        void this.offsetWidth;
        this.classList.add('arb-ripple');
      });
    });
  </script>
</body>
</html>
