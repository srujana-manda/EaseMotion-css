<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volcanic Activity & Seismic Early Warning Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="grid-header">
    <h1>Volcanic Activity & Seismic Early Warning Grid</h1>
    <p>Real-time monitoring across active fault zones and volcanic regions</p>
  </header>

  <main class="warning-grid">

    <section class="panel map-panel">
      <div class="panel-title">Seismic Activity Map</div>
      <div class="seismic-map">
        <span class="pulse-dot dot-1"></span>
        <span class="pulse-dot dot-2"></span>
        <span class="pulse-dot dot-3"></span>
        <span class="pulse-dot dot-4"></span>
      </div>
    </section>

    <section class="panel alert-panel">
      <div class="panel-title">Alert Level</div>
      <div class="alert-meter">
        <div class="alert-fill"></div>
        <span class="alert-label">ELEVATED</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Active Sensors</span>
        <span class="metric-number">412</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Tremors (24h)</span>
        <span class="metric-number">37</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Magma Pressure</span>
        <span class="metric-number">+12%</span>
      </div>
    </section>

  </main>

</body>
</html>
