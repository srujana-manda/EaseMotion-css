<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Carousel — Blur Entrance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-dc-wrapper">
    <div class="ease-dc-card">

      <div class="ease-dc-track">
        <input type="radio" name="ease-dc-slide" id="ease-dc-slide-1" class="ease-dc-radio" checked>
        <section class="ease-dc-slide ease-dc-slide-1" aria-label="Revenue slide">
          <h3 class="ease-dc-metric-label">Revenue</h3>
          <p class="ease-dc-metric-value">$482,900</p>
          <p class="ease-dc-metric-delta ease-dc-up">▲ 12.4% this month</p>
        </section>

        <input type="radio" name="ease-dc-slide" id="ease-dc-slide-2" class="ease-dc-radio">
        <section class="ease-dc-slide ease-dc-slide-2" aria-label="Active users slide">
          <h3 class="ease-dc-metric-label">Active Users</h3>
          <p class="ease-dc-metric-value">18,204</p>
          <p class="ease-dc-metric-delta ease-dc-up">▲ 6.1% this week</p>
        </section>

        <input type="radio" name="ease-dc-slide" id="ease-dc-slide-3" class="ease-dc-radio">
        <section class="ease-dc-slide ease-dc-slide-3" aria-label="Churn rate slide">
          <h3 class="ease-dc-metric-label">Churn Rate</h3>
          <p class="ease-dc-metric-value">2.3%</p>
          <p class="ease-dc-metric-delta ease-dc-down">▼ 0.4% this month</p>
        </section>
      </div>

      <div class="ease-dc-nav" role="radiogroup" aria-label="Carousel navigation">
        <div class="ease-dc-dot-visual ease-dc-dot-1"></div>
        <div class="ease-dc-dot-visual ease-dc-dot-2"></div>
        <div class="ease-dc-dot-visual ease-dc-dot-3"></div>
      </div>

    </div>
  </div>
</body>
</html>
