<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Search - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Live Search</h1>
    <p class="desc">Search filters results in real-time with fade animation</p>
    <div class="ls-card">
      <div class="ls-input-wrap">
        <span class="ls-icon">&#x1F50D;</span>
        <input type="text" class="ls-input" id="lsInput" placeholder="Search items..." />
      </div>
      <div class="ls-results" id="lsResults">
        <div class="ls-item" data-term="apple"><span class="ls-label">Apple</span><span class="ls-cat">Fruit</span></div>
        <div class="ls-item" data-term="banana"><span class="ls-label">Banana</span><span class="ls-cat">Fruit</span></div>
        <div class="ls-item" data-term="carrot"><span class="ls-label">Carrot</span><span class="ls-cat">Vegetable</span></div>
        <div class="ls-item" data-term="broccoli"><span class="ls-label">Broccoli</span><span class="ls-cat">Vegetable</span></div>
        <div class="ls-item" data-term="chicken"><span class="ls-label">Chicken</span><span class="ls-cat">Meat</span></div>
        <div class="ls-item" data-term="salmon"><span class="ls-label">Salmon</span><span class="ls-cat">Seafood</span></div>
        <div class="ls-item" data-term="rice"><span class="ls-label">Rice</span><span class="ls-cat">Grain</span></div>
        <div class="ls-item" data-term="pasta"><span class="ls-label">Pasta</span><span class="ls-cat">Grain</span></div>
      </div>
      <p class="ls-count" id="lsCount">8 items</p>
    </div>
  </div>
  <script>
    const input = document.getElementById('lsInput');
    const results = document.getElementById('lsResults');
    const count = document.getElementById('lsCount');
    const items = results.querySelectorAll('.ls-item');

    input.addEventListener('input', () => {
      const q = input.value.toLowerCase();
      let visible = 0;
      items.forEach(item => {
        const term = item.getAttribute('data-term');
        const match = term.includes(q);
        item.classList.toggle('ls-hidden', !match);
        if (match) visible++;
      });
      count.textContent = visible + ' item' + (visible !== 1 ? 's' : '');
    });
  </script>
</body>
</html>
