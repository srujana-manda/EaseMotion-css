<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Hydrological Clean Water Filtration Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="water-header">
    <h1>Global Hydrological Clean Water Filtration Grid</h1>
    <p>Monitoring filtration stages, flow rates, and water quality worldwide</p>
  </header>

  <main class="water-grid">

    <section class="panel filter-panel">
      <div class="panel-title">Filtration Stages</div>
      <div class="filter-view">
        <span class="flow-drop drop-1"></span>
        <span class="flow-drop drop-2"></span>
        <span class="flow-drop drop-3"></span>
        <span class="filter-stage stage-1"></span>
        <span class="filter-stage stage-2"></span>
        <span class="filter-stage stage-3"></span>
      </div>
    </section>

    <section class="panel purity-panel">
      <div class="panel-title">Water Purity</div>
      <div class="purity-meter">
        <div class="purity-fill"></div>
        <span class="purity-value">97%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Liters Filtered</span>
        <span class="metric-number">8.4M</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Active Stations</span>
        <span class="metric-number">312</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Contaminants Removed</span>
        <span class="metric-number">99.6%</span>
      </div>
    </section>

  </main>

</body>
</html>
