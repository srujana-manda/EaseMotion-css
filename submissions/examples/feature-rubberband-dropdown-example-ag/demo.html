<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubberBand Dropdown Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-dropdown-container-ag">
        <button class="ease-dropdown-trigger-ag" aria-haspopup="true" aria-expanded="false">
            Settings <span>▼</span>
        </button>
        
        <!-- The dropdown menu with the rubberband animation -->
        <ul class="ease-rubberband-dropdown-ag" role="menu">
            <li role="none"><a href="#1" role="menuitem">Profile</a></li>
            <li role="none"><a href="#2" role="menuitem">Preferences</a></li>
            <li role="none"><a href="#3" role="menuitem">Privacy</a></li>
        </ul>
    </div>
</body>
</html>
