<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio - Morph-Glow Badge Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="portfolio-badge-canvas">
    <div class="portfolio-card-frame">
      
      <div class="card-meta-header">
        <span class="category-tag">CYBERSECURITY AI</span>
        <h3>WhisperNet Platform</h3>
      </div>

      <div class="badge-display-area">
        <!-- Pure CSS Morph-Glow Badge -->
        <div class="morph-glow-badge">
          <div class="glow-aura-layer"></div>
          <span class="badge-status-dot"></span>
          <span class="badge-text-content">VisionX 2.0 Winner</span>
        </div>
      </div>

      <p class="panel-caption-footer">Hover over the badge or inspect the border radius to witness organic morphing and luminous glow cycling.</p>
    </div>
  </main>

</body>
</html>
