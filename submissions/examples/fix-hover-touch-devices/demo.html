<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch-Safe Hover Animation Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="demo-container">
        <h1>Touch-Safe Hover Animation</h1>

        <p>
            This demo shows the difference between a regular hover animation
            and a touch-safe hover animation.
        </p>

        <section class="demo-section">
            <h2>Touch-Safe Hover</h2>

            <p>
                This animation is only enabled on devices that support hover.
            </p>

            <button class="em-hover-scale-safe">
                Hover or Tap Me
            </button>
        </section>
    </main>

</body>
</html>
