<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-skeleton — Shimmer Loading Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: #0f172a;
      font-family: sans-serif;
      color: #e2e8f0;
      padding: 2rem;
      max-width: 640px;
    }
    h2 {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 1rem;
    }
    p.desc { color: #64748b; font-size: 0.85rem; margin: 0.25rem 0 1.5rem; }
    .demo-section { margin-bottom: 2rem; }
    .demo-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }
    button {
      padding: 6px 14px;
      cursor: pointer;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    button:hover { background: #334155; }
    label { font-size: 0.68rem; color: #475569; font-family: monospace; display: block; margin-top: 4px; }
    .col { display: flex; flex-direction: column; gap: 4px; }
    hr { border: none; border-top: 1px solid #1e293b; margin: 2rem 0; }
  </style>
</head>
<body>

<h1>💀 ease-skeleton</h1>
<p class="desc">Skeleton loading shimmer utility — CSS-only background-position animation. Zero JavaScript.</p>

<!-- TEXT LINES -->
<h2>Text Line Variants</h2>
<div class="demo-section col">
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-full"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-3\/4"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-2\/3"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-1\/2"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-1\/3"></div>
  <label>.ease-skeleton-text with width helpers</label>
</div>

<!-- TEXT SIZES -->
<h2>Text Size Variants</h2>
<div class="demo-section col">
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--sm ease-skeleton-text--w-3\/4"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--md ease-skeleton-text--w-full"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--lg ease-skeleton-text--w-2\/3"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--xl ease-skeleton-text--w-1\/2"></div>
  <label>sm → md → lg → xl</label>
</div>

<!-- CIRCLES / AVATARS -->
<h2>Circle / Avatar Variants</h2>
<div class="demo-row" style="align-items:flex-end">
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--xs"></div>
    <label>xs</label>
  </div>
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--sm"></div>
    <label>sm</label>
  </div>
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--md"></div>
    <label>md</label>
  </div>
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--lg"></div>
    <label>lg</label>
  </div>
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--xl"></div>
    <label>xl</label>
  </div>
</div>

<!-- PROFILE ROW -->
<h2>Profile Row</h2>
<div class="ease-skeleton-profile" style="margin-bottom:0.5rem">
  <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--md"></div>
  <div class="ease-skeleton-profile__lines">
    <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-1\/2"></div>
    <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--sm ease-skeleton-text--w-1\/3"></div>
  </div>
</div>
<label>.ease-skeleton-profile</label>

<!-- CARD LAYOUT -->
<h2>Card Layout</h2>
<div class="ease-skeleton-card-layout">
  <div class="ease-skeleton ease-skeleton-image" style="height:140px"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--lg ease-skeleton-text--w-3\/4"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-full"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-2\/3"></div>
  <div class="demo-row" style="margin:0">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--sm"></div>
    <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-1\/3" style="margin:0"></div>
    <div class="ease-skeleton ease-skeleton-btn ease-skeleton-btn--sm" style="margin-left:auto"></div>
  </div>
</div>
<label style="margin-top:0.5rem">.ease-skeleton-card-layout</label>

<!-- LIST ITEMS -->
<h2>List Items</h2>
<div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:0.5rem 1rem">
  <div class="ease-skeleton-list-item">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--sm"></div>
    <div class="ease-skeleton-list-item__lines">
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-1\/2"></div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--sm ease-skeleton-text--w-1\/3"></div>
    </div>
    <div class="ease-skeleton ease-skeleton-btn ease-skeleton-btn--sm"></div>
  </div>
  <div class="ease-skeleton-list-item">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--sm"></div>
    <div class="ease-skeleton-list-item__lines">
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-2\/3"></div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--sm ease-skeleton-text--w-1\/4"></div>
    </div>
    <div class="ease-skeleton ease-skeleton-btn ease-skeleton-btn--sm"></div>
  </div>
  <div class="ease-skeleton-list-item">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--sm"></div>
    <div class="ease-skeleton-list-item__lines">
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-3\/4"></div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--sm ease-skeleton-text--w-1\/3"></div>
    </div>
    <div class="ease-skeleton ease-skeleton-btn ease-skeleton-btn--sm"></div>
  </div>
</div>
<label style="margin-top:0.5rem">.ease-skeleton-list-item</label>

<!-- BUTTON PLACEHOLDERS -->
<h2>Button Placeholders</h2>
<div class="demo-row">
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-btn ease-skeleton-btn--sm"></div>
    <label>--sm</label>
  </div>
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-btn"></div>
    <label>default</label>
  </div>
  <div class="col" style="align-items:center">
    <div class="ease-skeleton ease-skeleton-btn ease-skeleton-btn--lg"></div>
    <label>--lg</label>
  </div>
</div>

<!-- SPEED VARIANTS -->
<h2>Speed Variants</h2>
<div class="demo-section col">
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-full ease-skeleton--fast"></div>
  <label>--fast (0.8s)</label>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-full" style="margin-top:0.5rem"></div>
  <label>default (1.5s)</label>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-full ease-skeleton--slow" style="margin-top:0.5rem"></div>
  <label>--slow (2.5s)</label>
</div>

<!-- THEMES -->
<h2>Themes</h2>
<div class="controls">
  <button onclick="setTheme('')">Default</button>
  <button onclick="setTheme('neon')">Neon</button>
  <button onclick="setTheme('dracula')">Dracula</button>
  <button onclick="setTheme('dark')">Dark</button>
</div>
<div id="theme-demo" class="col">
  <div class="ease-skeleton-profile">
    <div class="ease-skeleton ease-skeleton-circle ease-skeleton-circle--md"></div>
    <div class="ease-skeleton-profile__lines">
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-1\/2"></div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--sm ease-skeleton-text--w-1\/3"></div>
    </div>
  </div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-full" style="margin-top:0.5rem"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-3\/4"></div>
  <div class="ease-skeleton ease-skeleton-text ease-skeleton-text--w-1\/2"></div>
</div>

<script>
  function setTheme(t) {
    document.getElementById('theme-demo').dataset.theme = t;
  }
</script>

</body>
</html>
