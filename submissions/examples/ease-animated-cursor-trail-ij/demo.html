<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Cursor Trail - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Cursor Trail</h1>
    <p class="desc">Move your mouse — trailing dots follow with staggered delay</p>
    <div class="trail-container" id="trailContainer">
      <span class="trail-label">Move here</span>
    </div>
  </div>
  <script>
    const container = document.getElementById('trailContainer');
    const trailCount = 12;
    let pos = { x: 150, y: 100 };
    let trail = [];

    for (let i = 0; i < trailCount; i++) {
      const dot = document.createElement('div');
      dot.className = 'trail-dot';
      dot.style.setProperty('--td-delay', i * 0.04);
      container.appendChild(dot);
      trail.push({ el: dot, x: pos.x, y: pos.y });
    }

    container.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      pos.x = e.clientX - rect.left;
      pos.y = e.clientY - rect.top;
    });

    function animate() {
      trail[0].x += (pos.x - trail[0].x) * 0.3;
      trail[0].y += (pos.y - trail[0].y) * 0.3;
      trail[0].el.style.setProperty('--td-x', trail[0].x);
      trail[0].el.style.setProperty('--td-y', trail[0].y);

      for (let i = 1; i < trailCount; i++) {
        trail[i].x += (trail[i - 1].x - trail[i].x) * 0.25;
        trail[i].y += (trail[i - 1].y - trail[i].y) * 0.25;
        trail[i].el.style.setProperty('--td-x', trail[i].x);
        trail[i].el.style.setProperty('--td-y', trail[i].y);
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
