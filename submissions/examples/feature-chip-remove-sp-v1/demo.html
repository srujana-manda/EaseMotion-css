<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Chip Remove</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="demo">

    <h1>ease-chip-remove</h1>

    <div class="chips">

        <span class="ease-chip blue">
            Design
            <button class="remove">&times;</button>
        </span>

        <span class="ease-chip green">
            React
            <button class="remove">&times;</button>
        </span>

        <span class="ease-chip orange">
            Animation
            <button class="remove">&times;</button>
        </span>

    </div>

</div>


<script>

document.querySelectorAll(".remove").forEach(button => {

    button.addEventListener("click", () => {

        const chip = button.parentElement;

        chip.classList.add("remove-animation");

        setTimeout(() => {
            chip.remove();
        },450);

    });

});

</script>

</body>
</html>
