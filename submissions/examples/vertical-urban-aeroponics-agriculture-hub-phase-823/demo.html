<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vertical Urban Aeroponics Agriculture Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hub-header">
    <h1>Vertical Urban Aeroponics Agriculture Hub</h1>
    <p>Monitoring nutrient misting cycles, growth towers, and yield across the hub</p>
  </header>

  <main class="hub-grid">

    <section class="panel tower-panel">
      <div class="panel-title">Growth Tower Activity</div>
      <div class="tower-view">
        <span class="mist-particle p-1"></span>
        <span class="mist-particle p-2"></span>
        <span class="mist-particle p-3"></span>
        <span class="tower-bar bar-1"></span>
        <span class="tower-bar bar-2"></span>
        <span class="tower-bar bar-3"></span>
      </div>
    </section>

    <section class="panel nutrient-panel">
      <div class="panel-title">Nutrient Cycle</div>
      <div class="nutrient-meter">
        <div class="nutrient-fill"></div>
        <span class="nutrient-value">84%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Active Towers</span>
        <span class="metric-number">36</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Water Saved</span>
        <span class="metric-number">92%</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Yield (kg/wk)</span>
        <span class="metric-number">214</span>
      </div>
    </section>

  </main>

</body>
</html>
