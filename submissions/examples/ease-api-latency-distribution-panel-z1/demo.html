<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease API Latency Distribution Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>API Latency Distribution</h2>

<div class="metric healthy">
<div>
<h3>GET /users</h3>
<p>P50: 42 ms</p>
</div>
<span>Fast</span>
</div>

<div class="metric active">
<div>
<h3>POST /orders</h3>
<p>P95: 186 ms</p>
</div>
<span>Normal</span>
</div>

<div class="metric warning">
<div>
<h3>PUT /payments</h3>
<p>P99: 482 ms</p>
</div>
<span>Review</span>
</div>

<div class="metric critical">
<div>
<h3>DELETE /sessions</h3>
<p>Latency Spike Detected</p>
</div>
<span>Alert</span>
</div>

</section>

</body>
</html>
