<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Showcase Magnetic Tabs Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f1f5f9; /* Slate-100 */
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .demo-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
        }
        h2 {
            color: #334155; /* Slate-700 */
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="demo-wrapper">
        <h2>Features</h2>
        
        <div class="ease-saas-tabs-container">
            <input type="radio" id="tab1" name="saas-tabs" checked>
            <input type="radio" id="tab2" name="saas-tabs">
            <input type="radio" id="tab3" name="saas-tabs">

            <label for="tab1" class="ease-saas-tab">Automation</label>
            <label for="tab2" class="ease-saas-tab">Integrations</label>
            <label for="tab3" class="ease-saas-tab">Reporting</label>

            <!-- The active background highlight -->
            <div class="ease-saas-active-indicator"></div>
        </div>
    </div>
</body>
</html>
