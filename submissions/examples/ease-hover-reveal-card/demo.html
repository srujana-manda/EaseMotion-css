<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Reveal Card Demo - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <div class="ease-hover-reveal-card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS7d0jv9QsVUPrdwqcnBV8B1hiNGQJ4nbsouTuIbZqf1A&s=10" alt="Demo Image">
      <div class="ease-hover-reveal-content">
        <h2>Project Title</h2>
        <p>This content smoothly appears when we hover over the card.</p>
      </div>
    </div>

    <div class="ease-hover-reveal-card variant-fade">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS7d0jv9QsVUPrdwqcnBV8B1hiNGQJ4nbsouTuIbZqf1A&s=10" alt="Demo Image">
      <div class="ease-hover-reveal-content">
        <h2>Fade-In Card</h2>
        <p>The overlay smoothly fades in without sliding.</p>
      </div>
    </div>

    <div class="ease-hover-reveal-card variant-peek">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS7d0jv9QsVUPrdwqcnBV8B1hiNGQJ4nbsouTuIbZqf1A&s=10" alt="Demo Image">
      <div class="ease-hover-reveal-content">
        <h2>Peek Caption</h2>
        <p>This title peeks at the bottom and expands on hover to show full details.</p>
      </div>
    </div>

  </div>

</body>
</html>
