<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Animated Counter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Number Counters</h1>

<div class="counter-grid">

<div class="counter-card">
<h2>250+</h2>
<p>Projects Completed</p>
</div>

<div class="counter-card">
<h2>15K</h2>
<p>Active Users</p>
</div>

<div class="counter-card">
<h2>98%</h2>
<p>Customer Satisfaction</p>
</div>

<div class="counter-card">
<h2>120</h2>
<p>Team Members</p>
</div>

</div>

</div>

</body>
</html>
