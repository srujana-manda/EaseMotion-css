<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiggle Tooltip Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    
    <div class="tooltip-trigger-ag" tabindex="0" aria-describedby="wiggle-tooltip-ag">
      Save Configuration
      
      <!-- The Tooltip -->
      <div id="wiggle-tooltip-ag" class="wiggle-tooltip-ag" role="status" aria-live="polite">
        <span class="wiggle-dots-ag">...</span> Saving
      </div>
      
    </div>

  </div>
</body>
</html>
