<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typewriter Delete-Write Loop Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #0f172a;
      --ease-color-surface:        #1e293b;
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #334155;
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-font-mono:            'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.3), 0 4px 6px -2px rgba(0,0,0,0.15);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f8fafc;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #94a3b8;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02);
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Showcase layout ── */
    .showcase-container {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      width: 100%;
      max-width: 600px;
    }

    .showcase-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Agency Heading Styling */
    .agency-heading {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .color-primary {
      color: var(--ease-color-primary);
    }

    /* Terminal Mockup Styling */
    .terminal-box {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      font-family: var(--ease-font-mono);
      font-size: 0.95rem;
      color: #38bdf8;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
    }

    .terminal-prompt {
      color: #64748b;
      margin-right: 0.5rem;
      user-select: none;
    }

    .terminal-text {
      color: #f1f5f9;
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Typewriter Delete-Write Loop</h1>
    <p>
      An animated typewriter effect that continuously writes, pauses, deletes, and loops without any JavaScript.
    </p>
  </header>

  <main class="showcase-container">
    
    <!-- Hero Heading showcase -->
    <div class="showcase-card">
      <h2 class="agency-heading">
        We deliver <br>
        <span class="typewriter-loop-delete-uj color-primary" style="--chars: 10;">Modern UI.</span>
      </h2>
    </div>

    <!-- Terminal command showcase -->
    <div class="showcase-card">
      <div class="terminal-box">
        <span class="terminal-prompt">$</span><span class="terminal-text">npm install </span><span class="typewriter-loop-delete-uj" style="--chars: 14; color: #a78bfa;">easemotion-css</span>
      </div>
    </div>

  </main>

</body>
</html>
