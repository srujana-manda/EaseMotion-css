<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Service Level Objective Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Service Level Objectives</h2>

<div class="card healthy">
<div>
<h3>API Availability</h3>
<p>99.98% / Target 99.95%</p>
</div>
<span>Met</span>
</div>

<div class="card active">
<div>
<h3>Error Budget</h3>
<p>82% Remaining This Month</p>
</div>
<span>Healthy</span>
</div>

<div class="card warning">
<div>
<h3>Latency SLO</h3>
<p>P95 Response: 285 ms</p>
</div>
<span>Watch</span>
</div>

<div class="card critical">
<div>
<h3>Checkout Service</h3>
<p>Success Rate Dropped to 98.7%</p>
</div>
<span>Risk</span>
</div>

</section>

</body>
</html>
