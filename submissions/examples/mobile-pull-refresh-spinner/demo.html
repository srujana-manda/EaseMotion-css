<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Pull Refresh Spinner — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Mobile Pull Refresh Spinner</h1>
  <p class="subtitle">A mobile-style pull-to-refresh visual spinner — pure CSS.</p>
  <section><h2>Demo</h2><div class="spinner-wrap"><div class="refresh-spinner"><div class="arc"></div></div><p class="spinner-label">Pull to refresh</p></div></section>
  <section><h2>How It Works</h2><p>The spinner uses a circular <code>conic-gradient</code> arc with a <code>rotate</code> animation. The container simulates the pull-down overscroll motion.</p></section>
</body>
</html>
