<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Loading Animations Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        h1 { margin-bottom: 50px; font-weight: 700; }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 80%;
            max-width: 1000px;
        }
        .demo-item {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .demo-item h3 { margin-top: 20px; font-size: 1.1rem; color: #666; }
    </style>
</head>
<body>

    <h1>Loading Animations Demo</h1>

    <div class="demo-grid">
        <!-- Spinner Section -->
        <div class="demo-item">
            <div class="em-loader-spinner"></div>
            <h3>Circular Spinner</h3>
        </div>

        <!-- Dots Section -->
        <div class="demo-item">
            <div class="em-loader-dots">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <h3>Pulsing Dots</h3>
        </div>

        <!-- Progress Bar Section -->
        <div class="demo-item">
            <div class="em-loader-progress-container">
                <div class="em-loader-progress-bar"></div>
            </div>
            <h3>Indeterminate Progress</h3>
        </div>
    </div>

</body>
</html>
