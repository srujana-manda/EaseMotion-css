<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAB Pulse Animation Demo</title>
  
  <!-- Link to the core framework -->
  <link rel="stylesheet" href="../../easemotion.css">
  
  <!-- Our specific feature CSS -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
    }
    
    .ease-fab {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      border: none;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
    
    .ease-fab:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  
  <button class="ease-fab ease-fab-pulse" aria-label="Add new item">
    +
  </button>
  
</body>
</html>
