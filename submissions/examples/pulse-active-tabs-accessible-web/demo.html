<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Active Tabs - Accessible Web</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

    <h1>Accessible Web Tabs</h1>

    <div class="tabs" role="tablist">

        <button 
            class="tab active" 
            role="tab"
            aria-selected="true">
            Home
        </button>

        <button 
            class="tab" 
            role="tab"
            aria-selected="false">
            Services
        </button>

        <button 
            class="tab" 
            role="tab"
            aria-selected="false">
            About
        </button>

        <button 
            class="tab" 
            role="tab"
            aria-selected="false">
            Contact
        </button>

    </div>


    <section class="content">

        <h2>Accessible Interface</h2>

        <p>
            CSS-only Pulse Active Tabs designed for
            accessible and responsive web layouts.
        </p>

    </section>


</main>

</body>
</html>
