<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Calendar Week View</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calendar">

    <h1>Weekly Calendar</h1>

    <div class="week">

        <div class="day">
            <h2>Mon</h2>
            <div class="event" tabindex="0">
                <span>09:00 AM</span>
                <p>Team Meeting</p>
            </div>
            <div class="event" tabindex="0">
                <span>02:00 PM</span>
                <p>Project Review</p>
            </div>
        </div>

        <div class="day">
            <h2>Tue</h2>
            <div class="event" tabindex="0">
                <span>11:00 AM</span>
                <p>Design Session</p>
            </div>
        </div>

        <div class="day">
            <h2>Wed</h2>
            <div class="event" tabindex="0">
                <span>10:00 AM</span>
                <p>Client Call</p>
            </div>
            <div class="event" tabindex="0">
                <span>03:30 PM</span>
                <p>Development</p>
            </div>
        </div>

        <div class="day">
            <h2>Thu</h2>
            <div class="event" tabindex="0">
                <span>01:00 PM</span>
                <p>Testing</p>
            </div>
        </div>

        <div class="day">
            <h2>Fri</h2>
            <div class="event" tabindex="0">
                <span>09:30 AM</span>
                <p>Sprint Planning</p>
            </div>
        </div>

        <div class="day">
            <h2>Sat</h2>
            <div class="event" tabindex="0">
                <span>04:00 PM</span>
                <p>Personal Tasks</p>
            </div>
        </div>

        <div class="day">
            <h2>Sun</h2>
            <div class="event" tabindex="0">
                <span>06:00 PM</span>
                <p>Weekly Review</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
