<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shimmer Sweep Tabs</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f0f13;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .demo-wrap {
        width: 100%;
        max-width: 480px;
        padding: 1.5rem;
      }
      .tab-panel h3 {
        color: #fff;
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .tab-panel p {
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="demo-wrap">
      <div class="shimmer-sweep-tabs">
        <input type="radio" name="tabs" id="tab1" checked />
        <input type="radio" name="tabs" id="tab2" />
        <input type="radio" name="tabs" id="tab3" />

        <nav class="tabs-nav">
          <label for="tab1">Work</label>
          <label for="tab2">Play</label>
          <label for="tab3">Rest</label>
          <span class="shimmer" aria-hidden="true"></span>
        </nav>

        <div class="tabs-panels">
          <div class="tab-panel">
            <h3>Work</h3>
            <p>Curated projects and case studies.</p>
          </div>
          <div class="tab-panel">
            <h3>Play</h3>
            <p>Experiments and creative explorations.</p>
          </div>
          <div class="tab-panel">
            <h3>Rest</h3>
            <p>Thoughts, notes, and processes.</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
