<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collapse Button Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    
    <div class="button-wrapper-ag">
      <!-- 
        The button wrapper helps contain the collapse animation smoothly 
        without jumping layout during the entrance.
      -->
      <button class="collapse-button-ag">
        <span class="btn-text-ag">Click to Proceed</span>
      </button>
    </div>
    
    <p style="margin-top: 1rem; color: #64748b; font-size: 0.875rem;">
      Refresh the page to see the button enter via the collapse (unfold) animation.
    </p>

  </div>
</body>
</html>
