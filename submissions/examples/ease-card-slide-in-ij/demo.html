<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Slide In | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button onclick="toggleSlide()">Toggle Slide</button>
    <div class="card" style="--slide: 0">
      <h2>Slide In Card</h2>
      <p>This card slides in from the left when toggled.</p>
    </div>
  </div>
  <script>
    function toggleSlide() {
      const card = document.querySelector('.card');
      const current = card.style.getPropertyValue('--slide');
      card.style.setProperty('--slide', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
