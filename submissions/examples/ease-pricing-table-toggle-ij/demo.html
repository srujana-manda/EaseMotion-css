<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Toggle - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Pricing</h1>
    <p class="desc">Toggle between monthly and yearly billing</p>
    <div class="pt-card" id="ptCard">
      <div class="pt-toggle">
        <span class="pt-label" id="ptLabel">Monthly</span>
        <label class="pt-switch">
          <input type="checkbox" id="ptInput">
          <span class="pt-track"></span>
        </label>
        <span class="pt-label">Yearly</span>
        <span class="pt-badge" id="ptBadge">Save 20%</span>
      </div>
      <div class="pt-plans">
        <div class="pt-plan">
          <h3>Basic</h3>
          <div class="pt-price" id="ptPrice1" style="--pt-amount: 9;">
            <span class="pt-currency">$</span>
            <span class="pt-num">9</span>
            <span class="pt-period">/mo</span>
          </div>
          <ul class="pt-features">
            <li>5 projects</li>
            <li>10 GB storage</li>
            <li>Basic support</li>
          </ul>
          <button class="pt-btn">Choose</button>
        </div>
        <div class="pt-plan pt-featured">
          <h3>Pro</h3>
          <div class="pt-price" id="ptPrice2" style="--pt-amount: 29;">
            <span class="pt-currency">$</span>
            <span class="pt-num">29</span>
            <span class="pt-period">/mo</span>
          </div>
          <ul class="pt-features">
            <li>Unlimited projects</li>
            <li>100 GB storage</li>
            <li>Priority support</li>
          </ul>
          <button class="pt-btn pt-primary">Choose</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const input = document.getElementById('ptInput');
    const prices = [
      document.getElementById('ptPrice1'),
      document.getElementById('ptPrice2')
    ];
    const badge = document.getElementById('ptBadge');
    const monthly = [9, 29];
    const yearly = [7, 23];

    input.addEventListener('change', () => {
      const isYearly = input.checked;
      badge.style.display = isYearly ? 'inline' : 'none';
      const amounts = isYearly ? yearly : monthly;
      prices.forEach((el, i) => {
        el.style.setProperty('--pt-amount', amounts[i]);
        el.querySelector('.pt-num').textContent = amounts[i];
        el.querySelector('.pt-period').textContent = isYearly ? '/yr' : '/mo';
      });
    });
  </script>
</body>
</html>
