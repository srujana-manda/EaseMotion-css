<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Potion Brewing</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>🧪 Magical Potion Brewing</h1>

<div class="lab">

<div class="flask-wrapper">

<div class="glow"></div>

<div class="steam" id="steam"></div>

<div class="flask">

<div class="neck"></div>

<div class="cork" id="cork"></div>

<div class="liquid" id="liquid">

<div class="bubbles" id="bubbles"></div>

</div>

</div>

<div class="sparkles" id="sparkles"></div>

</div>

<div class="controls">

<button id="brewBtn">
🪄 Brew Potion
</button>

<button id="colorBtn">
🎨 Change Color
</button>

<button id="resetBtn">
🔄 Reset
</button>

<div class="slider">

<label>Magic Speed</label>

<input
type="range"
id="speed"
min="0.5"
max="3"
step="0.1"
value="1">

<span id="speedValue">
1x
</span>

</div>

<div class="indicator">

Current Potion

<span id="colorName">
Purple
</span>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
