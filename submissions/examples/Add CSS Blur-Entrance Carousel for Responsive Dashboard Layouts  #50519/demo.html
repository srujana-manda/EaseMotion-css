<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blur-Entrance Carousel - Responsive Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Accessibility Announcement -->
    <div class="sr-only" aria-live="polite">Use left and right arrow keys to navigate dashboard widgets.</div>

    <div class="dash-carousel">
        <!-- Radio inputs for pure CSS state -->
        <input type="radio" name="dash-slider" id="widget-1" class="dash-input" checked aria-label="Widget 1: Revenue">
        <input type="radio" name="dash-slider" id="widget-2" class="dash-input" aria-label="Widget 2: Users">
        <input type="radio" name="dash-slider" id="widget-3" class="dash-input" aria-label="Widget 3: Performance">

        <div class="dash-track">
            <!-- Widget 1: Revenue -->
            <div class="dash-slide">
                <div class="dash-card">
                    <div class="dash-header">
                        <h3 class="dash-title">Total Revenue</h3>
                        <span class="dash-badge success">+14.5%</span>
                    </div>
                    <div class="dash-metric">$124,563.00</div>
                    <div class="dash-chart">
                        <!-- CSS simulated bar chart -->
                        <div class="bar" style="height: 40%"></div>
                        <div class="bar" style="height: 70%"></div>
                        <div class="bar" style="height: 55%"></div>
                        <div class="bar" style="height: 90%"></div>
                        <div class="bar" style="height: 65%"></div>
                        <div class="bar" style="height: 100%; background-color: var(--color-primary);"></div>
                    </div>
                </div>
            </div>

            <!-- Widget 2: Users -->
            <div class="dash-slide">
                <div class="dash-card">
                    <div class="dash-header">
                        <h3 class="dash-title">Active Users</h3>
                        <span class="dash-badge warning">-2.4%</span>
                    </div>
                    <div class="dash-metric">45,210</div>
                    <div class="dash-chart line-chart">
                        <!-- CSS simulated line chart -->
                        <svg viewBox="0 0 100 40" preserveAspectRatio="none">
                            <path d="M0,40 L0,30 L20,10 L40,20 L60,5 L80,15 L100,0 L100,40 Z" fill="rgba(245, 158, 11, 0.1)"></path>
                            <polyline points="0,30 20,10 40,20 60,5 80,15 100,0" fill="none" stroke="var(--color-warning)" stroke-width="2"></polyline>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Widget 3: Performance -->
            <div class="dash-slide">
                <div class="dash-card">
                    <div class="dash-header">
                        <h3 class="dash-title">System Load</h3>
                        <span class="dash-badge neutral">Stable</span>
                    </div>
                    <div class="dash-metric">24.8%</div>
                    <div class="dash-chart progress-chart">
                        <!-- CSS simulated progress bar -->
                        <div class="progress-track">
                            <div class="progress-fill" style="width: 24.8%"></div>
                        </div>
                        <div class="progress-details">
                            <span>0%</span>
                            <span>100%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dash-controls">
            <label for="widget-1" class="dash-dot"></label>
            <label for="widget-2" class="dash-dot"></label>
            <label for="widget-3" class="dash-dot"></label>
        </div>
    </div>
</body>
</html>
