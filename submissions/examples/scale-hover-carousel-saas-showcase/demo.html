<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Scale-Hover Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="carousel" tabindex="0" aria-label="SaaS Showcase Carousel">

  <article class="card">
    <span class="badge">Analytics</span>
    <h2>Real-Time Dashboard</h2>
    <p>Track your business metrics instantly with interactive insights.</p>
    <button>Learn More</button>
  </article>

  <article class="card">
    <span class="badge">Automation</span>
    <h2>Workflow Builder</h2>
    <p>Create automated workflows without writing code.</p>
    <button>Explore</button>
  </article>

  <article class="card">
    <span class="badge">Security</span>
    <h2>Enterprise Ready</h2>
    <p>Protect your data with secure authentication and encryption.</p>
    <button>Get Started</button>
  </article>

</section>

</body>
</html>
