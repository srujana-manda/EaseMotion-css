<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-chip-slide-remove</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="csr-container">
    <div class="csr-chip" id="csr-chip-1" style="--dismissed: 0">
      <span class="csr-icon">⚙</span>
      <span class="csr-label">Settings</span>
      <button class="csr-dismiss" data-target="csr-chip-1" aria-label="Dismiss">&times;</button>
    </div>
    <div class="csr-chip" id="csr-chip-2" style="--dismissed: 0">
      <span class="csr-icon">🔔</span>
      <span class="csr-label">Notifications</span>
      <button class="csr-dismiss" data-target="csr-chip-2" aria-label="Dismiss">&times;</button>
    </div>
    <div class="csr-chip" id="csr-chip-3" style="--dismissed: 0">
      <span class="csr-icon">👤</span>
      <span class="csr-label">Profile</span>
      <button class="csr-dismiss" data-target="csr-chip-3" aria-label="Dismiss">&times;</button>
    </div>
  </div>
  <script>
    document.querySelectorAll('.csr-dismiss').forEach(btn => {
      btn.addEventListener('click', () => {
        const chip = document.getElementById(btn.dataset.target);
        chip.style.setProperty('--dismissed', 1);
        setTimeout(() => { chip.style.display = 'none'; }, 400);
      });
    });
  </script>
</body>
</html>
