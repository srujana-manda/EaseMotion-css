<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morphing Icon Toggles - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-min-h-screen ease-bg-slate-950 ease-flex ease-items-center ease-justify-center ease-p-8 ease-font-sans">
  
  <main class="ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-text-white ease-mb-2 ease-fade-in">
      Morphing Icon Toggles
    </h1>
    <p class="ease-text-slate-400 ease-mb-12 ease-fade-in ease-delay-100">
      Pure CSS interactive icons. Click to toggle!
    </p>

    <div class="ease-flex ease-flex-wrap ease-gap-12 ease-justify-center ease-items-start">
      
      <!-- 1. Menu to X -->
      <div class="ease-flex ease-flex-col ease-items-center ease-gap-4 ease-fade-in ease-delay-200">
        <label class="toggle menu-close" aria-label="Toggle Menu">
          <input type="checkbox" />
          <span class="slider">
            <span class="icon-menu">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </span>
        </label>
        <span class="ease-text-sm ease-text-slate-500">Menu / Close</span>
      </div>

      <!-- 2. Plus to X -->
      <div class="ease-flex ease-flex-col ease-items-center ease-gap-4 ease-fade-in ease-delay-300">
        <label class="toggle plus-close" aria-label="Toggle Add">
          <input type="checkbox" />
          <span class="slider">
            <span class="icon-plus">
              <span></span>
              <span></span>
            </span>
          </span>
        </label>
        <span class="ease-text-sm ease-text-slate-500">Add / Close</span>
      </div>

      <!-- 3. Chevron Down to Up -->
      <div class="ease-flex ease-flex-col ease-items-center ease-gap-4 ease-fade-in ease-delay-400">
        <label class="toggle chevron-toggle" aria-label="Toggle Expand">
          <input type="checkbox" />
          <span class="slider">
            <span class="icon-chevron"></span>
          </span>
        </label>
        <span class="ease-text-sm ease-text-slate-500">Expand / Collapse</span>
      </div>

    </div>
  </main>
</body>
</html>
