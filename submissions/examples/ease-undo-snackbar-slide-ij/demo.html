<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-undo-snackbar-slide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="uss-container">
    <button class="uss-btn" onclick="showSnackbar()">Show Snackbar</button>
    <div class="uss-snackbar" style="--show: 0">
      <span class="uss-message">Item deleted</span>
      <button class="uss-undo" onclick="undo()">Undo</button>
    </div>
  </div>
  <script>
    let timeout;

    function showSnackbar() {
      const snackbar = document.querySelector('.uss-snackbar');
      snackbar.style.setProperty('--show', '1');
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        snackbar.style.setProperty('--show', '0');
      }, 4000);
    }

    function undo() {
      const snackbar = document.querySelector('.uss-snackbar');
      snackbar.style.setProperty('--show', '0');
      clearTimeout(timeout);
      alert('Undo triggered!');
    }
  </script>
</body>
</html>
