<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volcanic Early Warning Grid — Phase #735</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Tremor wrapper for occasional screen shake -->
  <div class="app-wrapper">

    <!-- Header -->
    <header class="warning-header fade-in">
      <div class="brand">
        <div class="brand-icon"></div>
        SEISMO-VULCAN GRID
      </div>
      <div class="header-stat">
        <div class="stat-box">
          <span class="stat-val" style="color: var(--clr-magma)">LEVEL 4</span>
          <span class="stat-lbl">Alert Status</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" style="color: var(--clr-safe); text-shadow: 0 0 10px var(--clr-safe)">Evacuation</span>
          <span class="stat-lbl">Action Required</span>
        </div>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="app-main">
      
      <!-- Left Sidebar: Tremor Logs -->
      <aside class="panel fade-up">
        <div class="panel-title">SEISMIC TREMOR LOG</div>
        
        <div class="tremor-log">
          
          <div class="tremor-event high">
            <div class="te-hdr">
              <span class="te-mag">M 4.2</span>
              <span class="te-time">-2m ago</span>
            </div>
            <div class="te-loc">Shallow Harmonic Tremor</div>
            
            <div class="waveform">
              <div class="wf-bar"></div><div class="wf-bar"></div><div class="wf-bar"></div>
              <div class="wf-bar"></div><div class="wf-bar"></div><div class="wf-bar"></div>
              <div class="wf-bar"></div><div class="wf-bar"></div><div class="wf-bar"></div>
              <div class="wf-bar"></div>
            </div>
          </div>

          <div class="tremor-event">
            <div class="te-hdr">
              <span class="te-mag">M 2.8</span>
              <span class="te-time">-14m ago</span>
            </div>
            <div class="te-loc">Deep Tectonic Shift</div>
            
            <div class="waveform">
              <div class="wf-bar"></div><div class="wf-bar"></div><div class="wf-bar"></div>
              <div class="wf-bar"></div><div class="wf-bar"></div><div class="wf-bar"></div>
              <div class="wf-bar"></div><div class="wf-bar"></div><div class="wf-bar"></div>
              <div class="wf-bar"></div>
            </div>
          </div>

        </div>
      </aside>

      <!-- Center: Volcanic Cone Cross-Section -->
      <section class="panel cone-panel fade-in delay-1" style="padding: 0; background: transparent; border: none; box-shadow: none;">
        <div class="cone-view">
          
          <!-- Plumes -->
          <div class="plume"></div>
          <div class="plume p-2"></div>

          <!-- Volcano Structure -->
          <div class="volcano"></div>
          
          <!-- Magma Chamber & Conduit -->
          <div class="magma-chamber"></div>
          <div class="conduit"></div>

        </div>
      </section>

      <!-- Right Sidebar: Gas & Emissions -->
      <aside class="panel fade-up delay-2">
        
        <div class="alert-card">
          <div class="ac-lbl">Surface Temp</div>
          <div class="ac-val">485°C</div>
        </div>

        <div class="panel-title">GAS EMISSIONS</div>
        
        <div class="gas-list">
          
          <div class="gas-item">
            <div class="gi-hdr">
              <span class="gi-name">Sulfur Dioxide (SO2)</span>
              <span class="gi-val">4,200 t/d</span>
            </div>
            <div class="gi-bar"><div class="gi-fill" style="width: 85%;"></div></div>
          </div>

          <div class="gas-item">
            <div class="gi-hdr">
              <span class="gi-name">Carbon Dioxide (CO2)</span>
              <span class="gi-val">12,500 t/d</span>
            </div>
            <div class="gi-bar"><div class="gi-fill" style="width: 60%; background: var(--clr-safe)"></div></div>
          </div>

          <div class="gas-item">
            <div class="gi-hdr">
              <span class="gi-name">Hydrogen Sulfide (H2S)</span>
              <span class="gi-val">850 t/d</span>
            </div>
            <div class="gi-bar"><div class="gi-fill" style="width: 95%; background: var(--clr-magma)"></div></div>
          </div>

        </div>

      </aside>

    </main>

  </div> <!-- /app-wrapper -->

</body>
</html>
