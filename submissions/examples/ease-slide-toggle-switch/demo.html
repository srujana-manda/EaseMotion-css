<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Toggle Switch — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Slide Toggle Switch</h1>
  <p class="subtitle">A sliding toggle switch — pure CSS.</p>
  <section class="demo"><h2>Demo</h2><div class="toggle-row"><span>Wi-Fi</span><label class="toggle"><input type="checkbox" checked><span class="toggle-track"><span class="toggle-knob"></span></span></label></div><div class="toggle-row"><span>Bluetooth</span><label class="toggle"><input type="checkbox"><span class="toggle-track"><span class="toggle-knob"></span></span></label></div><div class="toggle-row"><span>Dark Mode</span><label class="toggle disabled"><input type="checkbox" disabled><span class="toggle-track"><span class="toggle-knob"></span></span></label></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;label class=&quot;toggle&quot;&gt;
  &lt;input type=&quot;checkbox&quot;&gt;
  &lt;span class=&quot;toggle-track&quot;&gt;
    &lt;span class=&quot;toggle-knob&quot;&gt;&lt;/span&gt;
  &lt;/span&gt;
&lt;/label&gt;</code></pre></section>
</body>
</html>
