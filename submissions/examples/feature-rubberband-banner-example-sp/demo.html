<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RubberBand Banner Example</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="rubberband-banner-page-sp">
      <h1>RubberBand Banner</h1>
      <p>Click dismiss to play a rubberband exit animation.</p>

      <div
        class="rubberband-banner-sp"
        id="rubberband-banner-sp"
        role="status"
        aria-live="polite"
      >
        <span>Your changes were saved successfully.</span>
        <button
          type="button"
          class="rubberband-banner-dismiss-sp"
          id="rubberband-dismiss-sp"
          aria-label="Dismiss banner"
        >
          Dismiss
        </button>
      </div>
    </main>

    <script>
      (function () {
        var banner = document.getElementById('rubberband-banner-sp');
        var dismiss = document.getElementById('rubberband-dismiss-sp');

        dismiss.addEventListener('click', function () {
          banner.classList.add('is-exiting-sp');
          banner.addEventListener(
            'animationend',
            function () {
              banner.hidden = true;
            },
            { once: true }
          );
        });
      })();
    </script>
  </body>
</html>
