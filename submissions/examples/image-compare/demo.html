<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Compare Slider – EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Before / After Image Compare</h1>

  <p class="intro">Drag the center handle left or right to reveal the "before" image underneath the "after" image. Pure CSS — no JavaScript.</p>

  <section class="demo-grid">

    <figure>
      <div class="image-compare">
        <img
          class="image-compare-before"
          src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=500&fit=crop"
          alt="Before – mountain landscape"
          width="800"
          height="500"
        >
        <span class="image-compare-before-label">BEFORE</span>
        <div class="image-compare-after-wrap">
          <img
            class="image-compare-after"
            src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&h=500&fit=crop"
            alt="After – mountain landscape"
            width="800"
            height="500"
          >
          <span class="image-compare-after-label">AFTER</span>
        </div>
      </div>
      <figcaption>Mountain landscape &ndash; natural vs dramatic edit</figcaption>
    </figure>

    <figure>
      <div class="image-compare">
        <img
          class="image-compare-before"
          src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&h=500&fit=crop"
          alt="Before – foggy forest"
          width="800"
          height="500"
        >
        <span class="image-compare-before-label">BEFORE</span>
        <div class="image-compare-after-wrap">
          <img
            class="image-compare-after"
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=500&fit=crop"
            alt="After – sunlit forest"
            width="800"
            height="500"
          >
          <span class="image-compare-after-label">AFTER</span>
        </div>
      </div>
      <figcaption>Forest scene &ndash; moody fog vs bright sunlight</figcaption>
    </figure>

    <figure>
      <div class="image-compare">
        <img
          class="image-compare-before"
          src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&h=500&fit=crop"
          alt="Before – tropical beach"
          width="800"
          height="500"
        >
        <span class="image-compare-before-label">BEFORE</span>
        <div class="image-compare-after-wrap">
          <img
            class="image-compare-after"
            src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=800&h=500&fit=crop"
            alt="After – sunset beach"
            width="800"
            height="500"
          >
          <span class="image-compare-after-label">AFTER</span>
        </div>
      </div>
      <figcaption>Tropical beach &ndash; daytime vs sunset glow</figcaption>
    </figure>

  </section>

</body>
</html>
