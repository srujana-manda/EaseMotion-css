<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Zoom-In Carousel - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Product Catalog Carousel</h1>

  <div class="carousel">

    <div class="card active" tabindex="0">
      <h2>Headphones</h2>
      <p>Wireless Audio</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Smart Watch</h2>
      <p>Fitness Tracker</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Laptop</h2>
      <p>Performance Series</p>
    </div>

  </div>

</div>

</body>
</html>
