<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exoplanet Bio-Habitability Index — Phase #762</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header fade-in">
    <div class="brand">KEPLER-452b // SURVEY</div>
    <div class="sys-info">
      <div class="sys-stat">
        <span class="sys-v">1,400 LY</span>
        <span class="sys-l">Distance</span>
      </div>
      <div class="sys-stat">
        <span class="sys-v" style="color: var(--clr-cyan); text-shadow: var(--glow-cyan)">G-TYPE</span>
        <span class="sys-l">Star Class</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Spectral Analysis -->
    <aside class="panel fade-up">
      <div class="panel-title">HABITABILITY INDEX</div>
      
      <div class="hab-score">
        <div class="hab-score-inner">
          <span class="h-val">87<span style="font-size: 1rem">%</span></span>
          <span class="h-lbl">MATCH</span>
        </div>
      </div>

      <div class="panel-title">ATMOSPHERIC SPECTRA</div>
      
      <div class="gas-row">
        <div class="gas-hdr"><span>Nitrogen (N₂)</span> <span>72.1%</span></div>
        <div class="gas-bar"><div class="gas-fill" style="width: 72.1%;"></div></div>
      </div>
      <div class="gas-row">
        <div class="gas-hdr"><span>Oxygen (O₂)</span> <span>21.4%</span></div>
        <div class="gas-bar"><div class="gas-fill" style="width: 21.4%; background: var(--clr-cyan); box-shadow: var(--glow-cyan);"></div></div>
      </div>
      <div class="gas-row">
        <div class="gas-hdr"><span>Argon (Ar)</span> <span>4.2%</span></div>
        <div class="gas-bar"><div class="gas-fill" style="width: 15%; background: var(--clr-gold); box-shadow: var(--glow-gold);"></div></div>
      </div>
      <div class="gas-row">
        <div class="gas-hdr"><span>Methane (CH₄)</span> <span style="color: var(--clr-danger)">1.8%</span></div>
        <div class="gas-bar"><div class="gas-fill" style="width: 8%; background: var(--clr-danger); box-shadow: 0 0 10px var(--clr-danger);"></div></div>
      </div>
    </aside>

    <!-- Center: 3D Holographic Visualizer -->
    <section class="panel planet-panel fade-in delay-1" style="background: transparent; border: none; box-shadow: none; backdrop-filter: none;">
      <div class="planet-view">
        <div class="orbit-ring"></div>
        <div class="orbit-ring"></div>
        <div class="orbit-ring"></div>
        <div class="exoplanet"></div>
      </div>
    </section>

    <!-- Right Sidebar: Surface & Orbit -->
    <aside class="panel fade-up delay-2">
      <div class="panel-title">SURFACE TOPOLOGY</div>
      
      <div class="topo-grid"></div>

      <div class="panel-title" style="margin-top: 1rem;">ORBITAL METRICS</div>
      
      <div class="metric-box">
        <span class="m-lbl">Gravity</span>
        <span class="m-val">1.2 G</span>
      </div>
      <div class="metric-box">
        <span class="m-lbl">Surface Temp</span>
        <span class="m-val">15°C ~ 35°C</span>
      </div>
      <div class="metric-box">
        <span class="m-lbl">Orbital Period</span>
        <span class="m-val">384 Days</span>
      </div>
      <div class="metric-box">
        <span class="m-lbl">Biosignatures</span>
        <span class="m-val" style="color: var(--clr-cyan);">DETECTED</span>
      </div>

    </aside>

  </main>

</body>
</html>
