<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Glow Popover</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <button
        class="trigger"
        id="trigger"
        aria-haspopup="dialog"
        aria-expanded="false"
        aria-controls="popover">

        View Profile

    </button>

    <div
        class="popover"
        id="popover"
        role="dialog"
        tabindex="-1"
        aria-labelledby="title">

        <h3 id="title">Creative Portfolio</h3>

        <p>
            Explore projects, animations, UI components,
            and interactive experiments built with modern CSS.
        </p>

        <div class="actions">

            <button class="secondary" id="closeBtn">
                Close
            </button>

            <button class="primary">
                Explore
            </button>

        </div>

    </div>

</div>

<script>
const trigger = document.getElementById("trigger");
const popover = document.getElementById("popover");
const closeBtn = document.getElementById("closeBtn");

function openPopover() {
    popover.classList.add("show");
    trigger.setAttribute("aria-expanded", "true");
    popover.focus();
}

function closePopover() {
    popover.classList.remove("show");
    trigger.setAttribute("aria-expanded", "false");
    trigger.focus();
}

trigger.addEventListener("click", () => {
    popover.classList.contains("show")
        ? closePopover()
        : openPopover();
});

closeBtn.addEventListener("click", closePopover);

document.addEventListener("click", (e) => {
    if (
        !popover.contains(e.target) &&
        !trigger.contains(e.target)
    ) {
        closePopover();
    }
});

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        closePopover();
    }
});
</script>

</body>
</html>
