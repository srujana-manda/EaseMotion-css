<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Autocomplete Suggestions Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="autocomplete-container">
        <label for="search-input" class="search-label">Search Country</label>
        <div class="input-wrapper">
            <input type="text" id="search-input" placeholder="Type to search..." autocomplete="off">
            <span class="search-icon">🔍</span>
        </div>
        <ul class="suggestions-list" id="suggestions-list">
            <li><span class="match">In</span>dia</li>
            <li><span class="match">In</span>donesia</li>
            <li><span class="match">In</span>gland</li>
        </ul>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const list = document.getElementById('suggestions-list');
        
        // Sample dataset for autocomplete testing
        const countries = [
            "India", "Indonesia", "Ireland", "Iran", "Iraq", "Iceland", "Italy", 
            "United States", "United Kingdom", "Canada", "Australia", "Germany", "France"
        ];

        // Wipe baseline hardcoded examples once JS fires up
        list.innerHTML = '';

        input.addEventListener('input', (e) => {
            const val = e.target.value;
            list.innerHTML = '';
            
            if (!val) {
                list.classList.remove('visible');
                return;
            }

            const filtered = countries.filter(c => c.toLowerCase().startsWith(val.toLowerCase()));
            
            if (filtered.length > 0) {
                filtered.forEach(item => {
                    const li = document.createElement('li');
                    const matchText = item.substring(0, val.length);
                    const remainingText = item.substring(val.length);
                    li.innerHTML = `<span class="match">${matchText}</span>${remainingText}`;
                    
                    li.addEventListener('click', () => {
                        input.value = item;
                        list.classList.remove('visible');
                    });
                    
                    list.appendChild(li);
                });
                list.classList.add('visible');
            } else {
                list.classList.remove('visible');
            }
        });

        // Close dropdown list when clicking outside the application box
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.autocomplete-container')) {
                list.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
