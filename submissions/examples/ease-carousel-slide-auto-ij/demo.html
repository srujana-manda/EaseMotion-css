<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-carousel-slide-auto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="csa-wrapper">
    <div class="csa-carousel" style="--slide: 0" data-slide="0">
      <div class="csa-track">
        <div class="csa-slide" style="background: #e94560;">Slide 1</div>
        <div class="csa-slide" style="background: #0f3460;">Slide 2</div>
        <div class="csa-slide" style="background: #533483;">Slide 3</div>
        <div class="csa-slide" style="background: #1a8a5c;">Slide 4</div>
      </div>
      <div class="csa-dots">
        <span class="csa-dot" data-slide="0"></span>
        <span class="csa-dot" data-slide="1"></span>
        <span class="csa-dot" data-slide="2"></span>
        <span class="csa-dot" data-slide="3"></span>
      </div>
    </div>
    <div class="csa-controls">
      <button class="csa-btn" data-slide="0">1</button>
      <button class="csa-btn" data-slide="1">2</button>
      <button class="csa-btn" data-slide="2">3</button>
      <button class="csa-btn" data-slide="3">4</button>
    </div>
  </div>
  <script>
    document.querySelectorAll('.csa-btn, .csa-dot').forEach(function(el) {
      el.addEventListener('click', function() {
        var s = this.dataset.slide;
        var carousel = document.querySelector('.csa-carousel');
        carousel.style.setProperty('--slide', s);
        carousel.dataset.slide = s;
      });
    });
  </script>
</body>
</html>
