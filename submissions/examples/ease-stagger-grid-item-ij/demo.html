<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stagger Grid Item | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button onclick="toggleStagger()">Toggle Stagger</button>
    <div class="grid" style="--animate: 0">
      <div class="grid-item" style="--i: 1">A</div>
      <div class="grid-item" style="--i: 2">B</div>
      <div class="grid-item" style="--i: 3">C</div>
      <div class="grid-item" style="--i: 4">D</div>
      <div class="grid-item" style="--i: 5">E</div>
      <div class="grid-item" style="--i: 6">F</div>
    </div>
  </div>
  <script>
    function toggleStagger() {
      const grid = document.querySelector('.grid');
      const current = grid.style.getPropertyValue('--animate');
      grid.style.setProperty('--animate', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
