<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Ocean Coral Reef Regeneration Monitoring</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="reef-header">
    <h1>AI Ocean Coral Reef Regeneration Monitoring</h1>
    <p>Tracking coral growth, bleaching recovery, and reef biodiversity in real time</p>
  </header>

  <main class="reef-grid">

    <section class="panel coral-panel">
      <div class="panel-title">Reef Growth</div>
      <div class="coral-view">
        <span class="coral-branch branch-1"></span>
        <span class="coral-branch branch-2"></span>
        <span class="coral-branch branch-3"></span>
        <span class="bubble b-1"></span>
        <span class="bubble b-2"></span>
      </div>
    </section>

    <section class="panel health-panel">
      <div class="panel-title">Reef Health Index</div>
      <div class="health-meter">
        <div class="health-fill"></div>
        <span class="health-value">86%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Coral Coverage</span>
        <span class="metric-number">+22%</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Species Tracked</span>
        <span class="metric-number">148</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Bleaching Risk</span>
        <span class="metric-number">Low</span>
      </div>
    </section>

  </main>

</body>
</html>
