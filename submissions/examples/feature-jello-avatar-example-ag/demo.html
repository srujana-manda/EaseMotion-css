<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jello Avatar Exit Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <h2>Avatar Jello Exit</h2>
        <p>Click an avatar to remove it. It will perform a jello exit animation before disappearing.</p>

        <div class="avatar-group-ag" id="avatar-container-ag">
            <button class="avatar-button-ag" aria-label="Remove Alice">
                <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Alice">
            </button>
            <button class="avatar-button-ag" aria-label="Remove Bob">
                <img src="https://i.pravatar.cc/150?u=a042581f4e29026024d" alt="Bob">
            </button>
            <button class="avatar-button-ag" aria-label="Remove Charlie">
                <img src="https://i.pravatar.cc/150?u=a04258114e29026702d" alt="Charlie">
            </button>
            <button class="avatar-button-ag" aria-label="Remove Diana">
                <img src="https://i.pravatar.cc/150?u=a04258114e29026302d" alt="Diana">
            </button>
        </div>
        
        <button id="reset-btn-ag" class="reset-button-ag">Reset Avatars</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('avatar-container-ag');
            const resetBtn = document.getElementById('reset-btn-ag');
            
            // Store original HTML for reset
            const originalHTML = container.innerHTML;

            function attachListeners() {
                const avatars = document.querySelectorAll('.avatar-button-ag');
                avatars.forEach(avatar => {
                    avatar.addEventListener('click', function() {
                        // Add the exit animation class
                        this.classList.add('ease-jello-exit-ag');
                        
                        // Wait for animation to finish before removing from DOM
                        this.addEventListener('animationend', () => {
                            this.remove();
                        }, { once: true });
                    });
                });
            }

            // Initial attachment
            attachListeners();

            // Reset functionality
            resetBtn.addEventListener('click', () => {
                container.innerHTML = originalHTML;
                attachListeners();
            });
        });
    </script>
</body>
</html>
