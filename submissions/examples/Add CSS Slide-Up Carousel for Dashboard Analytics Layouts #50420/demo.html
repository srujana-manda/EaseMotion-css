<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Slide-Up Carousel - Dashboard Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="dashboard-layout">
    
    <!-- Keyboard Accessible Radio Inputs Placed at Root for Sibling Routing -->
    <input type="radio" name="analytics-view" id="view-daily" class="sr-only" checked>
    <input type="radio" name="analytics-view" id="view-weekly" class="sr-only">
    <input type="radio" name="analytics-view" id="view-monthly" class="sr-only">

    <div class="widget-card">
      
      <!-- Widget Header with Control Tabs -->
      <div class="widget-header">
        <h2 class="widget-title">Performance Analytics</h2>
        <div class="widget-tabs">
          <label for="view-daily" class="tab-btn" tabindex="0">Daily</label>
          <label for="view-weekly" class="tab-btn" tabindex="0">Weekly</label>
          <label for="view-monthly" class="tab-btn" tabindex="0">Monthly</label>
        </div>
      </div>
      
      <!-- Carousel Viewport -->
      <div class="widget-body carousel-viewport">

        <!-- Slide 1: Daily -->
        <div class="slide slide-daily">
          <div class="metrics-grid">
            <div class="metric-box stagger-1">
              <span class="metric-label">Daily Revenue</span>
              <span class="metric-value">$1,240</span>
              <span class="metric-trend positive">↑ 4.2%</span>
            </div>
            <div class="metric-box stagger-2">
              <span class="metric-label">Active Users</span>
              <span class="metric-value">3,450</span>
              <span class="metric-trend negative">↓ 1.1%</span>
            </div>
            <div class="metric-box stagger-3">
              <span class="metric-label">Conversion</span>
              <span class="metric-value">2.4%</span>
              <span class="metric-trend positive">↑ 0.5%</span>
            </div>
          </div>
          <div class="chart-placeholder stagger-3">
            <div class="chart-bar h-60"></div>
            <div class="chart-bar h-80"></div>
            <div class="chart-bar h-40"></div>
            <div class="chart-bar h-100"></div>
            <div class="chart-bar h-30"></div>
            <div class="chart-bar h-70"></div>
            <div class="chart-bar h-90"></div>
          </div>
        </div>

        <!-- Slide 2: Weekly -->
        <div class="slide slide-weekly">
          <div class="metrics-grid">
            <div class="metric-box stagger-1">
              <span class="metric-label">Weekly Revenue</span>
              <span class="metric-value">$8,650</span>
              <span class="metric-trend positive">↑ 12.4%</span>
            </div>
            <div class="metric-box stagger-2">
              <span class="metric-label">Active Users</span>
              <span class="metric-value">12,400</span>
              <span class="metric-trend positive">↑ 5.2%</span>
            </div>
            <div class="metric-box stagger-3">
              <span class="metric-label">Conversion</span>
              <span class="metric-value">2.8%</span>
              <span class="metric-trend positive">↑ 0.8%</span>
            </div>
          </div>
          <div class="chart-placeholder stagger-3">
            <div class="chart-bar weekly-bar w-h-40"></div>
            <div class="chart-bar weekly-bar w-h-70"></div>
            <div class="chart-bar weekly-bar w-h-50"></div>
            <div class="chart-bar weekly-bar w-h-100"></div>
          </div>
        </div>

        <!-- Slide 3: Monthly -->
        <div class="slide slide-monthly">
          <div class="metrics-grid">
            <div class="metric-box stagger-1">
              <span class="metric-label">Monthly Revenue</span>
              <span class="metric-value">$34,200</span>
              <span class="metric-trend positive">↑ 24.1%</span>
            </div>
            <div class="metric-box stagger-2">
              <span class="metric-label">Active Users</span>
              <span class="metric-value">45,100</span>
              <span class="metric-trend positive">↑ 18.5%</span>
            </div>
            <div class="metric-box stagger-3">
              <span class="metric-label">Conversion</span>
              <span class="metric-value">3.2%</span>
              <span class="metric-trend positive">↑ 1.2%</span>
            </div>
          </div>
          <div class="chart-placeholder stagger-3" style="flex-direction: column; align-items: flex-start; justify-content: center; gap: 24px;">
            
            <div style="width: 100%; display: flex; align-items: center; gap: 16px;">
              <span style="width: 60px; font-weight: 500; color: var(--text-secondary); font-size: 0.85rem;">Desktop</span>
              <div class="progress-track">
                <div class="progress-fill p-h-70" style="background: var(--primary-color);"></div>
              </div>
            </div>
            
            <div style="width: 100%; display: flex; align-items: center; gap: 16px;">
              <span style="width: 60px; font-weight: 500; color: var(--text-secondary); font-size: 0.85rem;">Mobile</span>
              <div class="progress-track">
                <div class="progress-fill p-h-40" style="background: #8b5cf6;"></div>
              </div>
            </div>
            
            <div style="width: 100%; display: flex; align-items: center; gap: 16px;">
              <span style="width: 60px; font-weight: 500; color: var(--text-secondary); font-size: 0.85rem;">Tablet</span>
              <div class="progress-track">
                <div class="progress-fill p-h-20" style="background: #10b981;"></div>
              </div>
            </div>
            
          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
