<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate-Click Carousel - Product Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="catalog">
    <h1>Product Catalog</h1>

    <div class="rotate-carousel">
        <button class="card">
            <div class="image">📱</div>
            <h3>Smartphone</h3>
            <p>Fast performance with premium design.</p>
        </button>

        <button class="card">
            <div class="image">💻</div>
            <h3>Laptop</h3>
            <p>Powerful productivity for professionals.</p>
        </button>

        <button class="card">
            <div class="image">⌚</div>
            <h3>Smart Watch</h3>
            <p>Stay connected anytime.</p>
        </button>

        <button class="card">
            <div class="image">🎧</div>
            <h3>Headphones</h3>
            <p>Immersive sound quality.</p>
        </button>
    </div>
</section>

</body>
</html>
