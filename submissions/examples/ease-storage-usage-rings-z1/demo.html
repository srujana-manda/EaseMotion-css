<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Usage Rings</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="storage-card">
<h2>Storage Usage</h2>

<div class="ring-grid">

<div class="ring-item">
<div class="ring ring1"><span>82%</span></div>
<h3>SSD</h3>
</div>

<div class="ring-item">
<div class="ring ring2"><span>56%</span></div>
<h3>Database</h3>
</div>

<div class="ring-item">
<div class="ring ring3"><span>34%</span></div>
<h3>Backups</h3>
</div>

<div class="ring-item">
<div class="ring ring4"><span>91%</span></div>
<h3>Logs</h3>
</div>

</div>

</section>

</body>
</html>
