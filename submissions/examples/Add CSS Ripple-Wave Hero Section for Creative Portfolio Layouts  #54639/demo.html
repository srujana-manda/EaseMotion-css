<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple-Wave Hero Section</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Hero Section -->
  <section class="hero-section" aria-label="Introduction">
    
    <!-- Background Ripple Animation -->
    <div class="ripple-container" aria-hidden="true">
      <div class="ripple ripple-1"></div>
      <div class="ripple ripple-2"></div>
      <div class="ripple ripple-3"></div>
    </div>

    <!-- Main Content -->
    <div class="hero-content">
      <span class="hero-label">Digital Creator</span>
      <h1 class="hero-title">Crafting digital <span>experiences</span></h1>
      <p class="hero-description">
        I'm a visionary designer merging art and technology to build modern, interactive web interfaces that leave a lasting impression.
      </p>
      
      <a href="#work" class="hero-btn">
        Explore My Work
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="M12 5l7 7-7 7"></path>
        </svg>
      </a>
    </div>

  </section>

</body>
</html>
