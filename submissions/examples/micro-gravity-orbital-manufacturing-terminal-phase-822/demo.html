<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Micro-Gravity Orbital Manufacturing Terminal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="orbital-header">
    <h1>Micro-Gravity Orbital Manufacturing Terminal</h1>
    <p>Monitoring zero-g fabrication, print queues, and station telemetry</p>
  </header>

  <main class="orbital-grid">

    <section class="panel bay-panel">
      <div class="panel-title">Fabrication Bay</div>
      <div class="bay-view">
        <span class="orbit-ring ring-1"></span>
        <span class="orbit-ring ring-2"></span>
        <span class="print-core"></span>
      </div>
    </section>

    <section class="panel queue-panel">
      <div class="panel-title">Print Queue Progress</div>
      <div class="queue-meter">
        <div class="queue-fill"></div>
        <span class="queue-value">58%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Gravity Level</span>
        <span class="metric-number">0.001g</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Units Fabricated</span>
        <span class="metric-number">1,842</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Material Stock</span>
        <span class="metric-number">76%</span>
      </div>
    </section>

  </main>

</body>
</html>
