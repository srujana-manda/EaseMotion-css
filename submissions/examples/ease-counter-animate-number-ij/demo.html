<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter Animate Number - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Animated Counter</h1>
    <p class="desc">Numbers transition with a smooth flip animation</p>
    <div class="can-counter" id="counter">
      <span class="can-digit" data-digit="0">0</span>
      <span class="can-digit" data-digit="0">0</span>
      <span class="can-digit" data-digit="0">0</span>
    </div>
    <div class="can-controls">
      <button class="can-btn" data-action="down">-</button>
      <span class="can-value" id="canValue">0</span>
      <button class="can-btn" data-action="up">+</button>
    </div>
  </section>
  <script>
    const digitEls = document.querySelectorAll('.can-digit');
    const valueEl = document.getElementById('canValue');
    let value = 0;

    function updateDisplay() {
      const str = String(Math.abs(value)).padStart(3, '0');
      digitEls.forEach((el, i) => {
        const d = str[i] || '0';
        if (el.dataset.digit !== d) {
          el.dataset.digit = d;
          el.textContent = d;
          el.classList.remove('can-flip');
          void el.offsetWidth;
          el.classList.add('can-flip');
        }
      });
      valueEl.textContent = value;
    }

    document.querySelectorAll('.can-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        value += btn.dataset.action === 'up' ? 1 : -1;
        updateDisplay();
      });
    });

    updateDisplay();
  </script>
</body>
</html>
