<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Biodiversity Ecological Protection Network</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="bio-header">
    <h1>Global Biodiversity Ecological Protection Network</h1>
    <p>Tracking species conservation, habitat health, and protected zones in real time</p>
  </header>

  <main class="bio-grid">

    <section class="panel habitat-panel">
      <div class="panel-title">Habitat Map</div>
      <div class="habitat-view">
        <span class="zone-ring ring-1"></span>
        <span class="zone-ring ring-2"></span>
        <span class="species-dot dot-1"></span>
        <span class="species-dot dot-2"></span>
        <span class="species-dot dot-3"></span>
      </div>
    </section>

    <section class="panel health-panel">
      <div class="panel-title">Conservation Index</div>
      <div class="health-meter">
        <div class="health-fill"></div>
        <span class="health-value">88%</span>
      </div>
    </section>

    <section class="panel card-grid">
      <div class="metric-card card-1">
        <span class="metric-label">Protected Zones</span>
        <span class="metric-number">312</span>
      </div>
      <div class="metric-card card-2">
        <span class="metric-label">Species Monitored</span>
        <span class="metric-number">1,840</span>
      </div>
      <div class="metric-card card-3">
        <span class="metric-label">Poaching Risk</span>
        <span class="metric-number">Low</span>
      </div>
    </section>

  </main>

</body>
</html>
