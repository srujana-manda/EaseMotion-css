<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jello Input Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    <div id="input-wrapper-ag" class="input-wrapper-ag">
      <label for="email-ag" class="sr-only-ag">Email address</label>
      <input type="email" id="email-ag" class="jello-input-ag" placeholder="Enter your email" />
      <button onclick="submitForm()" class="submit-btn-ag">Submit</button>
    </div>
  </div>

  <script>
    function submitForm() {
      const wrapper = document.getElementById('input-wrapper-ag');
      // Trigger the jello exit animation
      wrapper.classList.add('is-exiting-ag');
      
      // Optionally remove from DOM after animation completes
      setTimeout(() => {
        wrapper.style.display = 'none';
      }, 900); // Matches animation duration
    }
  </script>
</body>
</html>
