<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Checkbox Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container-ag">
        <h1>Slide Checkbox</h1>
        <p>A custom toggle switch demonstrating a smooth sliding animation between states.</p>
        
        <div class="checkbox-wrapper-ag">
            <label class="slide-checkbox-label-ag" for="notifications-toggle">
                <span class="label-text-ag">Enable Notifications</span>
                <input type="checkbox" id="notifications-toggle" class="slide-checkbox-input-ag" aria-checked="false">
                <span class="slide-checkbox-track-ag" aria-hidden="true">
                    <span class="slide-checkbox-thumb-ag"></span>
                </span>
            </label>
        </div>
    </main>
    
    <script>
        const checkbox = document.getElementById('notifications-toggle');
        checkbox.addEventListener('change', (e) => {
            e.target.setAttribute('aria-checked', e.target.checked);
        });
    </script>
</body>
</html>
