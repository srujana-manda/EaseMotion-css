<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cauldron Stir – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🧙 Cauldron Stir</h1>
    <p class="subtitle">Cauldron with magical brew stirring</p>

    <div class="cs-container">
      <div class="cs-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Cauldron -->
        <div class="cauldron">
          <!-- Cauldron body -->
          <div class="cauldron-body">
            <!-- Outer rim -->
            <div class="cauldron-rim"></div>

            <!-- Inner rim -->
            <div class="cauldron-inner"></div>

            <!-- Brew liquid -->
            <div class="brew-liquid">
              <div class="brew-surface"></div>
              <div class="brew-color"></div>
              
              <!-- Brew bubbles -->
              <div class="brew-bubble bb1"></div>
              <div class="brew-bubble bb2"></div>
              <div class="brew-bubble bb3"></div>
              <div class="brew-bubble bb4"></div>
              <div class="brew-bubble bb5"></div>
              <div class="brew-bubble bb6"></div>
              <div class="brew-bubble bb7"></div>
              <div class="brew-bubble bb8"></div>
              <div class="brew-bubble bb9"></div>
              <div class="brew-bubble bb10"></div>
              <div class="brew-bubble bb11"></div>
              <div class="brew-bubble bb12"></div>
            </div>

            <!-- Stirring spoon -->
            <div class="spoon">
              <div class="spoon-handle"></div>
              <div class="spoon-head"></div>
            </div>

            <!-- Cauldron feet -->
            <div class="foot foot-left"></div>
            <div class="foot foot-right"></div>
            <div class="foot foot-back"></div>

            <!-- Cauldron handle -->
            <div class="handle handle-left"></div>
            <div class="handle handle-right"></div>
          </div>

          <!-- Steam -->
          <div class="steam s1"></div>
          <div class="steam s2"></div>
          <div class="steam s3"></div>
          <div class="steam s4"></div>
          <div class="steam s5"></div>
          <div class="steam s6"></div>
          <div class="steam s7"></div>
          <div class="steam s8"></div>

          <!-- Magic sparks -->
          <div class="spark sk1"></div>
          <div class="spark sk2"></div>
          <div class="spark sk3"></div>
          <div class="spark sk4"></div>
          <div class="spark sk5"></div>
          <div class="spark sk6"></div>
          <div class="spark sk7"></div>
          <div class="spark sk8"></div>
          <div class="spark sk9"></div>
          <div class="spark sk10"></div>

          <!-- Cauldron glow -->
          <div class="cauldron-glow"></div>

          <!-- Fire underneath -->
          <div class="fire fire-1"></div>
          <div class="fire fire-2"></div>
          <div class="fire fire-3"></div>
          <div class="fire fire-4"></div>
          <div class="fire fire-5"></div>
        </div>

        <!-- Ambient glow -->
        <div class="ambient-glow"></div>
      </div>
    </div>

    <div class="controls">
      <button id="stirBtn">🥄 Stir Brew</button>
      <button id="resetBtn">⟳ Reset</button>
      <label>
        Stir Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Magic Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
    </div>
  </div>

  <script>
    (function() {
      const spoon = document.querySelector('.spoon');
      const brewLiquid = document.querySelector('.brew-liquid');
      const brewSurface = document.querySelector('.brew-surface');
      const brewColor = document.querySelector('.brew-color');
      const brewBubbles = document.querySelectorAll('.brew-bubble');
      const steam = document.querySelectorAll('.steam');
      const sparks = document.querySelectorAll('.spark');
      const cauldronGlow = document.querySelector('.cauldron-glow');
      const ambientGlow = document.querySelector('.ambient-glow');
      const fire = document.querySelectorAll('.fire');

      const stirBtn = document.getElementById('stirBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isStirring = false;
      let stirInterval = null;
      let animationFrame = null;
      let lastTimestamp = 0;
      let stirAngle = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Spoon stir
        spoon.style.setProperty('--stir-duration', (1.5 / speedMultiplier) + 's');

        // Bubbles
        brewBubbles.forEach((b, i) => {
          const duration = (1.2 + (i % 4) * 0.2) / speedMultiplier;
          b.style.setProperty('--bubble-duration', duration + 's');
          b.style.setProperty('--bubble-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Steam
        steam.forEach((s, i) => {
          const duration = (2 + i * 0.15) / speedMultiplier;
          s.style.setProperty('--steam-duration', duration + 's');
          s.style.setProperty('--steam-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Sparks
        sparks.forEach((sp, i) => {
          const duration = (0.8 + (i % 3) * 0.15) / speedMultiplier;
          sp.style.setProperty('--spark-duration', duration + 's');
          sp.style.setProperty('--spark-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Fire
        fire.forEach((f, i) => {
          const duration = (0.6 + i * 0.05) / speedMultiplier;
          f.style.setProperty('--fire-duration', duration + 's');
          f.style.setProperty('--fire-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Cauldron glow
        cauldronGlow.style.setProperty('--glow-duration', (1.5 / speedMultiplier) + 's');

        // Ambient glow
        ambientGlow.style.setProperty('--ambient-duration', (3 / speedMultiplier) + 's');
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Cauldron glow
        const glowOpacity = Math.min(0.15 * intensityMultiplier, 0.3);
        cauldronGlow.style.setProperty('--glow-intensity', glowOpacity);
        const glowSize = 200 * intensityMultiplier;
        cauldronGlow.style.setProperty('--glow-size', glowSize + 'px');

        // Ambient glow
        const ambientOpacity = Math.min(0.05 * intensityMultiplier, 0.1);
        ambientGlow.style.setProperty('--ambient-intensity', ambientOpacity);
        const ambientSize = 300 * intensityMultiplier;
        ambientGlow.style.setProperty('--ambient-size', ambientSize + 'px');

        // Brew color intensity
        brewColor.style.setProperty('--brew-intensity', Math.min(0.6 * intensityMultiplier, 1));

        // Sparks
        sparks.forEach((sp) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          sp.style.setProperty('--spark-intensity', opacity);
        });

        // Fire
        fire.forEach((f) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          f.style.setProperty('--fire-intensity', opacity);
        });
      }

      // ----- Stir brew -----
      function stirBrew() {
        if (isStirring) {
          stopStir();
          return;
        }

        isStirring = true;
        stirAngle = 0;

        // Start spoon stir animation
        spoon.classList.add('stirring');

        // Intensify bubbles
        brewBubbles.forEach((b) => {
          b.style.transform = 'scale(1.5)';
          setTimeout(() => {
            b.style.transform = 'scale(1)';
          }, 300 / speedMultiplier);
        });

        // Steam burst
        steam.forEach((s) => {
          s.style.opacity = '0.6';
          setTimeout(() => {
            s.style.opacity = '0.15';
          }, 500 / speedMultiplier);
        });

        // Spark burst
        sparks.forEach((sp, i) => {
          setTimeout(() => {
            sp.classList.add('burst');
            setTimeout(() => {
              sp.classList.remove('burst');
            }, 800 / speedMultiplier);
          }, i * 30 / speedMultiplier);
        });

        // Glow flash
        cauldronGlow.style.opacity = '0.8';
        setTimeout(() => {
          cauldronGlow.style.opacity = '0.2';
        }, 400 / speedMultiplier);

        // Brew surface ripple
        brewSurface.style.transform = 'scaleX(1.1) scaleY(1.05)';
        setTimeout(() => {
          brewSurface.style.transform = 'scaleX(1) scaleY(1)';
        }, 400 / speedMultiplier);

        stirBtn.textContent = '🥄 Stirring...';
        setTimeout(() => {
          stirBtn.textContent = '🥄 Stop Stirring';
        }, 500 / speedMultiplier);

        // Auto-stop after 5 seconds
        setTimeout(() => {
          if (isStirring) {
            stopStir();
          }
        }, 5000 / speedMultiplier);
      }

      // ----- Stop stirring -----
      function stopStir() {
        isStirring = false;
        spoon.classList.remove('stirring');
        stirBtn.textContent = '🥄 Stir Brew';
        if (stirInterval) {
          clearInterval(stirInterval);
          stirInterval = null;
        }
      }

      // ----- Reset -----
      function resetCauldron() {
        if (isStirring) {
          stopStir();
        }

        spoon.classList.remove('stirring');
        brewSurface.style.transform = 'scaleX(1) scaleY(1)';
        cauldronGlow.style.opacity = '0.15';
        steam.forEach(s => s.style.opacity = '0.1');
        sparks.forEach(sp => sp.classList.remove('burst'));
        brewBubbles.forEach(b => b.style.transform = 'scale(1)');

        stirBtn.textContent = '🥄 Stir Brew';
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Brew surface gentle wave
        const wave = Math.sin(timestamp / 2000) * 0.02 + 0.98;
        brewSurface.style.transform = `scaleX(${wave}) scaleY(${0.98 + (1 - wave) * 0.3})`;

        // Brew color subtle shift
        const hueShift = Math.sin(timestamp / 3000) * 10;
        brewColor.style.setProperty('--brew-hue', hueShift + 'deg');

        // Fire flicker
        fire.forEach((f, i) => {
          const flicker = Math.sin(timestamp / (400 + i * 50) + i) * 0.2 + 0.8;
          f.style.transform = `scaleY(${flicker}) scaleX(${0.9 + (1 - flicker) * 0.2})`;
        });

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Set initial brew color
        brewColor.style.setProperty('--brew-color', '#6a4acc');

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-stir after 1.5 seconds
        setTimeout(() => {
          stirBrew();
        }, 1500);

        // Auto-stop and restart
        setTimeout(() => {
          if (isStirring) {
            stopStir();
          }
          setTimeout(() => {
            stirBrew();
          }, 500 / speedMultiplier);
        }, 7000 / speedMultiplier);
      }

      // ----- Event listeners -----
      stirBtn.addEventListener('click', stirBrew);
      resetBtn.addEventListener('click', resetCauldron);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      // Click on cauldron to stir
      document.querySelector('.cauldron').addEventListener('click', stirBrew);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (stirInterval) clearInterval(stirInterval);
      });

      init();
    })();
  </script>

</body>
</html>
