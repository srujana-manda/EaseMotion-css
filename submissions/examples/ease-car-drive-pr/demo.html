<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-car-drive — EaseMotion CSS Demo</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .demo-wrapper {
      width: 100%;
      max-width: 750px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    h1 span {
      color: #e63946;
    }

    .description {
      color: #bdbdbd;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .code-tag {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #a8d8ea;
      font-family: monospace;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <main class="demo-wrapper">

    <h1>EaseMotion CSS — <span>ease-car-drive</span></h1>

    <p class="description">
      A smooth and reusable CSS animation showcasing a car driving
      across a road with animated wheels, smoke, moving road lines,
      and background scenery.
    </p>

    <p class="label">Live Demo</p>

    <!-- Car Driving Animation -->
    <div
      class="ease-car-drive"
      role="img"
      aria-label="Animated car driving across a road with moving trees and smoke"
    >

      <!-- Decorative Trees -->
      <div class="ease-tree"></div>
      <div class="ease-tree"></div>
      <div class="ease-tree"></div>
      <div class="ease-tree"></div>

      <!-- Moving Road Line -->
      <div class="ease-road-line"></div>

      <!-- Car -->
      <div class="ease-car">

        <!-- Smoke -->
        <div class="ease-smoke">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- Car Roof -->
        <div class="ease-car-roof">
          <div class="ease-car-window front"></div>
          <div class="ease-car-window rear"></div>
        </div>

        <!-- Car Body -->
        <div class="ease-car-body">
          <div class="ease-car-headlight"></div>
        </div>

        <!-- Wheels -->
        <div class="ease-car-wheel front-wheel"></div>
        <div class="ease-car-wheel rear-wheel"></div>

      </div>
    </div>

    <code class="code-tag">
      &lt;div class="ease-car-drive"&gt; ... &lt;/div&gt;
    </code>

  </main>

</body>
</html>
