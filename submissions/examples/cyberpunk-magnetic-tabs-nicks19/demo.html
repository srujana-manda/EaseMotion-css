<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Magnetic Pull Tabs Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505;
            background-image: linear-gradient(rgba(255, 0, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        .demo-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
        }
        h2 {
            color: #0ff;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="demo-wrapper">
        <h2>System Override</h2>
        
        <div class="ease-cyber-tabs-container">
            <input type="radio" id="tab1" name="cyber-tabs" checked>
            <input type="radio" id="tab2" name="cyber-tabs">
            <input type="radio" id="tab3" name="cyber-tabs">

            <label for="tab1" class="ease-cyber-tab">Core</label>
            <label for="tab2" class="ease-cyber-tab">Proxy</label>
            <label for="tab3" class="ease-cyber-tab">Node</label>

            <!-- The active background highlight -->
            <div class="ease-cyber-active-indicator"></div>
        </div>
    </div>
</body>
</html>
