<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Text Effects Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px;
            margin: 0;
        }
        section {
            width: 100%;
            max-width: 800px;
            margin-bottom: 150px;
            text-align: center;
        }
        h2 { color: #555; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; }
        .typewriter-container { width: fit-content; margin: 0 auto; }
    </style>
</head>
<body>

    <!-- 1. Reveal Up Section -->
    <section>
        <h2>01. Masked Reveal (Hover Me)</h2>
        <div class="em-reveal-up" style="font-size: 3rem; font-weight: bold;">
            <span>Elevate Your Design</span>
        </div>
    </section>

    <!-- 2. Typewriter Section -->
    <section>
        <h2>02. Typewriter Effect</h2>
        <div class="typewriter-container">
            <h1 class="em-typewriter">Hello, Developer.</h1>
        </div>
    </section>

    <!-- 3. Glitch Section -->
    <section>
        <h2>03. Cyberpunk Glitch</h2>
        <div class="em-glitch" data-text="SYSTEM ERROR">SYSTEM ERROR</div>
    </section>

</body>
</html>
