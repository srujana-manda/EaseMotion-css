<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Switch Pill - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Toggle Pill</h1>
    <p class="desc">Flippable toggle with pill knob animation</p>
    <div class="toggle-card">
      <div class="ts-pill" id="tsPill" style="--ts-on: 0;" role="switch" aria-checked="false" tabindex="0">
        <div class="ts-knob"></div>
        <span class="ts-label ts-off">Off</span>
        <span class="ts-label ts-on">On</span>
      </div>
      <p class="ts-state" id="tsState">Toggle is OFF</p>
    </div>
  </div>
  <script>
    const pill = document.getElementById('tsPill');
    const state = document.getElementById('tsState');

    function toggle() {
      const on = pill.style.getPropertyValue('--ts-on') === '1' ? '0' : '1';
      pill.style.setProperty('--ts-on', on);
      pill.classList.toggle('on', on === '1');
      pill.setAttribute('aria-checked', on === '1');
      state.textContent = on === '1' ? 'Toggle is ON' : 'Toggle is OFF';
    }

    pill.addEventListener('click', toggle);
    pill.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });
  </script>
</body>
</html>
