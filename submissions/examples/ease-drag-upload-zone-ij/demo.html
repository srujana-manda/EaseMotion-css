<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag Upload Zone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="duz-section">
    <h1 class="duz-title">Drag Upload Zone</h1>
    <p class="duz-desc">Drag and drop your files into the area below to upload.</p>

    <div class="duz-zone" id="dropZone">
      <svg class="duz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <p class="duz-text">Drop files here</p>
    </div>
  </section>

  <script>
    const zone = document.getElementById('dropZone');

    zone.addEventListener('dragenter', (e) => {
      e.preventDefault();
      zone.classList.add('duz-dragover');
    });

    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    zone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      zone.classList.remove('duz-dragover');
    });

    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('duz-dragover');
    });
  </script>

</body>
</html>
