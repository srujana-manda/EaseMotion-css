<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Radar Anti-Stealth Defense Radar Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <header class="topbar">
        <h1>Quantum Radar Defense Console</h1>
        <span class="status online">SYSTEM ONLINE</span>
    </header>

    <main class="grid">

        <section class="radar-panel">

            <div class="radar">

                <div class="ring ring1"></div>
                <div class="ring ring2"></div>
                <div class="ring ring3"></div>

                <div class="sweep"></div>

                <div class="target t1"></div>
                <div class="target t2"></div>
                <div class="target t3"></div>

                <div class="center"></div>

            </div>

        </section>

        <aside class="info-panel">

            <div class="card">
                <h3>Detected Objects</h3>
                <h2>03</h2>
            </div>

            <div class="card">
                <h3>Stealth Probability</h3>
                <h2>91%</h2>
            </div>

            <div class="card">
                <h3>Quantum Signal</h3>
                <div class="bars">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="card">
                <h3>System Status</h3>
                <ul>
                    <li>✔ Radar Active</li>
                    <li>✔ AI Tracking</li>
                    <li>✔ Quantum Scan</li>
                    <li>✔ Defense Ready</li>
                </ul>
            </div>

        </aside>

    </main>

</div>

</body>
</html>
