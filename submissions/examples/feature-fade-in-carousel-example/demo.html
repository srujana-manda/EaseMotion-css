<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scale Hover Carousel</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="carousel-wrapper">

    <h2 class="carousel-title">
        Creative Portfolio
    </h2>

    <div class="carousel">

    <div class="card">
        <img src="https://picsum.photos/400/250?1" alt="">
        <div class="content">
            <h3>Project One</h3>
            <p>Creative Portfolio Design</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/250?2" alt="">
        <div class="content">
            <h3>Project Two</h3>
            <p>UI Dashboard</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/250?3" alt="">
        <div class="content">
            <h3>Project Three</h3>
            <p>Brand Identity</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/250?4" alt="">
        <div class="content">
            <h3>Project Four</h3>
            <p>Photography</p>
        </div>
    </div>

</div>

</div>

</body>
</html>
