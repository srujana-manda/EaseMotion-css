<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Play Button - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Play Button</h1>
    <p class="desc">Animated play button with ripple ring</p>
    <div class="vp-card">
      <div class="vp-thumb">
        <div class="vp-overlay"></div>
        <div class="vp-play-btn" id="vpPlayBtn" style="--vp-state: 0;">
          <span class="vp-icon">▶</span>
          <div class="vp-ring vp-ring-1"></div>
          <div class="vp-ring vp-ring-2"></div>
        </div>
        <span class="vp-duration">3:24</span>
      </div>
      <p class="vp-title">CSS Animation Demo</p>
      <p class="vp-state" id="vpState">Click to play</p>
    </div>
  </div>
  <script>
    const btn = document.getElementById('vpPlayBtn');
    const state = document.getElementById('vpState');

    btn.addEventListener('click', () => {
      const playing = btn.style.getPropertyValue('--vp-state') === '1' ? '0' : '1';
      btn.style.setProperty('--vp-state', playing);
      state.textContent = playing === '1' ? 'Now Playing' : 'Click to play';
    });
  </script>
</body>
</html>
