<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Service Mesh Traffic Flow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="mesh-panel">

<h2>Service Mesh Traffic</h2>

<div class="service healthy">
<div>
<h3>API Gateway → Auth</h3>
<p>Latency: 18 ms • 2.4k RPM</p>
</div>
<span>Healthy</span>
</div>

<div class="service active">
<div>
<h3>Auth → User Service</h3>
<p>Latency: 24 ms • mTLS Enabled</p>
</div>
<span>Active</span>
</div>

<div class="service warning">
<div>
<h3>User → Payment</h3>
<p>Error Rate: 2.8%</p>
</div>
<span>Warning</span>
</div>

<div class="service offline">
<div>
<h3>Payment → Email</h3>
<p>Connection Timeout</p>
</div>
<span>Failed</span>
</div>

</section>

</body>
</html>
