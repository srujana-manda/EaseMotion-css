<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smoke Particle Effect - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Smoke Particle</h1>
    <p class="desc">Hover over the container to release rising smoke particles</p>
    <div class="spe-container" id="speContainer">
      <span class="spe-label">Hover Me</span>
    </div>
  </section>
  <script>
    const container = document.getElementById('speContainer');

    function createParticle() {
      const particle = document.createElement('span');
      particle.className = 'spe-particle';
      const size = 6 + Math.random() * 12;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = (10 + Math.random() * 80) + '%';
      particle.style.setProperty('--spe-drift', (Math.random() * 60 - 30) + 'px');
      particle.style.setProperty('--spe-rise', (40 + Math.random() * 80) + 'px');
      particle.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      container.appendChild(particle);
      particle.addEventListener('animationend', () => particle.remove());
    }

    let interval = null;

    container.addEventListener('mouseenter', () => {
      interval = setInterval(createParticle, 120);
    });

    container.addEventListener('mouseleave', () => {
      clearInterval(interval);
      interval = null;
    });
  </script>
</body>
</html>
