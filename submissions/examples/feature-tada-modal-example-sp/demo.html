<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tada Modal Example</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="tada-modal-page-sp">
      <h1>Tada Modal</h1>
      <p>Open the modal to see a smooth tada attention animation.</p>

      <button
        type="button"
        class="tada-modal-trigger-sp"
        aria-haspopup="dialog"
        aria-controls="tada-modal-sp"
        id="tada-open-sp"
      >
        Open modal
      </button>
    </main>

    <div
      class="tada-modal-overlay-sp"
      id="tada-overlay-sp"
      hidden
    >
      <div
        class="tada-modal-sp"
        id="tada-modal-sp"
        role="dialog"
        aria-modal="true"
        aria-labelledby="tada-modal-title-sp"
        tabindex="-1"
      >
        <button
          type="button"
          class="tada-modal-close-sp"
          id="tada-close-sp"
          aria-label="Close modal"
        >
          &times;
        </button>
        <h2 id="tada-modal-title-sp">Success</h2>
        <p>Your action completed. This modal uses a tada entrance effect.</p>
        <button type="button" class="tada-modal-action-sp" id="tada-ok-sp">
          Got it
        </button>
      </div>
    </div>

    <script>
      (function () {
        var overlay = document.getElementById('tada-overlay-sp');
        var modal = document.getElementById('tada-modal-sp');
        var openBtn = document.getElementById('tada-open-sp');
        var closeBtn = document.getElementById('tada-close-sp');
        var okBtn = document.getElementById('tada-ok-sp');
        var lastFocus = null;

        function openModal() {
          lastFocus = document.activeElement;
          overlay.hidden = false;
          modal.classList.remove('is-tada-sp');
          // Retrigger animation
          void modal.offsetWidth;
          modal.classList.add('is-tada-sp');
          document.body.style.overflow = 'hidden';
          modal.focus();
        }

        function closeModal() {
          overlay.hidden = true;
          modal.classList.remove('is-tada-sp');
          document.body.style.overflow = '';
          if (lastFocus && typeof lastFocus.focus === 'function') {
            lastFocus.focus();
          }
        }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        okBtn.addEventListener('click', closeModal);

        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) closeModal();
        });

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && !overlay.hidden) {
            closeModal();
          }
        });
      })();
    </script>
  </body>
</html>
