<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skew 3D Card - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h2 class="demo-title">Hover the Card</h2>
    <p class="demo-desc">Card skews with a 3D perspective transform on hover.</p>
    <div class="stc-card">
      <div class="stc-inner">
        <span class="stc-icon">&#9670;</span>
        <h3 class="stc-heading">3D Skew Card</h3>
        <p class="stc-text">Hover to see the perspective skew effect in action.</p>
      </div>
    </div>
  </section>
</body>
</html>
