<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google-style Loading Animation | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="ldp-page">

    <header class="ldp-page__header">
      <h1 class="ldp-page__title">Google-style Loading Animation</h1>
      <p class="ldp-page__subtitle">
        A 4-dot bouncing wave in Google's signature colors, paired with an
        indeterminate gradient progress bar and a pulsing "Loading" label.
        Pure CSS. No JavaScript required.
      </p>
    </header>

    <section class="ldp-showcase">

      <!-- Full component: dots + bar + label -->
      <div class="ldp-card">
        <h2 class="ldp-card__title">Full Component</h2>

        <div class="ldp-container">
          <div class="ldp-dot-wave" role="status" aria-label="Loading">
            <span class="ldp-dot ldp-dot--blue"   style="--ldp-i:0;"></span>
            <span class="ldp-dot ldp-dot--red"    style="--ldp-i:1;"></span>
            <span class="ldp-dot ldp-dot--yellow" style="--ldp-i:2;"></span>
            <span class="ldp-dot ldp-dot--green"  style="--ldp-i:3;"></span>
          </div>

          <div class="ldp-progress" aria-hidden="true">
            <div class="ldp-progress__track">
              <div class="ldp-progress__fill"></div>
            </div>
          </div>

          <p class="ldp-label">Loading</p>
        </div>
      </div>

      <!-- Dot wave only -->
      <div class="ldp-card">
        <h2 class="ldp-card__title">Dot Wave Only</h2>
        <div class="ldp-container">
          <div class="ldp-dot-wave" role="status" aria-label="Loading">
            <span class="ldp-dot ldp-dot--blue"   style="--ldp-i:0;"></span>
            <span class="ldp-dot ldp-dot--red"    style="--ldp-i:1;"></span>
            <span class="ldp-dot ldp-dot--yellow" style="--ldp-i:2;"></span>
            <span class="ldp-dot ldp-dot--green"  style="--ldp-i:3;"></span>
          </div>
        </div>
      </div>

      <!-- Progress bar only -->
      <div class="ldp-card">
        <h2 class="ldp-card__title">Progress Bar Only</h2>
        <div class="ldp-container">
          <div class="ldp-progress" aria-hidden="true">
            <div class="ldp-progress__track">
              <div class="ldp-progress__fill"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Compact / inline variant -->
      <div class="ldp-card">
        <h2 class="ldp-card__title">Compact Variant</h2>
        <div class="ldp-container">
          <div class="ldp-dot-wave ldp-dot-wave--sm" role="status" aria-label="Loading">
            <span class="ldp-dot ldp-dot--blue"   style="--ldp-i:0;"></span>
            <span class="ldp-dot ldp-dot--red"    style="--ldp-i:1;"></span>
            <span class="ldp-dot ldp-dot--yellow" style="--ldp-i:2;"></span>
            <span class="ldp-dot ldp-dot--green"  style="--ldp-i:3;"></span>
          </div>
          <p class="ldp-label ldp-label--sm">Loading</p>
        </div>
      </div>

    </section>
  </main>

</body>
</html>
