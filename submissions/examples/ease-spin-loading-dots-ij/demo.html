<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Spin Loading Dots</title>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinnerEl">
      <span class="dot" style="--i:0"></span>
      <span class="dot" style="--i:1"></span>
      <span class="dot" style="--i:2"></span>
    </div>
    <button class="toggle" id="toggleLoading">Toggle Loading</button>
  </div>
  <script>
    const el = document.querySelector('.spinner');
    document.getElementById('toggleLoading').addEventListener('click', () => {
      const current = el.style.getPropertyValue('--loading').trim() || '0';
      el.style.setProperty('--loading', current === '1' ? '0' : '1');
    });
  </script>
</body>
</html>
