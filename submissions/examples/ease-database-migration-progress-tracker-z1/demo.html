<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Database Migration Progress Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Database Migration Tracker</h2>

<div class="migration success">
<div>
<h3>Migration Progress</h3>
<p>128 / 150 Scripts Executed</p>
</div>
<span>85%</span>
</div>

<div class="migration running">
<div>
<h3>Current Batch</h3>
<p>Batch #13 Processing</p>
</div>
<span>Running</span>
</div>

<div class="migration warning">
<div>
<h3>Validation</h3>
<p>2 Pending Integrity Checks</p>
</div>
<span>Review</span>
</div>

<div class="migration danger">
<div>
<h3>Rollback Status</h3>
<p>Rollback Package Ready</p>
</div>
<span>Ready</span>
</div>

</section>

</body>
</html>
