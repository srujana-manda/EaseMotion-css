<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Image Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-gallery-ag">
        <!-- Image with flash effect on hover -->
        <div class="ease-image-wrapper-ag ease-flash-image-ag">
            <img src="https://picsum.photos/seed/picsum1/400/300" alt="Random landscape placeholder 1">
            <div class="ease-image-overlay-ag">
                <span>View Details</span>
            </div>
        </div>
        
        <div class="ease-image-wrapper-ag ease-flash-image-ag">
            <img src="https://picsum.photos/seed/picsum2/400/300" alt="Random landscape placeholder 2">
            <div class="ease-image-overlay-ag">
                <span>View Details</span>
            </div>
        </div>
    </div>
</body>
</html>
