<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-tag-input-animate-add</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tia-section">
    <h1 class="tia-heading">Tag Input Animate Add</h1>
    <p class="tia-desc">Type a name and click Add to insert a new tag with a slide-in animation.</p>

    <div class="tia-tags" id="tia-tags">
      <div class="tia-tag tia-tag-visible">
        <span class="tia-label">JavaScript</span>
        <button class="tia-remove" aria-label="Remove">&times;</button>
      </div>
      <div class="tia-tag tia-tag-visible">
        <span class="tia-label">CSS</span>
        <button class="tia-remove" aria-label="Remove">&times;</button>
      </div>
      <div class="tia-tag tia-tag-visible">
        <span class="tia-label">HTML</span>
        <button class="tia-remove" aria-label="Remove">&times;</button>
      </div>
    </div>

    <div class="tia-input-row">
      <input class="tia-input" id="tia-input" type="text" placeholder="Enter tag name..." maxlength="30">
      <button class="tia-add-btn" id="tia-add-btn">Add</button>
    </div>
  </div>

  <script>
    const tagsContainer = document.getElementById('tia-tags');
    const input = document.getElementById('tia-input');
    const addBtn = document.getElementById('tia-add-btn');

    function addTag(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      const tag = document.createElement('div');
      tag.className = 'tia-tag';
      tag.innerHTML = `<span class="tia-label">${esc(trimmed)}</span><button class="tia-remove" aria-label="Remove">&times;</button>`;
      tagsContainer.appendChild(tag);

      requestAnimationFrame(() => {
        tag.classList.add('tia-tag-visible');
      });

      input.value = '';
      input.focus();
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    addBtn.addEventListener('click', () => addTag(input.value));

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTag(input.value);
    });

    tagsContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('.tia-remove');
      if (!btn) return;
      const tag = btn.closest('.tia-tag');
      tag.style.setProperty('--removing', 1);
      setTimeout(() => { tag.remove(); }, 350);
    });
  </script>
</body>
</html>
