<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Active Popover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="catalog-card">
    <img src="https://via.placeholder.com/300x180" alt="Product">

    <div class="content">
      <h2>Wireless Headphones</h2>
      <p>Premium sound with active noise cancellation.</p>

      <button class="popover-btn">
        View Details

        <span class="popover">
          <strong>Special Offer</strong>
          <span>20% OFF • Free Shipping</span>
        </span>
      </button>
    </div>
  </div>

</body>
</html>
