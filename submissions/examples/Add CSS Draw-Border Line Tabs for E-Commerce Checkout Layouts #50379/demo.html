<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Tabs - E-Commerce Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="checkout-layout">
    
    <div class="checkout-container">
      
      <!-- Checkout Header -->
      <div class="checkout-header">
        <h2 class="header-title">Secure Checkout</h2>
        <span class="security-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          256-bit SSL
        </span>
      </div>
      
      <!-- Payment Section -->
      <div class="checkout-section">
        <div class="section-header">
          <span class="step-number">2</span>
          <h3 class="section-title">Payment Method</h3>
        </div>
        
        <!-- Hidden Radio State Inputs (Keyboard Accessible) -->
        <input type="radio" name="payment-method" id="pay-card" class="sr-only" checked>
        <input type="radio" name="payment-method" id="pay-paypal" class="sr-only">
        <input type="radio" name="payment-method" id="pay-apple" class="sr-only">
        
        <!-- Draw-Border Payment Tabs -->
        <div class="payment-tabs">
          <label for="pay-card" class="tab-btn" tabindex="0">
            <span class="tab-icon">💳</span>
            <span class="tab-text">Credit Card</span>
          </label>
          
          <label for="pay-paypal" class="tab-btn" tabindex="0">
            <span class="tab-icon">🅿️</span>
            <span class="tab-text">PayPal</span>
          </label>
          
          <label for="pay-apple" class="tab-btn" tabindex="0">
            <span class="tab-icon">🍎</span>
            <span class="tab-text">Apple Pay</span>
          </label>
        </div>

        <!-- Dynamic Payment Content Panels -->
        <div class="payment-content">
          
          <!-- Credit Card Form -->
          <div class="tab-panel panel-card">
            <div class="form-group">
              <label>Card Number</label>
              <input type="text" placeholder="0000 0000 0000 0000">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Expiry Date</label>
                <input type="text" placeholder="MM/YY">
              </div>
              <div class="form-group">
                <label>CVC</label>
                <input type="text" placeholder="123">
              </div>
            </div>
          </div>

          <!-- PayPal Content -->
          <div class="tab-panel panel-paypal">
            <div class="redirect-box">
              <span class="redirect-icon">🔄</span>
              <p>You will be redirected to PayPal to complete your purchase securely.</p>
            </div>
          </div>

          <!-- Apple Pay Content -->
          <div class="tab-panel panel-apple">
             <div class="redirect-box">
              <span class="redirect-icon">📱</span>
              <p>Complete checkout using Apple Pay on your Apple device.</p>
            </div>
          </div>

        </div>
        
      </div>
      
      <!-- Checkout Footer -->
      <div class="checkout-footer">
        <div class="total-row">
          <span class="total-label">Total due</span>
          <span class="total-price">$124.00</span>
        </div>
        <button class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Pay $124.00
        </button>
      </div>

    </div>
  </div>

</body>
</html>
