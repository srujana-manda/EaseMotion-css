<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Ripple Click Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Material Ripple Click Effect</h1>
    <p>Click any button to see the ripple animation.</p>

    <button class="ripple-btn">Primary Button</button>
    <button class="ripple-btn light">Secondary Button</button>
    <button class="ripple-btn danger">Danger Button</button>
</div>

<script>
document.querySelectorAll(".ripple-btn").forEach(button => {
    button.addEventListener("click", function(e) {

        const ripple = document.createElement("span");
        ripple.classList.add("ripple");

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        ripple.style.width = ripple.style.height = size + "px";
        ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
        ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

        this.appendChild(ripple);

        ripple.addEventListener("animationend", () => {
            ripple.remove();
        });
    });
});
</script>

</body>
</html>
