<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Focus Border - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Sign In</h1>
    <div class="ifb-field">
      <input type="email" id="ifbEmail" class="ifb-input" placeholder=" " autocomplete="off">
      <label for="ifbEmail" class="ifb-label">Email</label>
      <span class="ifb-bar"></span>
    </div>
    <div class="ifb-field">
      <input type="password" id="ifbPass" class="ifb-input" placeholder=" " autocomplete="off">
      <label for="ifbPass" class="ifb-label">Password</label>
      <span class="ifb-bar"></span>
    </div>
  </div>
</body>
</html>
