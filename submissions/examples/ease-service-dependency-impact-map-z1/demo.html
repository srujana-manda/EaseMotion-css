<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Service Dependency Impact Map</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Service Dependency Impact</h2>

<div class="service healthy">
<div>
<h3>Authentication Service</h3>
<p>All upstream dependencies operational</p>
</div>
<span>Healthy</span>
</div>

<div class="service active">
<div>
<h3>Payment Service</h3>
<p>Dependent on Inventory API</p>
</div>
<span>Connected</span>
</div>

<div class="service warning">
<div>
<h3>Inventory API</h3>
<p>High response latency detected</p>
</div>
<span>Degraded</span>
</div>

<div class="service critical">
<div>
<h3>Checkout Service</h3>
<p>Customer transactions affected</p>
</div>
<span>Impacted</span>
</div>

</section>

</body>
</html>
