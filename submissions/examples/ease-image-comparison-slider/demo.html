<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ease Image Comparison Slider</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="ease-image-comparison-slider">

    <h1>Ease Image Comparison Slider</h1>

    <div class="ease-image-comparison">

        <img
            src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
            class="ease-after"
            alt="After image"
        >

        <div class="ease-before-wrapper">
            <img
                src="https://images.unsplash.com/photo-1497366754035-f200968a6e72"
                class="ease-before"
                alt="Before image"
            >
        </div>


        <div class="ease-divider"></div>


        <span class="ease-label before">
            Before
        </span>

        <span class="ease-label after">
            After
        </span>


        <input
            type="range"
            min="0"
            max="100"
            value="50"
            class="ease-slider"
            aria-label="Image comparison slider"
        >

    </div>

</section>

</body>
</html>
