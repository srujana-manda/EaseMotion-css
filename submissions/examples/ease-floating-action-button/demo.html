<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion - Floating Action Button Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 40px;
      color: #0f172a;
    }
    .demo-info {
      max-width: 500px;
    }
    h1 { margin-bottom: 8px; font-size: 1.75rem; }
    p { color: #64748b; font-size: 0.95rem; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="demo-info">
    <h1>Expandable Speed Dial FAB</h1>
    <p>Click the action button in the bottom right corner to view the staggered entry, rotation, and spring-bounce animation scaling variables.</p>
  </div>

  <div class="em-fab-container" id="speedDialFAB">
    <button class="em-fab-trigger" aria-label="Toggle Menu" onclick="toggleFAB()">
      ＋
    </button>

    <div class="em-fab-speed-dial">
      <button class="em-fab-action" style="--stagger-delay: 50ms;" aria-label="Action 1">✉</button>
      <button class="em-fab-action" style="--stagger-delay: 100ms;" aria-label="Action 2">📞</button>
      <button class="em-fab-action" style="--stagger-delay: 150ms;" aria-label="Action 3">⚙</button>
    </div>
  </div>

  <script>
    function toggleFAB() {
      const fabContainer = document.getElementById('speedDialFAB');
      fabContainer.classList.toggle('open');
    }
  </script>
</body>
</html>
