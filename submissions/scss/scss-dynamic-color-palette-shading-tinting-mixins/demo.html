<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dynamic Color Palettes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div style="text-align: center; margin-bottom: 2rem;">
    <h1 style="margin: 0 0 1rem 0;">Dynamic Shading & Tinting</h1>
    <p style="margin: 0; opacity: 0.8;">Generated perfectly scaled palettes and hover states entirely in SCSS.</p>
  </div>

  <div class="demo-container">
    
    <!-- Generated Blue Palette -->
    <div class="theme-blue">
      <h3 style="margin: 0 0 1rem 0;">Brand Blue Scale</h3>
      <div class="palette-grid">
        <div class="swatch swatch-light" style="background: var(--brand-50)">50</div>
        <div class="swatch swatch-light" style="background: var(--brand-100)">100</div>
        <div class="swatch swatch-light" style="background: var(--brand-200)">200</div>
        <div class="swatch swatch-light" style="background: var(--brand-300)">300</div>
        <div class="swatch swatch-dark" style="background: var(--brand-400)">400</div>
        <div class="swatch swatch-dark" style="background: var(--brand-500)">500</div>
        <div class="swatch swatch-dark" style="background: var(--brand-600)">600</div>
        <div class="swatch swatch-dark" style="background: var(--brand-700)">700</div>
        <div class="swatch swatch-dark" style="background: var(--brand-800)">800</div>
        <div class="swatch swatch-dark" style="background: var(--brand-900)">900</div>
      </div>
    </div>

    <!-- Generated Emerald Palette -->
    <div class="theme-emerald">
      <h3 style="margin: 0 0 1rem 0;">Brand Emerald Scale</h3>
      <div class="palette-grid">
        <div class="swatch swatch-light" style="background: var(--brand-50)">50</div>
        <div class="swatch swatch-light" style="background: var(--brand-100)">100</div>
        <div class="swatch swatch-light" style="background: var(--brand-200)">200</div>
        <div class="swatch swatch-light" style="background: var(--brand-300)">300</div>
        <div class="swatch swatch-dark" style="background: var(--brand-400)">400</div>
        <div class="swatch swatch-dark" style="background: var(--brand-500)">500</div>
        <div class="swatch swatch-dark" style="background: var(--brand-600)">600</div>
        <div class="swatch swatch-dark" style="background: var(--brand-700)">700</div>
        <div class="swatch swatch-dark" style="background: var(--brand-800)">800</div>
        <div class="swatch swatch-dark" style="background: var(--brand-900)">900</div>
      </div>
    </div>

    <hr style="border: 0; height: 1px; background: #e2e8f0; margin: 1rem 0;">

    <div>
      <h3 style="margin: 0 0 1rem 0; text-align: center;">Dynamic Button Hovers (Hover over me)</h3>
      <div class="button-group">
        <button class="demo-btn btn-primary-blue">Blue Primary</button>
        <button class="demo-btn btn-primary-emerald">Emerald Primary</button>
      </div>
    </div>

  </div>

</body>
</html>
