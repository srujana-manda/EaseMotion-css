<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SCSS Button Ripple Effect Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="demo-header">
    <h1>CSS-Only Button Ripples</h1>
    <p>Performant, center-origin pseudo-element ripple animations powered by SCSS.</p>
  </div>

  <div class="demo-grid">
    <!-- Uses Light Ripple on dark background -->
    <button class="demo-btn btn-primary ease-btn-ripple-light">
      Submit Form
    </button>

    <!-- Uses Dark Ripple on light background -->
    <button class="demo-btn btn-secondary ease-btn-ripple-dark">
      Cancel Action
    </button>

    <!-- Uses Light Ripple -->
    <button class="demo-btn btn-danger ease-btn-ripple-light">
      Delete Account
    </button>
  </div>

</body>
</html>
