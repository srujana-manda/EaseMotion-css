<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Code Block Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load standard component CSS -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel to compile JSX in the browser for this demo -->
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Note: We define the component inside the HTML for the CI demo using Babel -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const CodeBlock = ({ code, language = 'javascript', filename }) => {
      const [isCopied, setIsCopied] = useState(false);

      useEffect(() => {
        if (isCopied) {
          const timer = setTimeout(() => {
            setIsCopied(false);
          }, 2500);
          return () => clearTimeout(timer);
        }
      }, [isCopied]);

      const handleCopy = async () => {
        try {
          await navigator.clipboard.writeText(code);
          setIsCopied(true);
        } catch (err) {
          console.error('Failed to copy text: ', err);
        }
      };

      return (
        <div className="ease-code-block-wrapper">
          {filename && (
            <div className="ease-code-block-header">
              <span className="ease-code-filename">{filename}</span>
              <span className="ease-code-language">{language}</span>
            </div>
          )}

          <div className="ease-code-block-body">
            <pre className="ease-code-pre">
              <code className={`language-${language}`}>
                {code}
              </code>
            </pre>

            <button 
              className={`ease-code-copy-btn ${isCopied ? 'copied' : ''}`}
              onClick={handleCopy}
              aria-label="Copy code to clipboard"
              title="Copy code"
            >
              <div className="ease-code-copy-icon-wrapper">
                <svg 
                  className="ease-code-icon-copy" 
                  viewBox="0 0 24 24" 
                  fill="none" 
                  stroke="currentColor" 
                  strokeWidth="2" 
                  strokeLinecap="round" 
                  strokeLinejoin="round"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                
                <svg 
                  className="ease-code-icon-check" 
                  viewBox="0 0 24 24" 
                  fill="none" 
                  stroke="currentColor" 
                  strokeWidth="2" 
                  strokeLinecap="round" 
                  strokeLinejoin="round"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </div>
              <span className="ease-code-copy-text">
                {isCopied ? 'Copied!' : 'Copy'}
              </span>
            </button>
          </div>
        </div>
      );
    };

    // Render App
    const App = () => {
      const sampleCode = `import React from 'react';
import { render } from 'react-dom';

const App = () => {
  return (
    <div>
      <h1>Hello EaseMotion!</h1>
      <p>This is a beautiful code block.</p>
    </div>
  );
};

render(<App />, document.getElementById('root'));`;

      return (
        <div style={{width: '100%', maxWidth: '800px'}}>
          <h1 style={{fontFamily: 'sans-serif', color: '#1e293b', marginBottom: '0.5rem', textAlign: 'center'}}>React Code Block Copy Button</h1>
          <p style={{fontFamily: 'sans-serif', color: '#64748b', marginBottom: '2rem', textAlign: 'center'}}>Hover the block and click copy to see the physics-based icon swap.</p>
          
          <CodeBlock 
            code={sampleCode}
            language="jsx"
            filename="App.jsx"
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
