<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Tree View Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    h1 {
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const TreeNode = ({ node, level = 0 }) => {
      const [isOpen, setIsOpen] = useState(node.defaultOpen || false);
      const contentRef = useRef(null);
      const [contentHeight, setContentHeight] = useState('0px');

      const hasChildren = node.children && node.children.length > 0;

      useEffect(() => {
        if (contentRef.current) {
          if (isOpen) {
            setContentHeight(`${contentRef.current.scrollHeight}px`);
            const timer = setTimeout(() => {
              setContentHeight('auto');
            }, 300); 
            return () => clearTimeout(timer);
          } else {
            setContentHeight(`${contentRef.current.scrollHeight}px`);
            const frame = requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                setContentHeight('0px');
              });
            });
            return () => cancelAnimationFrame(frame);
          }
        }
      }, [isOpen, node.children]);

      const toggleOpen = () => {
        if (hasChildren) setIsOpen(!isOpen);
      };

      return (
        <div className="ease-tree-node">
          <div 
            className={`ease-tree-row ${isOpen ? 'is-open' : ''} ${!hasChildren ? 'is-leaf' : ''}`}
            style={{ paddingLeft: `${level * 16 + 8}px` }}
            onClick={toggleOpen}
          >
            <div className="ease-tree-icon-wrapper">
              {hasChildren ? (
                <svg className="ease-tree-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              ) : <span className="ease-tree-spacer"></span>}
              
              {hasChildren ? (
                <svg className="ease-tree-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
              ) : (
                <svg className="ease-tree-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                  <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
              )}
            </div>
            <span className="ease-tree-label">{node.name}</span>
          </div>

          {hasChildren && (
            <div 
              className="ease-tree-children-wrapper"
              ref={contentRef}
              style={{ height: contentHeight }}
              aria-hidden={!isOpen}
            >
              <div className="ease-tree-children-inner">
                {node.children.map((childNode, index) => (
                  <TreeNode key={index} node={childNode} level={level + 1} />
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    const TreeView = ({ data = [] }) => {
      return (
        <div className="ease-tree-container">
          {data.map((node, index) => (
            <TreeNode key={index} node={node} />
          ))}
        </div>
      );
    };

    const App = () => {
      const fileSystem = [
        {
          name: "src",
          defaultOpen: true,
          children: [
            {
              name: "components",
              children: [
                { name: "Button.jsx" },
                { name: "Navbar.jsx" }
              ]
            },
            {
              name: "hooks",
              children: [
                { name: "useAuth.js" }
              ]
            },
            { name: "App.jsx" },
            { name: "index.js" }
          ]
        },
        {
          name: "public",
          children: [
            { name: "index.html" },
            { name: "favicon.ico" }
          ]
        },
        { name: "package.json" },
        { name: "README.md" }
      ];

      return (
        <div>
          <h1>Project Explorer</h1>
          <TreeView data={fileSystem} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
