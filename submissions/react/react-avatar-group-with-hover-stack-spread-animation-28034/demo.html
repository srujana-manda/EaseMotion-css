<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Avatar Group Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      border: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      gap: 32px;
      width: 100%;
      max-width: 500px;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .demo-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const AvatarGroup = ({ users = [], max = 4, size = 'md' }) => {
      if (!users || users.length === 0) return null;

      const visibleUsers = users.slice(0, max);
      const overflowCount = users.length - max;

      const renderAvatar = (user, index, isOverflow = false) => {
        const fallbackColors = ['#f43f5e', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b'];
        const colorIndex = user.name ? user.name.length % fallbackColors.length : 0;
        const bgColor = fallbackColors[colorIndex];
        
        const initials = user.name 
          ? user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() 
          : '?';

        return (
          <div key={user.id || `avatar-${index}`} className="ease-avatar-item" style={{ zIndex: 100 - index }}>
            <div className="ease-avatar-circle" style={{ backgroundColor: user.avatar ? 'transparent' : bgColor }}>
              {user.avatar ? (
                <img src={user.avatar} alt={user.name} className="ease-avatar-img" />
              ) : (
                <span className="ease-avatar-initials">{initials}</span>
              )}
            </div>
            {!isOverflow && <div className="ease-avatar-tooltip">{user.name}</div>}
          </div>
        );
      };

      return (
        <div className={`ease-avatar-group ease-size-${size}`}>
          {visibleUsers.map((user, index) => renderAvatar(user, index))}
          {overflowCount > 0 && (
            <div className="ease-avatar-item ease-avatar-overflow" style={{ zIndex: 100 - visibleUsers.length }}>
              <div className="ease-avatar-circle">
                <span className="ease-avatar-initials">+{overflowCount}</span>
              </div>
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const users = [
        { id: 1, name: 'Alice Cooper', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&h=150&fit=crop&q=80' },
        { id: 2, name: 'Bob Smith' }, // Will use initials
        { id: 3, name: 'Charlie Davis', avatar: 'https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=150&h=150&fit=crop&q=80' },
        { id: 4, name: 'Diana Prince', avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150&h=150&fit=crop&q=80' },
        { id: 5, name: 'Ethan Hunt' },
        { id: 6, name: 'Fiona Gallagher', avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&h=150&fit=crop&q=80' }
      ];

      return (
        <div className="demo-container">
          <div className="demo-section">
            <span className="demo-label">Large (lg) - Full Team</span>
            <AvatarGroup users={users} size="lg" max={6} />
          </div>

          <div className="demo-section">
            <span className="demo-label">Medium (md) - Limited Display</span>
            <AvatarGroup users={users} size="md" max={4} />
          </div>

          <div className="demo-section">
            <span className="demo-label">Small (sm) - Compact</span>
            <AvatarGroup users={users} size="sm" max={3} />
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
