<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Stepper Progress Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    
    .demo-container {
      background: white;
      padding: 3rem 2rem;
      border-radius: 24px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 800px;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 2rem;
      color: #0f172a;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 3rem;
    }

    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    button.prev {
      background: #f1f5f9;
      color: #475569;
    }
    button.prev:hover:not(:disabled) { background: #e2e8f0; }

    button.next {
      background: #0f172a;
      color: white;
    }
    button.next:hover:not(:disabled) { background: #334155; }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button:active:not(:disabled) {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const StepperProgress = ({ steps = [], currentStep = 0 }) => {
      const progressPercentage = steps.length > 1 ? (currentStep / (steps.length - 1)) * 100 : 0;

      return (
        <div className="ease-stepper-container">
          <div className="ease-stepper-track-wrapper">
            <div className="ease-stepper-track-bg"></div>
            <div className="ease-stepper-track-fill" style={{ width: `${progressPercentage}%` }}></div>
          </div>

          <div className="ease-stepper-nodes">
            {steps.map((step, index) => {
              const isCompleted = index < currentStep;
              const isActive = index === currentStep;
              const isPending = index > currentStep;
              
              let stateClass = '';
              if (isCompleted) stateClass = 'is-completed';
              if (isActive) stateClass = 'is-active';
              if (isPending) stateClass = 'is-pending';

              const label = typeof step === 'string' ? step : step.label;

              return (
                <div key={index} className={`ease-stepper-node-wrapper ${stateClass}`}>
                  {isActive && <div className="ease-stepper-pulse-ring"></div>}
                  <div className="ease-stepper-circle">
                    {isCompleted ? (
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                      </svg>
                    ) : (
                      <span>{index + 1}</span>
                    )}
                  </div>
                  <div className="ease-stepper-label">{label}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const App = () => {
      const [currentStep, setCurrentStep] = useState(1); // Start on second step for demo
      const steps = [
        "Account Details",
        "Billing Address",
        "Payment Method",
        "Review Order"
      ];

      return (
        <div className="demo-container">
          <h1>Checkout Process</h1>
          
          <StepperProgress 
            steps={steps} 
            currentStep={currentStep} 
          />

          <div className="controls">
            <button 
              className="prev"
              onClick={() => setCurrentStep(c => Math.max(0, c - 1))}
              disabled={currentStep === 0}
            >
              Back
            </button>
            <button 
              className="next"
              onClick={() => setCurrentStep(c => Math.min(steps.length - 1, c + 1))}
              disabled={currentStep === steps.length - 1}
            >
              Continue
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
