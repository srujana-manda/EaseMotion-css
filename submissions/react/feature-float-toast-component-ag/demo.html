<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Toast Component Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h2 class="demo-title">EaseMotion CSS - Floating Toast Demo</h2>
    <p class="demo-subtitle">The toast notification is fixed at the bottom right corner of the viewport.</p>
  </div>

  <div class="toast-container-demo">
    <div class="toast toast-success">
      <div class="toast-icon">✓</div>
      <div class="toast-content">
        <h4 class="toast-title">Changes Saved</h4>
        <p class="toast-message">Your profile settings have been updated successfully.</p>
      </div>
      <button class="toast-close" aria-label="Close">&times;</button>
    </div>
  </div>

</body>
</html>
