<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Kanban Task Card Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    .demo-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 2rem;
      font-weight: 800;
    }

    .kanban-column {
      width: 300px;
      background: #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .column-header {
      font-weight: 700;
      color: #334155;
      margin-bottom: 16px;
      padding-left: 8px;
    }

    .kanban-dropzone {
      min-height: 200px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    
    .kanban-dropzone.drag-over {
      background: #cbd5e1;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    const KanbanCard = ({ task, onDragStart, onDragEnd }) => {
      const [isDragging, setIsDragging] = useState(false);
      const cardRef = useRef(null);

      const handleDragStart = (e) => {
        if (e.button !== 0) return;
        setIsDragging(true);
        if (onDragStart) onDragStart(task.id);
        
        e.dataTransfer.effectAllowed = 'move';
        
        // Timeout prevents the ghost image from capturing the ghost state styling
        setTimeout(() => {
          if (cardRef.current) cardRef.current.classList.add('is-dragging');
        }, 0);
      };

      const handleDragEnd = (e) => {
        setIsDragging(false);
        if (cardRef.current) cardRef.current.classList.remove('is-dragging');
        if (onDragEnd) onDragEnd(task.id);
      };

      const priorityColors = { high: '#ef4444', medium: '#f59e0b', low: '#10b981' };

      return (
        <div
          ref={cardRef}
          className={`ease-kanban-card ${isDragging ? 'is-dragging' : ''}`}
          draggable="true"
          onDragStart={handleDragStart}
          onDragEnd={handleDragEnd}
        >
          <div className="ease-card-header">
            <span className="ease-priority-badge" style={{ backgroundColor: priorityColors[task.priority] }}>{task.priority}</span>
            <span className="ease-task-id">{task.id}</span>
          </div>
          <h4 className="ease-task-title">{task.title}</h4>
          <div className="ease-card-footer">
            <div className="ease-avatar-group">
              {task.assignees.map((a, i) => (
                <div key={i} className="ease-avatar" style={{ zIndex: 10 - i }} title={a}>{a.charAt(0)}</div>
              ))}
            </div>
            {task.comments > 0 && (
              <div className="ease-comments">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>{task.comments}</span>
              </div>
            )}
          </div>
        </div>
      );
    };

    const App = () => {
      const tasks = [
        { id: 'TSK-101', title: 'Implement secure auth flow', priority: 'high', assignees: ['Alice', 'Bob'], comments: 3 },
        { id: 'TSK-102', title: 'Update documentation for v2.0 API endpoints', priority: 'low', assignees: ['Charlie'], comments: 0 },
        { id: 'TSK-103', title: 'Fix navigation layout bug on mobile Safari', priority: 'medium', assignees: ['Alice'], comments: 1 }
      ];

      return (
        <div>
          <div className="demo-header">
            <h1>To Do</h1>
            <p>Try dragging the cards. Notice the physical hover lift and the ghost state.</p>
          </div>
          
          <div className="kanban-column">
            <div className="column-header">Backlog ({tasks.length})</div>
            <div className="kanban-dropzone">
              {tasks.map(task => (
                <KanbanCard key={task.id} task={task} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
