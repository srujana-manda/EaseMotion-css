<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Heatmap Grid Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    
    .card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    h1 {
      color: #0f172a;
      margin-top: 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const HeatmapGrid = ({ data = [], xLabels = [], yLabels = [], colorScale }) => {
      const [hoveredCell, setHoveredCell] = useState(null);
      
      const maxValue = useMemo(() => Math.max(...data.map(d => d.value), 1), [data]);

      const defaultColorScale = (val) => {
        if (val === 0) return '#ebedf0';
        const ratio = val / maxValue;
        if (ratio < 0.25) return '#9be9a8';
        if (ratio < 0.50) return '#40c463';
        if (ratio < 0.75) return '#30a14e';
        return '#216e39';
      };

      const getColor = colorScale || defaultColorScale;

      const grid = yLabels.map((yLabel, yIndex) => {
        return xLabels.map((xLabel, xIndex) => {
          const cellData = data.find(d => d.y === yIndex && d.x === xIndex) || { value: 0 };
          return {
            x: xIndex, y: yIndex,
            xLabel, yLabel,
            value: cellData.value,
            label: cellData.label || `${cellData.value} events`
          };
        });
      });

      return (
        <div className="ease-heatmap-container">
          <div className="ease-heatmap-y-axis">
            {yLabels.map((label, i) => (
              <div key={`y-${i}`} className="ease-heatmap-label">{label}</div>
            ))}
          </div>

          <div className="ease-heatmap-main">
            <div className="ease-heatmap-grid" style={{ gridTemplateColumns: `repeat(${xLabels.length}, 1fr)` }}>
              {grid.map((row, yIndex) => 
                row.map((cell, xIndex) => {
                  // Add a slight stagger delay based on x/y coordinates for the entrance pop
                  const delay = (xIndex * 0.02) + (yIndex * 0.05);
                  
                  return (
                    <div
                      key={`${xIndex}-${yIndex}`}
                      className="ease-heatmap-cell-wrapper"
                      onMouseEnter={() => setHoveredCell(cell)}
                      onMouseLeave={() => setHoveredCell(null)}
                    >
                      <div 
                        className={`ease-heatmap-cell ${hoveredCell === cell ? 'is-hovered' : ''}`}
                        style={{ 
                          backgroundColor: getColor(cell.value),
                          animationDelay: `${delay}s` 
                        }}
                      >
                        {hoveredCell === cell && (
                          <div className="ease-heatmap-tooltip">{cell.label}</div>
                        )}
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            <div className="ease-heatmap-x-axis">
              {xLabels.map((label, i) => (
                <div key={`x-${i}`} className="ease-heatmap-label">{label}</div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const days = ['Mon', 'Wed', 'Fri'];
      const weeks = Array.from({length: 12}, (_, i) => `W${i+1}`);
      
      // Generate some dummy data
      const mockData = [];
      for(let y = 0; y < days.length; y++) {
        for(let x = 0; x < weeks.length; x++) {
          if (Math.random() > 0.3) {
            const val = Math.floor(Math.random() * 20);
            mockData.push({
              x, y, 
              value: val, 
              label: `${val} commits on ${days[y]}, ${weeks[x]}`
            });
          }
        }
      }

      return (
        <div className="card">
          <h1>Activity Heatmap</h1>
          <HeatmapGrid 
            data={mockData}
            xLabels={weeks}
            yLabels={days}
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
