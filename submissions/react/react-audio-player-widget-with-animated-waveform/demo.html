<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Audio Player Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    h1 {
      text-align: center;
      color: #1e293b;
      margin-bottom: 0;
    }

    p.subtitle {
      text-align: center;
      color: #64748b;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WaveBar = ({ isPlaying, height, delay }) => {
      return (
        <div 
          className={`ease-wave-bar ${isPlaying ? 'is-playing' : ''}`}
          style={{ height: `${height}px`, animationDelay: `${delay}s` }}
        />
      );
    };

    const AudioPlayer = ({ src, title, artist, coverArt }) => {
      const [isPlaying, setIsPlaying] = useState(false);
      const [progress, setProgress] = useState(0);
      const [duration, setDuration] = useState(0);
      const audioRef = useRef(null);
      
      const waveBars = useRef(
        Array.from({ length: 24 }).map((_, i) => ({
          id: i,
          height: Math.floor(Math.random() * (32 - 8 + 1)) + 8,
          delay: Math.random() * 1.5
        }))
      ).current;

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;

        const setAudioData = () => setDuration(audio.duration);
        const setAudioTime = () => setProgress((audio.currentTime / audio.duration) * 100);
        const handleEnd = () => { setIsPlaying(false); setProgress(0); };

        audio.addEventListener('loadeddata', setAudioData);
        audio.addEventListener('timeupdate', setAudioTime);
        audio.addEventListener('ended', handleEnd);

        return () => {
          audio.removeEventListener('loadeddata', setAudioData);
          audio.removeEventListener('timeupdate', setAudioTime);
          audio.removeEventListener('ended', handleEnd);
        };
      }, []);

      const togglePlay = () => {
        if (!audioRef.current) return;
        if (isPlaying) audioRef.current.pause();
        else audioRef.current.play();
        setIsPlaying(!isPlaying);
      };

      const handleSeek = (e) => {
        const audio = audioRef.current;
        if (!audio || !duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const newProgress = (clickX / rect.width);
        audio.currentTime = newProgress * duration;
        setProgress(newProgress * 100);
      };

      const formatTime = (timeInSeconds) => {
        if (!timeInSeconds || isNaN(timeInSeconds)) return "0:00";
        const minutes = Math.floor(timeInSeconds / 60);
        const seconds = Math.floor(timeInSeconds % 60);
        return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
      };

      const currentTime = audioRef.current ? audioRef.current.currentTime : 0;

      return (
        <div className={`ease-audio-player ${isPlaying ? 'is-playing' : ''}`}>
          <audio ref={audioRef} src={src} preload="metadata" />

          <div className="ease-audio-cover-wrapper">
            <img src={coverArt} alt="Cover Art" className="ease-audio-cover" />
            <div className="ease-audio-vinyl-hole"></div>
          </div>

          <div className="ease-audio-body">
            <div className="ease-audio-header">
              <div className="ease-audio-meta">
                <h3 className="ease-audio-title">{title}</h3>
                <p className="ease-audio-artist">{artist}</p>
              </div>
              
              <button className="ease-audio-play-btn" onClick={togglePlay} aria-label={isPlaying ? "Pause" : "Play"}>
                {isPlaying ? (
                  <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>
                ) : (
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z" /></svg>
                )}
              </button>
            </div>

            <div className="ease-audio-waveform-container" onClick={handleSeek} aria-label="Seek track">
              <div className="ease-audio-waveform-progress" style={{ width: `${progress}%` }}></div>
              <div className="ease-audio-waveform">
                {waveBars.map(bar => (
                  <WaveBar key={bar.id} height={bar.height} delay={bar.delay} isPlaying={isPlaying} />
                ))}
              </div>
            </div>

            <div className="ease-audio-time">
              <span>{formatTime(currentTime)}</span>
              <span>{formatTime(duration)}</span>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      return (
        <div className="demo-container">
          <div>
            <h1>Audio Player Widget</h1>
            <p className="subtitle">Press play to activate the CSS waveform and vinyl spin.</p>
          </div>
          
          <AudioPlayer 
            title="Lofi Study Beats"
            artist="Chillhop Music"
            // Using a free sample mp3 for the demo
            src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            coverArt="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&q=80"
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
