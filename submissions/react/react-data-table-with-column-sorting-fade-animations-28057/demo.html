<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Data Table Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 4rem 2rem;
    }
    
    .demo-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .demo-header {
      margin-bottom: 2rem;
    }

    .demo-header h1 {
      color: #0f172a;
      margin-bottom: 0.5rem;
    }
    
    .demo-header p {
      color: #64748b;
      margin-top: 0;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const DataTable = ({ columns = [], data = [] }) => {
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
      const [isSorting, setIsSorting] = useState(false);

      const sortedData = useMemo(() => {
        let sortableItems = [...data];
        if (sortConfig.key !== null) {
          sortableItems.sort((a, b) => {
            if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
            if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return sortableItems;
      }, [data, sortConfig]);

      const requestSort = (key) => {
        setIsSorting(true);
        setTimeout(() => {
          let direction = 'asc';
          if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
          setSortConfig({ key, direction });
          setIsSorting(false);
        }, 150);
      };

      return (
        <div className="ease-datatable-wrapper">
          <table className="ease-datatable">
            <thead>
              <tr>
                {columns.map((column) => (
                  <th 
                    key={column.key}
                    className={column.sortable ? 'is-sortable' : ''}
                    onClick={() => column.sortable && requestSort(column.key)}
                  >
                    <div className="ease-datatable-th-content">
                      {column.label}
                      {column.sortable && (
                        <span className={`ease-datatable-sort-icon ${sortConfig.key === column.key ? `is-active is-${sortConfig.direction}` : ''}`}>
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                          </svg>
                        </span>
                      )}
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody className={`ease-datatable-body ${isSorting ? 'is-sorting' : ''}`}>
              {sortedData.length > 0 ? (
                sortedData.map((row, rowIndex) => (
                  <tr key={row.id || rowIndex} className="ease-datatable-row" style={{ animationDelay: `${rowIndex * 0.05}s` }}>
                    {columns.map((column) => (
                      <td key={`${row.id || rowIndex}-${column.key}`}>{row[column.key]}</td>
                    ))}
                  </tr>
                ))
              ) : (
                <tr>
                  <td colSpan={columns.length} className="ease-datatable-empty">No data available</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      );
    };

    const App = () => {
      const columns = [
        { key: 'name', label: 'Name', sortable: true },
        { key: 'role', label: 'Role', sortable: true },
        { key: 'department', label: 'Department', sortable: true },
        { key: 'status', label: 'Status', sortable: false },
      ];

      const data = [
        { id: 1, name: 'Alice Johnson', role: 'Software Engineer', department: 'Engineering', status: 'Active' },
        { id: 2, name: 'Bob Smith', role: 'Product Manager', department: 'Product', status: 'On Leave' },
        { id: 3, name: 'Charlie Davis', role: 'UX Designer', department: 'Design', status: 'Active' },
        { id: 4, name: 'Diana Evans', role: 'QA Tester', department: 'Engineering', status: 'Active' },
        { id: 5, name: 'Evan Harris', role: 'Marketing Lead', department: 'Marketing', status: 'Active' },
      ];

      return (
        <div className="demo-container">
          <div className="demo-header">
            <h1>Team Directory</h1>
            <p>Click on column headers to sort the table data.</p>
          </div>
          <DataTable columns={columns} data={data} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
