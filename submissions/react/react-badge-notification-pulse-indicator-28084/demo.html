<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Badge Pulse Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    
    .demo-grid {
      display: flex;
      gap: 4rem;
      align-items: center;
      justify-content: center;
      background: white;
      padding: 4rem;
      border-radius: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .icon-box {
      width: 48px;
      height: 48px;
      background: #f1f5f9;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
    }

    .icon-box svg {
      width: 24px;
      height: 24px;
    }

    .controls {
      margin-top: 3rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: white;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #f1f5f9; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const BadgeNotification = ({ count = 0, showZero = false, pulsing = true, color = null, position = 'top-right', children }) => {
      const isVisible = count > 0 || showZero;
      const displayCount = typeof count === 'number' && count > 99 ? '99+' : count;

      return (
        <div className="ease-badge-container">
          {children}
          {isVisible && (
            <div className={`ease-badge-wrapper pos-${position}`}>
              {pulsing && <div className="ease-badge-pulse-ring" style={color ? { backgroundColor: color } : {}} />}
              <span className="ease-badge-core" style={color ? { backgroundColor: color } : {}}>{displayCount}</span>
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [count, setCount] = useState(3);
      const [isPulsing, setIsPulsing] = useState(true);

      const MailIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      );

      const BellIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      );

      return (
        <div>
          <div className="demo-grid">
            <BadgeNotification count={count} pulsing={isPulsing}>
              <div className="icon-box"><MailIcon /></div>
            </BadgeNotification>

            <BadgeNotification count={count > 0 ? "!" : 0} pulsing={isPulsing} color="#3b82f6">
              <div className="icon-box"><BellIcon /></div>
            </BadgeNotification>
            
            <BadgeNotification count={142} pulsing={isPulsing} color="#10b981" position="bottom-right">
              <div className="icon-box">Chat</div>
            </BadgeNotification>
          </div>

          <div className="controls">
            <button onClick={() => setCount(c => c + 1)}>Increment</button>
            <button onClick={() => setCount(0)}>Clear</button>
            <button onClick={() => setIsPulsing(!isPulsing)}>
              Toggle Pulse ({isPulsing ? 'On' : 'Off'})
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
