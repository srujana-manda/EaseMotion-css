<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Profile Flip Card Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    .demo-instructions {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const ProfileCard = ({ user }) => {
      const [isFlipped, setIsFlipped] = useState(false);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setIsFlipped(!isFlipped);
        }
      };

      return (
        <div className="ease-profile-scene">
          <div 
            className={`ease-profile-card ${isFlipped ? 'is-flipped' : ''}`}
            onClick={() => setIsFlipped(!isFlipped)}
            onKeyDown={handleKeyDown}
            role="button"
            tabIndex={0}
            aria-pressed={isFlipped}
            aria-label="Toggle user profile details"
          >
            
            <div className="ease-profile-face ease-profile-front">
              <div className="ease-profile-cover" style={{ backgroundImage: `url(${user.coverImage})` }}>
                <button className="ease-profile-flip-btn" aria-label="View details" tabIndex={-1}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>
                  </svg>
                </button>
              </div>
              
              <div className="ease-profile-avatar-wrapper">
                <img src={user.avatar} alt={`${user.name} avatar`} className="ease-profile-avatar" />
                {user.isOnline && <span className="ease-profile-status-dot" title="Online"></span>}
              </div>

              <div className="ease-profile-info">
                <h2 className="ease-profile-name">{user.name}</h2>
                <p className="ease-profile-role">{user.role}</p>
                
                <div className="ease-profile-stats">
                  <div className="ease-profile-stat">
                    <span className="ease-profile-stat-value">{user.stats.followers}</span>
                    <span className="ease-profile-stat-label">Followers</span>
                  </div>
                  <div className="ease-profile-stat">
                    <span className="ease-profile-stat-value">{user.stats.following}</span>
                    <span className="ease-profile-stat-label">Following</span>
                  </div>
                  <div className="ease-profile-stat">
                    <span className="ease-profile-stat-value">{user.stats.projects}</span>
                    <span className="ease-profile-stat-label">Projects</span>
                  </div>
                </div>
                
                <button 
                  className="ease-profile-action-btn"
                  onClick={(e) => { e.stopPropagation(); alert('Followed!'); }}
                >
                  Follow
                </button>
              </div>
            </div>

            <div className="ease-profile-face ease-profile-back">
              <div className="ease-profile-back-header">
                <h3>About</h3>
                <button className="ease-profile-flip-btn back-btn" aria-label="Go back" tabIndex={-1}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
                  </svg>
                </button>
              </div>
              
              <div className="ease-profile-bio">
                <p>{user.bio}</p>
              </div>
              
              <div className="ease-profile-skills">
                <h4>Top Skills</h4>
                <div className="ease-profile-tags">
                  {user.skills.map((skill, index) => (
                    <span key={index} className="ease-profile-tag">{skill}</span>
                  ))}
                </div>
              </div>
              
              <div className="ease-profile-socials">
                <button className="ease-social-btn" aria-label="Twitter" onClick={(e) => e.stopPropagation()}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg></button>
                <button className="ease-social-btn" aria-label="GitHub" onClick={(e) => e.stopPropagation()}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg></button>
              </div>
            </div>

          </div>
        </div>
      );
    };

    const App = () => {
      // Mock user data
      const mockUser = {
        name: "Alex Designer",
        role: "Senior UI/UX Engineer",
        bio: "Obsessed with micro-interactions, CSS physics, and building interfaces that feel physically satisfying to use.",
        avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d",
        coverImage: "https://images.unsplash.com/photo-1557683316-973673baf926?w=800&q=80",
        isOnline: true,
        stats: {
          followers: "12.4K",
          following: "842",
          projects: "47"
        },
        skills: ["React", "CSS Animation", "Figma", "Framer Motion", "Three.js"]
      };

      return (
        <div>
          <div className="demo-instructions">
            <h1 style={{color: '#0f172a', margin: '0 0 0.5rem 0'}}>Interactive Profile Card</h1>
            <p style={{margin: 0}}>Click the card or use Tab + Enter to trigger the 3D flip.</p>
          </div>
          
          <ProfileCard user={mockUser} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
