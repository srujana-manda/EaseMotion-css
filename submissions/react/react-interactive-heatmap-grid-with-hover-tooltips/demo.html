<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Heatmap Grid Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load standard component CSS -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel to compile JSX in the browser for this demo -->
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Note: We define the component inside the HTML for the CI demo using Babel -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    const HeatmapGrid = ({ 
      data = [], 
      xLabels = [], 
      yLabels = [], 
      colorTheme = 'emerald'
    }) => {
      const [hoveredCell, setHoveredCell] = useState(null);

      const getIntensityClass = (val) => {
        if (val === 0 || !val) return 'intensity-0';
        if (val < 25) return 'intensity-1';
        if (val < 50) return 'intensity-2';
        if (val < 75) return 'intensity-3';
        return 'intensity-4';
      };

      const gridMap = useMemo(() => {
        const map = new Map();
        data.forEach(item => {
          map.set(`${item.y}-${item.x}`, item.val);
        });
        return map;
      }, [data]);

      return (
        <div className={`ease-heatmap-container theme-${colorTheme}`}>
          <div className="ease-heatmap-inner">
            <div className="ease-heatmap-corner"></div>

            <div className="ease-heatmap-x-labels">
              {xLabels.map((label, i) => (
                <div key={`x-${i}`} className="ease-heatmap-label">{label}</div>
              ))}
            </div>

            <div className="ease-heatmap-y-labels">
              {yLabels.map((label, i) => (
                <div key={`y-${i}`} className="ease-heatmap-label">{label}</div>
              ))}
            </div>

            <div 
              className="ease-heatmap-grid" 
              style={{ 
                gridTemplateColumns: `repeat(${xLabels.length}, 1fr)`,
                gridTemplateRows: `repeat(${yLabels.length}, 1fr)`
              }}
            >
              {yLabels.map((_, y) => (
                xLabels.map((_, x) => {
                  const val = gridMap.get(`${y}-${x}`) || 0;
                  const isHovered = hoveredCell && hoveredCell.x === x && hoveredCell.y === y;
                  
                  return (
                    <div 
                      key={`${y}-${x}`} 
                      className="ease-heatmap-cell-wrapper"
                      onMouseEnter={() => setHoveredCell({ x, y, val })}
                      onMouseLeave={() => setHoveredCell(null)}
                    >
                      <div className={`ease-heatmap-cell ${getIntensityClass(val)}`}></div>
                      
                      <div className={`ease-heatmap-tooltip ${isHovered ? 'is-visible' : ''}`}>
                        <span className="tooltip-val">{val}</span> actions on {xLabels[x]}
                        <div className="tooltip-arrow"></div>
                      </div>
                    </div>
                  );
                })
              ))}
            </div>
          </div>
          
          <div className="ease-heatmap-legend">
            <span className="legend-label">Less</span>
            <div className="ease-heatmap-cell intensity-0"></div>
            <div className="ease-heatmap-cell intensity-1"></div>
            <div className="ease-heatmap-cell intensity-2"></div>
            <div className="ease-heatmap-cell intensity-3"></div>
            <div className="ease-heatmap-cell intensity-4"></div>
            <span className="legend-label">More</span>
          </div>
        </div>
      );
    };

    // Generate random mock data
    const generateMockData = (cols, rows) => {
      const data = [];
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          // 30% chance of 0, otherwise random 1-100
          const val = Math.random() > 0.7 ? Math.floor(Math.random() * 100) + 1 : 0;
          data.push({ x, y, val });
        }
      }
      return data;
    };

    const App = () => {
      const [theme, setTheme] = useState('emerald');
      
      const cols = 20;
      const rows = 7;
      
      const xLabels = Array.from({length: cols}, (_, i) => `W${i+1}`);
      const yLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      
      // Memoize random data so it doesn't change on re-render
      const mockData = useMemo(() => generateMockData(cols, rows), []);

      return (
        <div>
          <h1 style={{color: '#1e293b', marginBottom: '0.5rem', textAlign: 'center'}}>Interactive Heatmap Grid</h1>
          <p style={{color: '#64748b', marginBottom: '2rem', textAlign: 'center'}}>Hover over the cells to see the scale physics and spring tooltips.</p>
          
          <div style={{display: 'flex', justifyContent: 'center', marginBottom: '1.5rem', gap: '1rem'}}>
            <button onClick={() => setTheme('emerald')} style={{padding: '0.5rem 1rem', cursor: 'pointer', borderRadius: '4px', border: '1px solid #ccc'}}>Emerald</button>
            <button onClick={() => setTheme('blue')} style={{padding: '0.5rem 1rem', cursor: 'pointer', borderRadius: '4px', border: '1px solid #ccc'}}>Blue</button>
            <button onClick={() => setTheme('orange')} style={{padding: '0.5rem 1rem', cursor: 'pointer', borderRadius: '4px', border: '1px solid #ccc'}}>Orange</button>
          </div>

          <div style={{display: 'flex', justifyContent: 'center'}}>
            <HeatmapGrid 
              data={mockData}
              xLabels={xLabels}
              yLabels={yLabels}
              colorTheme={theme}
            />
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
