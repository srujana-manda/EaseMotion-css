<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Data Table Sort Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    .demo-instructions {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DataTable = ({ columns, data }) => {
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
      const [isAnimating, setIsAnimating] = useState(false);
      const [displayData, setDisplayData] = useState(data);

      const triggerSortAnimation = (sortedData) => {
        setIsAnimating(true);
        setTimeout(() => {
          setDisplayData(sortedData);
          setTimeout(() => {
            setIsAnimating(false);
          }, 50);
        }, 200); 
      };

      const handleSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        else if (sortConfig.key === key && sortConfig.direction === 'desc') {
          setSortConfig({ key: null, direction: 'asc' });
          triggerSortAnimation([...data]); 
          return;
        }
        
        setSortConfig({ key, direction });
        
        const sorted = [...data].sort((a, b) => {
          if (a[key] < b[key]) return direction === 'asc' ? -1 : 1;
          if (a[key] > b[key]) return direction === 'asc' ? 1 : -1;
          return 0;
        });

        triggerSortAnimation(sorted);
      };

      useEffect(() => {
        setDisplayData(data);
      }, [data]);

      const renderSortIcon = (key) => {
        if (sortConfig.key !== key) {
          return (
            <svg className="ease-sort-icon inactive" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="7 15 12 20 17 15"></polyline><polyline points="7 9 12 4 17 9"></polyline></svg>
          );
        }
        if (sortConfig.direction === 'asc') {
          return (
            <svg className="ease-sort-icon active" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="7 15 12 20 17 15"></polyline><polyline points="7 9 12 4 17 9" opacity="0.3"></polyline></svg>
          );
        }
        return (
          <svg className="ease-sort-icon active" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="7 15 12 20 17 15" opacity="0.3"></polyline><polyline points="7 9 12 4 17 9"></polyline></svg>
        );
      };

      return (
        <div className="ease-table-container">
          <table className="ease-data-table">
            <thead>
              <tr>
                {columns.map((col) => (
                  <th key={col.key} className={col.sortable ? 'is-sortable' : ''} onClick={() => col.sortable && handleSort(col.key)}>
                    <div className="ease-th-content">
                      {col.label}
                      {col.sortable && renderSortIcon(col.key)}
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody className={`ease-table-body ${isAnimating ? 'is-sorting' : ''}`}>
              {displayData.map((row, rowIndex) => (
                <tr key={row.id || rowIndex} style={{ '--row-index': rowIndex }}>
                  {columns.map((col) => (
                    <td key={`${row.id || rowIndex}-${col.key}`}>{row[col.key]}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    };

    const App = () => {
      const columns = [
        { key: 'name', label: 'Employee Name', sortable: true },
        { key: 'department', label: 'Department', sortable: true },
        { key: 'status', label: 'Status', sortable: true },
        { key: 'date', label: 'Join Date', sortable: true }
      ];

      const data = [
        { id: 1, name: 'Alice Smith', department: 'Engineering', status: 'Active', date: '2023-01-15' },
        { id: 2, name: 'Bob Johnson', department: 'Design', status: 'On Leave', date: '2022-11-04' },
        { id: 3, name: 'Charlie Brown', department: 'Product', status: 'Active', date: '2024-02-28' },
        { id: 4, name: 'Diana Prince', department: 'Engineering', status: 'Active', date: '2021-08-19' },
        { id: 5, name: 'Evan Wright', department: 'Marketing', status: 'Inactive', date: '2023-06-12' },
      ];

      return (
        <div style={{ width: '100%' }}>
          <div className="demo-instructions">
            <h1 style={{color: '#0f172a', margin: '0 0 0.5rem 0'}}>Sortable Data Table</h1>
            <p style={{margin: 0}}>Click on column headers to test the CSS-driven sort animation.</p>
          </div>
          <DataTable columns={columns} data={data} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
