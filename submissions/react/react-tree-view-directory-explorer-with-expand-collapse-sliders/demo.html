<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Tree View Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load standard component CSS -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel to compile JSX in the browser for this demo -->
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Note: We define the component inside the HTML for the CI demo using Babel -->
  <script type="text/babel">
    const { useState } = React;

    const TreeNode = ({ node }) => {
      const [isExpanded, setIsExpanded] = useState(node.isExpanded || false);
      const hasChildren = node.children && node.children.length > 0;

      const toggleExpand = () => {
        if (hasChildren) {
          setIsExpanded(!isExpanded);
        }
      };

      return (
        <div className="ease-tree-node">
          <div 
            className={`ease-tree-node-header ${hasChildren ? 'is-folder' : 'is-file'}`} 
            onClick={toggleExpand}
          >
            <div className={`ease-tree-chevron ${hasChildren && isExpanded ? 'expanded' : ''}`}>
              {hasChildren && (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              )}
            </div>
            
            <div className="ease-tree-icon">
              {hasChildren ? (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
              ) : (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                  <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
              )}
            </div>
            
            <span className="ease-tree-node-label">{node.name}</span>
          </div>

          {hasChildren && (
            <div className={`ease-tree-children-wrapper ${isExpanded ? 'is-expanded' : ''}`}>
              <div className="ease-tree-children-inner">
                <div className="ease-tree-children">
                  {node.children.map((child, index) => (
                    <TreeNode key={index} node={child} />
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const TreeView = ({ data = [] }) => {
      if (!data || data.length === 0) {
        return <div className="ease-tree-empty">No directory data available.</div>;
      }

      return (
        <div className="ease-tree-container">
          {data.map((node, index) => (
            <TreeNode key={index} node={node} />
          ))}
        </div>
      );
    };

    // Render App
    const App = () => {
      const directoryData = [
        {
          name: 'src',
          isExpanded: true,
          children: [
            {
              name: 'components',
              isExpanded: true,
              children: [
                { name: 'Button.jsx' },
                { name: 'Header.jsx' },
                { name: 'TreeView.jsx' }
              ]
            },
            {
              name: 'styles',
              children: [
                { name: 'main.css' },
                { name: 'variables.css' }
              ]
            },
            { name: 'App.jsx' },
            { name: 'index.js' }
          ]
        },
        {
          name: 'public',
          children: [
            { name: 'index.html' },
            { name: 'favicon.ico' }
          ]
        },
        { name: 'package.json' },
        { name: 'README.md' }
      ];

      return (
        <div style={{width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center'}}>
          <h1 style={{textAlign: 'center', fontFamily: 'sans-serif', color: '#1e293b'}}>React Tree View</h1>
          <p style={{textAlign: 'center', fontFamily: 'sans-serif', color: '#64748b', marginBottom: '2rem'}}>Click the folders to expand/collapse dynamically.</p>
          <TreeView data={directoryData} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
