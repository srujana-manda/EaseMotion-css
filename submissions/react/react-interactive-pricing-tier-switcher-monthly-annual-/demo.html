<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Pricing Switcher Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    .demo-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      color: #0f172a;
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    p.subtitle {
      color: #64748b;
      font-size: 1.125rem;
      max-width: 500px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const AnimatedPrice = ({ price }) => {
      return (
        <div className="ease-pricing-animated-number">
          <span key={price} className="ease-pricing-number-tick">
            ${price}
          </span>
        </div>
      );
    };

    const PricingSwitcher = ({ tiers, initialBilling = 'monthly' }) => {
      const [billingCycle, setBillingCycle] = useState(initialBilling);

      const isAnnual = billingCycle === 'annual';
      const toggleBilling = () => setBillingCycle(prev => prev === 'monthly' ? 'annual' : 'monthly');

      return (
        <div className="ease-pricing-container">
          <div className="ease-pricing-toggle-wrapper">
            <span className={`ease-pricing-toggle-label ${!isAnnual ? 'is-active' : ''}`}>Monthly</span>
            
            <button 
              className={`ease-pricing-switch ${isAnnual ? 'is-annual' : ''}`}
              onClick={toggleBilling}
              aria-pressed={isAnnual}
              aria-label="Toggle billing cycle"
            >
              <span className="ease-pricing-switch-thumb" />
            </button>

            <span className={`ease-pricing-toggle-label ${isAnnual ? 'is-active' : ''}`}>
              Annually
              <span className="ease-pricing-discount-badge">Save 20%</span>
            </span>
          </div>

          <div className="ease-pricing-cards-grid">
            {tiers.map((tier) => {
              const activePrice = isAnnual ? tier.price.annual : tier.price.monthly;
              
              return (
                <div key={tier.id} className={`ease-pricing-card ${tier.isPopular ? 'is-popular' : ''}`}>
                  {tier.isPopular && <div className="ease-pricing-popular-banner">Most Popular</div>}
                  
                  <div className="ease-pricing-card-header">
                    <h3 className="ease-pricing-card-title">{tier.name}</h3>
                    <p className="ease-pricing-card-desc">{tier.description}</p>
                  </div>

                  <div className="ease-pricing-card-price-wrap">
                    <AnimatedPrice price={activePrice} />
                    <span className="ease-pricing-card-period">/mo</span>
                  </div>
                  
                  <div className={`ease-pricing-card-annual-desc ${isAnnual ? 'is-visible' : ''}`}>
                    Billed ${activePrice * 12} annually
                  </div>

                  <ul className="ease-pricing-card-features">
                    {tier.features.map((feature, idx) => (
                      <li key={idx}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        {feature}
                      </li>
                    ))}
                  </ul>

                  <button className={`ease-pricing-btn ${tier.isPopular ? 'btn-primary' : 'btn-secondary'}`}>
                    {tier.buttonText}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const App = () => {
      // Sample pricing data
      const pricingTiers = [
        {
          id: 'basic',
          name: 'Basic',
          description: 'Perfect for individuals starting out.',
          price: { monthly: 15, annual: 12 },
          isPopular: false,
          buttonText: 'Get Started',
          features: ['1 Project', '10GB Storage', 'Community Support', 'Basic Analytics']
        },
        {
          id: 'pro',
          name: 'Professional',
          description: 'Ideal for growing teams and businesses.',
          price: { monthly: 49, annual: 39 },
          isPopular: true,
          buttonText: 'Start Free Trial',
          features: ['Unlimited Projects', '100GB Storage', 'Priority Email Support', 'Advanced Analytics', 'Custom Domains']
        },
        {
          id: 'enterprise',
          name: 'Enterprise',
          description: 'For large scale, mission-critical apps.',
          price: { monthly: 99, annual: 79 },
          isPopular: false,
          buttonText: 'Contact Sales',
          features: ['Everything in Pro', 'Unlimited Storage', '24/7 Phone Support', 'Dedicated Account Manager', 'Custom Contracts']
        }
      ];

      return (
        <div style={{width: '100%'}}>
          <div className="demo-header">
            <h1>Simple, transparent pricing</h1>
            <p className="subtitle">No hidden fees. No surprise charges. Choose the plan that works best for you and your team.</p>
          </div>
          <PricingSwitcher tiers={pricingTiers} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
