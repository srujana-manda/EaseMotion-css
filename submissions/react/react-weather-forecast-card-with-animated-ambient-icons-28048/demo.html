<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Weather Forecast Card Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 32px;
      width: 100%;
      max-width: 1100px;
    }

    .demo-header {
      margin-bottom: 3rem;
      text-align: center;
    }

    .demo-header h1 {
      color: #0f172a;
      margin-bottom: 0.5rem;
    }
    
    .demo-header p {
      color: #64748b;
      margin-top: 0;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const WeatherCard = ({ location, currentTemp, condition, forecast }) => {
      const [isHovered, setIsHovered] = useState(false);

      const renderWeatherIcon = (weatherType, isMain = false) => {
        const type = weatherType.toLowerCase();
        const iconClass = isMain ? "ease-weather-icon-main" : "ease-weather-icon-small";
        
        if (type.includes('sun') || type.includes('clear')) {
          return (
            <div className={`${iconClass} is-sunny`}>
              <div className="ease-weather-sun">
                <div className="ease-weather-sun-core" />
                <div className="ease-weather-sun-rays" />
              </div>
            </div>
          );
        } 
        
        if (type.includes('rain') || type.includes('shower')) {
          return (
            <div className={`${iconClass} is-rainy`}>
              <div className="ease-weather-cloud" />
              <div className="ease-weather-rain-drops">
                <span style={{ animationDelay: '0s' }} />
                <span style={{ animationDelay: '0.2s' }} />
                <span style={{ animationDelay: '0.4s' }} />
              </div>
            </div>
          );
        }

        return (
          <div className={`${iconClass} is-cloudy`}>
            <div className="ease-weather-cloud ease-weather-cloud-back" />
            <div className="ease-weather-cloud ease-weather-cloud-front" />
          </div>
        );
      };

      const getBackgroundClass = () => {
        const type = condition.toLowerCase();
        if (type.includes('sun')) return 'bg-sunny';
        if (type.includes('rain')) return 'bg-rainy';
        return 'bg-cloudy';
      };

      return (
        <div 
          className={`ease-weather-card ${getBackgroundClass()} ${isHovered ? 'is-hovered' : ''}`}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
        >
          <div className="ease-weather-ambient-layer">
            <div className="ease-weather-ambient-glow" />
          </div>

          <div className="ease-weather-current">
            <div className="ease-weather-header">
              <h2 className="ease-weather-location">{location}</h2>
              <span className="ease-weather-date">
                {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
              </span>
            </div>

            <div className="ease-weather-main-data">
              {renderWeatherIcon(condition, true)}
              <div className="ease-weather-temp-wrapper">
                <span className="ease-weather-temp">{currentTemp}°</span>
                <span className="ease-weather-condition">{condition}</span>
              </div>
            </div>
          </div>

          <div className="ease-weather-divider" />

          <div className="ease-weather-forecast">
            {forecast.map((day, index) => (
              <div key={day.day} className="ease-weather-forecast-item" style={{ animationDelay: `${index * 0.1}s` }}>
                <span className="ease-weather-forecast-day">{day.day}</span>
                {renderWeatherIcon(day.condition, false)}
                <span className="ease-weather-forecast-temp">{day.temp}°</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const App = () => {
      const sfForecast = [
        { day: 'Tue', temp: 68, condition: 'Sunny' },
        { day: 'Wed', temp: 65, condition: 'Cloudy' },
        { day: 'Thu', temp: 64, condition: 'Sunny' },
        { day: 'Fri', temp: 66, condition: 'Partly Cloudy' }
      ];

      const seaForecast = [
        { day: 'Tue', temp: 52, condition: 'Rainy' },
        { day: 'Wed', temp: 50, condition: 'Heavy Rain' },
        { day: 'Thu', temp: 54, condition: 'Cloudy' },
        { day: 'Fri', temp: 55, condition: 'Rainy' }
      ];

      const lonForecast = [
        { day: 'Tue', temp: 60, condition: 'Cloudy' },
        { day: 'Wed', temp: 58, condition: 'Cloudy' },
        { day: 'Thu', temp: 62, condition: 'Partly Cloudy' },
        { day: 'Fri', temp: 61, condition: 'Sunny' }
      ];

      return (
        <div>
          <div className="demo-header">
            <h1>Global Forecast</h1>
            <p>Hover over the cards to interact with the ambient animations.</p>
          </div>
          <div className="demo-grid">
            <WeatherCard location="San Francisco, CA" currentTemp={72} condition="Sunny" forecast={sfForecast} />
            <WeatherCard location="Seattle, WA" currentTemp={51} condition="Rainy" forecast={seaForecast} />
            <WeatherCard location="London, UK" currentTemp={59} condition="Cloudy" forecast={lonForecast} />
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
