<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism UI Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <!-- Ambient decorative background blobs to show off the blur effect -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <!-- The Glassmorphic Card -->
        <div class="glass-card">
            <span class="tag">Next-Gen UI</span>
            <h2 class="title">Glassmorphism</h2>
            <p class="description">
                A sleek, modern design style featuring a translucent, frosted-glass aesthetic with soft borders and vibrant background bleeds.
            </p>
            <button class="btn">Explore Features</button>
        </div>
    </div>
</body>
</html>
