<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Carousel Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load standard component CSS -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel to compile JSX in the browser for this demo -->
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      max-width: 800px;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Note: We define the component inside the HTML for the CI demo using Babel -->
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const Carousel = ({ images = [], autoPlayInterval = 5000 }) => {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isHovered, setIsHovered] = useState(false);

      const nextSlide = useCallback(() => {
        setCurrentIndex((prevIndex) => (prevIndex === images.length - 1 ? 0 : prevIndex + 1));
      }, [images.length]);

      const prevSlide = useCallback(() => {
        setCurrentIndex((prevIndex) => (prevIndex === 0 ? images.length - 1 : prevIndex - 1));
      }, [images.length]);

      const goToSlide = (index) => {
        setCurrentIndex(index);
      };

      useEffect(() => {
        if (autoPlayInterval === 0 || isHovered) return;
        const timer = setInterval(nextSlide, autoPlayInterval);
        return () => clearInterval(timer);
      }, [autoPlayInterval, isHovered, nextSlide]);

      if (!images || images.length === 0) {
        return <div className="ease-carousel-empty">No images provided</div>;
      }

      return (
        <div 
          className="ease-carousel-wrapper"
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
        >
          <div className="ease-carousel-main">
            <button 
              className="ease-carousel-arrow ease-carousel-prev" 
              onClick={prevSlide}
              aria-label="Previous Slide"
            >
              &#10094;
            </button>
            <button 
              className="ease-carousel-arrow ease-carousel-next" 
              onClick={nextSlide}
              aria-label="Next Slide"
            >
              &#10095;
            </button>
            <div 
              className="ease-carousel-track" 
              style={{ transform: `translateX(-${currentIndex * 100}%)` }}
            >
              {images.map((img, idx) => (
                <div key={idx} className="ease-carousel-slide">
                  <img src={img.url} alt={img.alt || `Slide ${idx + 1}`} />
                </div>
              ))}
            </div>
          </div>
          <div className="ease-carousel-thumbnails">
            {images.map((img, idx) => (
              <button
                key={idx}
                className={`ease-carousel-thumbnail-btn ${currentIndex === idx ? 'active' : ''}`}
                onClick={() => goToSlide(idx)}
                aria-label={`Go to slide ${idx + 1}`}
              >
                <img src={img.url} alt={`Thumbnail ${idx + 1}`} />
                <div className="ease-carousel-thumbnail-overlay"></div>
              </button>
            ))}
          </div>
        </div>
      );
    };

    // Render App
    const App = () => {
      const demoImages = [
        { url: 'https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?auto=format&fit=crop&w=800&q=80', alt: 'Mountain Landscape' },
        { url: 'https://images.unsplash.com/photo-1682687982501-1e58f813f228?auto=format&fit=crop&w=800&q=80', alt: 'Desert Dunes' },
        { url: 'https://images.unsplash.com/photo-1682695794816-7b9da18ed470?auto=format&fit=crop&w=800&q=80', alt: 'Ocean Cliffs' },
        { url: 'https://images.unsplash.com/photo-1682685797769-481b48222adf?auto=format&fit=crop&w=800&q=80', alt: 'Ancient Architecture' },
        { url: 'https://images.unsplash.com/photo-1682695798522-6e208131916d?auto=format&fit=crop&w=800&q=80', alt: 'Forest River' },
        { url: 'https://images.unsplash.com/photo-1682687981922-7b55dbb30892?auto=format&fit=crop&w=800&q=80', alt: 'Sunset Valley' }
      ];

      return (
        <div>
          <h1 style={{textAlign: 'center', fontFamily: 'sans-serif', color: '#1e293b'}}>React Interactive Carousel</h1>
          <p style={{textAlign: 'center', fontFamily: 'sans-serif', color: '#64748b', marginBottom: '2rem'}}>With synchronized thumbnails and pause-on-hover auto-play.</p>
          <Carousel images={demoImages} autoPlayInterval={4000} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
