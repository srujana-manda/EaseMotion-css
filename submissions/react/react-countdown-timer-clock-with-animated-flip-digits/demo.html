<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Countdown Timer Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    .demo-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 2.5rem;
      font-weight: 800;
    }

    p.subtitle {
      color: #64748b;
      margin-bottom: 3rem;
    }

    .alert-banner {
      margin-top: 3rem;
      padding: 1rem 2rem;
      background: #10b981;
      color: white;
      border-radius: 12px;
      font-weight: 600;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .alert-banner.is-visible {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FlipDigit = ({ value, label }) => {
      const valString = String(value).padStart(2, '0');
      const [currentVal, setCurrentVal] = useState(valString);
      const [nextVal, setNextVal] = useState(valString);
      const [isFlipping, setIsFlipping] = useState(false);

      useEffect(() => {
        if (valString !== currentVal) {
          setNextVal(valString);
          setIsFlipping(true);

          const timeout = setTimeout(() => {
            setCurrentVal(valString);
            setIsFlipping(false);
          }, 500); 

          return () => clearTimeout(timeout);
        }
      }, [valString, currentVal]);

      return (
        <div className="ease-flip-digit-group">
          <div className={`ease-flip-card ${isFlipping ? 'is-flipping' : ''}`}>
            <div className="ease-flip-card-top">{currentVal}</div>
            <div className="ease-flip-card-bottom">{currentVal}</div>
            <div className="ease-flip-flap ease-flip-flap-top">{currentVal}</div>
            <div className="ease-flip-flap ease-flip-flap-bottom">{nextVal}</div>
          </div>
          <div className="ease-flip-label">{label}</div>
        </div>
      );
    };

    const CountdownTimer = ({ targetDate, onComplete }) => {
      const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      const [isExpired, setIsExpired] = useState(false);
      const hasCompleted = useRef(false);

      useEffect(() => {
        const target = new Date(targetDate).getTime();

        const calculateTimeLeft = () => {
          const now = new Date().getTime();
          const difference = target - now;

          if (difference <= 0) {
            if (!hasCompleted.current) {
              hasCompleted.current = true;
              setIsExpired(true);
              if (onComplete) onComplete();
            }
            return { days: 0, hours: 0, minutes: 0, seconds: 0 };
          }

          return {
            days: Math.floor(difference / (1000 * 60 * 60 * 24)),
            hours: Math.floor((difference / (1000 * 60 * 60)) % 24),
            minutes: Math.floor((difference / 1000 / 60) % 60),
            seconds: Math.floor((difference / 1000) % 60)
          };
        };

        setTimeLeft(calculateTimeLeft());
        const timerInterval = setInterval(() => setTimeLeft(calculateTimeLeft()), 1000);
        return () => clearInterval(timerInterval);
      }, [targetDate, onComplete]);

      return (
        <div className={`ease-countdown-container ${isExpired ? 'is-expired' : ''}`}>
          <FlipDigit value={timeLeft.days} label="Days" />
          <span className="ease-countdown-separator">:</span>
          <FlipDigit value={timeLeft.hours} label="Hours" />
          <span className="ease-countdown-separator">:</span>
          <FlipDigit value={timeLeft.minutes} label="Minutes" />
          <span className="ease-countdown-separator">:</span>
          <FlipDigit value={timeLeft.seconds} label="Seconds" />
        </div>
      );
    };

    const App = () => {
      const [isCompleted, setIsCompleted] = useState(false);
      
      // Target date is dynamically 5 days, 3 hours, and 15 seconds from now for the demo
      const [targetDate] = useState(() => {
        const d = new Date();
        d.setDate(d.getDate() + 5);
        d.setHours(d.getHours() + 3);
        d.setSeconds(d.getSeconds() + 15);
        return d;
      });

      return (
        <div className="demo-container">
          <h1>Product Launch</h1>
          <p className="subtitle">Mechanical flip-clock countdown using standard EaseMotion 3D transforms.</p>
          
          <CountdownTimer 
            targetDate={targetDate} 
            onComplete={() => setIsCompleted(true)} 
          />

          <div className={`alert-banner ${isCompleted ? 'is-visible' : ''}`}>
            The launch has begun!
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
