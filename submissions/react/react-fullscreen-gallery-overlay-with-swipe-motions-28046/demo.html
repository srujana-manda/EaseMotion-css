<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Fullscreen Gallery Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 4rem 2rem;
    }
    
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .demo-thumbnail {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }

    .demo-thumbnail:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GalleryOverlay = ({ isOpen, onClose, images = [], initialIndex = 0 }) => {
      const [currentIndex, setCurrentIndex] = useState(initialIndex);
      const [slideDirection, setSlideDirection] = useState('next');
      const [isSwiping, setIsSwiping] = useState(false);
      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      useEffect(() => {
        if (isOpen) {
          setCurrentIndex(initialIndex);
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
        return () => { document.body.style.overflow = ''; };
      }, [isOpen, initialIndex]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!isOpen) return;
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowRight') handleNext();
          if (e.key === 'ArrowLeft') handlePrev();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isOpen, currentIndex, images.length]);

      const handleNext = () => {
        if (currentIndex < images.length - 1) {
          setSlideDirection('next');
          setCurrentIndex(prev => prev + 1);
        }
      };

      const handlePrev = () => {
        if (currentIndex > 0) {
          setSlideDirection('prev');
          setCurrentIndex(prev => prev - 1);
        }
      };

      const handleTouchStart = (e) => { touchStartX.current = e.changedTouches[0].screenX; };
      const handleTouchMove = (e) => { setIsSwiping(true); touchEndX.current = e.changedTouches[0].screenX; };
      const handleTouchEnd = () => {
        setIsSwiping(false);
        const diffX = touchEndX.current - touchStartX.current;
        if (Math.abs(diffX) > 50) {
          diffX > 0 ? handlePrev() : handleNext();
        }
      };

      if (!isOpen) return null;

      return (
        <div className="ease-gallery-overlay">
          <div className="ease-gallery-backdrop" onClick={onClose} />
          
          <div className="ease-gallery-header">
            <div className="ease-gallery-counter">{currentIndex + 1} / {images.length}</div>
            <button className="ease-gallery-close" onClick={onClose}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          {currentIndex > 0 && (
            <button className="ease-gallery-nav is-prev" onClick={handlePrev}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
          )}

          {currentIndex < images.length - 1 && (
            <button className="ease-gallery-nav is-next" onClick={handleNext}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          )}

          <div className="ease-gallery-viewport" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
            <div key={currentIndex} className={`ease-gallery-slide ${slideDirection === 'next' ? 'slide-in-right' : 'slide-in-left'} ${isSwiping ? 'is-swiping' : ''}`}>
              {images[currentIndex] && (
                <img src={images[currentIndex].src} alt={images[currentIndex].alt} className="ease-gallery-image" />
              )}
              {images[currentIndex]?.title && (
                <div className="ease-gallery-caption">{images[currentIndex].title}</div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [isOpen, setIsOpen] = useState(false);
      const [startIndex, setStartIndex] = useState(0);

      const images = [
        { src: 'https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?w=1200&q=80', alt: 'Mountain Landscape', title: 'Mountain Range at Sunset' },
        { src: 'https://images.unsplash.com/photo-1682695796254-12bf20c0f208?w=1200&q=80', alt: 'Desert Dunes', title: 'Sweeping Desert Dunes' },
        { src: 'https://images.unsplash.com/photo-1682687982501-1e58f813222a?w=1200&q=80', alt: 'Coastal Waves', title: 'Crashing Coastal Waves' },
        { src: 'https://images.unsplash.com/photo-1682687221038-404670f09439?w=1200&q=80', alt: 'Forest Path', title: 'Misty Forest Trail' }
      ];

      const openGallery = (index) => {
        setStartIndex(index);
        setIsOpen(true);
      };

      return (
        <div>
          <h1 style={{textAlign: 'center', marginBottom: '2rem'}}>Click an image to open Gallery</h1>
          <div className="demo-grid">
            {images.map((img, i) => (
              <img 
                key={i} 
                src={img.src} 
                className="demo-thumbnail" 
                onClick={() => openGallery(i)} 
                alt={img.alt}
              />
            ))}
          </div>

          <GalleryOverlay 
            isOpen={isOpen} 
            onClose={() => setIsOpen(false)} 
            images={images} 
            initialIndex={startIndex} 
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
