<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Emoji Picker Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-wrapper {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .demo-output {
      font-family: monospace;
      background: #1e293b;
      color: #a7f3d0;
      padding: 16px;
      border-radius: 8px;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const EmojiPicker = ({ question, onSelect, defaultSelected }) => {
      const [selectedId, setSelectedId] = useState(defaultSelected);

      const emojis = [
        { id: 'terrible', label: 'Terrible', emoji: '😡' },
        { id: 'bad', label: 'Bad', emoji: '🙁' },
        { id: 'okay', label: 'Okay', emoji: '😐' },
        { id: 'good', label: 'Good', emoji: '🙂' },
        { id: 'excellent', label: 'Excellent', emoji: '🤩' }
      ];

      const handleSelect = (emoji) => {
        setSelectedId(emoji.id);
        if (onSelect) onSelect(emoji);
      };

      return (
        <div className="ease-emoji-picker-container">
          <h3 className="ease-emoji-question">{question}</h3>
          
          <div className="ease-emoji-list" role="radiogroup">
            {emojis.map((item, index) => {
              const isSelected = selectedId === item.id;
              
              return (
                <div 
                  key={item.id}
                  className={`ease-emoji-item-wrapper ${isSelected ? 'is-selected' : ''}`}
                  style={{ animationDelay: `${index * 0.05}s` }}
                >
                  <button
                    type="button"
                    role="radio"
                    aria-checked={isSelected}
                    aria-label={item.label}
                    className="ease-emoji-btn"
                    onClick={() => handleSelect(item)}
                  >
                    <span className="ease-emoji-character">{item.emoji}</span>
                  </button>
                  <span className="ease-emoji-label">{item.label}</span>
                </div>
              );
            })}
          </div>
          
          <div className={`ease-emoji-thank-you ${selectedId ? 'is-visible' : ''}`}>
            Thank you for your feedback!
          </div>
        </div>
      );
    };

    const App = () => {
      const [selection, setSelection] = useState(null);

      return (
        <div className="demo-wrapper">
          <EmojiPicker 
            question="How was your checkout experience?" 
            onSelect={(data) => setSelection(data)}
          />
          
          <div className="demo-output">
            {selection ? `Payload: ${JSON.stringify(selection)}` : "Awaiting user selection..."}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
