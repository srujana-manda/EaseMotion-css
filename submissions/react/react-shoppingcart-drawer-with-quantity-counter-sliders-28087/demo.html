<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Shopping Cart Drawer Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    .demo-container {
      text-align: center;
    }

    h1 {
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 2.5rem;
      font-weight: 800;
    }

    .open-btn {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ShoppingCartDrawer = ({ initialCartItems = [], isOpen, onClose }) => {
      const [items, setItems] = useState(initialCartItems);
      const [isRendered, setIsRendered] = useState(isOpen);
      const drawerRef = useRef(null);

      useEffect(() => {
        if (isOpen) setIsRendered(true);
        else {
          const timeout = setTimeout(() => setIsRendered(false), 400); 
          return () => clearTimeout(timeout);
        }
      }, [isOpen]);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (isOpen && drawerRef.current && !drawerRef.current.contains(event.target)) {
            onClose();
          }
        };
        const timeoutId = setTimeout(() => {
          document.addEventListener('mousedown', handleClickOutside);
        }, 50);
        return () => {
          clearTimeout(timeoutId);
          document.removeEventListener('mousedown', handleClickOutside);
        };
      }, [isOpen, onClose]);

      const updateQuantity = (id, newQuantity) => {
        if (newQuantity < 0) return;
        setItems(prev => prev.map(item => item.id === id ? { ...item, quantity: newQuantity } : item));
      };

      const removeItem = (id) => {
        setItems(prev => prev.filter(item => item.id !== id));
      };

      const calculateTotal = () => {
        return items.reduce((total, item) => total + (item.price * item.quantity), 0).toFixed(2);
      };

      if (!isRendered) return null;

      return (
        <div className={`ease-cart-overlay ${isOpen ? 'is-open' : 'is-closed'}`}>
          <aside 
            ref={drawerRef}
            className={`ease-cart-drawer ${isOpen ? 'slide-in' : 'slide-out'}`}
          >
            <div className="ease-cart-header">
              <h2>Your Cart</h2>
              <button className="ease-cart-close-btn" onClick={onClose} aria-label="Close cart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>

            <div className="ease-cart-body">
              {items.length === 0 ? (
                <div className="ease-cart-empty">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                  </svg>
                  <p>Your cart is empty.</p>
                  <button className="ease-cart-shop-btn" onClick={onClose}>Continue Shopping</button>
                </div>
              ) : (
                <ul className="ease-cart-item-list">
                  {items.map(item => (
                    <li key={item.id} className="ease-cart-item">
                      <div className="ease-cart-item-image">
                        <div className="ease-img-placeholder"></div>
                      </div>
                      <div className="ease-cart-item-details">
                        <h4>{item.name}</h4>
                        <p className="ease-cart-item-price">${item.price.toFixed(2)}</p>
                        <div className="ease-cart-item-actions">
                          <div className="ease-quantity-slider">
                            <button className="ease-qty-btn" onClick={() => updateQuantity(item.id, item.quantity - 1)}>&minus;</button>
                            <div className="ease-qty-display-wrapper">
                              <span className="ease-qty-display" key={item.quantity}>{item.quantity}</span>
                            </div>
                            <button className="ease-qty-btn" onClick={() => updateQuantity(item.id, item.quantity + 1)}>+</button>
                          </div>
                          <button className="ease-cart-remove-btn" onClick={() => removeItem(item.id)}>Remove</button>
                        </div>
                      </div>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            {items.length > 0 && (
              <div className="ease-cart-footer">
                <div className="ease-cart-subtotal">
                  <span>Subtotal</span>
                  <span className="ease-cart-total-price">${calculateTotal()}</span>
                </div>
                <p className="ease-cart-tax-note">Shipping and taxes calculated at checkout.</p>
                <button className="ease-cart-checkout-btn">Checkout</button>
              </div>
            )}
          </aside>
        </div>
      );
    };

    const App = () => {
      const [drawerOpen, setDrawerOpen] = useState(false);
      
      const sampleCart = [
        { id: 1, name: "Premium Wireless Headphones", price: 299.99, quantity: 1 },
        { id: 2, name: "Ergonomic Mechanical Keyboard", price: 149.50, quantity: 2 }
      ];

      return (
        <div className="demo-container">
          <h1>Storefront</h1>
          <button className="open-btn" onClick={() => setDrawerOpen(true)}>
            Open Cart Drawer
          </button>

          <ShoppingCartDrawer 
            isOpen={drawerOpen} 
            onClose={() => setDrawerOpen(false)}
            initialCartItems={sampleCart}
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
