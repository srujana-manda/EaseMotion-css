<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Language Selector Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load standard component CSS -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel to compile JSX in the browser for this demo -->
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20vh;
      min-height: 100vh;
      box-sizing: border-box;
    }
    #root {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Note: We define the component inside the HTML for the CI demo using Babel -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const LanguageSelector = ({ languages = [], defaultLanguageCode, onChange }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [selectedLang, setSelectedLang] = useState(
        languages.find(l => l.code === defaultLanguageCode) || languages[0]
      );
      
      const dropdownRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleSelect = (lang) => {
        setSelectedLang(lang);
        setIsOpen(false);
        if (onChange) {
          onChange(lang);
        }
      };

      if (!languages || languages.length === 0) return null;

      return (
        <div className="ease-lang-selector" ref={dropdownRef}>
          <button 
            className={`ease-lang-trigger ${isOpen ? 'is-open' : ''}`}
            onClick={() => setIsOpen(!isOpen)}
            aria-haspopup="listbox"
            aria-expanded={isOpen}
          >
            <div className="ease-lang-flag-container">
              {languages.map((lang) => (
                <img 
                  key={`trigger-${lang.code}`}
                  src={lang.flagUrl} 
                  alt={`${lang.name} flag`} 
                  className={`ease-lang-flag ${selectedLang.code === lang.code ? 'is-active' : ''}`}
                />
              ))}
            </div>
            
            <span className="ease-lang-code">{selectedLang.code.toUpperCase()}</span>
            
            <svg 
              className="ease-lang-chevron" 
              viewBox="0 0 24 24" 
              fill="none" 
              stroke="currentColor" 
              strokeWidth="2" 
              strokeLinecap="round" 
              strokeLinejoin="round"
            >
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>

          <div 
            className={`ease-lang-dropdown ${isOpen ? 'is-open' : ''}`}
            role="listbox"
          >
            <ul className="ease-lang-list">
              {languages.map((lang) => (
                <li 
                  key={lang.code}
                  role="option"
                  aria-selected={selectedLang.code === lang.code}
                  className={`ease-lang-option ${selectedLang.code === lang.code ? 'is-selected' : ''}`}
                  onClick={() => handleSelect(lang)}
                >
                  <img src={lang.flagUrl} alt={`${lang.name} flag`} className="ease-lang-option-flag" />
                  <span className="ease-lang-option-name">{lang.name}</span>
                  
                  {selectedLang.code === lang.code && (
                    <svg className="ease-lang-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  )}
                </li>
              ))}
            </ul>
          </div>
        </div>
      );
    };

    // Render App
    const App = () => {
      // Using highly reliable flag SVGs from Flagpedia
      const supportedLanguages = [
        { code: 'en', name: 'English', flagUrl: 'https://flagcdn.com/w40/gb.png' },
        { code: 'fr', name: 'Français', flagUrl: 'https://flagcdn.com/w40/fr.png' },
        { code: 'de', name: 'Deutsch', flagUrl: 'https://flagcdn.com/w40/de.png' },
        { code: 'es', name: 'Español', flagUrl: 'https://flagcdn.com/w40/es.png' },
        { code: 'jp', name: '日本語', flagUrl: 'https://flagcdn.com/w40/jp.png' }
      ];

      return (
        <div>
          <h1 style={{fontFamily: 'sans-serif', color: '#1e293b', marginBottom: '0.5rem', textAlign: 'center'}}>Language Selector</h1>
          <p style={{fontFamily: 'sans-serif', color: '#64748b', marginBottom: '2rem', textAlign: 'center'}}>Notice the smooth flag crossfade and dropdown scale entrance.</p>
          
          <div style={{display: 'flex', justifyContent: 'center'}}>
            <LanguageSelector 
              languages={supportedLanguages}
              defaultLanguageCode="en"
              onChange={(lang) => console.log('Language changed to:', lang.code)}
            />
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
