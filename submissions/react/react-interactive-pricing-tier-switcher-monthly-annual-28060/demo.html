<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Pricing Switcher Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 4rem 2rem;
    }
    
    .demo-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .demo-header h1 {
      color: #0f172a;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    
    .demo-header p {
      color: #64748b;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const PricingSwitcher = ({ tiers = [] }) => {
      const [isAnnual, setIsAnnual] = useState(false);

      return (
        <div className="ease-pricing-container">
          <div className="ease-pricing-toggle-wrapper">
            <span 
              className={`ease-pricing-toggle-label ${!isAnnual ? 'is-active' : ''}`}
              onClick={() => setIsAnnual(false)}
            >
              Monthly
            </span>
            <button 
              className="ease-pricing-switch" 
              onClick={() => setIsAnnual(!isAnnual)}
              role="switch"
              aria-checked={isAnnual}
              aria-label="Toggle annual billing"
            >
              <div className={`ease-pricing-knob ${isAnnual ? 'is-annual' : 'is-monthly'}`} />
            </button>
            <span 
              className={`ease-pricing-toggle-label ${isAnnual ? 'is-active' : ''}`}
              onClick={() => setIsAnnual(true)}
            >
              Annually
              <span className="ease-pricing-badge-save">Save 20%</span>
            </span>
          </div>

          <div className="ease-pricing-grid">
            {tiers.map((tier, index) => {
              const delay = index * 0.1;
              const currentPrice = isAnnual ? tier.annualPrice : tier.monthlyPrice;

              return (
                <div 
                  key={tier.name}
                  className={`ease-pricing-card ${tier.isPopular ? 'is-popular' : ''}`}
                  style={{ animationDelay: `${delay}s` }}
                >
                  {tier.isPopular && <div className="ease-pricing-popular-badge">Most Popular</div>}
                  <h3 className="ease-pricing-tier-name">{tier.name}</h3>
                  <div className="ease-pricing-price-container">
                    <span className="ease-pricing-currency">$</span>
                    <span className="ease-pricing-amount" key={currentPrice}>{currentPrice}</span>
                    <span className="ease-pricing-period">/mo</span>
                  </div>
                  
                  {isAnnual && tier.annualPrice > 0 ? (
                    <div className="ease-pricing-billed-annually fade-in">
                      Billed ${(tier.annualPrice * 12).toFixed(0)} yearly
                    </div>
                  ) : (
                    <div className="ease-pricing-billed-annually spacer">&nbsp;</div>
                  )}

                  <button className={`ease-pricing-cta ${tier.isPopular ? 'primary' : 'secondary'}`}>
                    Get Started
                  </button>

                  <ul className="ease-pricing-features">
                    {tier.features.map((feature, i) => (
                      <li key={i}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                          <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        {feature}
                      </li>
                    ))}
                  </ul>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const App = () => {
      const pricingTiers = [
        {
          name: "Basic",
          monthlyPrice: 15,
          annualPrice: 12, // $144 billed annually
          isPopular: false,
          features: [
            "Up to 5 users",
            "Basic analytics",
            "24-hour support response time",
            "Core feature access"
          ]
        },
        {
          name: "Pro",
          monthlyPrice: 49,
          annualPrice: 39, // $468 billed annually
          isPopular: true,
          features: [
            "Up to 20 users",
            "Advanced analytics dashboard",
            "1-hour support response time",
            "Custom integrations",
            "API access"
          ]
        },
        {
          name: "Enterprise",
          monthlyPrice: 99,
          annualPrice: 79, // $948 billed annually
          isPopular: false,
          features: [
            "Unlimited users",
            "Custom reporting",
            "24/7 dedicated phone support",
            "White-glove onboarding",
            "SSO and advanced security"
          ]
        }
      ];

      return (
        <div>
          <div className="demo-header">
            <h1>Simple, transparent pricing</h1>
            <p>No hidden fees. No surprise charges.</p>
          </div>
          <PricingSwitcher tiers={pricingTiers} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
