<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Speed Dial FAB Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-content {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SpeedDial = ({ actions = [], position = 'bottom-right' }) => {
      const [isOpen, setIsOpen] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (containerRef.current && !containerRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        if (isOpen) document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, [isOpen]);

      useEffect(() => {
        const handleEsc = (event) => {
          if (event.key === 'Escape' && isOpen) setIsOpen(false);
        };
        if (isOpen) document.addEventListener('keydown', handleEsc);
        return () => document.removeEventListener('keydown', handleEsc);
      }, [isOpen]);

      return (
        <div 
          className={`ease-speeddial-container position-${position} ${isOpen ? 'is-open' : ''}`}
          ref={containerRef}
        >
          <ul className="ease-speeddial-list" aria-hidden={!isOpen}>
            {actions.map((action, index) => {
              const delay = isOpen ? (actions.length - 1 - index) * 0.05 : 0;
              return (
                <li key={action.name} className="ease-speeddial-item" style={{ transitionDelay: `${delay}s` }}>
                  <span className="ease-speeddial-tooltip">{action.name}</span>
                  <button 
                    className="ease-speeddial-action-btn"
                    aria-label={action.name}
                    tabIndex={isOpen ? 0 : -1}
                    onClick={() => {
                      action.onClick();
                      setIsOpen(false);
                    }}
                  >
                    {action.icon}
                  </button>
                </li>
              );
            })}
          </ul>

          <button 
            className="ease-speeddial-trigger" 
            onClick={() => setIsOpen(!isOpen)}
            aria-expanded={isOpen}
            aria-haspopup="true"
            aria-label="Toggle Speed Dial"
          >
            <span className="ease-speeddial-icon-default">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </span>
            <span className="ease-speeddial-icon-active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </span>
          </button>
        </div>
      );
    };

    const App = () => {
      const actions = [
        { 
          icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>, 
          name: 'New Document', 
          onClick: () => alert('Document created') 
        },
        { 
          icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>, 
          name: 'New Folder', 
          onClick: () => alert('Folder created') 
        },
        { 
          icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>, 
          name: 'Invite Member', 
          onClick: () => alert('Invite sent') 
        },
      ];

      return (
        <div>
          <div className="demo-content">
            <h1>FAB Speed Dial</h1>
            <p>Look at the bottom right of your screen. Click the plus icon to reveal the staggered actions.</p>
            <p>Try clicking outside the menu or pressing the Escape key to close it.</p>
          </div>
          <SpeedDial actions={actions} position="bottom-right" />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
