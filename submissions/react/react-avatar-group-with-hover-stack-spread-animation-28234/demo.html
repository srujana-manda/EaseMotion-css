<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Avatar Group Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    
    .demo-container {
      background: white;
      padding: 3rem;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      color: #0f172a;
      margin-bottom: 2rem;
    }
    
    .variants {
      display: flex;
      flex-direction: column;
      gap: 3rem;
      align-items: center;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const AvatarGroup = ({ avatars = [], max = 4, size = 'md' }) => {
      const [isHovered, setIsHovered] = useState(false);

      const visibleAvatars = avatars.slice(0, max);
      const overflowCount = avatars.length - max;
      const hasOverflow = overflowCount > 0;

      return (
        <div 
          className={`ease-avatar-group size-${size} ${isHovered ? 'is-hovered' : ''}`}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
          onFocus={() => setIsHovered(true)}
          onBlur={() => setIsHovered(false)}
          tabIndex={0}
        >
          {visibleAvatars.map((avatar, index) => (
            <div 
              key={avatar.id || index} 
              className="ease-avatar-wrapper"
              style={{ zIndex: visibleAvatars.length - index }}
            >
              <img 
                src={avatar.imageUrl} 
                alt={avatar.name} 
                className="ease-avatar-image"
                onError={(e) => {
                  e.target.style.display = 'none';
                  e.target.nextSibling.style.display = 'flex';
                }}
              />
              <div className="ease-avatar-fallback">
                {avatar.name ? avatar.name.charAt(0).toUpperCase() : '?'}
              </div>
              <div className="ease-avatar-tooltip">
                {avatar.name}
              </div>
            </div>
          ))}

          {hasOverflow && (
            <div className="ease-avatar-wrapper ease-avatar-overflow" style={{ zIndex: 0 }}>
              <span className="ease-avatar-fallback">+{overflowCount}</span>
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const users = [
        { id: 1, name: 'Alex Johnson', imageUrl: 'https://i.pravatar.cc/150?u=1' },
        { id: 2, name: 'Sarah Miller', imageUrl: 'https://i.pravatar.cc/150?u=2' },
        { id: 3, name: 'Mike Chen', imageUrl: 'https://i.pravatar.cc/150?u=3' },
        { id: 4, name: 'Emma Davis', imageUrl: 'https://i.pravatar.cc/150?u=4' },
        { id: 5, name: 'Chris Wilson', imageUrl: 'https://i.pravatar.cc/150?u=5' },
        { id: 6, name: 'Jessica Taylor', imageUrl: 'https://i.pravatar.cc/150?u=6' },
      ];

      return (
        <div className="demo-container">
          <h2>Hover over the avatars</h2>
          
          <div className="variants">
            <AvatarGroup avatars={users} size="lg" max={5} />
            <AvatarGroup avatars={users} size="md" max={4} />
            <AvatarGroup avatars={users} size="sm" max={3} />
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
