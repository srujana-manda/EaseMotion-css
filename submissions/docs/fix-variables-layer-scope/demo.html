<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix: Variables Layer Scope</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
    }
    h1 { font-size: 1.5rem; }
    p { color: var(--ease-color-muted); max-width: 520px; text-align: center; }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 750px;
      width: 90%;
    }
  </style>
</head>
<body>
  <h1>Fix: Variables Layer Scope</h1>
  <p>Design tokens should be un-layered so they are globally authoritative. These elements all consume framework tokens directly.</p>

  <div class="demo-grid">
    <div class="demo-token-primary">
      --ease-color-primary ✓
    </div>
    <div class="demo-token-surface">
      <strong>Surface + Border</strong>
      <p style="margin:0.5rem 0 0;">Uses --ease-color-surface and --ease-color-neutral-200</p>
    </div>
    <div class="demo-token-shadow">
      <strong>Shadow Token</strong>
      <p style="margin:0.5rem 0 0;">Uses --ease-shadow-lg</p>
    </div>
  </div>
</body>
</html>
