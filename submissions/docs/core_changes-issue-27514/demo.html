<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-badge — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.grid { display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; align-items:center; }
.card { text-align:center; }
.card .label { font-size:0.65rem; font-family:monospace; color:#6c63ff; margin-top:0.5rem; display:block; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-badge</h1><p>Notification badge with pulse indicator</p></header>
<div class="grid">
<div class="card"><div class="ease-badge-wrap ease-badge-danger ease-badge-md"><div class="ease-badge-icon">🔔</div><span class="ease-badge">3</span><span class="ease-badge-pulse"></span></div><span class="label">danger (default)</span></div>
<div class="card"><div class="ease-badge-wrap ease-badge-success ease-badge-md"><div class="ease-badge-icon">🔔</div><span class="ease-badge" style="background:#10b981;">5</span><span class="ease-badge-pulse" style="background:#10b981;"></span></div><span class="label">success</span></div>
<div class="card"><div class="ease-badge-wrap ease-badge-warning ease-badge-md"><div class="ease-badge-icon">🔔</div><span class="ease-badge" style="background:#f59e0b;">2</span><span class="ease-badge-pulse" style="background:#f59e0b;"></span></div><span class="label">warning</span></div>
<div class="card"><div class="ease-badge-wrap ease-badge-info ease-badge-md"><div class="ease-badge-icon">🔔</div><span class="ease-badge" style="background:#3b82f6;">9+</span><span class="ease-badge-pulse" style="background:#3b82f6;"></span></div><span class="label">info (9+)</span></div>
<div class="card"><div class="ease-badge-wrap ease-badge-danger ease-badge-sm"><div class="ease-badge-icon">🔔</div><span class="ease-badge" style="min-width:14px;height:14px;font-size:0.55rem;top:-4px;right:-4px;">1</span><span class="ease-badge-pulse" style="width:14px;height:14px;top:-4px;right:-4px;"></span></div><span class="label">sm size</span></div>
<div class="card"><div class="ease-badge-wrap ease-badge-danger ease-badge-lg"><div class="ease-badge-icon" style="font-size:2rem;">🔔</div><span class="ease-badge" style="min-width:22px;height:22px;font-size:0.75rem;top:-8px;right:-8px;">7</span><span class="ease-badge-pulse" style="width:22px;height:22px;top:-8px;right:-8px;"></span></div><span class="label">lg size</span></div>
</div>
</body>
</html>
