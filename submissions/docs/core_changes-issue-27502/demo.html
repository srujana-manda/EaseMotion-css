<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-modal — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.open-btn { padding:0.75rem 2rem; background:#6c63ff; color:white; border:none; border-radius:0.5rem; font-size:0.9rem; cursor:pointer; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-modal</h1><p>Dynamic modal with backdrop blur & scale-up</p></header>
<button class="open-btn" onclick="document.getElementById('modalOverlay').style.display='flex'">Open Modal</button>
<div class="ease-modal-overlay" id="modalOverlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
<div class="ease-modal">
<div class="ease-modal-header"><h3>Example Modal</h3><button class="ease-modal-close" onclick="document.getElementById('modalOverlay').style.display='none'">×</button></div>
<div class="ease-modal-body">This modal uses backdrop blur and a scale-up entrance animation. Click outside or the × to close.</div>
</div>
</div>
</body>
</html>
