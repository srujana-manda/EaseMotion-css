<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frontend filter controls — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>frontend filter controls</h1>
    <p>Issue #30363 — frontend filter controls for the student job board.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100">
    <div class="ease-flex ease-gap-2 ease-items-center" style="margin-bottom:0.5rem">
      <input type="text" id="fc-search" class="filter-input" placeholder="Search by title..." style="flex:1" />
    </div>
    <div class="ease-flex ease-gap-2 ease-items-center ease-flex-wrap">
      <label class="filter-label">Company:</label>
      <select id="fc-company" class="filter-select"><option value="">All</option><option>Google</option><option>Amazon</option><option>Microsoft</option><option>Tesla</option><option>SpaceX</option></select>
      <label class="filter-label">Min CGPA:</label>
      <select id="fc-cgpa" class="filter-select"><option value="0">Any</option><option value="7">7+</option><option value="8">8+</option><option value="9">9+</option></select>
    </div>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [{"title": "Software Engineer", "company": "Google", "branch": "CS", "cgpa": 8.0, "skills": ["Python", "Java", "React"]}, {"title": "Data Analyst", "company": "Amazon", "branch": "IT", "cgpa": 6.5, "skills": ["SQL", "Python", "Excel"]}, {"title": "Frontend Dev", "company": "Meta", "branch": "CS", "cgpa": 7.0, "skills": ["React", "CSS", "JS"]}, {"title": "Backend Dev", "company": "Microsoft", "branch": "CS", "cgpa": 7.5, "skills": ["C#", "Azure", "SQL"]}, {"title": "DevOps Engineer", "company": "Netflix", "branch": "IT", "cgpa": 8.5, "skills": ["AWS", "Docker", "K8s"]}, {"title": "Cloud Architect", "company": "AWS", "branch": "IT", "cgpa": 8.0, "skills": ["AWS", "GCP", "Terraform"]}, {"title": "Network Admin", "company": "Cisco", "branch": "IT", "cgpa": 6.0, "skills": ["CCNA", "Firewall", "TCP/IP"]}, {"title": "Embedded Eng", "company": "Tesla", "branch": "ECE", "cgpa": 8.5, "skills": ["C", "RTOS", "FPGA"]}, {"title": "Hardware Eng", "company": "AMD", "branch": "ECE", "cgpa": 7.5, "skills": ["VHDL", "Verilog", "PCB"]}, {"title": "Aerospace Eng", "company": "SpaceX", "branch": "ME", "cgpa": 9.0, "skills": ["CAD", "MATLAB", "Simulink"]}];
    const grid = document.getElementById("job-grid");

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => '' + '<span class="tag"></span>' + ').join("")
        : '<div class="no-results">No jobs match your criteria.</div>';
    }

    const fcSearch = document.getElementById("fc-search");
    const fcCompany = document.getElementById("fc-company");
    const fcCgpa = document.getElementById("fc-cgpa");
    function applyFC() {
      const q = fcSearch.value.toLowerCase(); const co = fcCompany.value; const cg = parseFloat(fcCgpa.value);
      render(jobs.filter(j => j.title.toLowerCase().includes(q) && (!co || j.company === co) && j.cgpa >= cg));
    }
    fcSearch.addEventListener("input", applyFC);
    fcCompany.addEventListener("change", applyFC);
    fcCgpa.addEventListener("change", applyFC);

    render(jobs);
  </script>
</body>
</html>
