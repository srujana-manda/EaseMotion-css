<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-transform-origin — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 720px; margin: 0 auto 2.5rem; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem;
    }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 0.3em 0.75em; color: #6c63ff; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .class-tag { background: #1e293b; border-color: #334155; }
    }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; max-width: 420px; margin: 0 auto; }
    .cell { text-align: center; }
    .cell .box-wrap { position: relative; width: 64px; height: 64px; margin: 0 auto; }
    .cell .box {
      width: 64px; height: 64px; background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      border-radius: 0.375rem; transition: transform 0.4s ease;
    }
    .cell:hover .box { transform: rotate(45deg); }
    .cell .label { font-size: 0.6rem; font-family: monospace; color: #6c63ff; margin-top: 0.3rem; }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-transform-origin</h1>
  <p>Transform origin utilities — hover each box to see rotation origin</p>
</header>
<section class="demo-section">
  <h2>Origins</h2>
  <div class="class-tag">.ease-origin-* (hover to rotate 45°)</div>
  <div class="grid">
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-top-left"></div></div><div class="label">origin-top-left</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-top"></div></div><div class="label">origin-top</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-top-right"></div></div><div class="label">origin-top-right</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-left"></div></div><div class="label">origin-left</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-center"></div></div><div class="label">origin-center</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-right"></div></div><div class="label">origin-right</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-bottom-left"></div></div><div class="label">origin-bottom-left</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-bottom"></div></div><div class="label">origin-bottom</div></div>
    <div class="cell"><div class="box-wrap"><div class="box ease-origin-bottom-right"></div></div><div class="label">origin-bottom-right</div></div>
  </div>
</section>
</body>
</html>
