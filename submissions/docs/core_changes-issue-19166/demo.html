<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Glow Button Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Neon Glow</h1>
    <p class="subtitle">Hover to activate &middot; Pure CSS</p>
  </header>

  <div class="flex-row">
    <button class="neon-btn indigo">Indigo</button>
    <button class="neon-btn pink">Pink</button>
    <button class="neon-btn teal">Teal</button>
    <button class="neon-btn amber">Amber</button>
    <button class="neon-btn indigo breathe">Breathe</button>
    <button class="neon-btn pink breathe-pink">Breathe Pink</button>
    <button class="neon-btn ghost">Ghost</button>
  </div>

  <div class="code-block">
    <h3>Usage</h3>
    <pre><code>&lt;button class="neon-btn indigo"&gt;Button&lt;/button&gt;
&lt;button class="neon-btn indigo breathe"&gt;Animated&lt;/button&gt;
&lt;button class="neon-btn ghost"&gt;Outline&lt;/button&gt;</code></pre>
  </div>
</body>
</html>
