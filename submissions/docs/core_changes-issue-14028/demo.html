<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Cycle Wave — core_changes-issue-14028</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Sleep Cycle</h1>
      <span class="header-date">Tonight</span>
    </div>

    <div class="ease-sleep-cycle" id="cycleContainer">
      <svg viewBox="0 0 600 280" id="sleepSvg">
        <defs>
          <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
          </linearGradient>
          <clipPath id="waveClip"><rect x="0" y="0" width="600" height="280"/></clipPath>
        </defs>

        <g id="grid" stroke="rgba(255,255,255,0.04)" stroke-width="1">
          <line x1="50" y1="55" x2="570" y2="55"/>
          <line x1="50" y1="115" x2="570" y2="115"/>
          <line x1="50" y1="175" x2="570" y2="175"/>
          <line x1="50" y1="235" x2="570" y2="235"/>
        </g>

        <text x="20" y="59" fill="rgba(255,255,255,0.08)" font-size="11" font-family="system-ui">Deep</text>
        <text x="20" y="179" fill="rgba(255,255,255,0.08)" font-size="11" font-family="system-ui">Light</text>
        <text x="20" y="239" fill="rgba(255,255,255,0.08)" font-size="11" font-family="system-ui">Awake</text>

        <g id="fillArea" clip-path="url(#waveClip)">
          <path id="fillPath" fill="url(#fillGrad)" d=""/>
        </g>

        <g id="segments"></g>
      </svg>
    </div>

    <div class="zone-labels">
      <span class="zone-label"><span class="zone-dot zone-dot-awake"></span>AWAKE</span>
      <span class="zone-label"><span class="zone-dot zone-dot-light"></span>LIGHT</span>
      <span class="zone-label"><span class="zone-dot zone-dot-deep"></span>DEEP</span>
      <span class="zone-label"><span class="zone-dot zone-dot-rem"></span>REM</span>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="legend-line" style="background:#f59e0b"></span>Awake</span>
      <span class="legend-item"><span class="legend-line" style="background:#3b82f6"></span>Light</span>
      <span class="legend-item"><span class="legend-line" style="background:#8b5cf6"></span>Deep</span>
      <span class="legend-item"><span class="legend-line" style="background:#ec4899"></span>REM</span>
    </div>

    <div class="controls">
      <button class="ease-btn active" id="btnPlay">&#9654; Play</button>
      <button class="ease-btn" id="btnPause">&#10074;&#10074; Pause</button>
      <button class="ease-btn" id="btnReset">&#8634; Reset</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Duration</div>
        <div class="stat-value">8h 12m</div>
        <div class="stat-sub">in bed</div>
      </div>
      <div class="stat">
        <div class="stat-label">Deep Sleep</div>
        <div class="stat-value" style="color:#a78bfa">2h 18m</div>
        <div class="stat-sub">28%</div>
      </div>
      <div class="stat">
        <div class="stat-label">REM</div>
        <div class="stat-value" style="color:#f472b6">1h 45m</div>
        <div class="stat-sub">21%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Awake</div>
        <div class="stat-value" style="color:#f59e0b">18m</div>
        <div class="stat-sub">4%</div>
      </div>
    </div>
  </div>

  <script>
    const W = 600, H = 280;
    const PAD = 50;
    const BOTTOM = 250, TOP = 30;
    const RANGE = BOTTOM - TOP;

    const stageDefs = [
      { id: 'AWAKE', color: '#f59e0b', depth: 0.10 },
      { id: 'LIGHT', color: '#3b82f6', depth: 0.35 },
      { id: 'DEEP',  color: '#8b5cf6', depth: 0.90 },
      { id: 'REM',   color: '#ec4899', depth: 0.30 },
    ];

    function getStage(id) { return stageDefs.find(s => s.id === id); }

    function stageDepth(id) { return getStage(id).depth; }

    function mapX(fraction) { return PAD + fraction * (W - 2 * PAD); }

    function mapY(depth) { return BOTTOM - depth * RANGE; }

    function jitter(val, amount) {
      return val + (Math.random() - 0.5) * 2 * amount;
    }

    function generatePoints() {
      const schedule = [
        { stage: 'AWAKE', tIn: 0.00, tOut: 0.04 },
        { stage: 'LIGHT', tIn: 0.04, tOut: 0.10 },
        { stage: 'DEEP',  tIn: 0.10, tOut: 0.18 },
        { stage: 'LIGHT', tIn: 0.18, tOut: 0.22 },
        { stage: 'REM',   tIn: 0.22, tOut: 0.28 },
        { stage: 'LIGHT', tIn: 0.28, tOut: 0.32 },
        { stage: 'DEEP',  tIn: 0.32, tOut: 0.42 },
        { stage: 'LIGHT', tIn: 0.42, tOut: 0.46 },
        { stage: 'REM',   tIn: 0.46, tOut: 0.52 },
        { stage: 'LIGHT', tIn: 0.52, tOut: 0.56 },
        { stage: 'DEEP',  tIn: 0.56, tOut: 0.62 },
        { stage: 'LIGHT', tIn: 0.62, tOut: 0.66 },
        { stage: 'REM',   tIn: 0.66, tOut: 0.74 },
        { stage: 'LIGHT', tIn: 0.74, tOut: 0.78 },
        { stage: 'REM',   tIn: 0.78, tOut: 0.86 },
        { stage: 'LIGHT', tIn: 0.86, tOut: 0.92 },
        { stage: 'AWAKE', tIn: 0.92, tOut: 1.00 },
      ];

      const pts = [];

      for (const seg of schedule) {
        const depth = stageDepth(seg.stage);
        const n = Math.max(3, Math.round((seg.tOut - seg.tIn) * 40));
        const jitterAmt = seg.stage === 'DEEP' ? 0.04 : (seg.stage === 'REM' ? 0.06 : 0.05);

        for (let i = 0; i < n; i++) {
          const frac = seg.tIn + (seg.tOut - seg.tIn) * (i / (n - 1));
          const baseY = mapY(depth);
          const y = jitter(baseY, RANGE * jitterAmt);
          const x = mapX(frac);
          pts.push({ x, y, stage: seg.stage });
        }
      }

      return pts;
    }

    function buildGraph() {
      const pts = generatePoints();
      const segGroup = document.getElementById('segments');
      segGroup.innerHTML = '';
      const fillPath = document.getElementById('fillPath');

      let segs = [];
      let cur = { stage: pts[0].stage, d: '' };

      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        const cmd = i === 0 ? 'M' : 'L';
        if (p.stage !== cur.stage && cur.d) {
          segs.push({ stage: cur.stage, d: cur.d });
          cur = { stage: p.stage, d: '' };
        }
        cur.d += (cur.d ? ' ' : '') + cmd + p.x.toFixed(1) + ' ' + p.y.toFixed(1);
      }
      if (cur.d) segs.push({ stage: cur.stage, d: cur.d });

      for (const seg of segs) {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const stage = getStage(seg.stage);
        path.setAttribute('d', seg.d);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', stage.color);
        path.setAttribute('stroke-width', '3');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('stroke-linejoin', 'round');
        path.setAttribute('stroke-dasharray', '2000');
        path.setAttribute('stroke-dashoffset', '2000');
        path.classList.add('ease-sleep-wave');
        segGroup.appendChild(path);
      }

      const last = pts[pts.length - 1];
      const fillD = 'M' + pts[0].x.toFixed(1) + ' ' + BOTTOM + ' ' +
        pts.map(p => 'L' + p.x.toFixed(1) + ' ' + p.y.toFixed(1)).join(' ') +
        ' L' + last.x.toFixed(1) + ' ' + BOTTOM + ' Z';
      fillPath.setAttribute('d', fillD);

      return { pts, segs: document.querySelectorAll('.ease-sleep-wave') };
    }

    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const { pts, segs: waves } = buildGraph();
    let isPaused = false;
    let isComplete = false;

    if (prefersReduced) {
      waves.forEach(w => { w.style.strokeDashoffset = '0'; });
    }

    function playAll() {
      if (prefersReduced) return;
      waves.forEach(w => {
        w.style.animation = 'none';
        w.style.strokeDashoffset = '2000';
        void w.offsetWidth;
        w.style.animation = 'easeSleepDraw 3s ease-out forwards';
      });
      isComplete = false;
    }

    function setPlayState(running) {
      waves.forEach(w => { w.style.animationPlayState = running ? 'running' : 'paused'; });
    }

    document.getElementById('btnPlay').addEventListener('click', () => {
      if (prefersReduced) return;
      if (isComplete) {
        playAll();
      } else {
        setPlayState(true);
      }
      isPaused = false;
      document.getElementById('btnPlay').classList.add('active');
      document.getElementById('btnPause').classList.remove('active');
      const started = waves[0].style.strokeDashoffset === '' || waves[0].style.strokeDashoffset === '2000';
      if (started) playAll();
    });

    document.getElementById('btnPause').addEventListener('click', () => {
      if (prefersReduced) return;
      setPlayState(false);
      isPaused = true;
      document.getElementById('btnPause').classList.add('active');
      document.getElementById('btnPlay').classList.remove('active');
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      if (prefersReduced) return;
      waves.forEach(w => {
        w.style.animation = 'none';
        w.style.strokeDashoffset = '2000';
        w.style.animationPlayState = 'running';
      });
      isPaused = false;
      isComplete = false;
      document.getElementById('btnPlay').classList.remove('active');
      document.getElementById('btnPause').classList.remove('active');
    });

    let animEndCount = 0;
    waves.forEach(w => {
      w.addEventListener('animationend', () => {
        animEndCount++;
        if (animEndCount >= waves.length) { isComplete = true; animEndCount = 0; }
      });
    });

    if (!prefersReduced) setTimeout(playAll, 400);
  </script>
</body>
</html>
