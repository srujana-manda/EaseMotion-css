<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>enhanced job board search — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>enhanced job board search</h1>
    <p>Issue #30361 — enhanced job board search for the student job board.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100 ease-flex ease-gap-2 ease-items-center ease-flex-wrap">
    <input type="search" id="es-search" class="filter-input" placeholder="Search by title or company..." style="flex:1;min-width:180px" />
    <label class="filter-label"><input type="checkbox" id="es-exact" /> Exact match</label>
    <select id="es-branch" class="filter-select"><option value="">Branch</option><option>CS</option><option>IT</option><option>ECE</option><option>ME</option></select>
  </div>
  <div class="filter-bar ease-flex ease-gap-2 ease-items-center">
    <span id="es-count" class="result-count">10 jobs</span>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [{"title": "Software Engineer", "company": "Google", "branch": "CS", "cgpa": 8.0, "skills": ["Python", "Java", "React"]}, {"title": "Data Analyst", "company": "Amazon", "branch": "IT", "cgpa": 6.5, "skills": ["SQL", "Python", "Excel"]}, {"title": "Frontend Dev", "company": "Meta", "branch": "CS", "cgpa": 7.0, "skills": ["React", "CSS", "JS"]}, {"title": "Backend Dev", "company": "Microsoft", "branch": "CS", "cgpa": 7.5, "skills": ["C#", "Azure", "SQL"]}, {"title": "DevOps Engineer", "company": "Netflix", "branch": "IT", "cgpa": 8.5, "skills": ["AWS", "Docker", "K8s"]}, {"title": "Cloud Architect", "company": "AWS", "branch": "IT", "cgpa": 8.0, "skills": ["AWS", "GCP", "Terraform"]}, {"title": "Network Admin", "company": "Cisco", "branch": "IT", "cgpa": 6.0, "skills": ["CCNA", "Firewall", "TCP/IP"]}, {"title": "Embedded Eng", "company": "Tesla", "branch": "ECE", "cgpa": 8.5, "skills": ["C", "RTOS", "FPGA"]}, {"title": "Hardware Eng", "company": "AMD", "branch": "ECE", "cgpa": 7.5, "skills": ["VHDL", "Verilog", "PCB"]}, {"title": "Aerospace Eng", "company": "SpaceX", "branch": "ME", "cgpa": 9.0, "skills": ["CAD", "MATLAB", "Simulink"]}];
    const grid = document.getElementById("job-grid");

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => '' + '<span class="tag"></span>' + ').join("")
        : '<div class="no-results">No jobs match your criteria.</div>';
    }

    const esSearch = document.getElementById("es-search");
    const esExact = document.getElementById("es-exact");
    const esBranch = document.getElementById("es-branch");
    const esCount = document.getElementById("es-count");
    function applyES() {
      const q = esSearch.value; const exact = esExact.checked; const b = esBranch.value;
      const res = jobs.filter(j => {
        if (b && j.branch !== b) return false;
        if (!q) return true;
        if (exact) return j.title === q || j.company === q;
        return j.title.toLowerCase().includes(q.toLowerCase()) || j.company.toLowerCase().includes(q.toLowerCase());
      });
      render(res); esCount.textContent = res.length + " job" + (res.length !== 1 ? "s" : "");
    }
    esSearch.addEventListener("input", applyES);
    esExact.addEventListener("change", applyES);
    esBranch.addEventListener("change", applyES);

    render(jobs);
  </script>
</body>
</html>
