<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-ripple — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 720px; margin: 0 auto 2.5rem; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem;
    }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 0.3em 0.75em; color: #6c63ff; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .class-tag { background: #1e293b; border-color: #334155; }
    }
    .btn-group {
      display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;
    }
    .btn {
      padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn-primary {
      background: #6c63ff; color: white;
    }
    .btn-secondary {
      background: #f1f5f9; color: #1e293b;
    }
    .btn-dark {
      background: #1e293b; color: white;
    }
    .btn-outline {
      background: transparent; color: #6c63ff; border: 2px solid #6c63ff;
    }
    .card {
      background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem;
      padding: 2rem; margin-bottom: 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      .card { background: #1e293b; border-color: #334155; }
      .btn-secondary { background: #334155; color: #f1f5f9; }
    }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-ripple</h1>
  <p>Material-inspired ripple click effect</p>
</header>

<section class="demo-section">
  <div class="card">
    <h2 style="margin-bottom:1rem;">Buttons</h2>
    <div class="class-tag">.ease-ripple</div>
    <div class="btn-group">
      <button class="btn btn-primary ease-ripple">
        Primary
        <span class="ease-ripple-effect"></span>
      </button>
      <button class="btn btn-dark ease-ripple ease-ripple-light">
        Dark
        <span class="ease-ripple-effect"></span>
      </button>
      <button class="btn btn-secondary ease-ripple ease-ripple-dark">
        Light
        <span class="ease-ripple-effect"></span>
      </button>
      <button class="btn btn-outline ease-ripple ease-ripple-dark">
        Outline
        <span class="ease-ripple-effect"></span>
      </button>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-bottom:1rem;">Floating Action Button</h2>
    <div class="class-tag">.ease-ripple .ease-ripple-light</div>
    <button class="ease-ripple ease-ripple-light" style="width:56px;height:56px;border-radius:50%;border:none;background:#6c63ff;color:white;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 12px rgba(108,99,255,0.4);">
      +
      <span class="ease-ripple-effect"></span>
    </button>
  </div>

  <div class="card">
    <h2 style="margin-bottom:1rem;">Card / List Item</h2>
    <div class="class-tag">.ease-ripple .ease-ripple-dark</div>
    <div class="ease-ripple ease-ripple-dark" style="padding:1rem;border-radius:0.5rem;border:1px solid #e2e8f0;cursor:pointer;position:relative;overflow:hidden;user-select:none;">
      <strong>Clickable card item</strong>
      <p style="font-size:0.8rem;color:#64748b;margin-top:0.25rem;">The ripple effect works on any element, not just buttons.</p>
      <span class="ease-ripple-effect"></span>
    </div>
  </div>
</section>

<script src="ripple.js"></script>
</body>
</html>
