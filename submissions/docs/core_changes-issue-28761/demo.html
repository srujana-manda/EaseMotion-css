<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-magnetic — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
      padding: 2rem;
    }
    .demo-header { text-align: center; margin-bottom: 4rem; }
    .demo-header h1 {
      font-size: clamp(2rem, 5vw, 3rem); color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .demo-header p { color: rgba(255,255,255,0.7); margin-top: 0.5rem; font-size: 0.9rem; }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px; padding: 0.3em 0.75em; color: rgba(255,255,255,0.9);
      margin-top: 2rem;
    }
    .dock-wrapper { margin: 2rem 0; }
    .note {
      color: rgba(255,255,255,0.5); font-size: 0.75rem;
      text-align: center; max-width: 400px; margin-top: 3rem;
    }
    .ease-magnetic-item svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-magnetic</h1>
  <p>CSS-only magnetic dock navigation</p>
</header>

<div class="dock-wrapper">
  <nav class="ease-magnetic-dock">
    <a href="#" class="ease-magnetic-item">
      <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    </a>
    <a href="#" class="ease-magnetic-item">
      <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </a>
    <a href="#" class="ease-magnetic-item">
      <svg viewBox="0 0 24 24"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
    </a>
    <a href="#" class="ease-magnetic-item">
      <svg viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    </a>
    <a href="#" class="ease-magnetic-item">
      <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    </a>
  </nav>
</div>

<div class="class-tag">.ease-magnetic-dock + .ease-magnetic-item</div>
<p class="note">Hover over any icon — neighboring items "magnetically" scale up. Pure CSS, no JS.</p>
</body>
</html>
