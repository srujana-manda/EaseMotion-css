<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-sidebar — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; display:flex; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } .ease-sidebar { background:#1e293b; border-color:#334155; } .ease-sidebar-link { color:#94a3b8; } .ease-sidebar-link:hover { background:#334155; color:#f1f5f9; } .ease-sidebar-header { border-color:#334155; } }
.demo-content { padding:3rem 2rem; flex:1; }
.demo-content h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-content h1 { color:#f1f5f9; } }
.demo-content p { color:#64748b; margin-top:0.5rem; }
</style>
</head>
<body>
<div class="ease-sidebar" onmouseenter="this.style.width='200px'" onmouseleave="this.style.width='56px'">
<div class="ease-sidebar-header"><span class="ease-sidebar-logo">E</span></div>
<nav class="ease-sidebar-nav">
<a href="#" class="ease-sidebar-link"><span class="ease-sidebar-icon">🏠</span><span class="ease-sidebar-label">Dashboard</span></a>
<a href="#" class="ease-sidebar-link"><span class="ease-sidebar-icon">📊</span><span class="ease-sidebar-label">Analytics</span></a>
<a href="#" class="ease-sidebar-link"><span class="ease-sidebar-icon">📄</span><span class="ease-sidebar-label">Documents</span></a>
<a href="#" class="ease-sidebar-link"><span class="ease-sidebar-icon">📋</span><span class="ease-sidebar-label">Tasks</span></a>
<a href="#" class="ease-sidebar-link"><span class="ease-sidebar-icon">👥</span><span class="ease-sidebar-label">Team</span></a>
<a href="#" class="ease-sidebar-link"><span class="ease-sidebar-icon">⚙️</span><span class="ease-sidebar-label">Settings</span></a>
</nav>
</div>
<main class="demo-content"><h1>ease-sidebar</h1><p>Hover the sidebar to expand — icons stay visible when collapsed.</p></main>
</body>
</html>
