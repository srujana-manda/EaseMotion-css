<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGPA Filter — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>CGPA Filter</h1>
    <p>Set a minimum CGPA to filter eligible jobs.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100 ease-flex ease-gap-2 ease-items-center">
    <label for="cgpa-input" class="filter-label">Min CGPA:</label>
    <input type="number" id="cgpa-input" class="cgpa-input" placeholder="0.0" min="0" max="10" step="0.1" value="0" />
    <span id="count" class="result-count">10 jobs</span>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [
      { title: "Software Engineer", company: "Google", cgpa: 8.0 },
      { title: "Data Analyst", company: "Amazon", cgpa: 6.5 },
      { title: "Frontend Dev", company: "Meta", cgpa: 7.0 },
      { title: "Backend Dev", company: "Microsoft", cgpa: 7.5 },
      { title: "DevOps Engineer", company: "Netflix", cgpa: 8.5 },
      { title: "Cloud Architect", company: "AWS", cgpa: 8.0 },
      { title: "Network Admin", company: "Cisco", cgpa: 6.0 },
      { title: "Embedded Eng", company: "Tesla", cgpa: 8.5 },
      { title: "Hardware Eng", company: "AMD", cgpa: 7.5 },
      { title: "Aerospace Eng", company: "SpaceX", cgpa: 9.0 },
    ];

    const grid = document.getElementById("job-grid");
    const input = document.getElementById("cgpa-input");
    const count = document.getElementById("count");

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => `
          <div class="job-card ease-card ease-card-shadow ease-slide-up ease-delay-${(i % 4) * 100}">
            <h3>${j.title}</h3>
            <div class="company">${j.company}</div>
            <div class="meta">CGPA: ${j.cgpa}</div>
          </div>
        `).join("")
        : '<div class="no-results">No jobs meet this CGPA requirement.</div>';
      count.textContent = jobs.length + " job" + (jobs.length !== 1 ? "s" : "");
    }

    input.addEventListener("input", () => {
      const min = parseFloat(input.value) || 0;
      render(jobs.filter(j => j.cgpa >= min));
    });

    render(jobs);
  </script>
</body>
</html>
