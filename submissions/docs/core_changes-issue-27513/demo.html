<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-rating — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:2rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-rating</h1><p>Interactive star rating with burst effect</p></header>
<div class="ease-rating" id="ratingDemo">
<span class="ease-star" data-v="1">★</span>
<span class="ease-star" data-v="2">★</span>
<span class="ease-star" data-v="3">★</span>
<span class="ease-star" data-v="4">★</span>
<span class="ease-star" data-v="5">★</span>
<span class="ease-rating-value" id="ratingVal">0/5</span>
</div>
<script>
var stars=document.querySelectorAll('#ratingDemo .ease-star');
var val=document.getElementById('ratingVal');
var current=0;
stars.forEach(s=>{s.addEventListener('mouseenter',function(){var v=parseInt(this.dataset.v);stars.forEach((st,i)=>st.classList.toggle('filled',i<v));val.textContent=v+'/5'});s.addEventListener('mouseleave',function(){stars.forEach((st,i)=>st.classList.toggle('filled',i<current));val.textContent=current+'/5'});s.addEventListener('click',function(){current=parseInt(this.dataset.v);stars.forEach((st,i)=>st.classList.toggle('filled',i<current));val.textContent=current+'/5')});
</script>
</body>
</html>
