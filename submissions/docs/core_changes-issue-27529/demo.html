<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-flip-card — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.cards { display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-flip-card</h1><p>Profile card with 3D flip animation</p></header>
<div class="cards">
<div class="ease-flip-card"><div class="ease-flip-inner">
<div class="ease-flip-front"><div class="ease-flip-avatar">J</div><h3>Jane Doe</h3><p>Developer</p><span class="ease-flip-hint">Hover to flip</span></div>
<div class="ease-flip-back"><h3>Jane Doe</h3><p>Passionate about building great experiences.</p><div class="ease-flip-social"><span>🐦</span><span>💼</span><span>📧</span></div></div>
</div></div>
<div class="ease-flip-card"><div class="ease-flip-inner">
<div class="ease-flip-front"><div class="ease-flip-avatar" style="background:#fd79a8;">A</div><h3>Alex Smith</h3><p>Designer</p><span class="ease-flip-hint">Hover to flip</span></div>
<div class="ease-flip-back" style="background:linear-gradient(135deg,#fd79a8,#e84393);"><h3>Alex Smith</h3><p>Creative problem solver with a passion for UI.</p><div class="ease-flip-social"><span>🐦</span><span>💼</span><span>📧</span></div></div>
</div></div>
</div>
</body>
</html>
