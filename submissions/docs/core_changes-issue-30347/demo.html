<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search Bar — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>Job Search</h1>
    <p>Type to search through available positions by title or company.</p>
  </div>

  <div class="search-section ease-slide-up ease-delay-100">
    <input type="text" id="search-input" class="search-input" placeholder="Search by title or company..." autofocus />
    <span id="result-count" class="result-count">12 jobs</span>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [
      { title: "Frontend Developer", company: "Google", skills: ["React", "TypeScript"] },
      { title: "Backend Engineer", company: "Microsoft", skills: ["Node.js", "Python"] },
      { title: "Data Analyst", company: "Amazon", skills: ["Python", "SQL"] },
      { title: "Full Stack Developer", company: "Meta", skills: ["React", "Node.js"] },
      { title: "DevOps Engineer", company: "Netflix", skills: ["Docker", "AWS"] },
      { title: "Software Intern", company: "Stripe", skills: ["Java", "Spring"] },
      { title: "Cloud Architect", company: "AWS", skills: ["AWS", "Terraform"] },
      { title: "Network Admin", company: "Cisco", skills: ["TCP/IP", "BGP"] },
      { title: "Embedded Engineer", company: "Tesla", skills: ["C", "RTOS"] },
      { title: "Hardware Engineer", company: "AMD", skills: ["FPGA", "Verilog"] },
      { title: "Robotics Engineer", company: "Boston Dynamics", skills: ["ROS", "C++"] },
      { title: "Aerospace Engineer", company: "SpaceX", skills: ["MATLAB", "CFD"] },
    ];

    const grid = document.getElementById("job-grid");
    const input = document.getElementById("search-input");
    const count = document.getElementById("result-count");
    let timer;

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => `
          <div class="job-card ease-card ease-card-shadow ease-slide-up ease-delay-${(i % 4) * 100}">
            <h3>${j.title}</h3>
            <div class="company">${j.company}</div>
            <div class="skills">
              ${j.skills.map(s => `<span class="tag">${s}</span>`).join("")}
            </div>
          </div>
        `).join("")
        : '<div class="no-results">No jobs match your search.</div>';
      count.textContent = jobs.length + " job" + (jobs.length !== 1 ? "s" : "");
    }

    input.addEventListener("input", () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const q = input.value.toLowerCase().trim();
        render(jobs.filter(j => !q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q)));
      }, 300);
    });

    render(jobs);
  </script>
</body>
</html>
