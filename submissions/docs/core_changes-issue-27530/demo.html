<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-pricing — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:2rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-pricing</h1><p>Pricing tier switcher — React component + CSS</p></header>
<div class="ease-pricing">
<div class="ease-pricing-toggle">
<span class="active">Monthly</span>
<div class="ease-toggle-track" onclick="this.classList.toggle('yearly');document.querySelectorAll('.ease-pricing-toggle span').forEach(s=>s.classList.toggle('active'))"><div class="ease-toggle-thumb"></div></div>
<span>Yearly</span>
</div>
<div class="ease-pricing-cards">
<div class="ease-pricing-card"><h3>Starter</h3><div class="ease-price">$9<span>/mo</span></div><ul><li>1 User</li><li>10GB Storage</li><li>Basic Support</li></ul><button class="ease-pricing-btn" onclick="alert('Starter selected')">Choose Starter</button></div>
<div class="ease-pricing-card"><h3>Pro</h3><div class="ease-price">$29<span>/mo</span></div><ul><li>5 Users</li><li>50GB Storage</li><li>Priority Support</li></ul><button class="ease-pricing-btn" onclick="alert('Pro selected')">Choose Pro</button></div>
<div class="ease-pricing-card"><h3>Enterprise</h3><div class="ease-price">$99<span>/mo</span></div><ul><li>Unlimited Users</li><li>500GB Storage</li><li>24/7 Support</li></ul><button class="ease-pricing-btn" onclick="alert('Enterprise selected')">Choose Enterprise</button></div>
</div>
</div>
</body>
</html>
