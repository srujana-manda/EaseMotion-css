<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shimmer Skeleton Screen — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <main class="wrapper">
    <header class="demo-header">
      <p class="badge">EaseMotion CSS</p>
      <h1>Shimmer Skeleton Screen</h1>
      <p>Content placeholder skeletons with moving gradient shimmer. Pure CSS, zero JavaScript.</p>
    </header>

    <!-- Card skeleton -->
    <section class="demo-section">
      <h2 class="section-title">Card Skeleton</h2>
      <div class="skeleton-grid">
        <div class="s-card">
          <div class="s-img"></div>
          <div class="s-body">
            <div class="s-line s-title"></div>
            <div class="s-line s-text"></div>
            <div class="s-line s-text s-short"></div>
          </div>
        </div>
        <div class="s-card">
          <div class="s-img"></div>
          <div class="s-body">
            <div class="s-line s-title"></div>
            <div class="s-line s-text"></div>
            <div class="s-line s-text s-short"></div>
          </div>
        </div>
        <div class="s-card">
          <div class="s-img"></div>
          <div class="s-body">
            <div class="s-line s-title"></div>
            <div class="s-line s-text"></div>
            <div class="s-line s-text s-short"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- List item skeleton -->
    <section class="demo-section">
      <h2 class="section-title">List Item Skeleton</h2>
      <div class="s-list">
        <div class="s-list-item">
          <div class="s-avatar"></div>
          <div class="s-list-body">
            <div class="s-line s-list-title"></div>
            <div class="s-line s-list-text"></div>
          </div>
        </div>
        <div class="s-list-item">
          <div class="s-avatar"></div>
          <div class="s-list-body">
            <div class="s-line s-list-title"></div>
            <div class="s-line s-list-text"></div>
          </div>
        </div>
        <div class="s-list-item">
          <div class="s-avatar"></div>
          <div class="s-list-body">
            <div class="s-line s-list-title"></div>
            <div class="s-line s-list-text"></div>
          </div>
        </div>
        <div class="s-list-item">
          <div class="s-avatar"></div>
          <div class="s-list-body">
            <div class="s-line s-list-title"></div>
            <div class="s-line s-list-text"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Article skeleton -->
    <section class="demo-section">
      <h2 class="section-title">Article Skeleton</h2>
      <div class="s-article">
        <div class="s-line s-article-title"></div>
        <div class="s-line s-article-subtitle"></div>
        <div class="s-article-divider"></div>
        <div class="s-line s-article-text"></div>
        <div class="s-line s-article-text"></div>
        <div class="s-line s-article-text s-short"></div>
      </div>
    </section>

  </main>

</body>
</html>
