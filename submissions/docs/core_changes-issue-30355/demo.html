<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>filter UI components — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>filter UI components</h1>
    <p>Issue #30355 — filter UI components for the student job board.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100 ease-flex ease-gap-2 ease-items-center">
    <label class="filter-label">Title:</label>
    <input type="text" id="fu-title" class="filter-input" placeholder="Job title..." style="flex:1" />
  </div>
  <div class="filter-bar ease-flex ease-gap-2 ease-items-center">
    <label class="filter-label">Company:</label>
    <input type="text" id="fu-company" class="filter-input" placeholder="Company..." style="flex:1" />
  </div>
  <div class="filter-bar ease-flex ease-gap-2 ease-items-center">
    <label class="filter-label">Branch:</label>
    <select id="fu-branch" class="filter-select"><option value="">All</option><option>CS</option><option>IT</option><option>ECE</option><option>ME</option></select>
    <span id="fu-count" class="result-count">10 jobs</span>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [{"title": "Software Engineer", "company": "Google", "branch": "CS", "cgpa": 8.0, "skills": ["Python", "Java", "React"]}, {"title": "Data Analyst", "company": "Amazon", "branch": "IT", "cgpa": 6.5, "skills": ["SQL", "Python", "Excel"]}, {"title": "Frontend Dev", "company": "Meta", "branch": "CS", "cgpa": 7.0, "skills": ["React", "CSS", "JS"]}, {"title": "Backend Dev", "company": "Microsoft", "branch": "CS", "cgpa": 7.5, "skills": ["C#", "Azure", "SQL"]}, {"title": "DevOps Engineer", "company": "Netflix", "branch": "IT", "cgpa": 8.5, "skills": ["AWS", "Docker", "K8s"]}, {"title": "Cloud Architect", "company": "AWS", "branch": "IT", "cgpa": 8.0, "skills": ["AWS", "GCP", "Terraform"]}, {"title": "Network Admin", "company": "Cisco", "branch": "IT", "cgpa": 6.0, "skills": ["CCNA", "Firewall", "TCP/IP"]}, {"title": "Embedded Eng", "company": "Tesla", "branch": "ECE", "cgpa": 8.5, "skills": ["C", "RTOS", "FPGA"]}, {"title": "Hardware Eng", "company": "AMD", "branch": "ECE", "cgpa": 7.5, "skills": ["VHDL", "Verilog", "PCB"]}, {"title": "Aerospace Eng", "company": "SpaceX", "branch": "ME", "cgpa": 9.0, "skills": ["CAD", "MATLAB", "Simulink"]}];
    const grid = document.getElementById("job-grid");

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => '' + '<span class="tag"></span>' + ').join("")
        : '<div class="no-results">No jobs match your criteria.</div>';
    }

    const fuTitle = document.getElementById("fu-title");
    const fuCompany = document.getElementById("fu-company");
    const fuBranch = document.getElementById("fu-branch");
    const fuCount = document.getElementById("fu-count");
    function applyFU() {
      const t = fuTitle.value.toLowerCase(); const c = fuCompany.value.toLowerCase(); const b = fuBranch.value;
      const res = jobs.filter(j => j.title.toLowerCase().includes(t) && j.company.toLowerCase().includes(c) && (!b || j.branch === b));
      render(res);
      fuCount.textContent = res.length + " jobs";
    }
    fuTitle.addEventListener("input", applyFU);
    fuCompany.addEventListener("input", applyFU);
    fuBranch.addEventListener("change", applyFU);

    render(jobs);
  </script>
</body>
</html>
