<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-transform — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 800px; margin: 0 auto 2.5rem; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem;
    }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 0.3em 0.75em; color: #6c63ff; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .class-tag { background: #1e293b; border-color: #334155; }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 1rem;
    }
    .card {
      background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem;
      padding: 1.5rem 0.75rem; text-align: center; font-size: 0.8rem;
    }
    @media (prefers-color-scheme: dark) {
      .card { background: #1e293b; border-color: #334155; }
    }
    .card .box {
      width: 40px; height: 40px; margin: 0 auto 0.5rem;
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      border-radius: 0.375rem;
    }
    .card .tag { font-family: monospace; font-size: 0.6rem; color: #6c63ff; }
    .demo-box {
      width: 64px; height: 64px; background: linear-gradient(135deg, #6c63ff, #ec4899);
      border-radius: 0.5rem; margin: 0 auto;
    }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-transform</h1>
  <p>Advanced transform utility classes</p>
</header>

<section class="demo-section">
  <h2>Scale</h2>
  <div class="class-tag">.ease-scale-*</div>
  <div class="grid">
    <div class="card"><div class="box ease-scale-90"></div><div class="tag">scale-90</div></div>
    <div class="card"><div class="box ease-scale-100"></div><div class="tag">scale-100</div></div>
    <div class="card"><div class="box ease-scale-110"></div><div class="tag">scale-110</div></div>
    <div class="card"><div class="box ease-scale-125"></div><div class="tag">scale-125</div></div>
    <div class="card"><div class="box ease-scale-150"></div><div class="tag">scale-150</div></div>
  </div>
</section>

<section class="demo-section">
  <h2>Rotate</h2>
  <div class="class-tag">.ease-rotate-*</div>
  <div class="grid">
    <div class="card"><div class="box ease-rotate-45"></div><div class="tag">rotate-45</div></div>
    <div class="card"><div class="box ease-rotate-90"></div><div class="tag">rotate-90</div></div>
    <div class="card"><div class="box ease-rotate-180"></div><div class="tag">rotate-180</div></div>
    <div class="card"><div class="box ease-rotate-n45"></div><div class="tag">rotate-n45</div></div>
    <div class="card"><div class="box ease-rotate-n90"></div><div class="tag">rotate-n90</div></div>
  </div>
</section>

<section class="demo-section">
  <h2>Skew &amp; Translate</h2>
  <div class="grid">
    <div class="card"><div class="box ease-skew-x-12"></div><div class="tag">skew-x-12</div></div>
    <div class="card"><div class="box ease-skew-y-12"></div><div class="tag">skew-y-12</div></div>
    <div class="card">
      <div style="position:relative;width:40px;height:40px;margin:0 auto 0.5rem;">
        <div class="demo-box ease-translate-xy-n50" style="position:absolute;top:50%;left:50%;width:32px;height:32px;"></div>
      </div>
      <div class="tag">translate-xy-n50</div>
    </div>
    <div class="card">
      <div style="position:relative;width:40px;height:40px;margin:0 auto 0.5rem;">
        <div class="demo-box ease-translate-y-n50" style="position:absolute;top:50%;left:0;width:32px;height:32px;"></div>
      </div>
      <div class="tag">translate-y-n50</div>
    </div>
  </div>
</section>
</body>
</html>
