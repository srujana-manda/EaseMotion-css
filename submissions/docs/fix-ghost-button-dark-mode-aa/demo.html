<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost Button Dark Mode Fix Demo</title>
    <!-- Link the fix styling -->
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --bg-color: #0b1121;
        --text-color: #ffffff;
        --ease-color-neutral-700: #334155;
        --ease-color-neutral-100: #f1f5f9;
        --ease-color-neutral-900: #0f172a;
      }

      [data-theme="light"] {
        --bg-color: #f8fafc;
        --text-color: #0f172a;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .container {
        text-align: center;
        padding: 2rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      }

      [data-theme="light"] .container {
        background: rgba(0, 0, 0, 0.02);
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      }

      /* Simple button base style to match .ease-btn layout */
      .ease-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        user-select: none;
        text-decoration: none;
        transition:
          background-color 0.15s,
          color 0.15s;
        margin: 10px;
        border: 2px solid transparent;
      }

      .toggle-btn {
        background: #6c63ff;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        margin-bottom: 2rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <button class="toggle-btn" onclick="toggleTheme()">
      Toggle Dark/Light Mode
    </button>
    <div class="container">
      <h2>Ghost Button Visibility Fix</h2>
      <p>
        The ghost button text should be white in dark mode and dark gray in light
        mode. The text should be dark when hovering in both modes.
      </p>
      <button class="ease-btn ease-btn-ghost">Ghost Button</button>
    </div>

    <script>
      function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute("data-theme") || "dark";
        const target = current === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", target);
      }
    </script>
  </body>
</html>
