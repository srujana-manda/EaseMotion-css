<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>improved UX with search and filters — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>improved UX with search and filters</h1>
    <p>Issue #30356 — improved UX with search and filters for the student job board.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100 ease-flex ease-gap-2 ease-items-center ease-flex-wrap">
    <div class="ease-flex ease-gap-2 ease-items-center" style="flex:1">
      <label class="filter-label">Find:</label>
      <input type="search" id="ux-search" class="filter-input" placeholder="Search jobs..." style="flex:1" />
    </div>
    <div class="ease-flex ease-gap-2 ease-items-center">
      <label class="filter-label">Sort:</label>
      <select id="ux-sort" class="filter-select"><option value="">Relevance</option><option value="title">Title A-Z</option><option value="cgpa">CGPA (high)</option></select>
    </div>
  </div>
  <div class="filter-bar ease-flex ease-gap-2 ease-items-center">
    <span id="ux-count" class="result-count">10 jobs found</span>
    <span id="ux-stats" class="result-count" style="margin-left:auto"></span>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [{"title": "Software Engineer", "company": "Google", "branch": "CS", "cgpa": 8.0, "skills": ["Python", "Java", "React"]}, {"title": "Data Analyst", "company": "Amazon", "branch": "IT", "cgpa": 6.5, "skills": ["SQL", "Python", "Excel"]}, {"title": "Frontend Dev", "company": "Meta", "branch": "CS", "cgpa": 7.0, "skills": ["React", "CSS", "JS"]}, {"title": "Backend Dev", "company": "Microsoft", "branch": "CS", "cgpa": 7.5, "skills": ["C#", "Azure", "SQL"]}, {"title": "DevOps Engineer", "company": "Netflix", "branch": "IT", "cgpa": 8.5, "skills": ["AWS", "Docker", "K8s"]}, {"title": "Cloud Architect", "company": "AWS", "branch": "IT", "cgpa": 8.0, "skills": ["AWS", "GCP", "Terraform"]}, {"title": "Network Admin", "company": "Cisco", "branch": "IT", "cgpa": 6.0, "skills": ["CCNA", "Firewall", "TCP/IP"]}, {"title": "Embedded Eng", "company": "Tesla", "branch": "ECE", "cgpa": 8.5, "skills": ["C", "RTOS", "FPGA"]}, {"title": "Hardware Eng", "company": "AMD", "branch": "ECE", "cgpa": 7.5, "skills": ["VHDL", "Verilog", "PCB"]}, {"title": "Aerospace Eng", "company": "SpaceX", "branch": "ME", "cgpa": 9.0, "skills": ["CAD", "MATLAB", "Simulink"]}];
    const grid = document.getElementById("job-grid");

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => '' + '<span class="tag"></span>' + ').join("")
        : '<div class="no-results">No jobs match your criteria.</div>';
    }

    const uxSearch = document.getElementById("ux-search");
    const uxSort = document.getElementById("ux-sort");
    const uxCount = document.getElementById("ux-count");
    const uxStats = document.getElementById("ux-stats");
    function applyUX() {
      let res = [...jobs];
      const q = uxSearch.value.toLowerCase();
      if (q) res = res.filter(j => j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q));
      const sort = uxSort.value;
      if (sort === "title") res.sort((a,b) => a.title.localeCompare(b.title));
      if (sort === "cgpa") res.sort((a,b) => b.cgpa - a.cgpa);
      render(res);
      uxCount.textContent = res.length + " job" + (res.length !== 1 ? "s" : "") + " found";
      const avg = res.length ? (res.reduce((s,j) => s + j.cgpa, 0) / res.length).toFixed(1) : "-";
      uxStats.textContent = "Avg CGPA: " + avg;
    }
    uxSearch.addEventListener("input", applyUX);
    uxSort.addEventListener("change", applyUX);

    render(jobs);
  </script>
</body>
</html>
