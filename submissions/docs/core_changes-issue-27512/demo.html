<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-tabs — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:2rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-tabs</h1><p>Tabs with smooth underline glider</p></header>
<div class="ease-tabs">
<div class="ease-tabs-bar" id="tabBar">
<button class="ease-tab active" onclick="switchTab(this,0)">Overview</button>
<button class="ease-tab" onclick="switchTab(this,1)">Features</button>
<button class="ease-tab" onclick="switchTab(this,2)">Pricing</button>
<button class="ease-tab" onclick="switchTab(this,3)">Reviews</button>
<div class="ease-tab-glider" id="tabGlider"></div>
</div>
<div class="ease-tab-content" id="tabContent">Overview — General information about the product and its main benefits.</div>
</div>
<script>
var contents = ['Overview — General information about the product and its main benefits.','Features — Detailed list of features and capabilities.','Pricing — Pricing plans and subscription options.','Reviews — Customer reviews and testimonials.'];
function switchTab(el,i){document.querySelectorAll('.ease-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('tabGlider').style.transform='translateX('+(i*100)+'%)';document.getElementById('tabContent').textContent=contents[i]}
document.getElementById('tabGlider').style.width='25%';
</script>
</body>
</html>
