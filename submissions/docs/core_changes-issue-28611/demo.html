<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-shake — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 640px; margin: 0 auto 2.5rem; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem;
    }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 0.3em 0.75em; color: #6c63ff; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .class-tag { background: #1e293b; border-color: #334155; }
    }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; }
    input {
      width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1;
      border-radius: 0.5rem; font-size: 0.875rem; background: white;
    }
    @media (prefers-color-scheme: dark) {
      input { background: #1e293b; border-color: #475569; color: #f1f5f9; }
    }
    .btn {
      padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem;
      background: #6c63ff; color: white; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; margin-right: 0.75rem; margin-bottom: 0.5rem;
    }
    .btn-outline {
      background: transparent; color: #6c63ff; border: 1px solid #6c63ff;
    }
    .note { font-size: 0.8rem; color: #64748b; margin-top: 1rem; }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-shake</h1>
  <p>Form validation shake animation</p>
</header>

<section class="demo-section">
  <h2>Demo Form</h2>
  <p style="font-size:0.875rem;color:#64748b;margin-bottom:1.5rem;">Click the button to trigger shake on each field.</p>

  <div class="form-group">
    <label for="name">Name (required)</label>
    <input id="name" type="text" placeholder="Enter your name" />
  </div>

  <div class="form-group">
    <label for="email">Email (invalid)</label>
    <input id="email" type="email" placeholder="email@example.com" />
  </div>

  <div class="form-group">
    <label for="password">Password (too short)</label>
    <input id="password" type="password" placeholder="At least 8 chars" />
  </div>

  <div>
    <button class="btn" onclick="shakeInput('name', 'ease-shake')">Shake Default</button>
    <button class="btn" onclick="shakeInput('email', 'ease-shake-subtle')">Shake Subtle</button>
    <button class="btn btn-outline" onclick="shakeInput('password', 'ease-shake-warn')">Shake Warn</button>
  </div>

  <p class="note">Uses <code>prefers-reduced-motion</code> — animation disabled for vestibular sensitivity.</p>
</section>

<script>
  function shakeInput(id, cls) {
    var el = document.getElementById(id);
    el.classList.remove('ease-shake', 'ease-shake-subtle', 'ease-shake-warn', 'ease-shake-vertical');
    void el.offsetWidth; /* reflow */
    el.classList.add(cls);
    setTimeout(function() { el.classList.remove(cls); }, 600);
  }
</script>
</body>
</html>
