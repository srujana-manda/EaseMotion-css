<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Board — Search & Filter Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>Job Board</h1>
    <p>Search and filter through available positions using the controls below.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100">
    <input type="text" id="search-input" class="search-input" placeholder="Search by title or company..." />
    <select id="filter-branch" class="filter-select">
      <option value="">All Branches</option>
      <option value="Computer Science">Computer Science</option>
      <option value="Information Technology">Information Technology</option>
      <option value="Electronics">Electronics</option>
      <option value="Mechanical">Mechanical</option>
    </select>
    <input type="number" id="filter-cgpa" class="filter-cgpa" placeholder="Min CGPA" min="0" max="10" step="0.1" />
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const sampleJobs = [
      { title: "Frontend Developer", company: "Google", branch: "Computer Science", cgpa: 7.5, skills: ["React", "TypeScript", "CSS"] },
      { title: "Backend Engineer", company: "Microsoft", branch: "Computer Science", cgpa: 8.0, skills: ["Node.js", "Python", "SQL"] },
      { title: "Data Analyst", company: "Amazon", branch: "Information Technology", cgpa: 6.5, skills: ["Python", "SQL", "Tableau"] },
      { title: "Embedded Systems Engineer", company: "Tesla", branch: "Electronics", cgpa: 8.5, skills: ["C", "RTOS", "PCB Design"] },
      { title: "Mechanical Design Engineer", company: "Boeing", branch: "Mechanical", cgpa: 7.0, skills: ["SolidWorks", "AutoCAD", "FEA"] },
      { title: "Full Stack Developer", company: "Meta", branch: "Computer Science", cgpa: 8.0, skills: ["React", "Node.js", "MongoDB"] },
      { title: "IT Support Specialist", company: "Dell", branch: "Information Technology", cgpa: 6.0, skills: ["Networking", "Linux", "Windows"] },
      { title: "VLSI Design Engineer", company: "Intel", branch: "Electronics", cgpa: 8.5, skills: ["Verilog", "VHDL", "FPGA"] },
      { title: "Robotics Engineer", company: "Boston Dynamics", branch: "Mechanical", cgpa: 8.0, skills: ["ROS", "C++", "Kinematics"] },
      { title: "Software Development Intern", company: "Stripe", branch: "Computer Science", cgpa: 7.0, skills: ["Java", "Spring", "SQL"] },
      { title: "Network Administrator", company: "Cisco", branch: "Information Technology", cgpa: 6.5, skills: ["TCP/IP", "BGP", "Firewalls"] },
      { title: "Hardware Engineer", company: "AMD", branch: "Electronics", cgpa: 7.5, skills: ["FPGA", "Verilog", "Signal Processing"] },
      { title: "Automation Engineer", company: "Siemens", branch: "Mechanical", cgpa: 7.5, skills: ["PLC", "SCADA", "Python"] },
      { title: "DevOps Engineer", company: "Netflix", branch: "Computer Science", cgpa: 8.0, skills: ["Docker", "Kubernetes", "AWS"] },
      { title: "Cloud Architect", company: "AWS", branch: "Information Technology", cgpa: 8.5, skills: ["AWS", "Terraform", "Linux"] },
      { title: "IoT Systems Engineer", company: "Qualcomm", branch: "Electronics", cgpa: 8.0, skills: ["IoT", "C", "MQTT"] },
      { title: "Aerospace Engineer", company: "SpaceX", branch: "Mechanical", cgpa: 9.0, skills: ["MATLAB", "CFD", "Structural Analysis"] },
    ];

    const jobGrid = document.getElementById("job-grid");
    const searchInput = document.getElementById("search-input");
    const filterBranch = document.getElementById("filter-branch");
    const filterCgpa = document.getElementById("filter-cgpa");

    let debounceTimer;

    function filterJobs() {
      const search = searchInput.value.toLowerCase().trim();
      const branch = filterBranch.value;
      const minCgpa = parseFloat(filterCgpa.value) || 0;

      const filtered = sampleJobs.filter(job => {
        if (search && !job.title.toLowerCase().includes(search) && !job.company.toLowerCase().includes(search)) {
          return false;
        }
        if (branch && job.branch !== branch) {
          return false;
        }
        if (minCgpa && job.cgpa < minCgpa) {
          return false;
        }
        return true;
      });

      renderJobs(filtered);
    }

    function renderJobs(jobs) {
      if (jobs.length === 0) {
        jobGrid.innerHTML = '<div class="no-results"><h3>No jobs found</h3><p>Try adjusting your search or filters.</p></div>';
        return;
      }

      jobGrid.innerHTML = jobs.map((job, i) => `
        <div class="job-card ease-card ease-card-shadow ease-slide-up ease-delay-${Math.min((i % 5) * 100, 400)}">
          <h3>${job.title}</h3>
          <div class="company">${job.company}</div>
          <div class="meta">
            <span>${job.branch}</span>
            <span>CGPA: ${job.cgpa}</span>
          </div>
          <div class="skills">
            ${job.skills.map(s => `<span class="skill-tag">${s}</span>`).join("")}
          </div>
        </div>
      `).join("");
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(filterJobs, 300);
    });

    filterBranch.addEventListener("change", filterJobs);
    filterCgpa.addEventListener("input", filterJobs);

    renderJobs(sampleJobs);
  </script>
</body>
</html>
