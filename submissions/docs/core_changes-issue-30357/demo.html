<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>combined search and filter — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>combined search and filter</h1>
    <p>Issue #30357 — combined search and filter for the student job board.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100 ease-flex ease-gap-2 ease-items-center ease-flex-wrap">
    <input type="text" id="co-search" class="filter-input" placeholder="Search title/company..." style="flex:1;min-width:150px" />
    <select id="co-branch" class="filter-select"><option value="">All branches</option><option>CS</option><option>IT</option><option>ECE</option><option>ME</option></select>
    <input type="number" id="co-cgpa" class="filter-number" placeholder="Min CGPA" min="0" max="10" step="0.1" style="width:100px" />
  </div>
  <div class="filter-bar ease-flex ease-gap-2 ease-items-center">
    <span id="co-count" class="result-count">10 jobs</span>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [{"title": "Software Engineer", "company": "Google", "branch": "CS", "cgpa": 8.0, "skills": ["Python", "Java", "React"]}, {"title": "Data Analyst", "company": "Amazon", "branch": "IT", "cgpa": 6.5, "skills": ["SQL", "Python", "Excel"]}, {"title": "Frontend Dev", "company": "Meta", "branch": "CS", "cgpa": 7.0, "skills": ["React", "CSS", "JS"]}, {"title": "Backend Dev", "company": "Microsoft", "branch": "CS", "cgpa": 7.5, "skills": ["C#", "Azure", "SQL"]}, {"title": "DevOps Engineer", "company": "Netflix", "branch": "IT", "cgpa": 8.5, "skills": ["AWS", "Docker", "K8s"]}, {"title": "Cloud Architect", "company": "AWS", "branch": "IT", "cgpa": 8.0, "skills": ["AWS", "GCP", "Terraform"]}, {"title": "Network Admin", "company": "Cisco", "branch": "IT", "cgpa": 6.0, "skills": ["CCNA", "Firewall", "TCP/IP"]}, {"title": "Embedded Eng", "company": "Tesla", "branch": "ECE", "cgpa": 8.5, "skills": ["C", "RTOS", "FPGA"]}, {"title": "Hardware Eng", "company": "AMD", "branch": "ECE", "cgpa": 7.5, "skills": ["VHDL", "Verilog", "PCB"]}, {"title": "Aerospace Eng", "company": "SpaceX", "branch": "ME", "cgpa": 9.0, "skills": ["CAD", "MATLAB", "Simulink"]}];
    const grid = document.getElementById("job-grid");

    function render(jobs) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => '' + '<span class="tag"></span>' + ').join("")
        : '<div class="no-results">No jobs match your criteria.</div>';
    }

    const coSearch = document.getElementById("co-search");
    const coBranch = document.getElementById("co-branch");
    const coCgpa = document.getElementById("co-cgpa");
    const coCount = document.getElementById("co-count");
    function applyCo() {
      const q = coSearch.value.toLowerCase(); const b = coBranch.value; const c = parseFloat(coCgpa.value) || 0;
      const res = jobs.filter(j => (!q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q)) && (!b || j.branch === b) && j.cgpa >= c);
      render(res);
      coCount.textContent = res.length + " job" + (res.length !== 1 ? "s" : "");
    }
    coSearch.addEventListener("input", applyCo);
    coBranch.addEventListener("change", applyCo);
    coCgpa.addEventListener("input", applyCo);

    render(jobs);
  </script>
</body>
</html>
