<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-caret — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 720px; margin: 0 auto 2.5rem; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem;
    }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 0.3em 0.75em; color: #6c63ff; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .class-tag { background: #1e293b; border-color: #334155; }
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    .card {
      background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 1.25rem 0.75rem; text-align: center;
    }
    @media (prefers-color-scheme: dark) { .card { background: #1e293b; border-color: #334155; } }
    .card .label { font-size: 0.6rem; font-family: monospace; color: #6c63ff; }
    input { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.375rem; font-size: 0.875rem; }
    @media (prefers-color-scheme: dark) { input { background: #1e293b; border-color: #475569; color: #f1f5f9; } }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-caret</h1>
  <p>Caret color &amp; cursor utilities</p>
</header>
<section class="demo-section">
  <h2>Caret Colors</h2>
  <div class="class-tag">Click each input to see the caret color</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
    <input class="ease-caret-primary" value="Primary caret" />
    <input class="ease-caret-danger" value="Danger caret" />
    <input class="ease-caret-success" value="Success caret" />
    <input class="ease-caret-warning" value="Warning caret" />
  </div>
</section>
<section class="demo-section">
  <h2>Cursors</h2>
  <div class="grid">
    <div class="card ease-cursor-pointer"><div class="label">cursor-pointer</div></div>
    <div class="card ease-cursor-wait"><div class="label">cursor-wait</div></div>
    <div class="card ease-cursor-text"><div class="label">cursor-text</div></div>
    <div class="card ease-cursor-move"><div class="label">cursor-move</div></div>
    <div class="card ease-cursor-not-allowed"><div class="label">cursor-not-allowed</div></div>
    <div class="card ease-cursor-grab"><div class="label">cursor-grab</div></div>
    <div class="card ease-cursor-grabbing"><div class="label">cursor-grabbing</div></div>
    <div class="card ease-cursor-crosshair"><div class="label">cursor-crosshair</div></div>
    <div class="card ease-cursor-zoom-in"><div class="label">cursor-zoom-in</div></div>
    <div class="card ease-cursor-zoom-out"><div class="label">cursor-zoom-out</div></div>
  </div>
</section>
</body>
</html>
