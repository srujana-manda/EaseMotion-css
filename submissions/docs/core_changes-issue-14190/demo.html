<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Skeleton — core_changes-issue-14190</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Table Skeleton</h1>
    <p class="sub">5-row, 4-column skeleton table with staggered shimmer — Issue #14190</p>

    <div class="ease-skeleton-table" id="skeletonTable">
      <div class="ease-skeleton-thead">
        <div class="ease-skeleton-row">
          <div class="ease-skeleton-cell ease-skeleton-cell-header ease-skeleton-cell-narrow">#</div>
          <div class="ease-skeleton-cell ease-skeleton-cell-header ease-skeleton-cell-wide">Name</div>
          <div class="ease-skeleton-cell ease-skeleton-cell-header">Status</div>
          <div class="ease-skeleton-cell ease-skeleton-cell-header">Role</div>
        </div>
      </div>

      <div class="ease-skeleton-row">
        <div class="ease-skeleton-cell ease-skeleton-cell-narrow ease-delay-1"></div>
        <div class="ease-skeleton-cell ease-skeleton-cell-wide ease-delay-2"></div>
        <div class="ease-skeleton-cell ease-delay-3"></div>
        <div class="ease-skeleton-cell ease-delay-4"></div>
      </div>

      <div class="ease-skeleton-row">
        <div class="ease-skeleton-cell ease-skeleton-cell-narrow ease-delay-2"></div>
        <div class="ease-skeleton-cell ease-skeleton-cell-wide ease-delay-3"></div>
        <div class="ease-skeleton-cell ease-delay-4"></div>
        <div class="ease-skeleton-cell ease-delay-5"></div>
      </div>

      <div class="ease-skeleton-row">
        <div class="ease-skeleton-cell ease-skeleton-cell-narrow ease-delay-3"></div>
        <div class="ease-skeleton-cell ease-skeleton-cell-wide ease-delay-4"></div>
        <div class="ease-skeleton-cell ease-delay-5"></div>
        <div class="ease-skeleton-cell ease-delay-1"></div>
      </div>

      <div class="ease-skeleton-row">
        <div class="ease-skeleton-cell ease-skeleton-cell-narrow ease-delay-4"></div>
        <div class="ease-skeleton-cell ease-skeleton-cell-wide ease-delay-5"></div>
        <div class="ease-skeleton-cell ease-delay-1"></div>
        <div class="ease-skeleton-cell ease-delay-2"></div>
      </div>

      <div class="ease-skeleton-row">
        <div class="ease-skeleton-cell ease-skeleton-cell-narrow ease-delay-5"></div>
        <div class="ease-skeleton-cell ease-skeleton-cell-wide ease-delay-1"></div>
        <div class="ease-skeleton-cell ease-delay-2"></div>
        <div class="ease-skeleton-cell ease-delay-3"></div>
      </div>
    </div>

    <div class="controls">
      <button id="btnLoading">Loading</button>
      <button id="btnLoaded">Loaded</button>
    </div>
  </div>

  <script>
    const table = document.getElementById('skeletonTable');
    document.getElementById('btnLoading').addEventListener('click', () => {
      table.classList.remove('loaded');
    });
    document.getElementById('btnLoaded').addEventListener('click', () => {
      table.classList.add('loaded');
      const cells = table.querySelectorAll('.ease-skeleton-cell:not(.ease-skeleton-cell-header)');
      const data = [
        ['1', 'Alice Chen', 'Active', 'Admin'],
        ['2', 'Bob Martinez', 'Away', 'Editor'],
        ['3', 'Carol Smith', 'Active', 'Viewer'],
        ['4', 'Dave Kim', 'Offline', 'Editor'],
        ['5', 'Eve Johnson', 'Active', 'Admin'],
      ];
      let idx = 0;
      cells.forEach(cell => {
        const rowIdx = Math.floor(idx / 4);
        const colIdx = idx % 4;
        cell.textContent = data[rowIdx]?.[colIdx] || '';
        idx++;
      });
    });
  </script>
</body>
</html>
