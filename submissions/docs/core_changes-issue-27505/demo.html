<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-stepper — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
.stage { display:flex; gap:1rem; margin-bottom:2rem; justify-content:center; }
.stage button { padding:0.5rem 1rem; border:1px solid #e2e8f0; background:white; border-radius:0.375rem; cursor:pointer; font-size:0.8rem; }
@media (prefers-color-scheme:dark) { .stage button { background:#1e293b; border-color:#334155; color:#f1f5f9; } }
.stage button.active { background:#6c63ff; color:white; border-color:#6c63ff; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-stepper</h1><p>Stepper progress bar with pulse nodes</p></header>
<div class="stepper-demo">
<div class="ease-stepper" id="stepper">
<div class="ease-step completed"><div class="ease-step-node">✓</div><div class="ease-step-label">Cart</div><div class="ease-step-line filled"></div></div>
<div class="ease-step active"><div class="ease-step-node">2</div><div class="ease-step-label">Shipping</div><div class="ease-step-line"></div></div>
<div class="ease-step"><div class="ease-step-node">3</div><div class="ease-step-label">Payment</div><div class="ease-step-line"></div></div>
<div class="ease-step"><div class="ease-step-node">4</div><div class="ease-step-label">Confirm</div></div>
</div>
<div class="stage"><button onclick="setStep(0)">Cart</button><button onclick="setStep(1)" class="active">Shipping</button><button onclick="setStep(2)">Payment</button><button onclick="setStep(3)">Confirm</button></div>
</div>
<script>
var labels = ['Cart','Shipping','Payment','Confirm'];
var steps = document.getElementById('stepper').children;
function setStep(n){for(var i=0;i<steps.length;i++){var s=steps[i];s.className='ease-step';s.querySelector('.ease-step-node').textContent=i+1;var line=s.querySelector('.ease-step-line');if(line)line.classList.remove('filled');if(i<n){s.classList.add('completed');s.querySelector('.ease-step-node').textContent='✓';if(line)line.classList.add('filled');}else if(i===n){s.classList.add('active');}}}
</script>
</body>
</html>
