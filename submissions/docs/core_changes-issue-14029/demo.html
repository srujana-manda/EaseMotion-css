<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathing Circle — core_changes-issue-14029</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Guided Breathing</h1>
    <p class="sub">Meditation breathing circle — expand/contract with text cues</p>

    <div class="ease-breathe">
      <div class="ease-breathe-circle"></div>
      <div class="ease-breathe-circle-inner"></div>
      <span class="ease-breathe-text" id="breatheText">Breathe In</span>
      <span class="ease-breathe-count" id="breatheCount">4</span>
    </div>

    <div class="phase-label" id="phaseLabel">Inhale slowly through your nose</div>

    <div class="controls">
      <button class="active" data-cycle="8" id="btnSlow">Slow (8s)</button>
      <button data-cycle="6" id="btnMedium">Medium (6s)</button>
      <button data-cycle="4" id="btnFast">Fast (4s)</button>
    </div>
  </div>

  <script>
    const circle = document.querySelector('.ease-breathe-circle');
    const circleInner = document.querySelector('.ease-breathe-circle-inner');
    const text = document.getElementById('breatheText');
    const count = document.getElementById('breatheCount');
    const phase = document.getElementById('phaseLabel');
    let cycleDuration = 8;

    function updateCycle(duration) {
      cycleDuration = duration;
      circle.style.animationDuration = duration + 's';
      circleInner.style.animationDuration = duration + 's';

      const inhaleMs = (duration / 4) * 1000;
      const holdMs = (duration / 4) * 1000;

      clearInterval(window.breatheTimer);
      window.breatheTimer = setInterval(() => {
        const now = (performance.now() / 1000) % duration;
        if (now < duration / 4) {
          text.textContent = 'Breathe In';
          phase.textContent = 'Inhale slowly through your nose';
          count.textContent = Math.ceil(duration / 4 - now) || '';
        } else if (now < duration / 2) {
          text.textContent = 'Hold';
          phase.textContent = 'Hold your breath gently';
          count.textContent = Math.ceil(duration / 2 - now) || '';
        } else if (now < duration * 3 / 4) {
          text.textContent = 'Breathe Out';
          phase.textContent = 'Exhale slowly through your mouth';
          count.textContent = Math.ceil(duration * 3 / 4 - now) || '';
        } else {
          text.textContent = 'Rest';
          phase.textContent = 'Pause and relax';
          count.textContent = Math.ceil(duration - now) || '';
        }
      }, 100);

      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-cycle="' + duration + '"]').classList.add('active');
    }

    document.querySelectorAll('.controls button').forEach(btn => {
      btn.addEventListener('click', () => updateCycle(parseInt(btn.dataset.cycle)));
    });

    updateCycle(8);
  </script>
</body>
</html>
