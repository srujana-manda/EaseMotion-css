<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="playground-header">
    <h1><span>✦</span> EaseMotion Playground</h1>
    <div class="playground-actions">
      <button class="playground-btn" id="btn-reset">Reset</button>
      <button class="playground-btn playground-btn-primary" id="btn-copy">Copy Code</button>
    </div>
  </header>

  <!-- Main -->
  <div class="playground-main">

    <!-- Editor -->
    <div class="playground-editor">
      <div class="playground-editor-header">HTML Editor <span style="color:#64748b;font-weight:400;text-transform:none;letter-spacing:normal;">— Ctrl+Enter to run</span></div>
      <textarea id="playground-input" class="playground-textarea" spellcheck="false" placeholder="Write HTML with EaseMotion classes..."></textarea>
    </div>

    <!-- Resizer -->
    <div class="playground-resizer" id="playground-resizer"></div>

    <!-- Preview -->
    <div class="playground-preview">
      <div class="playground-preview-header">
        Live Preview
        <span class="playground-preview-status" id="preview-status">Ready</span>
      </div>
      <iframe id="playground-iframe" class="playground-iframe" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>

    <!-- Controls -->
    <div class="playground-controls" id="playground-controls">
      <div class="playground-controls-header">Customize</div>

      <div class="playground-control-group">
        <label>Primary Color</label>
        <input type="color" data-css-var="--ease-color-primary" value="#6c63ff">
      </div>

      <div class="playground-control-group">
        <label>Fast Speed</label>
        <input type="range" data-css-var="--ease-speed-fast" data-unit="ms" min="50" max="500" value="150">
        <div class="playground-control-value" data-css-var-display="--ease-speed-fast">150ms</div>
      </div>

      <div class="playground-control-group">
        <label>Medium Speed</label>
        <input type="range" data-css-var="--ease-speed-medium" data-unit="ms" min="100" max="1000" value="300">
        <div class="playground-control-value" data-css-var-display="--ease-speed-medium">300ms</div>
      </div>

      <div class="playground-control-group">
        <label>Slow Speed</label>
        <input type="range" data-css-var="--ease-speed-slow" data-unit="ms" min="200" max="2000" value="600">
        <div class="playground-control-value" data-css-var-display="--ease-speed-slow">600ms</div>
      </div>

      <!-- Class Browser -->
      <div class="playground-class-browser">
        <div class="playground-controls-header" style="padding:0 0 0.5rem;border:none;">Class Browser</div>
        <input type="text" id="class-search" class="playground-class-search" placeholder="Search classes...">
        <div class="playground-class-list" id="class-list"></div>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div class="playground-toast" id="playground-toast"></div>

  <script src="playground.js"></script>
</body>
</html>
