<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skeleton — EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 2rem; background: #f9fafb; color: #111; }
h1 { margin-bottom: .5rem; }
section { background: #fff; padding: 1.5rem; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
h2 { margin: 0 0 1rem; font-size: 1rem; color: #374151; }
code { background: #e5e7eb; padding: .15em .4em; border-radius: 4px; font-size: .85em; }
.demo-row { display: flex; gap: 1.5rem; align-items: flex-start; flex-wrap: wrap; }
</style>
</head>
<body>

<h1>Skeleton / Placeholder</h1>

<section>
<h2>Text Skeletons</h2>
<span class="ease-skeleton ease-skeleton-text"></span>
<span class="ease-skeleton ease-skeleton-text"></span>
<span class="ease-skeleton ease-skeleton-text"></span>
</section>

<section>
<h2>Text Sizes</h2>
<div style="display:flex;flex-direction:column;gap:.5rem">
  <span class="ease-skeleton ease-skeleton-text ease-skeleton-text-sm" style="width:40%"></span>
  <span class="ease-skeleton ease-skeleton-text" style="width:65%"></span>
  <span class="ease-skeleton ease-skeleton-text ease-skeleton-text-lg" style="width:80%"></span>
</div>
</section>

<section>
<h2>Circle (Avatar) Skeletons</h2>
<div class="demo-row">
  <span class="ease-skeleton ease-skeleton-circle ease-skeleton-circle-sm"></span>
  <span class="ease-skeleton ease-skeleton-circle ease-skeleton-circle-md"></span>
  <span class="ease-skeleton ease-skeleton-circle ease-skeleton-circle-lg"></span>
</div>
</section>

<section>
<h2>Rectangle Skeletons</h2>
<div style="display:flex;flex-direction:column;gap:.75rem">
  <span class="ease-skeleton ease-skeleton-rect ease-skeleton-rect-sm"></span>
  <span class="ease-skeleton ease-skeleton-rect ease-skeleton-rect-md"></span>
</div>
</section>

<section>
<h2>Card Skeleton (composition)</h2>
<div style="max-width:320px">
  <span class="ease-skeleton ease-skeleton-rect ease-skeleton-rect-sm" style="border-radius:12px 12px 0 0"></span>
  <div style="padding:1rem">
    <span class="ease-skeleton ease-skeleton-text ease-skeleton-text-lg" style="width:75%"></span>
    <span class="ease-skeleton ease-skeleton-text" style="width:100%"></span>
    <span class="ease-skeleton ease-skeleton-text" style="width:60%"></span>
  </div>
</div>
</section>

</body>
</html>
