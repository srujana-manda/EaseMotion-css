<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-dock — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; padding: 2rem;
    }
    .demo-header {
      text-align: center; color: white; margin-bottom: auto; padding-top: 3rem;
    }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    .demo-header p { opacity: 0.8; margin-top: 0.5rem; }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px; padding: 0.3em 0.75em; color: #e2e8f0; margin-bottom: 0.75rem;
    }
    .dock-section { margin-bottom: 3rem; }
    .dock-wrapper {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .dock-label { font-size: 0.7rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.1em; }

    .custom-dock {
      --ease-dock-gap: 0.5rem;
      --ease-dock-size: 56px;
    }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-dock</h1>
  <p>macOS-inspired dock navigation — pure CSS</p>
</header>

<div class="dock-wrapper">
  <div class="dock-label">Default</div>
  <div class="class-tag">.ease-dock</div>
  <nav class="ease-dock">
    <a class="ease-dock-item active">
      <span class="ease-dock-icon">🔍</span>
      <span class="ease-dock-label">Finder</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">📁</span>
      <span class="ease-dock-label">Documents</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">📧</span>
      <span class="ease-dock-label">Mail</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">🌐</span>
      <span class="ease-dock-label">Safari</span>
    </a>
    <div class="ease-dock-divider"></div>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">🗑️</span>
      <span class="ease-dock-label">Trash</span>
    </a>
  </nav>
</div>

<div class="dock-wrapper">
  <div class="dock-label">Dark + Magnify</div>
  <div class="class-tag">.ease-dock-dark .ease-dock-magnify</div>
  <nav class="ease-dock ease-dock-dark ease-dock-magnify">
    <a class="ease-dock-item">
      <span class="ease-dock-icon">⚙️</span>
      <span class="ease-dock-label">Settings</span>
    </a>
    <a class="ease-dock-item active">
      <span class="ease-dock-icon">🎵</span>
      <span class="ease-dock-label">Music</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">📷</span>
      <span class="ease-dock-label">Photos</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">💬</span>
      <span class="ease-dock-label">Messages</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">📅</span>
      <span class="ease-dock-label">Calendar</span>
    </a>
  </nav>
</div>

<div class="dock-wrapper">
  <div class="dock-label">Custom Size</div>
  <div class="class-tag">.ease-dock with custom properties</div>
  <nav class="ease-dock custom-dock ease-dock-magnify" style="--ease-dock-scale: 1.8;">
    <a class="ease-dock-item">
      <span class="ease-dock-icon">🎮</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">📱</span>
    </a>
    <a class="ease-dock-item active">
      <span class="ease-dock-icon">💻</span>
    </a>
    <a class="ease-dock-item">
      <span class="ease-dock-icon">⌚</span>
    </a>
  </nav>
</div>
</body>
</html>
