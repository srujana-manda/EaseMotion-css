<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-speed-dial — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #1e293b; padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
    }
    .demo-header { text-align: center; margin-bottom: 3rem; }
    .demo-header h1 { font-size: clamp(2rem, 5vw, 3rem); }
    .demo-header p { color: #64748b; margin-top: 0.5rem; }
    .demo-section { max-width: 720px; margin: 0 auto 2.5rem; }
    .demo-section h2 {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: #6c63ff; margin-bottom: 0.75rem;
    }
    .class-tag {
      display: inline-block; font-size: 0.65rem; font-family: monospace;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 999px; padding: 0.3em 0.75em; color: #6c63ff; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .class-tag { background: #1e293b; border-color: #334155; }
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3rem; max-width: 600px; margin: 0 auto;
    }
    .demo-cell {
      display: flex; align-items: center; justify-content: center;
      min-height: 200px;
    }
    .note { text-align: center; font-size: 0.8rem; color: #64748b; margin-top: 2rem; }
  </style>
</head>
<body>
<header class="demo-header">
  <h1>ease-speed-dial</h1>
  <p>Floating action button speed dial — click to expand</p>
</header>

<section class="demo-section">
  <h2>Directions</h2>
  <p style="font-size:0.875rem;color:#64748b;margin-bottom:1.5rem;">Click each FAB to toggle the speed dial.</p>
  <div class="demo-grid">
    <div class="demo-cell">
      <div>
        <div class="class-tag" style="display:block;text-align:center;margin-bottom:0.5rem;">.ease-speed-dial-up</div>
        <div class="ease-speed-dial ease-speed-dial-up" id="dial-up">
          <button class="ease-speed-dial-fab" onclick="toggle('dial-up')">+</button>
          <div class="ease-speed-dial-actions">
            <button class="ease-speed-dial-action" title="Camera">📷</button>
            <button class="ease-speed-dial-action" title="File">📎</button>
            <button class="ease-speed-dial-action" title="Doc">📄</button>
          </div>
        </div>
      </div>
    </div>
    <div class="demo-cell">
      <div>
        <div class="class-tag" style="display:block;text-align:center;margin-bottom:0.5rem;">.ease-speed-dial-down</div>
        <div class="ease-speed-dial ease-speed-dial-down" id="dial-down">
          <button class="ease-speed-dial-fab" onclick="toggle('dial-down')">+</button>
          <div class="ease-speed-dial-actions">
            <button class="ease-speed-dial-action">⭐</button>
            <button class="ease-speed-dial-action">🔔</button>
            <button class="ease-speed-dial-action">⚙️</button>
          </div>
        </div>
      </div>
    </div>
    <div class="demo-cell">
      <div>
        <div class="class-tag" style="display:block;text-align:center;margin-bottom:0.5rem;">.ease-speed-dial-right</div>
        <div class="ease-speed-dial ease-speed-dial-right" id="dial-right">
          <button class="ease-speed-dial-fab" onclick="toggle('dial-right')">+</button>
          <div class="ease-speed-dial-actions">
            <button class="ease-speed-dial-action">✏️</button>
            <button class="ease-speed-dial-action">📋</button>
            <button class="ease-speed-dial-action">🗑️</button>
          </div>
        </div>
      </div>
    </div>
    <div class="demo-cell">
      <div>
        <div class="class-tag" style="display:block;text-align:center;margin-bottom:0.5rem;">.ease-speed-dial-left</div>
        <div class="ease-speed-dial ease-speed-dial-left" id="dial-left">
          <button class="ease-speed-dial-fab" onclick="toggle('dial-left')">+</button>
          <div class="ease-speed-dial-actions">
            <button class="ease-speed-dial-action">🎨</button>
            <button class="ease-speed-dial-action">📊</button>
            <button class="ease-speed-dial-action">📝</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<p class="note">The FAB rotates 45° when active. Actions fade and slide in. Click the FAB to toggle.</p>

<script>
function toggle(id) {
  document.getElementById(id).classList.toggle('active');
}
</script>
</body>
</html>
