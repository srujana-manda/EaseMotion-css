<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaming ProgressBar — EaseMotion CSS Showcase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1 class="page-title">GAMING PROGRESSBAR</h1>
      <p class="page-subtitle">A neon-lit loading bar combining glow, pulse, shimmer, and stripe utilities.</p>
    </header>

    <!-- Variant 1: Health Bar -->
    <section class="showcase-block">
      <div class="stat-row">
        <span class="stat-label stat-label--hp">HP</span>
        <span class="stat-value">245 / 300</span>
      </div>
      <div class="gaming-bar gaming-bar--hp">
        <div class="gaming-bar__fill" style="width: 82%;">
          <span class="gaming-bar__shimmer"></span>
          <span class="gaming-bar__stripes"></span>
        </div>
      </div>
    </section>

    <!-- Variant 2: Mana Bar -->
    <section class="showcase-block">
      <div class="stat-row">
        <span class="stat-label stat-label--mp">MANA</span>
        <span class="stat-value">120 / 200</span>
      </div>
      <div class="gaming-bar gaming-bar--mp">
        <div class="gaming-bar__fill" style="width: 60%;">
          <span class="gaming-bar__shimmer"></span>
          <span class="gaming-bar__stripes"></span>
        </div>
      </div>
    </section>

    <!-- Variant 3: XP Bar (loading style) -->
    <section class="showcase-block">
      <div class="stat-row">
        <span class="stat-label stat-label--xp">LEVEL 42 — XP</span>
        <span class="stat-value">7,340 / 10,000</span>
      </div>
      <div class="gaming-bar gaming-bar--xp">
        <div class="gaming-bar__fill" style="width: 73%;">
          <span class="gaming-bar__shimmer"></span>
          <span class="gaming-bar__stripes"></span>
        </div>
      </div>
    </section>

    <!-- Variant 4: Boss Loading (indeterminate) -->
    <section class="showcase-block">
      <div class="stat-row">
        <span class="stat-label stat-label--boss">⚔ BOSS INCOMING</span>
        <span class="stat-value stat-value--pulse">LOADING...</span>
      </div>
      <div class="gaming-bar gaming-bar--boss">
        <div class="gaming-bar__fill gaming-bar__fill--indeterminate">
          <span class="gaming-bar__shimmer"></span>
          <span class="gaming-bar__stripes"></span>
        </div>
      </div>
    </section>

    <!-- Variant 5: Compact stacked HUD -->
    <section class="showcase-block hud-block">
      <h2 class="hud-title">PLAYER HUD</h2>
      <div class="hud-row">
        <span class="hud-icon">♥</span>
        <div class="gaming-bar gaming-bar--sm gaming-bar--hp">
          <div class="gaming-bar__fill" style="width: 95%;">
            <span class="gaming-bar__shimmer"></span>
          </div>
        </div>
      </div>
      <div class="hud-row">
        <span class="hud-icon">✦</span>
        <div class="gaming-bar gaming-bar--sm gaming-bar--mp">
          <div class="gaming-bar__fill" style="width: 40%;">
            <span class="gaming-bar__shimmer"></span>
          </div>
        </div>
      </div>
      <div class="hud-row">
        <span class="hud-icon">★</span>
        <div class="gaming-bar gaming-bar--sm gaming-bar--xp">
          <div class="gaming-bar__fill" style="width: 68%;">
            <span class="gaming-bar__shimmer"></span>
          </div>
        </div>
      </div>
    </section>

    <footer class="page-footer">
      <p>Author: <strong>soumyasekharshee265-ux</strong> — EaseMotion CSS Core & Docs Showcase</p>
    </footer>
  </main>
</body>
</html>
