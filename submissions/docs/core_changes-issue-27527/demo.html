<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-table — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } .ease-table th { background:#1e293b; color:#94a3b8; } .ease-table td { color:#f1f5f9; border-color:#334155; } .ease-table th { border-color:#334155; } .ease-table tbody tr:hover { background:#1e293b; } }
.demo-header { text-align:center; margin-bottom:2rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-table</h1><p>Data table with sortable columns</p></header>
<div class="ease-table-wrap">
<table class="ease-table" id="dataTable">
<thead><tr><th onclick="sortTable(0)">Name <span class="ease-sort-icon">⇅</span></th><th onclick="sortTable(1)">Status <span class="ease-sort-icon">⇅</span></th><th onclick="sortTable(2)">Priority <span class="ease-sort-icon">⇅</span></th><th onclick="sortTable(3)">Assignee <span class="ease-sort-icon">⇅</span></th></tr></thead>
<tbody id="tableBody">
<tr><td>Project Alpha</td><td><span class="ease-badge-status active">Active</span></td><td><span class="ease-badge-priority high">High</span></td><td>Alice</td></tr>
<tr><td>Beta Release</td><td><span class="ease-badge-status review">Review</span></td><td><span class="ease-badge-priority medium">Medium</span></td><td>Bob</td></tr>
<tr><td>Dashboard Redesign</td><td><span class="ease-badge-status done">Done</span></td><td><span class="ease-badge-priority high">High</span></td><td>Carol</td></tr>
<tr><td>API Integration</td><td><span class="ease-badge-status active">Active</span></td><td><span class="ease-badge-priority low">Low</span></td><td>Dave</td></tr>
<tr><td>User Testing</td><td><span class="ease-badge-status review">Review</span></td><td><span class="ease-badge-priority medium">Medium</span></td><td>Eve</td></tr>
</tbody>
</table>
</div>
</body>
</html>
