<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Toggle Switch — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <main class="wrapper">
    <header class="demo-header">
      <p class="badge">EaseMotion CSS</p>
      <h1>Animated Toggle Switch</h1>
      <p>CSS-only toggle with size variants, icon modes, and reduced-motion support.</p>
    </header>

    <!-- Small -->
    <section class="demo-section" aria-label="Small toggle demo">
      <h2 class="section-title">Small</h2>

      <label class="toggle toggle-sm">
        <input type="checkbox" />
        <span class="track"><span class="knob"></span></span>
        <span class="label-text">Wi-Fi</span>
      </label>

      <label class="toggle toggle-sm">
        <input type="checkbox" checked />
        <span class="track"><span class="knob"><span class="icon-check">✓</span></span></span>
        <span class="label-text">Bluetooth</span>
      </label>
    </section>

    <!-- Default -->
    <section class="demo-section" aria-label="Default toggle demo">
      <h2 class="section-title">Default</h2>

      <label class="toggle">
        <input type="checkbox" />
        <span class="track"><span class="knob"></span></span>
        <span class="label-text">Dark Mode</span>
      </label>

      <label class="toggle">
        <input type="checkbox" checked />
        <span class="track"><span class="knob"><span class="icon-moon">☾</span></span></span>
        <span class="label-text">Dark Mode</span>
      </label>
    </section>

    <!-- Large -->
    <section class="demo-section" aria-label="Large toggle demo">
      <h2 class="section-title">Large</h2>

      <label class="toggle toggle-lg">
        <input type="checkbox" />
        <span class="track"><span class="knob"></span></span>
        <span class="label-text">Notifications</span>
      </label>

      <label class="toggle toggle-lg">
        <input type="checkbox" checked />
        <span class="track"><span class="knob"><span class="icon-cross">✕</span></span></span>
        <span class="label-text">Notifications</span>
      </label>
    </section>

    <!-- All sizes overview -->
    <section class="demo-section" aria-label="Size comparison">
      <h2 class="section-title">Size Comparison</h2>
      <div class="size-row">
        <label class="toggle toggle-sm">
          <input type="checkbox" />
          <span class="track"><span class="knob"></span></span>
          <span class="label-text">sm</span>
        </label>
        <label class="toggle">
          <input type="checkbox" checked />
          <span class="track"><span class="knob"><span class="icon-check">✓</span></span></span>
          <span class="label-text">md</span>
        </label>
        <label class="toggle toggle-lg">
          <input type="checkbox" />
          <span class="track"><span class="knob"><span class="icon-cross">✕</span></span></span>
          <span class="label-text">lg</span>
        </label>
      </div>
    </section>
  </main>

</body>
</html>
