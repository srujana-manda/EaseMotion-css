<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Parallax Background</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background layer-back"></div>
    <div class="background layer-middle"></div>
    <div class="background layer-front"></div>

    <div class="content">
        <h1>Mouse Parallax Background</h1>
        <p>Move your mouse to experience the depth effect.</p>

        <div class="controls">
            <label>
                <input type="checkbox" id="toggleParallax" checked>
                     Enable Parallax
            </label>
            <label for="strength">
                Parallax Strength:
            </label>

            <input
                type="range"
                id="strength"
                min="5"
                max="50"
                value="25">

            <span id="strengthValue">25</span>
        </div>

        <button id="resetBtn">
            Reset Position
        </button>
    </div>

<script>
const root = document.documentElement;

const slider = document.getElementById("strength");
const value = document.getElementById("strengthValue");
const reset = document.getElementById("resetBtn");
const toggle = document.getElementById("toggleParallax");

let strength = Number(slider.value);
let enabled = true;

slider.addEventListener("input", () => {
    strength = Number(slider.value);
    value.textContent = strength;
});

toggle.addEventListener("change", () => {
    enabled = toggle.checked;

    if (!enabled) {
        root.style.setProperty("--ease-mouse-x", "0px");
        root.style.setProperty("--ease-mouse-y", "0px");
    }
});

document.addEventListener("mousemove", (e) => {

    if (!enabled) return;

    const x = (window.innerWidth / 2 - e.clientX) / strength;
    const y = (window.innerHeight / 2 - e.clientY) / strength;

    root.style.setProperty("--ease-mouse-x", `${x}px`);
    root.style.setProperty("--ease-mouse-y", `${y}px`);
});

document.addEventListener("touchmove", (e) => {

    e.preventDefault();

    if (!enabled) return;

    const touch = e.touches[0];

    const x = (window.innerWidth / 2 - touch.clientX) / strength;
    const y = (window.innerHeight / 2 - touch.clientY) / strength;

    root.style.setProperty("--ease-mouse-x", `${x}px`);
    root.style.setProperty("--ease-mouse-y", `${y}px`);
    
}, { passive: false });

reset.addEventListener("click", () => {

    strength = 25;

    slider.value = 25;
    value.textContent = 25;

    enabled = true;
    toggle.checked = true;

    root.style.setProperty("--ease-mouse-x", "0px");
    root.style.setProperty("--ease-mouse-y", "0px");
});
</script>

</body>

</html>
