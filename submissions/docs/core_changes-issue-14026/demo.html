<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Emoji Select — core_changes-issue-14026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Mood Selector</h1>
    <p class="sub">Animated mood/emotion selector with bounce — Issue #14026</p>

    <div class="prompt">How are you feeling today?</div>

    <div class="mood-grid" id="moodGrid">
      <div class="mood-option" data-mood="Awesome" data-emoji="&#128513;" tabindex="0" role="radio" aria-checked="false" aria-label="Awesome">&#128513;</div>
      <div class="mood-option" data-mood="Happy" data-emoji="&#128522;" tabindex="-1" role="radio" aria-checked="false" aria-label="Happy">&#128522;</div>
      <div class="mood-option" data-mood="Neutral" data-emoji="&#128528;" tabindex="-1" role="radio" aria-checked="false" aria-label="Neutral">&#128528;</div>
      <div class="mood-option" data-mood="Sad" data-emoji="&#128542;" tabindex="-1" role="radio" aria-checked="false" aria-label="Sad">&#128542;</div>
      <div class="mood-option" data-mood="Tired" data-emoji="&#128564;" tabindex="-1" role="radio" aria-checked="false" aria-label="Tired">&#128564;</div>
      <div class="mood-option" data-mood="Loved" data-emoji="&#128525;" tabindex="-1" role="radio" aria-checked="false" aria-label="Loved">&#128525;</div>
      <div class="mood-option" data-mood="Cool" data-emoji="&#128526;" tabindex="-1" role="radio" aria-checked="false" aria-label="Cool">&#128526;</div>
      <div class="mood-option" data-mood="Sick" data-emoji="&#129298;" tabindex="-1" role="radio" aria-checked="false" aria-label="Sick">&#129298;</div>
    </div>

    <div class="selected-label" id="selectedDisplay">Tap a mood above</div>
  </div>

  <script>
    const options = document.querySelectorAll('.mood-option');
    const display = document.getElementById('selectedDisplay');

    options.forEach(opt => {
      opt.addEventListener('click', () => selectMood(opt));
      opt.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectMood(opt); }
      });
    });

    function selectMood(el) {
      options.forEach(o => {
        o.classList.remove('selected');
        o.setAttribute('aria-checked', 'false');
        o.tabIndex = '-1';
      });
      el.classList.add('selected');
      el.setAttribute('aria-checked', 'true');
      el.tabIndex = '0';
      el.focus();
      display.innerHTML = '<span class="emoji">' + el.dataset.emoji + '</span> ' + el.dataset.mood;
    }
  </script>
</body>
</html>
