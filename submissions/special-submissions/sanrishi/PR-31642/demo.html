<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Border Glow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Avatar Border Glow</h1>
    <p class="desc">Hover the avatars to see the border glow effect</p>
    <div class="dp-card">
      <div class="dp-row">
        <div class="dp-item" style="--dp-bg: #e94560;">
          <span class="dp-label">Aa</span>
          <div class="dp-tip">
            <div class="dp-tip-body">
              <strong>Alpha</strong>
              <span>Designer</span>
            </div>
          </div>
        </div>
        <div class="dp-item" style="--dp-bg: #60a5fa;">
          <span class="dp-label">Bb</span>
          <div class="dp-tip">
            <div class="dp-tip-body">
              <strong>Bravo</strong>
              <span>Developer</span>
            </div>
          </div>
        </div>
        <div class="dp-item" style="--dp-bg: #34d399;">
          <span class="dp-label">Cc</span>
          <div class="dp-tip">
            <div class="dp-tip-body">
              <strong>Charlie</strong>
              <span>Manager</span>
            </div>
          </div>
        </div>
        <div class="dp-item" style="--dp-bg: #f59e0b;">
          <span class="dp-label">Dd</span>
          <div class="dp-tip">
            <div class="dp-tip-body">
              <strong>Delta</strong>
              <span>Engineer</span>
            </div>
          </div>
        </div>
        <div class="dp-item" style="--dp-bg: #a78bfa;">
          <span class="dp-label">Ee</span>
          <div class="dp-tip">
            <div class="dp-tip-body">
              <strong>Echo</strong>
              <span>Analyst</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
